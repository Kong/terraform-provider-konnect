      - "konnect/definitions/control-planes-config/v2/**/openapi.yaml#/paths/~1control-planes~1%7BcontrolPlaneId%7D~1core-entities~1plugins"
      - "konnect/definitions/control-planes-config/v2/**/openapi.yaml#/paths/~1control-planes~1%7BcontrolPlaneId%7D~1core-entities~1plugins~1%7Bplugin_id_or_instance_name%7D"
      - "konnect/definitions/control-planes-config/v2/**/openapi.yaml#/paths/~1control-planes~1%7BcontrolPlaneId%7D~1core-entities~1snis"
      - "konnect/definitions/control-planes-config/v2/**/openapi.yaml#/paths/~1control-planes~1%7BcontrolPlaneId%7D~1core-entities~1snis~1%7Bsni_id%7D"
      - "konnect/definitions/control-planes-config/v2/**/openapi.yaml#/paths/~1control-planes~1%7BcontrolPlaneId%7D~1core-entities~1upstreams"
      - "konnect/definitions/control-planes-config/v2/**/openapi.yaml#/paths/~1control-planes~1%7BcontrolPlaneId%7D~1core-entities~1upstreams~1%7Bupstream_id%7D"
      - "konnect/definitions/control-planes-config/v2/**/openapi.yaml#/paths/~1control-planes~1%7BcontrolPlaneId%7D~1core-entities~1upstreams~1%7Bupstream_id%7D~1targets"
      - "konnect/definitions/control-planes-config/v2/**/openapi.yaml#/paths/~1control-planes~1%7BcontrolPlaneId%7D~1core-entities~1upstreams~1%7Bupstream_id%7D~1targets~1%7Btarget_id%7D"
      - "konnect/definitions/control-planes-config/v2/**/openapi.yaml#/paths/~1control-planes~1%7BcontrolPlaneId%7D~1core-entities~1vaults"
      - "konnect/definitions/control-planes-config/v2/**/openapi.yaml#/paths/~1control-planes~1%7BcontrolPlaneId%7D~1core-entities~1vaults~1%7Bvault_id_or_prefix%7D"
      - "konnect/definitions/control-planes-config/v2/**/openapi.yaml#/paths/~1control-planes~1%7BcontrolPlaneId%7D~1core-entities~1schemas~1plugins~1%7Bplugin_name%7D"
      - "konnect/definitions/control-planes-config/v2/**/openapi.yaml#/paths/~1control-planes~1%7BcontrolPlaneId%7D~1core-entities~1debug~1node~1log-level"
