      - "konnect/definitions/control-planes-config/v2/**/openapi.yaml#/paths/~1control-planes~1%7BcontrolPlaneId%7D~1core-entities~1certificates~1%7Bcertificate_id%7D~1snis~1%7Bsni_id%7D"
      - "konnect/definitions/control-planes-config/v2/**/openapi.yaml#/paths/~1control-planes~1%7BcontrolPlaneId%7D~1core-entities~1consumers"
