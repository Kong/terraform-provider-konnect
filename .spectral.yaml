      - "konnect/definitions/control-planes-config/v2/**/openapi.yaml#/paths/~1control-planes~1%7BcontrolPlaneId%7D~1core-entities~1consumers~1%7Bconsumer_id%7D~1plugins~1%7Bplugin_id_or_instance_name%7D"
      - "konnect/definitions/control-planes-config/v2/**/openapi.yaml#/paths/~1control-planes~1%7BcontrolPlaneId%7D~1core-entities~1consumers~1%7Bconsumer_id%7D~1consumer_groups"
      - "konnect/definitions/control-planes-config/v2/**/openapi.yaml#/paths/~1control-planes~1%7BcontrolPlaneId%7D~1core-entities~1consumer_groups"
