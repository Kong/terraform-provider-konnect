extends:
  - "spectral:oas"
rules:
  # ---------------------------------------------------------------------------
  # Schema rules
  # ---------------------------------------------------------------------------
  info-version-semver:
    severity: error
    recommended: true
    message: Specs should follow semantic versioning. {{value}} is not a valid version.
    given: $.info.version
    then:
      function: pattern
      functionOptions:
        match: "^([0-9]+.[0-9]+.[0-9]+)$"

  path-summary-required:
    description: All paths require a summary
    severity: error
    message: Missing {{property}} at {{path}}
    given: $.paths.*[get,post,patch,put,delete]
    then:
      - field: "summary"
        function: truthy

  adv-parameter-property-include-id-check:
    description: |-
      If property or path parameters contain 'ID' it should have Id instead of ID.
    severity: warn
    message: >-
      {{property}} contains the letters ID, If this is short for identifier it MAY be Id instead.
    given:
      - $..parameters..name
      - $.components.schemas[*]..properties[*]~
    then:
      function: pattern
      functionOptions:
        notMatch: /.*([^A-Z])(ID)(?![A-Z])+.*/

  oas-version:
    severity: error
    description: OAS version 3.1.x is unsupported.
    message: >-
      OAS version {{value}} is unsupported. Only OAS versions 3.0.x are supported.
    given: $
    then:
      field: openapi
      function: pattern
      functionOptions:
        match: '^(3\.0\.[0-3]+)$'

  server-not-include-variables:
    description: Server block must not contain variables
    severity: error
    recommended: true
    message: "{{property}} must not contain any variables"
    given:
      - $.servers[*].url
    then:
      function: pattern
      functionOptions:
        notMatch: "[{}]"

  server-in-approved-list:
    description: Server block must be us, eu or global.api.konghq.com
    severity: error
    recommended: true
    message: "{{error}}"
    given:
      - $.servers[*].url
    then:
      function: pattern
      functionOptions:
        match: "https://(us|eu|global).api.konghq.com/v(\\d+)"

  title-prefix:
    severity: error
    description: "Titles must be prefixed with their product. One of [Konnect, Portal, Gateway]"
    message: >-
      "{{value}}" must start with "Konnect", "Portal" or "Gateway"
    given: $.info.title
    then:
      function: pattern
      functionOptions:
        match: '^(Konnect|Portal|Gateway)'
  title-no-api-suffix:
    severity: error
    description: "Titles must not end with 'API'"
    message: >-
      "{{value}}" must not have an "API" suffix
    given: $.info.title
    then:
      function: pattern
      functionOptions:
        notMatch: 'API\s?$'

  # ---------------------------------------------------------------------------
  # API Rules
  # ---------------------------------------------------------------------------

  server-url-must-contain-version-aip-3101:
    description: Global API version must be present in the path
    severity: error
    recommended: true
    message: "Unversioned server URL detected: {{value}}"
    given: "$.servers[*].url"
    then:
      function: pattern
      functionOptions:
        match: "\/v[1-9]+\/"

  paths-kebab-case-aip-122:
    description: All YAML/JSON paths MUST follow kebab-case
    severity: error
    recommended: true
    message: "{{property}} is not kebab-case"
    given: $.paths[*]~
    then:
      function: pattern
      functionOptions:
        match: "^((\/[-a-z0-9]+)|(\/{[-a-zA-Z]+}))*(\\.\\w+)?$" # doesn't allow /asasd{asdas}sadas pattern or not closed braces

  paths-not-include-api:
    description: Paths must not include /api/
    severity: error
    recommended: true
    message: "{{property}} must not contain /api/"
    given:
      - $.paths[*]~
      - $.servers[*].url
    then:
      function: pattern
      functionOptions:
        notMatch: "\/api\/|\/api$"

  path-parameters-camelCase-alphanumeric:
    description: Path parameters MUST follow camelCase
    severity: error
    recommended: true
    message: "{{property}} path parameter is not camelCase: {{error}}"
    given: $..parameters[?(@.in == 'path')].name
    then:
      function: pattern
      functionOptions:
        match: "^[a-z][a-zA-Z0-9]+$"

  properties-snake-case-aip-122:
    description: Property name has to be ASCII snake_case
    severity: error
    recommended: true
    message: "Invalid property name: {{value}} (expected: lowercase with underscores)"
    given:
      - $.paths.*.*[responses,requestBody]..content..schema.properties.*~
      - $..components.schemas.*.properties[*]~
      # If you're seeing this on a $ref then check where it's used
      # as it's likely that the parent property name is incorrect
      # This is a bug in Spectral
      - $.paths.*[post,get,patch,put,delete].parameters[?(@.in == "query")].schema.properties.*~
    then:
      function: pattern
      functionOptions:
        match: "^[a-z_]+$"

  query-parameters-properties-snake-case-and-square-brackets-aip-122:
    description: Query parameters must be snake case. Square brackets are allowed (e.g. page[number]=1)
    severity: error
    recommended: true
    message: "Invalid property name: {{value}} (expected: lowercase with underscores)"
    given:
      - $..parameters[?(@.in == 'query')].name
    then:
      function: pattern
      functionOptions:
        match: "^[a-z_\\[\\]]+$"

  query-parameters-filter-deepobject:
    severity: error
    description: Filter parameters must set style=deepObject
    given: "$..parameters[?(@.in == 'query' && @.name == 'filter')]*"
    then:
      - field: style
        function: truthy
        message: "{{property}}: {{ description }}"
      - field: style
        message: "{{property}}: {{ description }}"
        function: pattern
        functionOptions:
          match: /^deepObject$/

  headers-hyphenated-pascal-case:
    description: All `HTTP` headers MUST use `Hyphenated-Pascal-Case` notation
    severity: error
    given: "$..parameters[?(@.in == 'header')].name"
    message: "'HTTP' headers MUST follow 'Hyphenated-Pascal-Case' notation"
    recommended: true
    type: style
    then:
      function: pattern
      functionOptions:
        match: "/^([A-Z][a-z0-9]-)*([A-Z][a-z0-9])+/"

  request-GET-no-body:
    description: "A 'GET' request MUST NOT accept a 'body` parameter"
    severity: error
    given: $.paths..get.requestBody
    then:
      function: pattern
      functionOptions:
        notMatch: "/^body$/"

  errors-problem-json-aip-193:
    description: "Errors must use application/problem+json"
    severity: error
    given:
      - $..400.content.*~
      - $..401.content.*~
      - $..402.content.*~
      - $..403.content.*~
      - $..404.content.*~
      - $..405.content.*~
      - $..406.content.*~
      - $..407.content.*~
      - $..408.content.*~
      - $..409.content.*~
      - $..410.content.*~
      - $..411.content.*~
      - $..412.content.*~
      - $..413.content.*~
      - $..414.content.*~
      - $..415.content.*~
      - $..416.content.*~
      - $..417.content.*~
      - $..418.content.*~
      - $..422.content.*~
      - $..425.content.*~
      - $..426.content.*~
      - $..428.content.*~
      - $..429.content.*~
      - $..431.content.*~
      - $..451.content.*~
    then:
      function: pattern
      functionOptions:
        match: 'application/problem\+json'

  errors-require-type-aip-193:
    severity: error
    given:
      - $..401.content.*.schema
      - $..402.content.*.schema
      - $..403.content.*.schema
      - $..404.content.*.schema
      - $..405.content.*.schema
      - $..406.content.*.schema
      - $..407.content.*.schema
      - $..408.content.*.schema
      - $..409.content.*.schema
      - $..410.content.*.schema
      - $..411.content.*.schema
      - $..412.content.*.schema
      - $..413.content.*.schema
      - $..414.content.*.schema
      - $..415.content.*.schema
      - $..416.content.*.schema
      - $..417.content.*.schema
      - $..418.content.*.schema
      - $..422.content.*.schema
      - $..425.content.*.schema
      - $..426.content.*.schema
      - $..428.content.*.schema
      - $..429.content.*.schema
      - $..431.content.*.schema
      - $..451.content.*.schema
    then:
      field: properties
      function: schema
      functionOptions:
        allErrors: true
        schema:
          type: object
          required:
            - type
            - status
            - title
            - instance

  validation-error-invalid-parameters-aip-193:
    severity: error
    given:
      - $..400.content.*.schema
    then:
      field: properties
      function: schema
      functionOptions:
        allErrors: true
        schema:
          type: object
          required:
            - invalid_parameters
          properties:
            invalid_parameters:
              type: object
              properties:
                items:
                  type: object
                  properties:
                    properties:
                      type: object
                      required:
                        - field
                        - rule

  errors-delete-contains-404-aip-135:
    description: "DELETE operations must contain a 404 (returned when an ID is not found)"
    severity: error
    given:
      - $.paths..delete
    then:
      field: responses
      function: schema
      functionOptions:
        schema:
          type: object
          required:
            - "404"

  errors-post-not-contain-200:
    description: "POST operations must not contain a 200 (created must return 201)"
    severity: error
    given:
      - $.paths..post
    then:
      field: responses
      function: schema
      functionOptions:
        schema:
          not:
            type: object
            required:
              - "200"

overrides:
  - files:
    # verify domain override
    - "konnect/definitions/portal-management/v2/**/openapi.yaml#/paths/~1portals~1%7BportalId%7D~1verify-domain/post/responses"
    rules:
      errors-post-not-contain-200: "off"
  - files:
      - "konnect/definitions/mesh-control-planes/v0/**/openapi.yaml"
    rules:
      server-url-must-contain-version-aip-3101: "off"
      oas3-valid-media-example: "off" # page[number] is not defined in AIP
  - files:
      - "konnect/definitions/audit-logs/v2/**/openapi.yaml"
    rules:
      errors-require-type-aip-193: "off"
      validation-error-invalid-parameters-aip-193: "off"
  - files:
      - "konnect/definitions/identity/v2/**/openapi.yaml"
      - "konnect/definitions/identity/v3/**/openapi.yaml"
    rules:
      errors-require-type-aip-193: "off"
      validation-error-invalid-parameters-aip-193: "off"
  - files:
      - "konnect/definitions/runtime-groups/v2/**/openapi.yaml"
      - "konnect/definitions/control-planes/v2/**/openapi.yaml"
    rules:
      errors-require-type-aip-193: "off"
      validation-error-invalid-parameters-aip-193: "off"
  - files:
      - "portal/definitions/products/**/openapi.yaml"
    rules:
      errors-require-type-aip-193: "off"
      validation-error-invalid-parameters-aip-193: "off"
  - files:
      - "portal/definitions/**/*"
      - "output/portal/*"
    rules:
      paths-not-include-api: "off"
      oas3-api-servers: "off"
      server-url-must-contain-version-aip-3101: "off"
  - files:
      - "konnect/definitions/identity/v2/**/openapi.yaml"
      - "konnect/definitions/identity/v3/**/openapi.yaml"
      - "konnect/definitions/runtime-groups-config/v2/**/openapi.yaml"
      - "konnect/definitions/control-planes-config/v2/**/openapi.yaml"
    rules:
      errors-delete-contains-404-aip-135: "off"
  - files:
      - "portal/definitions/developer/**/openapi.yaml"
    rules:
      errors-post-not-contain-200: "off"
  - files:
      # This should be a 403, not a 400. It's missing invalid_parameters
      - "konnect/definitions/runtime-groups/v2/**/openapi.yaml#/components/examples/400UsageLimitsReachedExample"
      - "konnect/definitions/control-planes/v2/**/openapi.yaml#/components/examples/400UsageLimitsReachedExample"
      # The 'unknownProperty' rule isn't in the enum of allowed types
      - "konnect/definitions/runtime-groups/v2/**/openapi.yaml#/components/examples/400UnknownPropertyExample"
      - "konnect/definitions/control-planes/v2/**/openapi.yaml#/components/examples/400UnknownPropertyExample"
      # The next block are errors that are missing a "detail" field as we made it required after the endpoints were built
      ## Runtime Groups
      - "konnect/definitions/runtime-groups/v2/**/openapi.yaml#/components/examples/400RequestFormatInvalidExample"
      - "konnect/definitions/runtime-groups/v2/**/openapi.yaml#/components/examples/400CannotBeBlankExample"
      - "konnect/definitions/runtime-groups/v2/**/openapi.yaml#/components/examples/400InvalidIDFormatExample"
      - "konnect/definitions/control-planes/v2/**/openapi.yaml#/components/examples/400RequestFormatInvalidExample"
      - "konnect/definitions/control-planes/v2/**/openapi.yaml#/components/examples/400CannotBeBlankExample"
      - "konnect/definitions/control-planes/v2/**/openapi.yaml#/components/examples/400InvalidIDFormatExample"
      ## Identity
      - "konnect/definitions/identity/v2/**/openapi.yaml#/components/examples/400-request-format-is-invalid"
      - "konnect/definitions/identity/v2/**/openapi.yaml#/components/examples/400-cannot-be-blank"
      - "konnect/definitions/identity/v2/**/openapi.yaml#/components/examples/400-invalid-id-format"
      - "konnect/definitions/identity/v2/**/openapi.yaml#/components/examples/400-valid-uuid"
      - "konnect/definitions/identity/v2/**/openapi.yaml#/components/examples/400-systems-team-modified"
      - "konnect/definitions/identity/v2/**/openapi.yaml#/components/examples/400-authentication-settings-cannot-be-both-disabled"
      - "konnect/definitions/identity/v2/**/openapi.yaml#/components/examples/400-oidc-auth-enabled-needs-idp"
      - "konnect/definitions/identity/v2/**/openapi.yaml#/components/responses/IdentityBadRequest"
      - "konnect/definitions/identity/v3/**/openapi.yaml#/components/examples/400-request-format-is-invalid"
      - "konnect/definitions/identity/v3/**/openapi.yaml#/components/examples/400-cannot-be-blank"
      - "konnect/definitions/identity/v3/**/openapi.yaml#/components/examples/400-invalid-id-format"
      - "konnect/definitions/identity/v3/**/openapi.yaml#/components/examples/400-valid-uuid"
      - "konnect/definitions/identity/v3/**/openapi.yaml#/components/examples/400-systems-team-modified"
      - "konnect/definitions/identity/v3/**/openapi.yaml#/components/examples/400-authentication-settings-cannot-be-both-disabled"
      - "konnect/definitions/identity/v3/**/openapi.yaml#/components/examples/400-oidc-auth-enabled-needs-idp"
      - "konnect/definitions/identity/v3/**/openapi.yaml#/components/responses/IdentityBadRequest"
    rules:
      oas3-valid-media-example: "off"
  - files:
      - "konnect/definitions/analytics-reports/v2/**/openapi.yaml#/paths/~1reports~1%7BreportId%7D~1export/post/responses"
      - "konnect/definitions/analytics-requests/v2/**/openapi.yaml#/paths/~1api-requests/post/responses"
      - "portal/definitions/analytics/**/openapi.yaml#/paths/~1api~1v2~1stats/post/responses"
    rules:
      errors-post-not-contain-200: "off"
  # Embedded Kong Gateway core-entities are not expected to pass
  - files:
      - "konnect/definitions/control-planes-config/v2/**/openapi.yaml#/paths/~1control-planes~1%7BcontrolPlaneId%7D~1core-entities~1ca_certificates"
      - "konnect/definitions/control-planes-config/v2/**/openapi.yaml#/paths/~1control-planes~1%7BcontrolPlaneId%7D~1core-entities~1ca_certificates~1%7Bca_certificate_id%7D"
      - "konnect/definitions/control-planes-config/v2/**/openapi.yaml#/paths/~1control-planes~1%7BcontrolPlaneId%7D~1core-entities~1services"
      - "konnect/definitions/control-planes-config/v2/**/openapi.yaml#/paths/~1control-planes~1%7BcontrolPlaneId%7D~1core-entities~1services~1%7Bservice_id%7D"
      - "konnect/definitions/control-planes-config/v2/**/openapi.yaml#/paths/~1control-planes~1%7BcontrolPlaneId%7D~1core-entities~1services~1%7Bservice_id%7D~1routes"
      - "konnect/definitions/control-planes-config/v2/**/openapi.yaml#/paths/~1control-planes~1%7BcontrolPlaneId%7D~1core-entities~1services~1%7Bservice_id%7D~1routes~1%7Broute_id%7D"
      - "konnect/definitions/control-planes-config/v2/**/openapi.yaml#/paths/~1control-planes~1%7BcontrolPlaneId%7D~1core-entities~1services~1%7Bservice_id%7D~1plugins"
      - "konnect/definitions/control-planes-config/v2/**/openapi.yaml#/paths/~1control-planes~1%7BcontrolPlaneId%7D~1core-entities~1services~1%7Bservice_id%7D~1plugins~1%7Bplugin_id_or_instance_name%7D"
      - "konnect/definitions/control-planes-config/v2/**/openapi.yaml#/paths/~1control-planes~1%7BcontrolPlaneId%7D~1core-entities~1routes"
      - "konnect/definitions/control-planes-config/v2/**/openapi.yaml#/paths/~1control-planes~1%7BcontrolPlaneId%7D~1core-entities~1routes~1%7Broute_id%7D"
      - "konnect/definitions/control-planes-config/v2/**/openapi.yaml#/paths/~1control-planes~1%7BcontrolPlaneId%7D~1core-entities~1routes~1%7Broute_id%7D~1plugins"
      - "konnect/definitions/control-planes-config/v2/**/openapi.yaml#/paths/~1control-planes~1%7BcontrolPlaneId%7D~1core-entities~1routes~1%7Broute_id%7D~1plugins~1%7Bplugin_id_or_instance_name%7D"
      - "konnect/definitions/control-planes-config/v2/**/openapi.yaml#/paths/~1control-planes~1%7BcontrolPlaneId%7D~1core-entities~1certificates"
      - "konnect/definitions/control-planes-config/v2/**/openapi.yaml#/paths/~1control-planes~1%7BcontrolPlaneId%7D~1core-entities~1certificates~1%7Bcertificate_id%7D"
