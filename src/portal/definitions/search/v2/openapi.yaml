openapi: 3.0.0
info:
  title: Portal Search
  version: 2.0.0
  description: N/A (this description is removed during bundling)
  contact:
    name: Kong
    url: 'https://cloud.konghq.com'
paths:
  /api/v2/search/{indices}:
    get:
      summary: Search Portal Entities
      operationId: search-portal-entities
      description: Returns paginated search results from the specified entities with the given search parameters.
      responses:
        '200':
          $ref: '#/components/responses/SearchResponse'
        '400':
          $ref: '../../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
      parameters:
        - $ref: '#/components/parameters/SearchIndices'
        - $ref: '#/components/parameters/SearchQuery'
        - $ref: '#/components/parameters/SearchJoin'
        - $ref: '../../../../common/definitions/metadatas.yaml#/components/parameters/PageSize'
        - $ref: '../../../../common/definitions/metadatas.yaml#/components/parameters/PageNumber'
      tags:
        - search
      security:
        - portalAccessToken: []
        - {}
components:
  securitySchemes:
    portalAccessToken:
      $ref: '../../../../common/definitions/security.yaml#/components/securitySchemes/portalAccessToken'
  parameters:
    SearchQuery:
      name: q
      description: Determines how to filter search results
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/SearchQueryParameters'
    SearchJoin:
      name: join
      description: Determines which sub-entities to include in search results
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/SearchJoinParameters'
    SearchIndices:
      name: indices
      description: Determines which entity sets to search
      required: true
      in: path
      schema:
        $ref: '#/components/schemas/SearchIndicesParameters'
  responses:
    SearchResponse:
      description: Search Results
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SearchResults'
          examples:
            Search Response Example:
              $ref: '#/components/examples/SearchResponseExample'
  schemas:
    SearchResults:
      title: 'SearchResults'
      type: object
      additionalProperties: false
      required:
        - data
        - meta
      properties:
        meta:
          $ref: '../../../../common/definitions/metadatas.yaml#/components/schemas/PaginatedMeta'
        data:
          type: array
          description: The paginated results that matched the search query
          items:
            type: object
            additionalProperties: false
            properties:
              index:
                $ref: '#/components/schemas/SearchIndicesParameters'
              source:
                $ref: '#/components/schemas/ProductCatalogIndexSource'
            required:
              - index
              - source
    ProductCatalogIndexSource:
      title: 'ProductCatalogIndexSource'
      type: object
      additionalProperties: false
      required:
        - id
        - created_at
        - updated_at
        - name
        - document_count
        - version_count
        - latest_version
        - public_labels
      properties:
        id:
          $ref: '../../../../common/definitions/properties.yaml#/components/schemas/UUID'
        name:
          type: string
          example: Nice Product
          description: the name of the product
          nullable: true
          readOnly: true
        description:
          type: string
          example: A nice product for customers to read about and consume
          description: a description of the product
          nullable: true
          readOnly: true
        created_at:
          $ref: '../../../../common/definitions/properties.yaml#/components/schemas/CreatedAt'
        updated_at:
          $ref: '../../../../common/definitions/properties.yaml#/components/schemas/UpdatedAt'
        document_count:
          type: number
          example: 5
          description: Number of product documents available.
          readOnly: true
        version_count:
          type: number
          example: 2
          description: Number of product versions.
          readOnly: true
        latest_version:
           type: object
           description: Last created version.
           nullable: true
           required:
            - name
            - id
           additionalProperties: false
           properties:
              name:
                type: string
                example: v2.0.0
                description: Name of product version.
              id:
                $ref: '../../../../common/definitions/properties.yaml#/components/schemas/UUID'
        public_labels:
          $ref: '../../../../common/definitions/konnect_properties.yaml#/components/schemas/PublicLabels'

    SearchIndicesParameters:
      title: 'SearchIndicesParameters'
      type: string
      enum:
        - product-catalog
    SearchQueryParameters:
      title: 'SearchQueryParameters'
      type: string
    SearchJoinParameters:
      title: 'SearchJoinParameters'
      type: string
      description: Accepted values are `versions` and `versions.documents`. Use commas to separate multiple values.
      example: versions,versions.documents
  examples:
    SearchResponseExample:
      value:
        data:
          - index: product-catalog
            source:
              created_at: '2023-01-19T17:41:55.896Z'
              updated_at: '2023-01-20T17:41:55.896Z'
              id: e35b0beb-c3f7-4f8f-95f7-cd8ff0ee478e
              name: Great Product
              description: Great products are built with great care
              document_count: 5
              version_count: 5
              public_labels:
                env: test
              latest_version:
                name: v5
                id: 455b0beb-c3f7-4f8f-95f7-cd8ff0ee478e
        meta:
          page:
            number: 1
            size: 10
            total: 4
tags:
  - name: search
    description: The API for Konnect Portal Search.
