openapi: 3.0.0
info:
  title: Portal Application Analytics
  version: 2.0.0
  description: API for querying Application Analytics.
  contact:
    name: Kong
    url: https://cloud.konghq.com
paths:
  /api/v2/stats:
    post:
      description: Query
      operationId: query-application-analytics
      summary: Query Application Analytics
      requestBody:
        description: Object describing the query sent to analytics API.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryApplicationAnalytics'
            examples:
              Query with a single metric:
                $ref: '#/components/examples/QueryExampleWithMetric'
              Query with a metric and dimension:
                $ref: '#/components/examples/QueryExampleWithMetricAndDimension'
              Query with a metric and two dimensions:
                $ref: '#/components/examples/QueryExampleWithMetricAndMultipleDimensions'
              Query with time dimension:
                $ref: '#/components/examples/QueryExampleWithTimeDimension'
      responses:
        '200':
          $ref: '#/components/responses/QueryResponse'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              examples:
                BadRequestExample:
                  $ref: '#/components/examples/BadRequestExample'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              examples:
                UnauthorizedExample:
                  $ref: '#/components/examples/UnauthorizedExample'
        '403':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/Forbidden'
      tags:
        - Application Analytics
      security:
        - portalAccessToken: []
  /api/v2/explore:
    post:
      x-internal: true
      x-unstable: true
      description: Query the portal Explore endpoint.
      operationId: query-application-analytics-explore
      summary: Query Application Analytics (Explore)
      requestBody:
        description: Object describing the query sent to analytics Explore API.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExploreV2Dto"
      responses:
        '200':
          description: Aggregated results of the query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExploreResultV2"
        '400':
          description: Bad Request
          content:
            application/problem+json:
              examples:
                BadRequestExample:
                  $ref: '#/components/examples/BadRequestExample'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              examples:
                UnauthorizedExample:
                  $ref: '#/components/examples/UnauthorizedExample'
        '403':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/Forbidden'
      tags:
        - Application Analytics
      security:
        - portalAccessToken: [ ]
  /api/v2/stats/config:
    get:
      summary: Application Analytics Config
      operationId: get-application-analytics-config
      description: Get config for application analytics
      responses:
        '200':
          $ref: '#/components/responses/GetConfig'
        '401':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
      tags:
        - Application Analytics
      security:
        - portalAccessToken: []
components:
  securitySchemes:
      portalAccessToken:
        $ref: '../../../common/definitions/security.yaml#/components/securitySchemes/portalAccessToken'
  schemas:
    QueryApplicationAnalytics:
      type: object
      additionalProperties: false 
      properties:
        start_ms:
          type: integer
          description: Unix timestamp in milliseconds specifying the lower bound to return data for the query, inclusive.
        end_ms:
          type: integer
          description: Unix timestamp in milliseconds specifying upper bound to return data for the query, inclusive.
        metrics:
          type: array
          minItems: 1
          maxItems: 1
          items:
            type: string
            enum: [ 
              REQUEST_COUNT,
              REQUEST_PER_MINUTE,
              RESPONSE_LATENCY_P99,
              RESPONSE_LATENCY_P95,
              RESPONSE_LATENCY_P50,
              RESPONSE_SIZE_P99,
              RESPONSE_SIZE_P95,
              RESPONSE_SIZE_P50,
              REQUEST_SIZE_P99,
              REQUEST_SIZE_P95,
              REQUEST_SIZE_P50
            ]
          description: |
            A property of your API (such as request count or latency) that you wish to query on.
            Your chosen metric is aggregated within the specified dimensions, meaning that if you query 'request count by application', you'll receive the total number of requests each application received within the given time frame.  Some metrics, such as latency and response size, have more complicated aggregations: selecting P99 will result in the 99th percentile of the chosen metric.
        dimensions:
          type: array
          minItems: 0
          maxItems: 2
          items:
            type: string
            enum: [ 
              API_PRODUCT_VERSION,
              APPLICATION,
              STATUS_CODE,
              STATUS_CODE_GROUPED,
              TIME 
            ]
          description: |
            The dimensions for the query.  A query may have up to 2 dimensions, including time.
            If no dimensions are provided, the report will simply return the provided metric aggregated across
            all available data.
          default: []
        granularity_ms:
          type: integer
          default: 86400000
          description: |
            `granularity_ms` is only valid for queries that include a time dimension, and it specifies the time buckets in for the returned data.
        filter:
          type: array
          items:
            discriminator:
              propertyName: dimension
              mapping:
                API_PRODUCT_VERSION: '#/components/schemas/ApiProductVersionFilter'
                APPLICATION: '#/components/schemas/ApplicationFilter'
                STATUS_CODE: '#/components/schemas/StatusCodeFilter'
                STATUS_CODE_GROUPED: '#/components/schemas/StatusCodeGroupedFilter'
            oneOf:
              - $ref: '#/components/schemas/ApiProductVersionFilter'
              - $ref: '#/components/schemas/ApplicationFilter'
              - $ref: '#/components/schemas/StatusCodeFilter'
              - $ref: '#/components/schemas/StatusCodeGroupedFilter'
          default: []
      required:
        - start_ms
        - end_ms
        - metrics
    FilterType:
      type: string
      description: The type of filter to apply.  `IN` filters will limit results to only the specified values, while `NOT_IN` filters will exclude the specified values.
      enum: [ IN, NOT_IN ]
    ApiProductVersionFilter:
      type: object
      additionalProperties: false 
      properties:
        dimension:
          description: The dimension to filter.
          type: string
          enum: [ API_PRODUCT_VERSION ]
        type:
          $ref: '#/components/schemas/FilterType'
        values:
          description: |
            The UUIDs of the API product versions to include in the results.
          type: array
          items: &validKokoUuid
            type: string
            pattern: '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'
      required:
        - dimension
        - type
        - values
    ApplicationFilter:
      type: object
      additionalProperties: false 
      properties:
        dimension:
          description: The dimension to filter. If no application filter is provided the API will implicitly filter on the applications owned by the developer making the query request. 
          type: string
          enum: [ APPLICATION ]
        type:
          $ref: '#/components/schemas/FilterType'
        values:
          description: |
            The UUIDs of the dev portal applications to include in the results.
          type: array
          items: *validKokoUuid
      required:
        - dimension
        - type
        - values
    StatusCodeFilter:
      type: object
      additionalProperties: false 
      properties:
        dimension:
          description: The dimension to filter.
          type: string
          enum: [ STATUS_CODE ]
        type:
          $ref: '#/components/schemas/FilterType'
        values:
          description: |
            Only include requests with specific status codes in the results.
          type: array
          items:
            type: integer
            minimum: 100
            maximum: 999
      required:
        - dimension
        - type
        - values
    StatusCodeGroupedFilter:
      type: object
      additionalProperties: false 
      properties:
        dimension:
          description: The dimension to filter.
          type: string
          enum: [ STATUS_CODE_GROUPED ]
        type:
          $ref: '#/components/schemas/FilterType'
        values:
          description: |
            Only include the given groups of status codes in the results.
          type: array
          items:
            type: string
            pattern: '^\d[X][X]$'
      required:
        - dimension
        - type
        - values
    QueryResponseMeta:
      type: object
      additionalProperties: false 
      description: Query response metadata.
      properties:
        dimensions:
          type: object
          additionalProperties: false 
          description: The dimension name and values returned in the response.
          properties:
            API_PRODUCT_VERSION:
              type: array
              items:
                type: string
            APPLICATION:
              type: array
              items:
                type: string
            STATUS_CODE:
              type: array
              items:
                type: string
            STATUS_CODE_GROUPED:
              type: array
              items:
                type: string
        metric_names:
          type: array
          description: The metric requested in query.
          minItems: 1
          maxItems: 1
          items:
            type: string
            enum: [ REQUEST_COUNT, REQUEST_PER_MINUTE, RESPONSE_LATENCY_P99, RESPONSE_LATENCY_P95, RESPONSE_LATENCY_P50, RESPONSE_SIZE_P99, RESPONSE_SIZE_P95, RESPONSE_SIZE_P50, REQUEST_SIZE_P99, REQUEST_SIZE_P95, REQUEST_SIZE_P50 ]
        metric_units:
          type: object
          description: The unit of metric.
          properties:
            REQUEST_COUNT:
              type: string
              default: 'count'
            REQUEST_PER_MINUTE:
              type: string
              default: 'count/minute'
            RESPONSE_LATENCY_P99:
              type: string
              default: 'ms'
            RESPONSE_LATENCY_P95:
              type: string
              default: 'ms'
            RESPONSE_LATENCY_P50:
              type: string
              default: 'ms'
            RESPONSE_SIZE_P99:
              type: string
              default: 'bytes'
            RESPONSE_SIZE_P95:
              type: string
              default: 'bytes'
            RESPONSE_SIZE_P50:
              type: string
              default: 'bytes'
            REQUEST_SIZE_P99:
              type: string
              default: 'bytes'
            REQUEST_SIZE_P95:
              type: string
              default: 'bytes'
            REQUEST_SIZE_P50:
              type: string
              default: 'bytes'
        start_ms: 
          type: integer
          description: Unix timestamp in milliseconds specifying the lower bound to return data for the query. Provided from the query parameters.
        end_ms:
          type: integer
          description: Unix timestamp in milliseconds specifying the upper bound to return data for the query. Provided from the query parameters.
        truncated:
          type: boolean
          description: True if the limit of dimension values was reached and results were truncated. Limit value is 50.
        granularity:
          type: integer
          description: The resulting time bucket for the returned data. If `TIME` was not specified as a dimension, granularity is the duration of the query.
        query_id:
          type: string
          description: Optional ID used to look up the query.
    QueryResponseRecord:
      type: object
      additionalProperties: false 
      description: A response record. 
      properties:
        event:
          type: object
          additionalProperties: false 
          description: Event within the response. Mapping from the requested metrics and dimensions to the values.
          properties:
            REQUEST_COUNT:
              type: integer
              description: The number or requests metric. 
            REQUEST_PER_MINUTE:
              type: number
              description: The number of requests per minute metric.
            RESPONSE_LATENCY_P99:
              type: number
              description: 99th percentile response latency metric in milliseconds.
            RESPONSE_LATENCY_P95:
              type: number
              description: 95th percentile response latency metric in milliseconds. 
            RESPONSE_LATENCY_P50:
              type: number
              description: 50th percentile response latency metric in milliseconds.
            RESPONSE_SIZE_P99:
              type: number
              description: 99th percentile response size metric in bytes.
            RESPONSE_SIZE_P95:
              type: number
              description: 95th percentile response size metric in bytes.
            RESPONSE_SIZE_P50:
              type: number
              description: 50th percentile response size metric in bytes.
            REQUEST_SIZE_P99:
              type: number
              description: 99th percentile request size metric in bytes.
            REQUEST_SIZE_P95:
              type: number
              description: 95th percentile request size metric in bytes.
            REQUEST_SIZE_P50:
              type: number
              description: 50th percentile request size metric in bytes.
            API_PRODUCT_VERSION:
              type: string
              description: Dimension value for `API_PRODUCT_VERSION` name.
            APPLICATION:
              type: string
              description: Dimension value for `APPLICATION` name.
            STATUS_CODE:
              type: string
              description: Dimension value for `STATUS_CODE`.
            STATUS_CODE_GROUPED:
              type: string
              description: Dimension value for `STATUS_CODE_GROUPED`.
        timestamp:
          type: string
          format: date-time
          description: An ISO-8601 timestamp. If `TIME` was requested as a dimension this will be the start of the time bucket. If not specified this is the start time of the query.
          example: '2023-08-03T15:00:00.000Z'
    QueryResponseRecords:
      type: array
      description: Query response data.
      items:
        $ref: '#/components/schemas/QueryResponseRecord'
    GetConfigResponse:
      additionalProperties: false
      type: object
      required:
        - analytics
      properties:
        analytics:
          type: object
          nullable: true
          additionalProperties: false
          description: Null if analytics is not enabled.
          properties:
            percentiles:
              type: boolean
              description: True if analytics percentiles are enabled. 
            retention_ms:
              type: integer
              description: Analytics retention in milliseconds.
          required:
            - percentiles
            - retention_ms
    AbsoluteTimeRangeDtoV2:
      type: object
      description: A duration representing an exact start and end time.
      properties:
        tz:
          type: string
          default: Etc/UTC
        type:
          type: string
          enum:
            - absolute
        start:
          format: date-time
          type: string
        end:
          format: date-time
          type: string
      required:
        - type
    RelativeTimeRangeDtoV2:
      type: object
      description: A duration representing a relative-to-now span of time. Generally the start time is floored to the requested granularity. Eg 7d from now, with 1day granularity initiated at 2024-01-08T17:11:00+05:00 will query for the time range from 2024-01-01T00:00:00+05:00 to 2024-01-08T17:11:00+05:00. The exact start and end timestamps are returned in the result query in the meta.start_ms and meta.end_ms fields. If the granularity for the previous query was 1hour, it would query a time range from 2024-01-01T17:00:00+05:00 to 2024-01-08T17:11:00+05:00.
      properties:
        tz:
          type: string
          default: Etc/UTC
        type:
          type: string
          enum:
            - relative
        time_range:
          type: string
          enum:
            - 15m
            - 1h
            - 6h
            - 12h
            - 24h
            - 7d
            - 30d
            - current_week
            - current_month
            - previous_week
            - previous_month
          default: 1h
      required:
        - type
        - time_range
    ExploreFilter:
      type: object
      description: A filter that specifies which data to include in the query
      properties:
        dimension:
          type: string
          enum:
            - api_product
            - api_product_version
            - application
            - consumer
            - control_plane
            - control_plane_group
            - data_plane_node
            - gateway_service
            - route
            - status_code
            - status_code_grouped
          example: status_code
        type:
          type: string
          enum:
            - in
            - not_in
            - selector
          example: in
        values:
          type: array
          items:
            type: string
      required:
        - dimension
        - type
        - values
    ExploreV2Dto:
      type: object
      description: A query to launch at the API
      properties:
        metrics:
          type: array
          description: List of aggregated metrics to collect across the requested time span.
          example:
            - request_count
          items:
            type: string
            enum:
              - request_count
              - request_per_minute
              - response_latency_p99
              - response_latency_p95
              - response_latency_p50
              - response_latency_average
              - upstream_latency_p99
              - upstream_latency_p95
              - upstream_latency_p50
              - upstream_latency_average
              - kong_latency_p99
              - kong_latency_p95
              - kong_latency_p50
              - kong_latency_average
              - response_size_p99
              - response_size_p95
              - response_size_p50
              - request_size_p99
              - request_size_p95
              - request_size_p50
              - request_size_average
              - response_size_average
        dimensions:
          type: array
          description: List of attributes or entity types to group by.
          minItems: 0
          maxItems: 2
          example:
            - status_code_grouped
          items:
            type: string
            enum:
              - api_product
              - api_product_version
              - application
              - consumer
              - control_plane
              - control_plane_group
              - data_plane_node
              - gateway_service
              - route
              - status_code
              - status_code_grouped
              - time
        filters:
          type: array
          description: A list of filters to apply to the query.
          items:
            $ref: "#/components/schemas/ExploreFilter"
        granularity:
          type: string
          description: |
            Force time grouping into buckets of the specified duration.  Only has an effect if "time" is in the "dimensions" list.
  
            If "trend" is chosen, the time range covered by the query will be twice the specified time range, and the granularity will be set such that two time buckets are returned, one for the given time range and one for the same time range prior.
            For example:
  
            time range: last 24 hours
            granularity: trend
  
            will return 2 time buckets (assuming both have data):
  
            - 48 hours ago to 24 hours ago
            - 24 hours ago to now
  
            Another example:
  
            time range: 2020-05-01 to 2020-05-15
            granularity: trend
  
            will return 2 time buckets:
  
            - 2020-04-15 through 2020-04-30
            - 2020-05-01 through 2020-05-15
  
            The granularity of the result may be coarser than requested.  The finest allowed granularity depends on the query's time range: data farther in the past may have coarser granularity.  The exact result granularity will be reported in the response `meta.granularity_ms` field.
  
            If granularity is not specified and "time" is in the dimensions list, a default will be chosen based on the time range requested.
          enum:
            - minute
            - hour
            - day
            - week
            - trend
        time_range:
          description: The time range to query.
          oneOf:
            - $ref: "#/components/schemas/RelativeTimeRangeDtoV2"
            - $ref: "#/components/schemas/AbsoluteTimeRangeDtoV2"
          discriminator:
            propertyName: type
            mapping:
              relative: "#/components/schemas/RelativeTimeRangeDtoV2"
              absolute: "#/components/schemas/AbsoluteTimeRangeDtoV2"
          default:
            type: relative
            time_range: 1h
        meta:
          type: object
      example:
        {
          "time_range": {
            "type": "relative",
            "time_range": "24h",
            "tz": "EST"
          },
          "dimensions": [ "time", "gateway_service" ],
          "filters": [
            {
              "type": "in",
              "dimension": "application",
              "values": [
                "d5ac5d88-efed-4e10-9dfe-0b0a6646c219"
              ]
            }
          ],
          "granularity": "hour",
          "metrics": [ "response_latency_p99", "response_latency_p95", "response_latency_p50" ]
        }
    GroupByResult:
      type: object
      properties:
        timestamp:
          type: string
          readOnly: true
        event:
          type: object
          readOnly: true
      required:
        - timestamp
        - event
      example: {
        "event": {
          "gateway_service": "d5ac5d88-efed-4e10-9dfe-0b0a6646c219:bf16907c-8673-4f9d-aa83-1f2ea9215055",
          "request_count": 1000,
          "response_latency_p99": 23,
        },
        "timestamp": "2024-01-16T00:00:00Z",
      }
    DisplayBlob:
      type: object
      properties: { }
      example: {
        "gateway_service": {
          "d5ac5d88-efed-4e10-9dfe-0b0a6646c219:bf16907c-8673-4f9d-aa83-111111111111": {
            "id": "d5ac5d88-efed-4e10-9dfe-0b0a6646c219:bf16907c-8673-4f9d-aa83-111111111111",
            "deleted": true,
            "name": "Gateway Service Alpha"
          },
          "d5ac5d88-efed-4e10-9dfe-0b0a6646c219:bf16907c-8673-4f9d-aa83-1f2ea9215055": {
            "id": "d5ac5d88-efed-4e10-9dfe-0b0a6646c219:bf16907c-8673-4f9d-aa83-1f2ea9215055",
            "deleted": false,
            "name": "Gateway Service Beta"
          }
        }
      }
    MetricUnitDto:
      type: object
      properties: { }
      example: {
        "request_count": "cnt",
        "response_latency_p99": "ms"
      }
    QueryResponseMetaExplore:
      type: object
      properties:
        start_ms:
          type: number
          readOnly: true
        end_ms:
          type: number
          readOnly: true
        display:
          readOnly: true
          allOf:
            - $ref: "#/components/schemas/DisplayBlob"
        metric_units:
          readOnly: true
          allOf:
            - $ref: "#/components/schemas/MetricUnitDto"
        granularity:
          type: number
          readOnly: true
        granularity_ms:
          type: number
          readOnly: true
        truncated:
          type: boolean
          readOnly: true
        limit:
          type: number
          readOnly: true
        query_id:
          type: string
          readOnly: true
      required:
        - start_ms
        - end_ms
        - display
        - metric_units
        - granularity_ms
        - truncated
        - limit
        - query_id
      example: {
        "start_ms": 1705428000000,
        "end_ms": 1705429000000,
        "display": {
          "gateway_service": {
            "d5ac5d88-efed-4e10-9dfe-0b0a6646c219:bf16907c-8673-4f9d-aa83-111111111111": {
              "id": "d5ac5d88-efed-4e10-9dfe-0b0a6646c219:bf16907c-8673-4f9d-aa83-111111111111",
              "deleted": true,
              "name": "Gateway Service Alpha"
            },
            "d5ac5d88-efed-4e10-9dfe-0b0a6646c219:bf16907c-8673-4f9d-aa83-1f2ea9215055": {
              "id": "d5ac5d88-efed-4e10-9dfe-0b0a6646c219:bf16907c-8673-4f9d-aa83-1f2ea9215055",
              "deleted": false,
              "name": "Gateway Service Beta"
            }
          }
        },
        "metric_units": {
          "request_count": "cnt",
          "response_latency_p99": "ms"
        },
        "granularity_ms": 60000,
        "truncated": false,
        "limit": 50,
        "query_id": "requested-query-id"
      }
    ExploreResultV2:
      type: object
      properties:
        data:
          readOnly: true
          type: array
          items:
            $ref: "#/components/schemas/GroupByResult"
        meta:
          readOnly: true
          allOf:
            - $ref: "#/components/schemas/QueryResponseMetaExplore"
      required:
        - data
        - meta

  responses:
    QueryResponse:
      description: A response from an Application Analytics query.
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false 
            properties:
              meta:
                $ref: '#/components/schemas/QueryResponseMeta'
              records:
                $ref: '#/components/schemas/QueryResponseRecords'
          examples:
            Response with a single metric: 
              $ref: '#/components/examples/ResponseExampleWithMetric'
            Response with metric and dimension: 
              $ref: '#/components/examples/ResponseExampleWithMetricAndDimension'
            Response with metric and two dimensions: 
              $ref: '#/components/examples/ResponseExampleWithMetricAndMultipleDimensions'
            Response with time dimension: 
              $ref: '#/components/examples/ResponseExampleWithTimeDimension'
    GetConfig:
      description: Get config
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GetConfigResponse'
          examples:
            GetConfigNoAnalytics200response:
              $ref: '#/components/examples/GetConfigNoAnalytics200response'
            GetConfigAnalytics200response:
              $ref: '#/components/examples/GetConfigAnalytics200response'
  examples:
    ResponseExampleWithMetricAndDimension:
      value: {
        'meta': {
          'dimensions': {
            'APPLICATION': [
              'Application 1',
              'Application 2'
            ]
          },
          'metric_names': [
            'RESPONSE_LATENCY_P99'
          ],
          'metric_units': {
            'RESPONSE_LATENCY_P99': 'ms'
          },
          'start_ms': 1691074800000,
          'end_ms': 1691161200000,
          'granularity': 86400000,
          'truncated': false,
          'query_id': 'portal-api-3c0abb98-90bd-4e80-a495-ac268acc493e'
        },
        'records': [
          {
            'event': {
              'APPLICATION': 'Application 1',
