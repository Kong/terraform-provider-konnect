openapi: 3.0.0
info:
  title: Portal Developer Applications
  version: 2.0.0
  description: N/A (this description is removed during bundling)
  contact:
    name: Kong
    url: 'https://cloud.konghq.com'
paths:
  /api/v2/applications:
    get:
      summary: List Applications
      description: List applications owned by the developer currently logged in.
      operationId: list-applications
      parameters:
        - $ref: '../../../common/definitions/metadatas.yaml#/components/parameters/PageSize'
        - $ref: '../../../common/definitions/metadatas.yaml#/components/parameters/PageNumber'
        - $ref: '../common/filter_parameters.yaml#/components/parameters/FilterByNameEquality'
        - $ref: '../common/filter_parameters.yaml#/components/parameters/FilterByNameEqualityShort'
        - $ref: '../common/filter_parameters.yaml#/components/parameters/FilterByNameContains'
        - $ref: '../common/filter_parameters.yaml#/components/parameters/FilterByAuthStrategyEquality'
        - $ref: '../common/filter_parameters.yaml#/components/parameters/FilterByAuthStrategyEqualityShort'
      responses:
        '200':
          $ref: '#/components/responses/ListApplications'
        '400':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
      tags:
        - applications
      security:
        - portalAccessToken: []
    post:
      summary: Create an Application
      description: Creates a new Application.
      operationId: create-application
      requestBody:
        $ref: '#/components/requestBodies/CreateApplication'
      responses:
        '201':
          $ref: '#/components/responses/ApplicationCreation'
        '400':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/NotFound'
        '409':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/Conflict'
      tags:
        - applications
      security:
        - portalAccessToken: []
  /api/v2/applications/{applicationId}:
    get:
      summary: Get an Application
      description: Gets the details for an existing application. You need only supply the unique application identifier that was returned upon application creation or by the list-applications endpoint.
      operationId: get-application
      parameters:
        - $ref: '../common/parameters.yaml#/components/parameters/ApplicationId'
      responses:
        '200':
          $ref: '#/components/responses/GetApplication'
        '400':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '404':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/NotFound'
      tags:
        - applications
      security:
        - portalAccessToken: []
    delete:
      summary: Delete Application
      description: Deletes an application and all of its associated entities (registrations).
      operationId: delete-application
      parameters:
        - $ref: '../common/parameters.yaml#/components/parameters/ApplicationId'
      responses:
        '204':
          description: Application was deleted successfully.
        '400':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '404':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/NotFound'
        '429':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/TooManyRequests'
      tags:
        - applications
      security:
        - portalAccessToken: []
    patch:
      summary: Update Application
      description: Updates an application, replacing specified properties with any new values supplied in the request body.
      operationId: update-application
      parameters:
        - $ref: '../common/parameters.yaml#/components/parameters/ApplicationId'
      requestBody:
        $ref: '#/components/requestBodies/UpdateApplication'
      responses:
        '200':
          $ref: '#/components/responses/ApplicationUpdate'
        '400':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '404':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/NotFound'
        '409':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/Conflict'
      tags:
        - applications
      security:
        - portalAccessToken: []
  /api/v2/applications/{applicationId}/refresh-token:
    post:
      summary: Refresh Client Secret
      description: Resets the client secret for an application.
      operationId: refresh-application-token
      parameters:
        - $ref: '../common/parameters.yaml#/components/parameters/ApplicationId'
      responses:
        '201':
          $ref: '#/components/responses/RefreshToken'
        '400':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '404':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/NotFound'
      tags:
        - credentials
      security:
        - portalAccessToken: []
  /api/v2/applications/{applicationId}/credentials:
    get:
      summary: List credentials
      description: Lists the credentials for an application they own.
      operationId: list-credentials
      parameters:
        - $ref: '../common/parameters.yaml#/components/parameters/ApplicationId'
        - $ref: '../../../common/definitions/metadatas.yaml#/components/parameters/PageSize'
        - $ref: '../../../common/definitions/metadatas.yaml#/components/parameters/PageNumber'
      responses:
        '200':
          $ref: '#/components/responses/ListCredentials'
        '400':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '409':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/Conflict'
        '404':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/NotFound'
      tags:
        - credentials
      security:
        - portalAccessToken: []
    post:
      summary: Create Credential for Application
      description: Allows a developer to create a credential for an application they own.
      operationId: create-credential
      parameters:
        - $ref: '../common/parameters.yaml#/components/parameters/ApplicationId'
      requestBody:
        $ref: '#/components/requestBodies/CreateCredential'
      responses:
        '201':
          $ref: '#/components/responses/CredentialCreation'
        '400':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '404':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/NotFound'
      tags:
        - credentials
      security:
        - portalAccessToken: []
  /api/v2/applications/{applicationId}/credentials/{credentialId}:
    put:
      summary: Update Credential
      description: Updates a credential for an application owned by the current logged in developer.
      operationId: update-credential
      parameters:
        - $ref: '../common/parameters.yaml#/components/parameters/ApplicationId'
        - $ref: '#/components/parameters/CredentialId'
      requestBody:
        $ref: '#/components/requestBodies/UpdateCredential'
      responses:
        '200':
          description: Credential successfully updated.
        '400':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '404':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/NotFound'
      tags:
        - credentials
      security:
        - portalAccessToken: []
    delete:
      summary: Delete Credential
      description: Deletes a credential for an application they own.
      operationId: delete-credential
      parameters:
        - $ref: '../common/parameters.yaml#/components/parameters/ApplicationId'
        - $ref: '#/components/parameters/CredentialId'
      responses:
        '204':
          description: Credential successfully deleted.
        '400':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '404':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/NotFound'
        '409':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/Conflict'
      tags:
        - credentials
      security:
        - portalAccessToken: []
  /api/v2/applications/{applicationId}/product-versions/{productVersionId}/granted-scopes:
     get:
      summary: Get the granted scopes
      description: |
       Retrieves the granted scopes of a specified application and product version directly from the IDP.
       Scopes shared between product versions will be returned, even if not currently registered for given product version.
       Will return 409 if this feature is not supported by the application.
      operationId: get-application-product-version-granted-scopes
      parameters:
        - $ref: '../common/parameters.yaml#/components/parameters/ApplicationId'
        - $ref: '../common/parameters.yaml#/components/parameters/ProductVersionId'
      responses:
        '200':
          $ref: '#/components/responses/GetGrantedScopesProductVersion'
        '401':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '404':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/GetGrantedScopesProductVersion422Response'
      tags:
        - applications
      security:
        - portalAccessToken: []
  /api/v2/applications/auth-strategies:
    get:
      summary: List the available auth strategies
      description: |
        Retrieve the available Auth Strategies on this portal.
        An Auth Strategy is a set of plugin configurations that represent how the gateway will perform authentication and authorization for a Product Version.
        It may reference to Key-Auth or an OIDC configuration (with or without DCR).
      operationId: list-application-auth-strategies
      parameters:
        - $ref: '../../../common/definitions/metadatas.yaml#/components/parameters/PageSize'
        - $ref: '../../../common/definitions/metadatas.yaml#/components/parameters/PageNumber'
        - $ref: '../common/filter_parameters.yaml#/components/parameters/FilterByNameEquality'
        - $ref: '../common/filter_parameters.yaml#/components/parameters/FilterByNameEqualityShort'
        - $ref: '../common/filter_parameters.yaml#/components/parameters/FilterByNameContains'
        - $ref: '#/components/parameters/FilterByCredentialTypeEquality'
      responses:
        '200':
          $ref: '#/components/responses/ListAuthStrategies'
        '400':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
      tags:
        - applications
      security:
        - portalAccessToken: []

components:
  securitySchemes:
    portalAccessToken:
      $ref: '../../../common/definitions/security.yaml#/components/securitySchemes/portalAccessToken'
  parameters:
    CredentialId:
      name: credentialId
      in: path
      required: true
      description: Id of the targeted credential
      schema:
        type: string
        format: uuid
    FilterByCredentialTypeEquality:
      name: 'filter[credential_type][eq]'
      description: Filter by direct equality comparison of the credential_type with a supplied value.
      in: query
      required: false
      schema:
        type: string
        enum:
          - client_credentials
          - self_managed_client_credentials
          - key_auth
        example: 'key_auth'
  requestBodies:
    CreateApplication:
      description: Create an application
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreateApplicationPayload'
    UpdateApplication:
      description: Update an application
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UpdateApplicationPayload'
    CreateCredential:
      description: Create a credential
      required: false
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreateCredentialPayload'
    UpdateCredential:
      description: Update a credential
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UpdateCredentialPayload'
  responses:
    ListApplications:
      description: Get applications response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ListApplicationsResponse'
    GetApplication:
      description: Get application response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GetApplicationResponse'
    RefreshToken:
      description: Refresh token response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RefreshTokenResponse'
    ListCredentials:
      description: List credentials response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ListCredentialsResponse'
    CredentialCreation:
      description: Credential Creation success
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CredentialCreationResponse'
    ApplicationCreation:
      description: Application Creation success
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApplicationCreationResponse'
    ApplicationUpdate:
      description: Application Update success
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApplicationUpdateResponse'
    GetGrantedScopesProductVersion:
      description: Get granted scopes response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GetGrantedScopesProductVersionResponse'
          examples:
            GetGrantedScopesProductVersion200Response:
              $ref: '#/components/examples/GetGrantedScopesProductVersion200Response'
    GetGrantedScopesProductVersion422Response:
      description: Get granted with application using unsupported IDP.
      content:
        application/problem+json:
          schema:
            $ref: '../../../common/definitions/errors.yaml#/components/schemas/UnprocessableContentError'
          examples:
            GetGrantedScopesProductVersion422Example:
              $ref: '#/components/examples/GetGrantedScopesProductVersion422Example'
    ListAuthStrategies:
      description: List auth strategies response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ListAuthStrategiesResponse'
  schemas:
    AuthStrategyId:
      description: ID of the auth strategy to use for the application. If null or not included, the default application auth strategy will be used.
      type: string
      format: uuid
      nullable: true
    AuthStrategyCredentialType:
      type: string
      enum:
      - client_credentials
      - self_managed_client_credentials
      - key_auth
    Scopes:
      x-internal: true
      x-unstable: true
      description: The granted scopes for the application. Will only be included if supported by the application's auth strategy.
      type: array
      items:
        type: string
    CreateCredentialPayload:
      additionalProperties: false
      type: object
      properties:
        display_name:
          type: string
          maxLength: 255
    UpdateCredentialPayload:
      additionalProperties: false
      type: object
      required:
        - display_name
      properties:
        display_name:
          type: string
          maxLength: 255
    ListApplicationsResponse:
      additionalProperties: false
      type: object
      required:
        - data
        - meta
      properties:
        meta:
          $ref: '../../../common/definitions/metadatas.yaml#/components/schemas/PaginatedMeta'
        data:
          type: array
          items:
            $ref: '#/components/schemas/GetApplicationResponse'
    GetApplicationResponse:
      additionalProperties: false
      type: object
      properties:
        id:
          $ref: '../../../common/definitions/properties.yaml#/components/schemas/UUID'
        name:
          type: string
        reference_id:
          $ref: '../common/properties.yaml#/components/schemas/ApplicationReferenceId'
        description:
          type: string
          nullable: true
        redirect_uri:
          type: string
          nullable: true
        auth_strategy:
          $ref: '../../../common/definitions/auth_strategies.yaml#/components/schemas/PortalAuthStrategy'
        scopes:
          $ref: '#/components/schemas/Scopes'
        created_at:
          $ref: '../../../common/definitions/properties.yaml#/components/schemas/CreatedAt'
        updated_at:
          $ref: '../../../common/definitions/properties.yaml#/components/schemas/UpdatedAt'
      required:
        - id
        - name
        - reference_id
        - description
        - updated_at
        - created_at
    ListCredentialsResponse:
      additionalProperties: false
      type: object
      required:
        - data
        - meta
      properties:
        meta:
          $ref: '../../../common/definitions/metadatas.yaml#/components/schemas/PaginatedMeta'
        data:
          type: array
          items:
            type: object
            additionalProperties: false
            properties:
              id:
                $ref: '../../../common/definitions/properties.yaml#/components/schemas/UUID'
              display_name:
                type: string
            required:
              - id
              - display_name
    CredentialCreationResponse:
      additionalProperties: false
      type: object
      properties:
        credential:
          type: string
        id:
          $ref: '../../../common/definitions/properties.yaml#/components/schemas/UUID'
        display_name:
          type: string
      required:
        - credential
        - id
        - display_name
    RefreshTokenResponse:
      additionalProperties: false
      type: object
      title: Refresh token response
      description: Refresh token response
      required:
        - client_id
        - client_secret
      properties:
        client_id:
          type: string
        client_secret:
          type: string
    CreateApplicationPayload:
      additionalProperties: false
      type: object
      title: CreateApplicationPayload
      description: Application creation payload
      required:
        - name
      properties:
        name:
          description: The name of the application
          type: string
          maxLength: 255
        reference_id:
          $ref: '../common/properties.yaml#/components/schemas/ApplicationReferenceId'
        redirect_uri:
          description: URL to redirect to after completing an OIDC auth flow
          type: string
          format: uri
        description:
          description: A brief description of the application
          type: string
          maxLength: 255
        auth_strategy_id:
          $ref: '#/components/schemas/AuthStrategyId'
        scopes:
          $ref: '#/components/schemas/Scopes'
    ApplicationCreationResponse:
      additionalProperties: false
      type: object
      title: ApplicationCreationResponse
      description: Application creation response payload
      required:
        - id
        - name
        - reference_id
        - description
        - created_at
        - updated_at
        - auth_strategy
      properties:
        id:
          $ref: '../../../common/definitions/properties.yaml#/components/schemas/UUID'
        name:
          type: string
        reference_id:
          $ref: '../common/properties.yaml#/components/schemas/ApplicationReferenceId'
        description:
          type: string
          nullable: true
        redirect_uri:
          type: string
          nullable: true
        credentials:
          additionalProperties: false
          type: object
          required:
            - client_id
            - client_secret
          properties:
            client_id:
              type: string
            client_secret:
              type: string
        auth_strategy:
           $ref: '../../../common/definitions/auth_strategies.yaml#/components/schemas/PortalAuthStrategy'
        scopes:
          $ref: '#/components/schemas/Scopes'
        created_at:
          $ref: '../../../common/definitions/properties.yaml#/components/schemas/CreatedAt'
        updated_at:
          $ref: '../../../common/definitions/properties.yaml#/components/schemas/UpdatedAt'
    UpdateApplicationPayload:
      additionalProperties: false
      type: object
      title: UpdateApplicationPayload
      description: Payload required to update an application
      required:
        - name
      properties:
        name:
          description: The name of the application
          type: string
          maxLength: 255
        reference_id:
          $ref: '../common/properties.yaml#/components/schemas/ApplicationReferenceId'
        redirect_uri:
          description: URL to redirect to after completing an OIDC auth flow
          type: string
          format: uri
        description:
          description: A brief description of the application
          type: string
          maxLength: 255
        scopes:
          $ref: '#/components/schemas/Scopes'
    ApplicationUpdateResponse:
      additionalProperties: false
      type: object
      title: ApplicationUpdateResponse
      description: Application update response payload
      required:
        - id
        - name
        - reference_id
        - description
        - updated_at
        - created_at
      properties:
        id:
          $ref: '../../../common/definitions/properties.yaml#/components/schemas/UUID'
        name:
          type: string
        reference_id:
          $ref: '../common/properties.yaml#/components/schemas/ApplicationReferenceId'
        description:
          type: string
          example: A brief description of the application
          nullable: true
        redirect_uri:
          type: string
          example: https://example.com/callback
          nullable: true
        auth_strategy:
          $ref: '../../../common/definitions/auth_strategies.yaml#/components/schemas/PortalAuthStrategy'
        scopes:
          $ref: '#/components/schemas/Scopes'
        created_at:
          $ref: '../../../common/definitions/properties.yaml#/components/schemas/CreatedAt'
        updated_at:
          $ref: '../../../common/definitions/properties.yaml#/components/schemas/UpdatedAt'
    GetGrantedScopesProductVersionResponse:
      additionalProperties: false
      type: object
      required:
        - scopes
      properties:
        scopes:
          $ref: '../common/properties.yaml#/components/schemas/RefreshedGrantedScopes'
    ListAuthStrategiesResponse:
      additionalProperties: false
      type: object
      required:
        - data
        - meta
      properties:
        meta:
          $ref: '../../../common/definitions/metadatas.yaml#/components/schemas/PaginatedMeta'
        data:
          type: array
          items:
            $ref: '../../../common/definitions/auth_strategies.yaml#/components/schemas/PortalAuthStrategy'
  examples:
    GetGrantedScopesProductVersion200Response:
      value:
        scopes: ['openid']
    GetGrantedScopesProductVersion422Example:
      value:
        status: 422
        title: Unsupported IDP
        type: https://kongapi.info/konnect/portal/granted-scopes-unavailable
        detail: This feature is not supported by the application.
        instance: kong:trace:2724154947768991354
tags:
  - name: applications
    description:
      The API for Konnect Portal developer applications within a private portal (i.e. requires registration/authentication).
      When a portal is in `public` mode, all of the described endpoints will return a 404 error. A public portal means
      that applications and registrations are not available/needed. In this API's context, "you" and "your" refers to the
      developer consuming the API.
  - name: credentials
    description: The API for Konnect Portal developer credentials within a private portal (i.e. requires registration/authentication).
