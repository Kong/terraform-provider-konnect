openapi: 3.0.0
info:
  title: Portal
  version: 3.0.0
  description: N/A (this description is removed during bundling)
  contact:
    name: Kong
    url: https://cloud.konghq.com
paths:
  /api/v3/portal:
    get:
      x-unstable: true
      x-internal: true
      operationId: get-portal-context-v3
      summary: Get portal context
      description: Returns the portal context object.
      responses:
        '200':
          $ref: '#/components/responses/GetPortalContextResponseV3'
      tags:
        - portal
      security:
        - portalAccessToken: []
        - {}
  /api/v3/portal/pages:
    get:
      x-unstable: true
      x-internal: true
      operationId: list-portal-pages
      summary: List Portal Pages
      description: >-
        Returns a paginated list of pages for the portal. Each page has a path, title, and content.
        Public pages will be returned for non-authenticated users, while both private and public pages will be returned for authenticated users.
      parameters:
        - $ref: '#/components/parameters/SortPortalPages'
        - $ref: '../../../../common/definitions/metadatas.yaml#/components/parameters/PageSize'
        - $ref: '../../../../common/definitions/metadatas.yaml#/components/parameters/PageNumber'
        - $ref: '../../common/filter_parameters.yaml#/components/parameters/FilterByTitleEquality'
        - $ref: '../../common/filter_parameters.yaml#/components/parameters/FilterByTitleEqualityShort'
        - $ref: '../../common/filter_parameters.yaml#/components/parameters/FilterByTitleContains'
        - $ref: '../../common/filter_parameters.yaml#/components/parameters/FilterByPathEquality'
        - $ref: '../../common/filter_parameters.yaml#/components/parameters/FilterByPathEqualityShort'
        - $ref: '../../common/filter_parameters.yaml#/components/parameters/FilterByPathContains'
        - $ref: '../../common/filter_parameters.yaml#/components/parameters/FilterByPublicEquality'
        - $ref: '../../common/filter_parameters.yaml#/components/parameters/FilterByPublicEqualityShort'
      responses:
        '200':
          $ref: '#/components/responses/ListPortalPagesResponse'
      tags:
        - portal
      security:
        - portalAccessToken: []
        - {}
  /api/v3/portal/pages/content:
    get:
      x-unstable: true
      x-internal: true
      operationId: get-portal-page
      summary: Get Portal Page
      description: >-
        Returns a single page for the portal. Each page has a path, title, and content.
        Public pages will be returned for non-authenticated users, while both private and public pages will be returned for authenticated users.
      parameters:
        - name: path
          in: query
          required: true
          description: The unique identifier of the page
          schema:
            type: string
          example: /about/company
      responses:
        '200':
          $ref: '#/components/responses/GetPortalPageResponse'
        '404':
          $ref: '../../../../common/definitions/errors.yaml#/components/responses/NotFound'
      tags:
        - portal
      security:
        - portalAccessToken: []
        - {}
  /api/v3/portal/snippets:
    get:
      x-unstable: true
      x-internal: true
      operationId: list-portal-snippets
      summary: List Portal Snippets
      description: >-
        Returns a paginated list of snippets for the portal. Each snippet has a name, title, and content.
        Public snippets will be returned for non-authenticated users, while both private and public snippets will be returned for authenticated users.
      parameters:
        - $ref: '#/components/parameters/SortPortalSnippets'
        - $ref: '../../../../common/definitions/metadatas.yaml#/components/parameters/PageSize'
        - $ref: '../../../../common/definitions/metadatas.yaml#/components/parameters/PageNumber'
        - $ref: '../../common/filter_parameters.yaml#/components/parameters/FilterByTitleEquality'
        - $ref: '../../common/filter_parameters.yaml#/components/parameters/FilterByTitleEqualityShort'
        - $ref: '../../common/filter_parameters.yaml#/components/parameters/FilterByTitleContains'
        - $ref: '../../common/filter_parameters.yaml#/components/parameters/FilterByNameEquality'
        - $ref: '../../common/filter_parameters.yaml#/components/parameters/FilterByNameEqualityShort'
        - $ref: '../../common/filter_parameters.yaml#/components/parameters/FilterByPathContains'
        - $ref: '../../common/filter_parameters.yaml#/components/parameters/FilterByPublicEquality'
        - $ref: '../../common/filter_parameters.yaml#/components/parameters/FilterByPublicEqualityShort'
      responses:
        '200':
          $ref: '#/components/responses/ListPortalSnippetsResponse'
      tags:
        - portal
      security:
        - portalAccessToken: []
        - {}
  /api/v3/portal/snippets/content:
    get:
      x-unstable: true
      x-internal: true
      operationId: get-portal-snippet
      summary: Get Portal Snippet
      description: >-
        Returns a single snippet for the portal. Each snippet has a name, title, and content.
        Public snippets will be returned for non-authenticated users, while both private and public snippets will be returned for authenticated users.
      parameters:
        - name: name
          in: query
          required: true
          description: The name of the snippet
          schema:
            type: string
          example: snip1
      responses:
        '200':
          $ref: '#/components/responses/GetPortalSnippetResponse'
        '404':
          $ref: '../../../../common/definitions/errors.yaml#/components/responses/NotFound'
      tags:
        - portal
      security:
        - portalAccessToken: []
        - {}

components:
  parameters:
    SortPortalPages:
      name: 'sort'
      description: |
        Sorts a collection of portal pages. Supported sort attributes are:
          - created_at
          - updated_at
          - path
          - title
          - public
      in: query
      required: false
      schema:
        type: string
    SortPortalSnippets:
      name: 'sort'
      description: |
        Sorts a collection of portal snippets. Supported sort attributes are:
          - created_at
          - updated_at
          - name
          - title
          - public
      in: query
      required: false
      schema:
        type: string
  responses:
    ListPortalPagesResponse:
      description: Paginated list of portal pages
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ListPortalPages'
          examples:
            ListPortalPageResponseExample1:
              value:
                data:
                  - id: 582b9327-3eba-4bfe-9438-6066840dbbca
                    title: 'Home'
                    path: '/'
                    public: true
                    description: 'Welcome page'
                    created_at: '2021-09-01T00:00:00Z'
                    updated_at: '2021-09-01T00:00:00Z'
                meta:
                  page:
                    size: 10
                    total: 1
                    number: 1
    ListPortalSnippetsResponse:
      description: Paginated list of portal snippets
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ListPortalSnippets'
          examples:
            ListPortalSnippetResponseExample1:
              value:
                data:
                  - id: 582b9327-3eba-4bfe-9438-6066840dbbca
                    title: 'Home'
                    name: 'snip1'
                    public: true
                    description: 'Welcome snippet'
                    created_at: '2021-09-01T00:00:00Z'
                    updated_at: '2021-09-01T00:00:00Z'
                meta:
                  page:
                    size: 10
                    total: 1
                    number: 1  
    GetPortalPageResponse:
      description: A single portal page
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PortalPage'
          examples:
            PortalPageResponseExample1:
              value:
                id: 582b9327-3eba-4bfe-9438-6066840dbbca
                title: 'Home'
                path: '/'
                content: '# Welcome to the Developer Portal'
                public: true
                created_at: '2021-09-01T00:00:00Z'
                updated_at: '2021-09-01T00:00:00Z'
    GetPortalSnippetResponse:
      description: A single portal snippet
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PortalSnippet'
          examples:
            PortalPageResponseExample1:
              value:
                id: 582b9327-3eba-4bfe-9438-6066840dbbca
                title: 'Home'
                name: 'snip1'
                content: '# Welcome to the Developer Portal'
                public: true
                created_at: '2021-09-01T00:00:00Z'
                updated_at: '2021-09-01T00:00:00Z'
    GetPortalContextResponseV3:
      description: The portal context object
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PortalContextV3'
          examples:
            GetPortalContextResponseV3Example1:
              value:
                portal_id: "18a9b697-7e68-411b-8e1d-102b261ab18e"
                org_id: "a40f5d1f-d889-42e9-94ea-b9b33585fc6b"
                basic_auth_enabled: true
                oidc_auth_enabled: true
                saml_auth_enabled: true
                authentication_enabled: true
                rbac_enabled: true
                allowed_time_period: "90d"
                name: "my portal"
                canonical_domain: "portal.example.com"
  schemas:
    PortalContextV3:
      title: Portal Context
      description: Describes the portal execution context
      type: object
      additionalProperties: false
      required:
        - portal_id
        - org_id
        - basic_auth_enabled
        - oidc_auth_enabled
        - saml_auth_enabled
        - authentication_enabled
        - rbac_enabled
        - allowed_time_period
        - name
        - canonical_domain
      properties:
        portal_id:
          type: string
          format: uuid
          description: ID of the portal
        org_id:
          type: string
          format: uuid
          description: ID of the organization
        basic_auth_enabled:
          type: boolean
          description: Whether the portal can be accessed via email and password
        oidc_auth_enabled:
          type: boolean
          description: Whether the portal can be accessed via authentication with Single Sign On (SSO) through OpenID Connect (OIDC) from a third-party Identity Provider
        saml_auth_enabled:
          type: boolean
          description: Whether the portal can be accessed via SAML authentication
        authentication_enabled:
          type: boolean
          description: Whether authentication is enabled for the portal
        rbac_enabled:
          type: boolean
          description: Whether Role-Based Access Control is enabled for the portal
        allowed_time_period:
          type: string
          description: Allowed time period for Analytics queries
        name:
          type: string
          description: Name of the developer portal
        canonical_domain:
          type: string
          description: The canonical domain of the developer portal
    PageId:
      title: Page ID
      description: The unique identifier of the page
      type: string
      format: uuid
      example: 582b9327-3eba-4bfe-9438-6066840dbbca
    PagePath:
      title: Page Path
      description: The path of the page with a leading slash
      type: string
      example: /my-page
    PageTitle:
      title: Page Title
      description: The title of the page
      type: string
      example: My Page
    PageContent:
      title: Page Content
      description: The renderable markdown content of the page
      type: string
      example: '# Welcome to the Developer Portal'
    PublicStatus:
      title: Resource Public Status
      description: Whether the page or snippet is public or private. Private pages and snippets are only accessible to authenticated users.
      type: boolean
      example: true
    Description:
      title: Resource Description
      type: string
      example: 'A custom page about developer portals'
    SnippetId:
      title: Snippet ID
      description: The unique identifier of the snippet
      type: string
      format: uuid
      example: 582b9327-3eba-4bfe-9438-6066840dbbcb
    SnippetTitle:
      title:  Snippet Title
      description: The title of the snippet
      type: string
      example: My Snippet
    SnippetContent:
      title:  Snippet Content
      description: The renderable markdown content of the snippet
      type: string
      example: '# Welcome to the Developer Portal'
    SnippetName:
      title: Snippet Name
      description: The name of the snippet (no leading slash)
      type: string
      example: my-snippet
    ListPortalPages:
      title: List Portal Pages
      description: A paginated list of pages for the portal
      type: object
      additionalProperties: false
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PortalPageInfo'
        meta:
          $ref: '../../../../common/definitions/metadatas.yaml#/components/schemas/PaginatedMeta'
    ListPortalSnippets:
      title: List Portal Snippets
      description: A paginated list of snippets for the portal
      type: object
      additionalProperties: false
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PortalSnippetInfo'
        meta:
          $ref: '../../../../common/definitions/metadatas.yaml#/components/schemas/PaginatedMeta'
    PortalPageInfo:
      title: Portal Page Info
      description: A single page for the portal
      type: object
      additionalProperties: false
      properties:
        id:
          $ref: '#/components/schemas/PageId'
        path:
          $ref: '#/components/schemas/PagePath'
        title:
          $ref: '#/components/schemas/PageTitle'
        public:
          $ref: '#/components/schemas/PublicStatus'
        description:
          $ref: '#/components/schemas/Description'
        created_at:
          $ref: '../../../../common/definitions/konnect_properties.yaml#/components/schemas/CreatedAt'
        updated_at:
          $ref: '../../../../common/definitions/konnect_properties.yaml#/components/schemas/UpdatedAt'
      required:
        - id
        - path
        - title
        - public
        - created_at
        - updated_at
    PortalSnippetInfo:
      title: Portal Snippet Info
      description: A single snippet for the portal
      type: object
      additionalProperties: false
      properties:
        id:
          $ref: '#/components/schemas/SnippetId'
        name:
          $ref: '#/components/schemas/SnippetName'
        title:
          $ref: '#/components/schemas/SnippetTitle'
        public:
          $ref: '#/components/schemas/PublicStatus'
        description:
          $ref: '#/components/schemas/Description'
        created_at:
          $ref: '../../../../common/definitions/konnect_properties.yaml#/components/schemas/CreatedAt'
        updated_at:
          $ref: '../../../../common/definitions/konnect_properties.yaml#/components/schemas/UpdatedAt'
      required:
        - id
        - name
        - title
        - public
        - created_at
        - updated_at
    PortalPage:
      title: Portal Page
      description: A single page for the portal
      type: object
      additionalProperties: false
      properties:
        id:
          $ref: '#/components/schemas/PageId'
        title:
          $ref: '#/components/schemas/PageTitle'
        path:
          $ref: '#/components/schemas/PagePath'
        content:
          $ref: '#/components/schemas/PageContent'
        public:
          $ref: '#/components/schemas/PublicStatus'
        description:
          $ref: '#/components/schemas/Description'
        created_at:
          $ref: '../../../../common/definitions/konnect_properties.yaml#/components/schemas/CreatedAt'
        updated_at:
          $ref: '../../../../common/definitions/konnect_properties.yaml#/components/schemas/UpdatedAt'
      required:
        - id
        - title
        - path
        - content
        - public
        - created_at
        - updated_at
    PortalSnippet:
      title: Portal Snippet
      description: A single snippet for the portal
      type: object
      additionalProperties: false
      properties:
        id:
          $ref: '#/components/schemas/PageId'
        title:
          $ref: '#/components/schemas/SnippetTitle'
        name:
          $ref: '#/components/schemas/SnippetName'
        content:
          $ref: '#/components/schemas/SnippetContent'
        public:
          $ref: '#/components/schemas/PublicStatus'
        description:
          $ref: '#/components/schemas/Description'
        created_at:
          $ref: '../../../../common/definitions/konnect_properties.yaml#/components/schemas/CreatedAt'
        updated_at:
          $ref: '../../../../common/definitions/konnect_properties.yaml#/components/schemas/UpdatedAt'
      required:
        - id
        - title
        - name
        - content
        - public
        - created_at
        - updated_at
  securitySchemes:
    portalAccessToken:
      $ref: '../../../../common/definitions/security.yaml#/components/securitySchemes/portalAccessToken'
tags:
  - name: portal
    description: The API for retrieving details about a single Konnect Portal.
