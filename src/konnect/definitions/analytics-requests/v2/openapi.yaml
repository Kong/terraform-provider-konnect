        - value
    FilterSingleValueNumericMilliseconds:
      title: Numeric filters
      type: object
      properties:
        operator:
          $ref: '#/components/schemas/RequestsFilterTypeNumeric'
        value:
          description: |
            The value to include in the results. The value should be in milliseconds.
          type: integer
      required:
        - operator
        - value
    FilterMultiValueNumericMilliseconds:
      title: Multiselect filters
      type: object
      properties:
        operator:
          $ref: '#/components/schemas/RequestsFilterType'
        value:
          description: |
            The values to include in the results. The values should be in milliseconds.
          type: array
          items:
            type: integer
      required:
