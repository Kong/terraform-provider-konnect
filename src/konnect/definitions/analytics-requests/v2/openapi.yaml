        - value
    FilterSingleValueNumericBytes:
      title: Numeric filters
      type: object
      properties:
        operator:
          $ref: '#/components/schemas/RequestsFilterTypeNumeric'
        value:
          description: |
            The value to include in the results. The value should be in bytes.
          type: integer
      required:
        - operator
        - value
    FilterMultiValueNumericBytes:
      title: Multiselect filters
      type: object
      properties:
        operator:
          $ref: '#/components/schemas/RequestsFilterType'
        value:
          description: |
            The values to include in the results. The values should be in bytes.
          type: array
          items:
            type: integer
      required:
        - operator
        - value

    ApplicationFilterByField:
      title: Filter by application
      allOf:
        - type: object
          properties:
            field:
              description: The field to filter.
              type: string
              enum: [ application ]
          required:
            - field
        - oneOf:
          - $ref: '#/components/schemas/FilterMultiValueUUID'
          - $ref: '#/components/schemas/FilterSingleValueUUID'
          - $ref: '#/components/schemas/FilterEmpty'
    ApplicationFilterByDimension:
      title: Filter by application
      type: object
      properties:
        dimension:
          description: The dimension to filter.  This will be deprecated in favor of `field`.
          type: string
          enum: [ application ]
        type:
          $ref: '#/components/schemas/RequestsFilterType'
        values:
          description: |
            The IDs to include in the results.
          type: array
          items:
            $ref: '#/components/schemas/UnscopedUuid'
      required:
        - dimension
        - type
        - values

    ApiProductFilterByField:
      title: Filter by api_product
      allOf:
        - type: object
          properties:
            field:
              description: The field to filter.
              type: string
              enum: [ api_product ]
          required:
            - field
        - oneOf:
          - $ref: '#/components/schemas/FilterMultiValueUUID'
          - $ref: '#/components/schemas/FilterSingleValueUUID'
          - $ref: '#/components/schemas/FilterEmpty'
    ApiProductFilterByDimension:
      title: Filter by api_product
      type: object
