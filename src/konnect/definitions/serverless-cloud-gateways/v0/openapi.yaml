    UpdateServerlessCloudGatewayRequest:
      x-speakeasy-entity: ServerlessCloudGateway
      type: object
      title: UpdateServerlessCloudGatewayRequest
      description: Schema to update a serverless cloud gateway.
      additionalProperties: false
      properties:
        cp_prefix:
          type: string
          description: The prefix of the serverless cloud gateway CP.
          example: 518da50bf7
        cp_region:
          $ref: '#/components/schemas/CpRegion'
        labels:
          $ref: '#/components/schemas/SCGWLabels'
    SCGWLabels:
      title: Labels
      type: object
      example:
        env: 'test'
      description: 'Labels to facilitate tagged search on serverless cloud gateways. Keys must be of length 1-63 characters, and cannot start with ''kong'', ''konnect'', ''mesh'', ''kic'', or ''_''.'
      additionalProperties:
        type: string
        pattern: '^[a-z0-9A-Z]{1}([a-z0-9A-Z\-\.\_]*[a-z0-9A-Z]+)?$'
        minLength: 1
        maxLength: 63
    CpRegion:
      title: Control plane region
      type: string
      description: The control plane region.
      example: us
      enum:
        - us
        - eu
        - au
      x-enum-varnames: [US, Europe, Aus]
    ServerlessControlPlane:
      type: object
      title: Control plane
      x-go-name: ControlPlane
      required:
        - id
        - prefix
        - region
      properties:
        id:
          type: string
          format: uuid
          description: ID of the serverless cloud gateway CP.
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        prefix:
          type: string
          description: The prefix of the serverless cloud gateway CP.
          example: 518da50bf7
        region:
          $ref: '#/components/schemas/CpRegion'
