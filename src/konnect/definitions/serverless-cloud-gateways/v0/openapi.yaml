    CreateServerlessCloudGatewayResponse:
      description: A response to creating a serverless cloud gateway.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ServerlessCloudGateway'
          examples:
            Create Serverless cloud gateway Response:
