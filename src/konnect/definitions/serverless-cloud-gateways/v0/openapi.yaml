openapi: 3.0.3
info:
  title: Konnect Serverless Cloud Gateways Manager
  description: Serverless Cloud Gateways Manager API
  version: 0.0.1
  contact:
    name: Kong
    url: https://konghq.com
servers:
  - url: https://global.api.konghq.com/v0
    description: US Public API
security:
  - personalAccessToken: []
  - systemAccountAccessToken: []
tags:
  - name: Serverless Cloud Gateways
paths:
  /serverless-cloud-gateways:
    get:
      summary: List Serverless cloud gateways
      parameters:
        - $ref: '../../../../common/definitions/metadatas.yaml#/components/parameters/PageSize'
        - $ref: '../../../../common/definitions/metadatas.yaml#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/FilterSCGWByLabels'
      responses:
        '200':
          $ref: '#/components/responses/ListServerlessCloudGatewaysResponse'
        '401':
          $ref: >-
            ../../../../common/definitions/errors.yaml#/components/responses/Unauthorized
        '403':
          $ref: >-
            ../../../../common/definitions/errors.yaml#/components/responses/Forbidden
      operationId: list-serverless-cloud-gateway
      description: Returns an array of serverless cloud gateways objects.
      x-unstable: true
      tags:
        - Serverless Cloud Gateways
    post:
      x-speakeasy-entity-operation: ServerlessCloudGateway#create
      summary: Create a new serverless cloud gateway
      description: Create a new serverless cloud gateway
      operationId: create-serverless-cloud-gateway
      x-unstable: true
      tags:
        - Serverless Cloud Gateways
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateServerlessCloudGatewayRequest'
            examples:
              Example Request Body:
                $ref: '#/components/examples/CreateServerlessCloudGatewayRequestExample'
      responses:
        '201':
          $ref: '#/components/responses/CreateServerlessCloudGatewayResponse'
        '400':
          $ref: ../../../../common/definitions/errors.yaml#/components/responses/BadRequest
        '401':
          $ref: >-
            ../../../../common/definitions/errors.yaml#/components/responses/Unauthorized
        '403':
          $ref: >-
            ../../../../common/definitions/errors.yaml#/components/responses/Forbidden
  /serverless-cloud-gateways/{controlPlaneId}:
    parameters:
      - name: controlPlaneId
        in: path
        required: true
        description: Id of the Serverless Cloud Gateway control plane
        example: bf138ba2-c9b1-4229-b268-04d9d8a6410b
        schema:
          type: string
          format: uuid
        x-speakeasy-match: control_plane.id
    get:
      x-speakeasy-entity-operation: ServerlessCloudGateway#read
      summary: Get the serverless cloud gateway
      description: Get the serverless cloud gateway
      operationId: get-serverless-cloud-gateway
      x-unstable: true
      tags:
        - Serverless Cloud Gateways
      responses:
        '200':
          $ref: '#/components/responses/RetrieveServerlessCloudGatewayResponse'
        '401':
          $ref: >-
            ../../../../common/definitions/errors.yaml#/components/responses/Unauthorized
        '403':
          $ref: >-
            ../../../../common/definitions/errors.yaml#/components/responses/Forbidden
        '404':
          $ref: >-
            ../../../../common/definitions/errors.yaml#/components/responses/NotFound
    patch:
      x-speakeasy-entity-operation: ServerlessCloudGateway#update
      summary: Update the serverless cloud gateway
      operationId: update-serverless-cloud-gateway
      x-internal: true
      x-unstable: true
      responses:
        '200':
          $ref: '#/components/responses/UpdateServerlessCloudGatewayResponse'
        '400':
          $ref: ../../../../common/definitions/errors.yaml#/components/responses/BadRequest
        '401':
          $ref: >-
            ../../../../common/definitions/errors.yaml#/components/responses/Unauthorized
        '403':
          $ref: >-
            ../../../../common/definitions/errors.yaml#/components/responses/Forbidden
        '404':
          $ref: >-
            ../../../../common/definitions/errors.yaml#/components/responses/NotFound
      description: Update an individual serverless cloud gateway.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateServerlessCloudGatewayRequest'
            examples:
              Example Request Body:
                $ref: '#/components/examples/UpdateServerlessCloudGatewayRequestExample'
      tags:
        - Serverless Cloud Gateways
    delete:
      x-speakeasy-entity-operation: ServerlessCloudGateway#delete
      summary: Delete the serverless cloud gateway
      description: Delete the serverless cloud gateway
      operationId: delete-serverless-cloud-gateway
      x-unstable: true
      tags:
        - Serverless Cloud Gateways
      responses:
        '204':
          description: No Content
        '401':
          $ref: >-
            ../../../../common/definitions/errors.yaml#/components/responses/Unauthorized
        '403':
          $ref: >-
            ../../../../common/definitions/errors.yaml#/components/responses/Forbidden
        '404':
          $ref: >-
            ../../../../common/definitions/errors.yaml#/components/responses/NotFound
components:
  parameters:
    FilterSCGWByLabels:
      name: labels
      description: Filter serverless cloud gateways in the response by associated labels.
      in: query
      required: false
      schema:
        type: string
        example: 'filter[labels][eq]=env:prod'
  securitySchemes:
    personalAccessToken:
      $ref: >-
        ../../../../common/definitions/security.yaml#/components/securitySchemes/personalAccessToken
    systemAccountAccessToken:
      $ref: >-
        ../../../../common/definitions/security.yaml#/components/securitySchemes/systemAccountAccessToken
  schemas:
    ServerlessCloudGateway:
      x-speakeasy-entity: ServerlessCloudGateway
      type: object
      title: ServerlessCloudGateway
      description: A serverless cloud gateway
      required:
        - control_plane
        - gateway_endpoint
        - updated_at
        - created_at
      properties:
        control_plane:
          $ref: '#/components/schemas/ServerlessControlPlane'
        gateway_endpoint:
          type: string
          format: hostname
          description: Endpoint for the serverless cloud gateway.
          example: us-kong-4594857kpl.kongcloud.dev
          readOnly: true
        created_at:
          type: string
          format: date-time
          example: '2023-01-11T02:30:42.227Z'
          readOnly: true
        updated_at:
          type: string
          format: date-time
          example: '2023-01-11T02:30:42.227Z'
          readOnly: true
        labels:
          $ref: '#/components/schemas/SCGWLabels'
    CreateServerlessCloudGatewayRequest:
