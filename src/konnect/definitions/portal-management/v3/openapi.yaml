  schemas:
    ################################
    ## Portal
    ################################

    PortalV3:
      title: PortalV3
      type: object
      additionalProperties: false
      properties:
        id:
          $ref: '../../../../common/definitions/konnect_properties.yaml#/components/schemas/UUID'
        created_at:
          $ref: '../../../../common/definitions/konnect_properties.yaml#/components/schemas/CreatedAt'
        updated_at:
          $ref: '../../../../common/definitions/konnect_properties.yaml#/components/schemas/UpdatedAt'
        name:
          type: string
          maxLength: 255
          minLength: 1
          description: >-
            The name of the portal, used to distinguish it from other portals.
            Name must be unique.
        display_name:
          type: string
          maxLength: 255
          minLength: 1
          description: >-
            The display name of the portal. This value will be the portal's
            `name` in Portal API.
        description:
          type: string
          nullable: true
          maxLength: 512
          description: >-
            A description of the portal.
        authentication_enabled:
          type: boolean
          description: >-
            Whether the portal supports developer authentication. If disabled,
            developers cannot register for accounts or create applications.
          default: true
        rbac_enabled:
          type: boolean
          description: >-
            Whether the portal resources are protected by Role Based Access
            Control (RBAC). If enabled, developers view or register for products
            until unless assigned to teams with access to view and consume
            specific products. Authentication must be enabled to use RBAC.
          default: false
        default_api_visibility:
          type: string
          description: >-
            The default visibility of APIs in the portal. If set to `public`,
            newly published APIs are visible to unauthenticated developers. If set to
            `private`, newly published APIs are hidden from unauthenticated
            developers.
          enum:
            - public
            - private
        default_page_visibility:
          type: string
          description: >-
            The default visibility of pages in the portal. If set to `public`,
            newly created pages are visible to unauthenticated developers. If set
            to `private`, newly created pages are hidden from unauthenticated
            developers.
          enum:
            - public
            - private
        default_application_auth_strategy_id:
          type: string
          format: uuid
          description: >-
            The default authentication strategy for APIs published to the portal.
            Newly published APIs will use this authentication strategy unless
            overridden during publication. If set to `null`, API publications
            will not use an authentication strategy unless set during publication.
          nullable: true
        auto_approve_developers:
          type: boolean
          description: >-
            Whether developer account registrations will be automatically
            approved, or if they will be set to pending until approved by an
            admin.
          default: false
        auto_approve_applications:
          type: boolean
          description: >-
            Whether requests from applications to register for products will
            be automatically approved, or if they will be set to pending until
            approved by an admin.
          default: false
        default_domain:
          description: >-
            The domain assigned to the portal by Konnect. This is the default
            place to access the portal and its API if not using a
            `custom_domain``.
          type: string
          format: hostname
          readOnly: true
        custom_domain:
          type: string
          format: hostname
          nullable: true
          description: >-
            The custom domain to access the developer portal. A CNAME for the portal's default domain
            must be able to be set for the custom domain for it to be valid. After setting a valid CNAME,
            an SSL/TLS certificate will be automatically manged for the custom domain, and traffic will
            be able to use the custom domain to route to the portal's web client and API.
        labels:
          $ref: '../../../../common/definitions/konnect_properties.yaml#/components/schemas/Labels'

    PortalImageAssetV3:
      title: PortalImageAssetV3
      type: string
      format: binary
      example: data:image/png;base64,bmljZV9sb29raW5nX3BpY3R1cmU=

    ReplacePortalImageAssetV3:
      title: ReplacePortalImageAssetV3
      description: >-
        The image data to upload, along with an optional filename. Images must be a data URL with binary image data in base 64 format.
        See https://developer.mozilla.org/en-US/docs/Web/HTTP/Basics_of_HTTP/Data_URLs.
      type: object
      additionalProperties: false
      nullable: true
      required:
        - data
      properties:
        data:
          $ref: >-
            ../../../../common/definitions/portal.yaml#/components/schemas/ImageDataUri
        filename:
          type: string
          maxLength: 512
      example:
        data: data:image/jpeg;base64,bmljZV9sb29raW5nX3BpY3R1cmU=

    ################################
    ## Pages & Snippets
    ################################

    PagePath:
      title: PagePath
      description: The path of a page in a portal with a leading slash.
      type: string
      maxLength: 512
      example: /my-page
    PageTitle:
