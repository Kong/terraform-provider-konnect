openapi: 3.0.3
info:
  title: Portal Management V3
  version: 3.0.0
  description: The management API for Portals
  contact:
    name: Kong
    url: https://konghq.com
servers:
  - url: https://us.api.konghq.com/v3
    description: US Region Base URL
  - url: https://eu.api.konghq.com/v3
    description: EU Region Base URL
  - url: https://au.api.konghq.com/v3
    description: AU Region Base URL
  - url: https://me.api.konghq.com/v3
    description: ME Region Base URL
paths:
  /portals:
    get:
      summary: List V3 Portals
      description: >-
        Lists developer portals defined in this region for this organization.
        Each developer portal is available at a unique address and has isolated
        configuration, customization, developers, and applications.
      operationId: list-portals
      tags:
        - V3 Portals
      parameters:
        - $ref: >-
            ../../../../common/definitions/metadatas.yaml#/components/parameters/PageSize
        - $ref: >-
            ../../../../common/definitions/metadatas.yaml#/components/parameters/PageNumber
        - $ref: '#/components/parameters/SortPortalsV3'
        - in: query
          name: filter
          description: Filter portals returned in the response.
          required: false
          style: deepObject
          schema:
            $ref: '#/components/schemas/PortalFilterParameters'
      responses:
        '200':
          $ref: '#/components/responses/ListPortalsResponseV3'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: >-
                  ../../../../common/definitions/errors.yaml#/components/schemas/BadRequestError
              examples:
                ListPortalsV3BadRequestExample1:
                  $ref: '#/components/examples/ListPortalsV3BadRequestExample1'
                ListPortalsV3BadRequestExample2:
                  $ref: '#/components/examples/ListPortalsV3BadRequestExample2'
                ListPortalsV3BadRequestExample3:
                  $ref: '#/components/examples/ListPortalsV3BadRequestExample3'
        '401':
          $ref: >-
            ../../../../common/definitions/errors.yaml#/components/responses/Unauthorized
        '403':
          $ref: >-
            ../../../../common/definitions/errors.yaml#/components/responses/Forbidden
    post:
      summary: Create V3 Portal
      description: >-
        Creates a new developer portal scoped in this region for this organization.
      operationId: create-portal
      tags:
        - V3 Portals
      requestBody:
        $ref: '#/components/requestBodies/CreatePortalV3'
      responses:
        '201':
          $ref: '#/components/responses/PortalResponseV3'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: >-
                  ../../../../common/definitions/errors.yaml#/components/schemas/BadRequestError
              examples:
                UpdatePortalV3BadRequestExample1:
                  $ref: '#/components/examples/UpdatePortalV3BadRequestExample1'
                UpdatePortalV3BadRequestExample2:
                  $ref: '#/components/examples/UpdatePortalV3BadRequestExample2'
                UpdatePortalV3BadRequestExample3:
                  $ref: '#/components/examples/UpdatePortalV3BadRequestExample3'
                UpdatePortalV3BadRequestExample4:
                  $ref: '#/components/examples/UpdatePortalV3BadRequestExample4'
                UpdatePortalV3BadRequestExample5:
                  $ref: '#/components/examples/UpdatePortalV3BadRequestExample5'
                UpdatePortalV3BadRequestExample6:
                  $ref: '#/components/examples/UpdatePortalV3BadRequestExample6'
        '401':
          $ref: >-
            ../../../../common/definitions/errors.yaml#/components/responses/Unauthorized
        '403':
          $ref: >-
            ../../../../common/definitions/errors.yaml#/components/responses/Forbidden
  /portals/{portalId}:
    parameters:
      - name: portalId
        in: path
        schema:
          type: string
          format: uuid
        required: true
        description: ID of the portal.
    get:
      summary: Get V3 Portal
      description: >-
        Returns the configuration for a single developer portal. This allows you
        to understand the current visibility, access, and domain settings.
      operationId: get-portal
      tags:
        - V3 Portals
      responses:
        '200':
          $ref: '#/components/responses/PortalResponseV3'
        '401':
          $ref: >-
            ../../../../common/definitions/errors.yaml#/components/responses/Unauthorized
        '403':
          $ref: >-
            ../../../../common/definitions/errors.yaml#/components/responses/Forbidden
        '404':
          $ref: >-
            ../../../../common/definitions/errors.yaml#/components/responses/NotFound
    patch:
      summary: Update V3 Portal
      description: >-
        Updates the configuration for a single portal including the visibility,
        access, and custom domain settings.
      operationId: update-portal
      requestBody:
        $ref: '#/components/requestBodies/UpdatePortalV3'
      tags:
        - V3 Portals
      responses:
        '200':
          $ref: '#/components/responses/PortalResponseV3'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: >-
                  ../../../../common/definitions/errors.yaml#/components/schemas/BadRequestError
              examples:
                UpdatePortalV3BadRequestExample1:
                  $ref: '#/components/examples/UpdatePortalV3BadRequestExample1'
                UpdatePortalV3BadRequestExample2:
                  $ref: '#/components/examples/UpdatePortalV3BadRequestExample2'
                UpdatePortalV3BadRequestExample3:
                  $ref: '#/components/examples/UpdatePortalV3BadRequestExample3'
                UpdatePortalV3BadRequestExample4:
                  $ref: '#/components/examples/UpdatePortalV3BadRequestExample4'
                UpdatePortalV3BadRequestExample5:
                  $ref: '#/components/examples/UpdatePortalV3BadRequestExample5'
                UpdatePortalV3BadRequestExample6:
                  $ref: '#/components/examples/UpdatePortalV3BadRequestExample6'
        '401':
          $ref: >-
            ../../../../common/definitions/errors.yaml#/components/responses/Unauthorized
        '403':
          $ref: >-
            ../../../../common/definitions/errors.yaml#/components/responses/Forbidden
        '404':
          $ref: >-
            ../../../../common/definitions/errors.yaml#/components/responses/NotFound
        '409':
          $ref: >-
            ../../../../common/definitions/errors.yaml#/components/responses/Conflict
    delete:
      summary: Delete Portal
      description: >-
        Deletes a single portal, along with all related entities.
      operationId: delete-portal
      tags:
        - V3 Portals
      responses:
        '204':
          description: No Content
        '401':
          $ref: >-
            ../../../../common/definitions/errors.yaml#/components/responses/Unauthorized
        '403':
          $ref: >-
            ../../../../common/definitions/errors.yaml#/components/responses/Forbidden
        '404':
          $ref: >-
            ../../../../common/definitions/errors.yaml#/components/responses/NotFound
  /portals/{portalId}/verify-domain:
    post:
      summary: Verify Custom Domain
      description: >-
        Verifies the current status of the custom hosted domain for this portal,
        indicating whether the appropriate CNAME properties have propagated and
        if a corresponding SSL certificate has been generated.
      operationId: verify-portal-domain
      parameters:
        - $ref: >-
            ../../../../common/definitions/portal.yaml#/components/parameters/PortalId
      tags:
