components:
  parameters:
    PortalId:
      schema:
        type: string
        format: uuid
      name: portalId
      in: path
      required: true
      description: ID of the portal.
    GatewayServiceId:
      schema:
        type: string
        format: uuid
      name: gatewayServiceId
      in: path
      required: true
      description: ID of the gateway service.
    controlPlaneId:
      name: controlPlaneId
      in: path
      required: true
      schema:
        type: string
        format: uuid
        example: 9524ec7d-36d9-465d-a8c5-83a3c9390458
      description: The UUID of your control plane. This variable is available in the Konnect manager.
    DeveloperId:
      schema:
        type: string
        example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        format: uuid
      name: developerId
      in: path
      required: true
      description: ID of the developer.
    DocumentId:
      schema:
        type: string
        example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        format: uuid
      name: documentId
      in: path
      required: true
      description: ID of the document.
    RoleId:
      schema:
        type: string
        example: 8350205f-a305-4e39-abe9-bc082a80091a
        format: uuid
      name: roleId
      in: path
      required: true
    TeamId:
      schema:
          type: string
          format: uuid
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
      name: teamId
      in: path
      required: true
      description: ID of the team.
    PageId:
      schema:
          type: string
          format: uuid
          example: ebbac5b0-ac89-45c3-9d2e-c4542c657e79
      name: pageId
      in: path
      required: true
      description: ID of the page.
    SnippetId:
      schema:
          type: string
          format: uuid
          example: ebbac5b0-ac89-45c3-9d2e-c4542c657e79
      name: snippetId
      in: path
      required: true
      description: ID of the snippet.
    DcrProviderId:
      name: dcrProviderId
      description: DCR provider identifier
      in: path
      required: true
      schema:
          type: string
          format: uuid
          example: ebbac5b0-ac89-45c3-9d2e-c4542c657e79
    AuthStrategyId:
      name: authStrategyId
      description: 'ID of the auth strategy to use for the application'
      in: path
      required: true
      schema:
          type: string
          format: uuid
          example: ebbac5b0-ac89-45c3-9d2e-c4542c657e79
  schemas:
    PortalCustomization:
      deprecated: true
      title: PortalCustomization
      type: object
      additionalProperties: true
    ImageDataUri:
      title: ImageDataUri
      type: string
      format: uri
      pattern: '^data:image/(png|jpeg|x-icon|ico|icon|vnd.microsoft.icon|gif)(;base64)?,(?:[A-Za-z0-9+/]{4})*(?:[A-Za-z0-9+/]{2}==|[A-Za-z0-9+/]{3}=)?$'
      description: 'must be a data URL with base64 image data, e.g., data:image/jpeg;base64,<BASE64_IMAGE_DATA>'
      x-validation-message: 'must be a data URL with base64 image data, e.g., data:image/jpeg;base64,<BASE64_IMAGE_DATA>'
      example: 'data:image/png,YW5faW1hZ2VfZmlsZQ=='
    PortalCustomizationV3:
      title: PortalCustomizationV3
      description: The custom settings of this portal
      type: object
      additionalProperties: false
      properties:
        theme:
          type: string
          nullable: false
        layout:
          type: string
          nullable: false
        css:
          type: string
          nullable: true
        js:
          type: object
          additionalProperties: false
          properties:
            custom:
              type: string
              nullable: true
            scripts:
              type: array
              items:
                type: string
                pattern: '^https://[^:.]+\\..+$'
              maxItems: 20
        menu:
          type: object
          additionalProperties: false
          properties:
            main:
              type: array
              items:
                $ref: '#/components/schemas/PortalMenuItemV3'
            footer_sections:
              type: array
              items:
                $ref: '#/components/schemas/PortalFooterMenuSectionV3'
            footer_bottom:
              type: array
              items:
                $ref: '#/components/schemas/PortalMenuItemV3'
        spec_renderer:
          type: object
          additionalProperties: false
          properties:
            try_it_ui:
              type: boolean
              default: true
            try_it_insomnia: 
              type: boolean
              default: true
            infinite_scroll:
              type: boolean
              default: true
            show_schemas:
              type: boolean
              default: true
        robots:
          type: string
          nullable: true
    PortalMenuItemV3:
      type: object
      additionalProperties: false
      properties:
        path:
          description: The absolute path of a page in a portal with a leading slash.
          type: string
          example: /about/company
          maxLength: 512
        title:
          description: The link display text
          type: string
          example: My Page
        public:
          description: Whether a page is publicly accessible to non-authenticated users. Defaults to false.
          type: boolean
        external:
          description: 'When clicked, open the link in a new window'
          type: boolean
      required:
        - path
        - title
        - public
        - external
    PortalFooterMenuSectionV3:
      type: object
      additionalProperties: false
      properties:
        title:
          description: The footer menu section title
          type: string
          maxLength: 512
        items:
          type: array
          items:
            $ref: '#/components/schemas/PortalMenuItemV3'
      required:
        - title
        - items
    PortalConfig:
      type: object
      properties:
        data:
          type: object
          additionalProperties: true
          properties:
            header:
              type: array
              items:
                $ref: '#/components/schemas/PortalMenuItemV3'
            footer_sections:
              type: array
              items:
                $ref: '#/components/schemas/PortalFooterMenuSectionV3'
            footer_bottom:
              type: array
              items:
                $ref: '#/components/schemas/PortalMenuItemV3'
      additionalProperties: false
      required:
        - data
      title: PortalConfig
  responses:
    GetPortalCustomization:
      description: Response for a portal customization
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PortalCustomization'