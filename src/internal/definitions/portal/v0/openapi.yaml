openapi: 3.0.3
info:
    title: Internal Portal
    description: Internal api for konnect to allow retrieving of entities in konnect db.
    version: '1.0.0'
    contact:
      name: Kong
      url: 'https://konghq.com'
tags:
  - name: portal
  - name: App Auth Strategies
  - name: api-products
servers:
  - url: 'http://konnect-api.konnect.svc.cluster.local:300/v0'
    description: Konnect cluster
paths:
  /internal/application-auth-strategies/{authStrategyId}:
    parameters:
      - $ref: '../../../../common/definitions/portal.yaml#/components/parameters/AuthStrategyId'
    get:
      summary: retrieve an auth strategy
      description: Returns a raw database representation of the auth strategy.
      operationId: get-authstrat
      tags:
        - App Auth Strategies
      responses:
        '200':
          $ref: '#/components/responses/GetAuthStrat'
        '404':
          $ref: '../../../../common/definitions/errors.yaml#/components/responses/NotFound'
  /internal/portals/{portalId}:
    parameters:
      - $ref: '../../../../common/definitions/portal.yaml#/components/parameters/PortalId'
    get:
      summary: retrieve a portal
      description: Returns a raw database representation of the portal.
      operationId: get-portal
      tags:
        - portal
      responses:
        '200':
          $ref: '#/components/responses/GetPortal'
        '404':
          $ref: '../../../../common/definitions/errors.yaml#/components/responses/NotFound'
  /internal/control-planes/{controlPlaneId}/gateway-services/{gatewayServiceId}/product-version:
    parameters:
      - $ref: '../../../../common/definitions/portal.yaml#/components/parameters/controlPlaneId'
      - $ref: '../../../../common/definitions/portal.yaml#/components/parameters/GatewayServiceId'
    get:
      summary: retrieves a product version id by control plane and gateway service
      description: returns product version id or 404 if not found
      operationId: get-cp-gw-product-version
      tags:
        - api-products
      responses:
        '200':
          $ref: '#/components/responses/GetProductVersion'
        '404':
          $ref: '../../../../common/definitions/errors.yaml#/components/responses/NotFound'

components:
  responses:
    GetPortal:
      description: A raw database portal
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Portal'
    GetAuthStrat:
      description: A raw database auth strategy
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AuthStrategy'
    GetProductVersion:
      description: A product version
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProductVersion'
  schemas:
    Portal:
      additionalProperties: true
      type: object
      required:
        - id
        - default_application_auth_strategy
        - name
        - uri
        - labels
        - version
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        display_name:
          type: string
        uri:
          type: string
        custom_domain:
          type: string
        is_domain_verified:
          type: boolean
        logo:
          type: string
        logo_filename:
          type: string
        favicon:
          type: string
        favicon_filename:
          type: string
        is_public:
          type: boolean
        auto_approve_developers:
          type: boolean
        auto_approve_applications:
          type: boolean
        rbac_enabled:
          type: boolean
        config:
          type: object
          additionalProperties: true
        version:
          type: string
        customization:
          $ref: '../../../../common/definitions/portal.yaml#/components/schemas/PortalCustomization'
        labels:
          $ref: '../../../../common/definitions/konnect_properties.yaml#/components/schemas/Labels'
        description:
          type: string
        default_application_auth_strategy:
          $ref: '#/components/schemas/NullableAuthStrategy'
    ProductVersion:
      additionalProperties: false
      type: object
      required:
        - id
      properties:
        id:
          type: string
          format: uuid    
    AuthStrategy:
      allOf:
        - $ref: '#/components/schemas/BaseAuthStrategy'
    NullableAuthStrategy:
      allOf:
        - $ref: '#/components/schemas/BaseAuthStrategy'
      nullable: true
    BaseAuthStrategy:
      type: object
      required:
        - id
        - name
        - display_name
        - strategy_type
        - dcr_provider
        - configs
        - labels
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        display_name:
          type: string
        strategy_type:
          type: string
        configs:
          type: object
        labels:
          $ref: '../../../../common/definitions/konnect_properties.yaml#/components/schemas/Labels'
        dcr_provider:
          $ref: '#/components/schemas/NullableDcrProvider'
    NullableDcrProvider:
      type: object
      nullable: true
      required:
        - id
        - name
        - provider_type
        - issuer
        - dcr_config
        - labels
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        provider_type:
          type: string
        issuer:
          type: string
        dcr_config:
          type: object
        labels:
          $ref: '../../../../common/definitions/konnect_properties.yaml#/components/schemas/Labels'