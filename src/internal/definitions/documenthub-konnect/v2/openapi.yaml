openapi: 3.0.3
info:
    title: DocumentHub admin Api v2
    description: DocumentHub admin Api
    version: '0.0.1'
    contact:
      name: Kong
      url: 'https://konghq.com'
servers:
  - url: 'http://localhost:4400/v2'
    description: Local
  - url: 'http://documenthub.documenthub.svc.cluster.local:4400/v2'
    description: Konnect cluster
paths:
  /collections:
    get:
      summary: List collections
      description: Create a document collection
      operationId: listCollections
      parameters:
        - $ref: '#/components/parameters/SortCollections'
        - $ref: '../../../../common/definitions/metadatas.yaml#/components/parameters/PageSize'
        - $ref: '../../../../common/definitions/metadatas.yaml#/components/parameters/PageNumber'
        - schema:
            type: object
            properties:
              id:
                $ref: '../../../../common/definitions/aip_filters.yaml#/components/schemas/UuidFieldFilter'
              name:
                $ref: '../../../../common/definitions/aip_filters.yaml#/components/schemas/StringFieldFilter'
              created_at:
                 $ref: '../../../../common/definitions/aip_filters.yaml#/components/schemas/DateTimeFieldFilter'
              updated_at:
                 $ref: '../../../../common/definitions/aip_filters.yaml#/components/schemas/DateTimeFieldFilter'
          in: query
          name: filter
          description: Filter documents returned in the response.
          required: false
          style: deepObject
      responses:
        '200':
          description: The collection has been created
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/ListCollectionResponse'
      tags:
        - Collections
    post:
      summary: Create collection
      description: Create a document collection
      operationId: createCollection
      requestBody:
        $ref: '#/components/requestBodies/CreateCollection'
      responses:
        '201':
          description: The collection has been created
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/DocumentCollection'
        '400':
          $ref: '../../../../common/definitions/errors.yaml#/components/responses/BadRequest'
      tags:
        - Collections
  /collections/{collectionId}:
    parameters:
      - $ref: '#/components/parameters/collectionId'
    get:
      summary: Get document collection
      description: Get document collection
      operationId: getCollection
      responses:
        '200':
          description: Document collection
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/DocumentCollection'
        '404':
          $ref: '../../../../common/definitions/errors.yaml#/components/responses/NotFound'
      tags:
        - Collections
    patch:
      summary: Update collection
      description: Update the document collection
      operationId: updateCollection
      requestBody:
        $ref: '#/components/requestBodies/UpdateCollection'
      responses:
        '201':
          description: The document has been created
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/DocumentCollection'
        '400':
          $ref: '../../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '404':
          $ref: '../../../../common/definitions/errors.yaml#/components/responses/NotFound'
      tags:
        - Collections
    delete:
      summary: Delete collection
      description: Delete the document collection
      operationId: deleteCollection
      responses:
        '204':
          description: The document collection has been deleted
        '404':
          $ref: '../../../../common/definitions/errors.yaml#/components/responses/NotFound'
      tags:
        - Collections
  /collections/{collectionId}/documents:
    parameters:
      - $ref: '#/components/parameters/collectionId'
    get:
      summary: List collection documents
      description: List documents in a collection
      operationId: listDocuments
      parameters:
        - in: header
          name: Accept
          schema:
            $ref: '../../documenthub/common/v2/documenthub.yaml#/components/schemas/DocumentContentTypeEnum'
        - $ref: '#/components/parameters/SortDocuments'
        - $ref: '../../../../common/definitions/metadatas.yaml#/components/parameters/PageSize'
        - $ref: '../../../../common/definitions/metadatas.yaml#/components/parameters/PageNumber'
        - schema:
            type: object
            properties:
              id:
                $ref: '../../../../common/definitions/aip_filters.yaml#/components/schemas/UuidFieldFilter'
              slug:
                $ref: '../../../../common/definitions/aip_filters.yaml#/components/schemas/StringFieldFilter'
              title:
                $ref: '../../../../common/definitions/aip_filters.yaml#/components/schemas/StringFieldFilter'
              created_at:
                 $ref: '../../../../common/definitions/aip_filters.yaml#/components/schemas/DateTimeFieldFilter'
              updated_at:
                 $ref: '../../../../common/definitions/aip_filters.yaml#/components/schemas/DateTimeFieldFilter'
          in: query
          name: filter
          description: |
            Filter documents returned in the response.
            The filters are only applied for 'application/json' content-type.
          required: false
          style: deepObject
      responses:
        '200':
          description: Documents in the collection
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/ListDocuments'
            'application/vnd.konnect.document-tree+json':
              schema:
                $ref: '#/components/schemas/ListDocumentsTree'
        '400':
          $ref: '../../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '404':
          $ref: '../../../../common/definitions/errors.yaml#/components/responses/NotFound'
      tags:
        - Documents
    post:
      summary: Create document
      description: Create document and put it in a collection
      operationId: createDocument
      requestBody:
        $ref: '#/components/requestBodies/CreateDocument'
      responses:
        '201':
          description: The document has been created
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/DocumentCreationResponsePayload'
        '400':
          $ref: '../../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '404':
          $ref: '../../../../common/definitions/errors.yaml#/components/responses/NotFound'
      tags:
        - Documents
  /collections/{collectionId}/documents/{documentId}:
    parameters:
      - $ref: '#/components/parameters/collectionId'
      - $ref: '#/components/parameters/documentId'
    get:
      summary: Get the document
      description: Get the document
      operationId: getDocument
      parameters:
        - in: header
          name: Accept
          schema:
            $ref: '../../documenthub/common/v2/documenthub.yaml#/components/schemas/DocumentFormatContentTypeEnum'
      responses:
        '200':
          description: Document
          content:
            text/markdown:
              schema:
                type: string
                description: the markdown content
            'application/json':
              schema:
                $ref: '#/components/schemas/DocumentRaw'
            application/vnd.konnect.document-nodes+json:
              schema:
                $ref: '#/components/schemas/Document'
        '404':
          $ref: '../../../../common/definitions/errors.yaml#/components/responses/NotFound'
      tags:
        - Documents
    delete:
      summary: Delete the document
      description: |
        Delete the document. 
        Returns 404 if the document cannot be found, 409 if deleting the document would result in other orphaned documents.
      operationId: deleteDocument
      responses:
        '204':
          description: The document has been deleted
        '404':
          $ref: '../../../../common/definitions/errors.yaml#/components/responses/NotFound'
        '409':
          $ref: '../../../../common/definitions/errors.yaml#/components/responses/Conflict'
      tags:
        - Documents
    patch:
      summary: Update the document
      description: Update the document
      operationId: updateDocument
      requestBody:
        $ref: '#/components/requestBodies/UpdateDocument'
      responses:
        '200':
          description: The document has been updated
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Document'
        '400':
          $ref: '../../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '404':
          $ref: '../../../../common/definitions/errors.yaml#/components/responses/NotFound'
      tags:
        - Documents
  /collections/{collectionId}/documents/{documentId}/move:
    put:
      summary: Move a document
      description: |
        This api allows the user to move a document within the document tree using the
        parameters parent_document_id and index. If parent_document_id is not
        provided, the document will be placed at the top level of the document tree.
        index represents a zero-indexed document order relative to its siblings under
        the same parent. For example, if we want to put the document at top level in
        first position we would send parent_document_id: null and index: 0. This api
        also supports using a negative index to count backwards from the end of the
        document list, which means you can put the document in last position by using
        index: -1.
      operationId: moveDocument
      parameters:
        - $ref: '#/components/parameters/collectionId'
        - $ref: '#/components/parameters/documentId'
      requestBody:
        $ref: '#/components/requestBodies/MoveDocument'
      responses:
        '200':
          description: The document has been moved
        '400':
          $ref: '../../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '404':
          $ref: '../../../../common/definitions/errors.yaml#/components/responses/NotFound'
      tags:
        - Documents

components:
  securitySchemes:
    konnectAccessToken:
      $ref: '../../../../common/definitions/security.yaml#/components/securitySchemes/konnectAccessToken'
  schemas:
    ListDocumentsTree:
      type: object
      required:
      - meta
      - data
      properties:
        meta:
          $ref: '../../../../common/definitions/metadatas.yaml#/components/schemas/PaginatedMeta'
        data:
          type: array
          items:
            $ref: '#/components/schemas/DocumentTree'
    ListDocuments:
      type: object
      additionalProperties: false
      required:
      - meta
      - data
      properties:
        meta:
          $ref: '../../../../common/definitions/metadatas.yaml#/components/schemas/PaginatedMeta'
        data:
          type: array
          items:
            $ref: '#/components/schemas/DocumentItem'
    DocumentItem:
      type: object
      title: Document item
      additionalProperties: false
      required:
      - id
      - parent_document_id
      - slug
      - title
      - filename
      - created_at
      - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: the id of the document
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        parent_document_id:
          type: string
          format: uuid
          description: the id of the parent document
          nullable: true
          example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
        slug:
          type: string
          description: the slug of the document
          example: getting-started
        title:
          type: string
          description: the title of the document
          example: Getting Started
        filename:
          type: string
          description: the filename of the document
          example: myDocument.md
        created_at:
          $ref: '../../../../common/definitions/properties.yaml#/components/schemas/CreatedAt'
        updated_at:
          $ref: '../../../../common/definitions/properties.yaml#/components/schemas/UpdatedAt'
    DocumentRaw:
      type: object
      title: Document
      description: a document
      required:
      - id
      - slug
      - revision
      properties:
        id:
          type: string
          format: uuid
          description: the id of the document
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        parent_document_id:
          type: string
          format: uuid
          description: the id of the parent document
          nullable: true
          example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
        slug:
          type: string
          description: the slug of the document
          example: getting-started
        revision:
          $ref: '#/components/schemas/RevisionRaw'
    RevisionRaw:
      type: object
      title: Revision
      description: revision of a document
      required:
        - id
        - document_id
        - content
        - metadata
        - title
      properties:
        id:
          type: string
          format: uuid
          description: the id of the revision
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        document_id:
          type: string
          format: uuid
          description: the id of the document
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        content:
          type: string
          description: Markdown document
        metadata:
          type: object
          description: the metadata of the document
          example:
            title: Hello World
            description: This is a description
            keywords: hello, world
        title:
          type: string
          description: the title of the document
          example: Hello World
    Slug:
      type: string
      description: document slug
      pattern: ^[\w-]+$
      maxLength: 80
      example: path-for-seo
    PublishStatus:
      description: document publish status. Default to published.
      type: string
      enum:
      - published
      - unpublished
    ListCollectionResponse:
      type: object
      properties:
        meta:
          $ref: '../../../../common/definitions/metadatas.yaml#/components/schemas/PaginatedMeta'
        data:
          type: array
          items:
            $ref: '#/components/schemas/DocumentCollection'
      required:
      - meta
      - data
    DocumentCollection:
      type: object
      title: Document Collection
      description: a document collection
      required:
      - id
      - name
      - created_at
      - updated_at
      properties:
        id:
          type: string
          format: uuid
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        name:
          type: string
          example: my document collection
        created_at:
          $ref: '../../../../common/definitions/properties.yaml#/components/schemas/CreatedAt'
        updated_at:
          $ref: '../../../../common/definitions/properties.yaml#/components/schemas/UpdatedAt'
    Document:
      type: object
      title: Document
      description: a document
      required:
      - id
      - parent_document_id
      - slug
      - revision
      - status
      - updated_at
      - created_at
      properties:
        id:
          type: string
          format: uuid
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        parent_document_id:
          type: string
          format: uuid
          example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
          nullable: true
        slug:
          $ref: '#/components/schemas/Slug'
        status:
          $ref: '#/components/schemas/PublishStatus'
        created_at:
          $ref: '../../../../common/definitions/properties.yaml#/components/schemas/CreatedAt'
        updated_at:
          $ref: '../../../../common/definitions/properties.yaml#/components/schemas/UpdatedAt'
        revision:
          $ref: '#/components/schemas/Revision'
    DocumentTree:
      type: object
      title: DocumentTree
      description: a document tree
      required:
      - id
      - title
      - filename
      - slug
      - metadata
      - children
      - status
      - created_at
      - updated_at
      properties:
        id:
          type: string
          format: uuid
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        parent_document_id:
          type: string
          format: uuid
          example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
          nullable: true
        title:
          type: string
        filename:
          type: string
          example: myDocument.md
        slug:
          type: string
          description: document slug
          example: path-for-seo
        metadata:
          type: object
          description: metadata of the document
          example: { "author": "John Doe" }
        children:
          type: array
          description: children of the document
          example:
            - id: d32d905a-ed33-46a3-a093-d8f536af9a8a
              title: Hello world
              filename: myDocument.md
              slug: hello-world
              status: published
              created_at: '2023-01-11T02:30:42.227Z'
              updated_at: '2023-01-11T02:30:42.227Z'
              metadata:
                author: John Doe
              children: []
          items:
            $ref: '#/components/schemas/DocumentTree'
        created_at:
          $ref: '../../../../common/definitions/properties.yaml#/components/schemas/CreatedAt'
        updated_at:
          $ref: '../../../../common/definitions/properties.yaml#/components/schemas/UpdatedAt'
    Revision:
      type: object
      title: Revision
      description: revision of a document
      required:
      - content
      - document_id
      - id
      - metadata
      - title
      - file
      properties:
        id:
          type: string
          format: uuid
          description: revision id
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        document_id:
          type: string
          format: uuid
          description: document id
          example: 2272b454-4af6-4c56-8a02-d6145ac62e67
        content:
          $ref: '../../documenthub/common/v2/documenthub_nodes.yaml#/components/schemas/DocumentBlock'
        metadata:
          type: object
          example: { "author": "John Doe" }
        title:
          type: string
          example: Hello world
        raw_md_content:
          type: string
          format: byte
          description: raw markdown content
          example: I0ludHJvZHVjdGlvbg==
        file:
          description: file of the revision
          type: object
          required:
          - filename
          - modified_at
          properties:
            filename:
              type: string
              example: my_doc.md
            modified_at:
              type: string
              format: date-time
              example: '2023-01-11T02:30:42.227Z'
    CreateCollectionPayload:
      type: object
      title: CreateCollectionPayload
      description: payload to create the document collection
      required:
      - name
      properties:
        name:
          type: string
    UpdateCollectionPayload:
      type: object
      title: UpdateCollectionPayload
      description: payload to update the document collection
      required:
      - name
      properties:
        name:
          type: string
    CreateDocumentPayload:
      type: object
      title: CreateDocumentPayload
      description: a document payload
      required:
      - slug
      - title
      - filename
      properties:
        parent_document_id:
          type: string
          format: uuid
          description: parent document id
          example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
        slug:
          $ref: '#/components/schemas/Slug'
        status:
          $ref: '#/components/schemas/PublishStatus'
        title:
          type: string
          description: document title
          example: How to create a document in Konnect DocumentHub
        raw_content:
          type: string
          format: byte
          example: YmFzZTY0LWVuY29kZWQgdGV4dCBzdHJpbmc=
        str_md_content:
          type: string
          description: markdown content
          example: '## My Markdown'
        metadata:
          type: object
          nullable: true
          description: metadata of the document
          example: { "author": "John Doe" }
        filename:
          type: string
          description: name of the uploaded file
          example: my_doc.md
      oneOf:
        - required:
            - raw_content
        - required:
            - str_md_content
    UpdateDocumentPayload:
      type: object
      title: UpdateDocumentPayload
      description: a document payload
      properties:
        parent_document_id:
          type: string
          format: uuid
          nullable: true
          description: |
            Parent document Id. If this value is explicitly set to null, the
            document will be put as a top level document at the bottom of the tree.
          example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
        slug:
          $ref: '#/components/schemas/Slug'
        status:
          $ref: '#/components/schemas/PublishStatus'
        title:
          type: string
          description: document title
          example: How to update a document in Konnect DocumentHub
        raw_content:
          type: string
          format: byte
          description: base64 encoded string of the document content
          example: YmFzZTY0LWVuY29kZWQgdGV4dCBzdHJpbmc=
        str_md_content:
          type: string
          description: markdown content
          example: '## My Markdown'
        filename:
          type: string
          description: name of the uploaded file
          example: my_doc.md
        metadata:
          type: object
          nullable: true
    DocumentCreationResponsePayload:
      type: object
      title: Document Creation Response Payload
      description: a document payload
      required:
      - document_id
      - revision_id
      properties:
        document_id:
          type: string
          format: uuid
          description: document id
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        revision_id:
          type: string
          format: uuid
          description: revision id
          example: ecfb698d-77a8-4ab5-91fa-45ee383b48ba
    MoveDocumentRequestPayload:
      type: object
      title: Move document
      description: move document request payload
      properties:
        parent_document_id:
          type: string
          format: uuid
          description: parent document id
          example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
        index:
          type: integer
          description: index of the document in the parent document's children
          example: 1
  requestBodies:
    MoveDocument:
      description: move document
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MoveDocumentRequestPayload'
    CreateCollection:
      description: collection creation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreateCollectionPayload'
    UpdateCollection:
      description: collection update
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UpdateCollectionPayload'
    CreateDocument:
      description: document creation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreateDocumentPayload'
    UpdateDocument:
      description: document update
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UpdateDocumentPayload'
  parameters:
    collectionId:
      name: collectionId
      in: path
      required: true
      description: Targeted collection
      example: bb84c46a-432d-4314-81e4-478614a52dcb
      schema:
        type: string
        format: uuid
    documentId:
      name: documentId
      in: path
      required: true
      description: Targeted document
      example: bb84c46a-432d-4314-81e4-478614a52dcb
      schema:
        type: string
        format: uuid
    SortDocuments:
      name: 'sort'
      description: |
        Sorts a collection of documents. 
        The sort parameter is only applied for 'application/json' content-type.
        Supported sort attributes are:
          - created_at
          - updated_at
          - slug
          - title
      in: query
      required: false
      schema:
        type: string
    SortCollections:
      name: 'sort'
      description: |
        Sorts a list of collections. Supported sort attributes are:
          - created_at
          - updated_at
          - name
      in: query
      required: false
      schema:
        type: string

security:
  - konnectAccessToken: []
tags:
  - name: Collections
    description: document collections operations
  - name: Documents
    description: document operations