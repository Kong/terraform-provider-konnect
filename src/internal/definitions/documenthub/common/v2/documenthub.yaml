components:
  schemas:
    Metadata:
      type: object
      description: Contains key value pairs information about entity's metadata.
      additionalProperties: true
      example:
        owner: John Appleseed
    MetadataNullable:
      type: object
      nullable: true
      description: Contains key value pairs information about entity's metadata.
      additionalProperties: true
    DocumentFormatContentTypeEnum:
      type: string
      default: application/json
      enum:
        - text/markdown
        - application/json
        - application/vnd.konnect.document-nodes+json
    DocumentContentTypeEnum:
      type: string
      default: 'application/json'
      enum:
      - 'application/json'
      - 'application/vnd.konnect.document-tree+json'
    ListDocumentsWithStatus:
      type: object
      additionalProperties: false
      required:
      - meta
      - data
      properties:
        meta:
          $ref: '../../../../../common/definitions/metadatas.yaml#/components/schemas/PaginatedMeta'
        data:
          type: array
          items:
            $ref: '#/components/schemas/DocumentItemWithStatus'
    DocumentItemWithStatus:
      allOf:
      - $ref: '#/components/schemas/DocumentItem'
      - type: object
        title: Document item with status
        additionalProperties: false
        required:
        - status
        properties:
          status:
            description: document publish status
            type: string
            enum:
            - published
            - unpublished
