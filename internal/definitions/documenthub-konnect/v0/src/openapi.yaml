openapi: 3.0.3
info:
    title: DocumentHub admin Api
    description: DocumentHub admin Api
    version: '0.0.1'
    contact:
      name: Kong
      url: 'https://konghq.com'
servers:
  - url: 'http://localhost:4400/v0'
    description: Local
  - url: 'https://us.api.konghq.tech/v0'
    description: Development - US
  - url: 'https://us.api.konghq.com/v0'
    description: Production - US
  - url: 'https://eu.api.konghq.tech/v0'
    description: Development - EU
  - url: 'https://eu.api.konghq.com/v0'
    description: Production - EU
  - url: 'http://documenthub.documenthub.svc.cluster.local:4400/v0'
    description: Konnect cluster
paths:
  /{resourceKind}/{resourceId}/documents/tree:
    get:
      summary: Get the document tree
      description: Get the document tree
      operationId: getDocumentTree
      parameters:
        - $ref: '#/components/parameters/resourceKind'
        - $ref: '#/components/parameters/resourceId'
      responses:
        '200':
          description: Tree of documents
          content:
            'application/json':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DocumentTree'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
      tags:
        - Customization
  /{resourceKind}/{resourceId}/documents:
    get:
      summary: Get many documents
      description: Get many documents
      operationId: getManyDocuments
      parameters:
        - in: header
          name: Accept
          schema:
            $ref: '../../../documenthub/common/v0/documenthub.yaml#/components/schemas/DocumentContentTypeEnum'
        - $ref: '#/components/parameters/resourceKind'
        - $ref: '#/components/parameters/resourceId'
        - $ref: '../../../../../common/definitions/metadatas.yaml#/components/parameters/PageSize'
        - $ref: '../../../../../common/definitions/metadatas.yaml#/components/parameters/PageNumber'
      responses:
        '200':
          description: Tree of documents or flat list of documents
          content:
            'application/json':
              schema:
                $ref: '../../../documenthub/common/v0/documenthub.yaml#/components/schemas/ListDocumentsWithStatus'
            'application/vnd.konnect.document-tree+json':
              schema:
                $ref: '#/components/schemas/GetManyDocumentTrees'
        '400':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/BadRequest'
      tags:
        - Customization
    post:
      summary: Create document
      description: Create document and associate it with a Konnect resource
      operationId: createDocument
      parameters:
        - $ref: '#/components/parameters/resourceKind'
        - $ref: '#/components/parameters/resourceId'
      requestBody:
        $ref: '#/components/requestBodies/CreateDocument'
      responses:
        '201':
          description: The document has been created
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/DocumentCreationResponsePayload'
        '400':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
      tags:
        - Customization

  /{resourceKind}/{resourceId}/documents/{documentId}:
    get:
      summary: Get the document
      description: Get the document
      operationId: getDocument
      parameters:
        - $ref: '#/components/parameters/resourceKind'
        - $ref: '#/components/parameters/resourceId'
        - $ref: '#/components/parameters/documentId'
        - schema:
            type: boolean
          name: raw
          in: query
          required: false
          description: include raw document data in the response
          example: true
      responses:
        '200':
          description: The document
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Document'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
      tags:
        - Customization
    put:
      summary: Update the document
      description: Update the document
      operationId: updateDocument
      parameters:
        - $ref: '#/components/parameters/resourceKind'
        - $ref: '#/components/parameters/resourceId'
        - $ref: '#/components/parameters/documentId'
      requestBody:
        $ref: '#/components/requestBodies/UpdateDocument'
      responses:
        '200':
          description: The document has been updated
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Document'
        '400':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
      tags:
        - Customization
    delete:
      summary: Delete the document
      description: |
        Delete the document and all its associated revisions including the saved
        files in the datastore. This is a hard delete, files are not recoverable.
        Returns 404 if the document cannot be found, 409 if deleting the document would result in other orphaned documents.
      operationId: deleteDocument
      parameters:
        - $ref: '#/components/parameters/resourceKind'
        - $ref: '#/components/parameters/resourceId'
        - $ref: '#/components/parameters/documentId'
      responses:
        '204':
          description: The document has been deleted
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
        '409':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Conflict'
      tags:
        - Customization
  /{resourceKind}/{resourceId}/documents/{documentId}/move:
    put:
      summary: Move a document
      description: |
        This api allows the user to move a document within the document tree using the
        parameters parent_document_id and index. If parent_document_id is not
        provided, the document will be placed at the top level of the document tree.
        index represents a zero-indexed document order relative to its siblings under
        the same parent. For example, if we want to put the document at top level in
        first position we would send parent_document_id: null and index: 0. This api
        also supports using a negative index to count backwards from the end of the
        document list, which means you can put the document in last position by using
        index: -1.
      operationId: moveDocument
      parameters:
        - $ref: '#/components/parameters/resourceKind'
        - $ref: '#/components/parameters/resourceId'
        - $ref: '#/components/parameters/documentId'
      requestBody:
        $ref: '#/components/requestBodies/MoveDocument'
      responses:
        '200':
          description: The document has been moved
        '400':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
      tags:
        - Customization
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Slug:
      type: string
      description: document slug
      pattern: ^[\w-]+$
      maxLength: 80
      example: path-for-seo
    PublishStatus:
      description: document publish status
      type: string
      enum:
      - published
      - unpublished
    Document:
      type: object
      title: Document
      description: a document
      required:
      - id
      - parent_document_id
      - slug
      - revision
      - status
      - modified_at
      - created_at
      properties:
        id:
          type: string
          format: uuid
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        status:
          $ref: '#/components/schemas/PublishStatus'
        parent_document_id:
          type: string
          format: uuid
          example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
          nullable: true
        slug:
          $ref: '#/components/schemas/Slug'
        created_at:
          type: string
          format: date-time
          example: '2023-01-11T02:30:42.227Z'
        modified_at:
          type: string
          format: date-time
          example: '2023-01-11T02:30:42.227Z'
        revision:
          $ref: '#/components/schemas/Revision'
    GetManyDocumentTrees:
      type: object
      required:
      - meta
      - data
      properties:
        meta:
          $ref: '../../../../../common/definitions/metadatas.yaml#/components/schemas/PaginatedMeta'
        data:
          type: array
          items:
            $ref: '#/components/schemas/DocumentTree'
    DocumentTree:
      type: object
      title: DocumentTree
      description: a document tree
      required:
      - id
      - title
      - slug
      - metadata
      - children
      - status
      properties:
        id:
          type: string
          format: uuid
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        parent_document_id:
          type: string
          format: uuid
          example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
          nullable: true
        title:
          type: string
        slug:
          type: string
          description: document slug
          example: path-for-seo
        metadata:
          type: object
          description: metadata of the document
          example: { "author": "John Doe" }
        status:
          $ref: '#/components/schemas/PublishStatus'
        children:
          type: array
          description: children of the document
          example: [{ "id": "d32d905a-ed33-46a3-a093-d8f536af9a8a", "title": "Hello world","status": "published", "slug": "hello-world", "metadata": { "author": "John Doe" }, "children": [] }]
          items:
            $ref: '#/components/schemas/DocumentTree'
    Revision:
      type: object
      title: Revision
      description: revision of a document
      required:
      - content
      - document_id
      - id
      - metadata
      - title
      - file
      properties:
        id:
          type: string
          format: uuid
          description: revision id
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        document_id:
          type: string
          format: uuid
          description: document id
          example: 2272b454-4af6-4c56-8a02-d6145ac62e67
        content:
          $ref: '../../../documenthub/common/v0/documenthub_nodes.yaml#/components/schemas/DocumentBlock'
        metadata:
          type: object
          example: { "author": "John Doe" }
        title:
          type: string
          example: Hello world
        raw_md_content:
          type: string
          format: byte
          description: raw markdown content
          example: I0ludHJvZHVjdGlvbg==
        str_md_content:
          type: string
          description: markdown content
          example: '## My Markdown'
        file:
          description: file of the revision
          type: object
          required:
          - filename
          - modified_at
          properties:
            filename:
              type: string
              example: my_doc.md
            modified_at:
              type: string
              format: date-time
              example: '2023-01-11T02:30:42.227Z'
    CreateDocumentPayload:
      type: object
      title: CreateDocumentPayload
      description: a document payload
      required:
      - slug
      - status
      - title
      - raw_content
      - filename
      properties:
        parent_document_id:
          type: string
          format: uuid
          nullable: true
          description: parent document id
          example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
        slug:
          $ref: '#/components/schemas/Slug'
        status:
          $ref: '#/components/schemas/PublishStatus'
        title:
          type: string
          description: document title
          example: How to create a document in Konnect DocumentHub
        raw_content:
          type: string
          format: byte
          description: Must be a base64 encoded string
          example: YmFzZTY0LWVuY29kZWQgdGV4dCBzdHJpbmc=
        metadata:
          type: object
          nullable: true
          description: metadata of the document
          example: { "author": "John Doe" }
        filename:
          type: string
          description: name of the uploaded file
          example: my_doc.md
    UpdateDocumentPayload:
      type: object
      title: UpdateDocumentPayload
      description: a document payload
      properties:
        parent_document_id:
          type: string
          format: uuid
          nullable: true
          description: |
            Parent document Id. If this value is explicitly set to null, the
            document will be put as a top level document at the bottom of the tree.
          example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
        slug:
          $ref: '#/components/schemas/Slug'
        status:
          $ref: '#/components/schemas/PublishStatus'
        title:
          type: string
          description: document title
          example: How to update a document in Konnect DocumentHub
        raw_content:
          type: string
          format: byte
          description: base64 encoded string of the document content
          example: YmFzZTY0LWVuY29kZWQgdGV4dCBzdHJpbmc=
        filename:
          type: string
          description: name of the uploaded file
          example: my_doc.md
        metadata:
          type: object
          nullable: true
    DocumentCreationResponsePayload:
      type: object
      title: Document Creation Response Payload
      description: a document payload
      required:
      - document_id
      - revision_id
      properties:
        document_id:
          type: string
          format: uuid
          description: document id
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        revision_id:
          type: string
          format: uuid
          description: revision id
          example: ecfb698d-77a8-4ab5-91fa-45ee383b48ba
    MoveDocumentRequestPayload:
      type: object
      title: Move document
      description: move document request payload
      properties:
        parent_document_id:
          type: string
          format: uuid
          description: parent document id
          example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
        index:
          type: integer
          description: index of the document in the parent document's children
          example: 1
  requestBodies:
    MoveDocument:
      description: move document
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MoveDocumentRequestPayload'
    CreateDocument:
      description: document creation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreateDocumentPayload'
    UpdateDocument:
      description: document update
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UpdateDocumentPayload'
  parameters:
    resourceKind:
      name: resourceKind
      in: path
      required: true
      description: Kind of the Konnect resource
      example: services
      schema:
        type: string
        enum: [ services ]
    resourceId:
      name: resourceId
      in: path
      required: true
      description: Id of the Konnect resource
      example: bf138ba2-c9b1-4229-b268-04d9d8a6410b
      schema:
        type: string
        format: uuid
    documentId:
      name: documentId
      in: path
      required: true
      description: Targeted document
      example: bb84c46a-432d-4314-81e4-478614a52dcb
      schema:
        type: string
        format: uuid
security:
  - bearerAuth: []
tags:
  - name: Customization
    description: customization operations