openapi: 3.1.0
info:
  title: Portal Auth API
  version: '0.1.0'
  description: 'The management API for portal developers, teams, and RBAC rules.'
  contact:
    name: Kong
    url: 'https://konghq.com'
servers:
  - url: 'http://localhost:8000/v2'
    description: Local
  - url: 'https://us.api.konghq.tech/v2'
    description: Development - US
  - url: 'https://us.api.konghq.com/v2'
    description: Production - US
  - url: 'https://eu.api.konghq.tech/v2'
    description: Development - EU
  - url: 'https://eu.api.konghq.com/v2'
    description: Production - EU
paths:
  '/portals/{portalId}/teams':
    get:
      summary: List Teams
      responses:
        '200':
          $ref: '#/components/responses/TeamCollection'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
      operationId: list-teams
      description: List the teams.
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
      tags:
        - Teams
    parameters:
      - schema:
          type: string
        name: portalId
        in: path
        required: true
    post:
      summary: Create Team
      operationId: create-team
      responses:
        '201':
          $ref: '#/components/responses/TeamSingle'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
      tags:
        - Teams
      requestBody:
        $ref: '#/components/requestBodies/CreateTeam'
      description: Create a team.
  '/portals/{portalId}/teams/{teamId}':
    parameters:
      - schema:
          type: string
          format: uuid
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        name: teamId
        in: path
        required: true
        description: ID of the team.
      - schema:
          type: string
        name: portalId
        in: path
        required: true
        description: ID of the portal.
    get:
      summary: Get Team
      responses:
        '200':
          $ref: '#/components/responses/TeamSingle'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
      operationId: get-team
      description: Get an individual team.
      tags:
        - Teams
    patch:
      summary: Update Team
      operationId: update-team
      responses:
        '200':
          $ref: '#/components/responses/TeamSingle'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
      description: Update an individual team.
      requestBody:
        $ref: '#/components/requestBodies/UpdateTeam'
      tags:
        - Teams
    delete:
      summary: Delete Team
      operationId: delete-team
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
      description: Deleting a team also deletes its assigned roles. Members of the team are not deleted.
      tags:
        - Teams
  '/portals/{portalId}/teams/{teamId}/developers':
    parameters:
      - schema:
          type: string
        name: portalId
        in: path
        required: true
      - schema:
          type: string
        name: teamId
        in: path
        required: true
    get:
      summary: List Team Developers
      responses:
        '200':
          $ref: '#/components/responses/DeveloperCollection'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
      operationId: list-team-developers
      description: List a team's developers.
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
      tags:
        - Team Membership
    post:
      summary: Add Developer
      operationId: add-developer-to-team
      responses:
        '201':
          description: Created
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
      description: Add a developer to a team.
      requestBody:
        $ref: '#/components/requestBodies/AddDeveloperToTeam'
      tags:
        - Team Membership
  '/portals/{portalId}/teams/{teamId}/developers/{developerId}':
    parameters:
      - schema:
          type: string
          format: uuid
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        name: developerId
        in: path
        required: true
        description: ID of the developer.
      - schema:
          type: string
        name: portalId
        in: path
        required: true
      - schema:
          type: string
        name: teamId
        in: path
        required: true
    delete:
      summary: Remove Developer from Team
      operationId: remove-developer-from-team
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
      description: Remove a developer from a team.
      tags:
        - Team Membership
  '/portals/{portalId}/teams/{teamId}/assigned-roles':
    parameters:
      - schema:
          type: string
        name: portalId
        in: path
        required: true
      - schema:
          type: string
        name: teamId
        in: path
        required: true
    get:
      summary: List Team Roles
      tags:
        - Team Roles
      responses:
        '200':
          $ref: '#/components/responses/AssignedRoleCollection'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
      operationId: list-team-roles
      description: List the roles belonging to a team.
    post:
      summary: Assign Role
      operationId: teams-assign-role
      responses:
        '200':
          $ref: '#/components/responses/AssignedRoleSingle'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
      description: Assign a role to a team.
      requestBody:
        $ref: '#/components/requestBodies/AssignRole'
      tags:
        - Team Roles
  '/portals/{portalId}/teams/{teamId}/assigned-roles/{roleId}':
    parameters:
      - schema:
          type: string
          example: 8350205f-a305-4e39-abe9-bc082a80091a
          format: uuid
        name: roleId
        in: path
        required: true
      - schema:
          type: string
        name: portalId
        in: path
        required: true
      - schema:
          type: string
        name: teamId
        in: path
        required: true
    delete:
      summary: Remove Role
      operationId: teams-remove-role
      responses:
        '204':
          description: No Content
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
      tags:
        - Team Roles
      description: Remove an assigned role from a team.
  '/portals/{portalId}/developers':
    get:
      summary: List Developers
      tags:
        - Developers
      responses:
        '200':
          $ref: '#/components/responses/DeveloperCollection'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
      operationId: list-developers
      description: List the developers.
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
    parameters:
      - schema:
          type: string
        name: portalId
        in: path
        required: true
  '/portals/{portalId}/developers/{developerId}/teams':
    parameters:
      - schema:
          type: string
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
          format: uuid
        name: developerId
        in: path
        required: true
        description: ID of the developer.
      - schema:
          type: string
        name: portalId
        in: path
        required: true
    get:
      summary: List Developer Teams
      responses:
        '200':
          $ref: '#/components/responses/TeamCollection'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
      operationId: list-developer-teams
      description: List the teams to which a developer belongs.
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
      tags:
        - Team Membership
  /portal-roles:
    get:
      summary: List Portal Roles
      responses:
        '200':
          $ref: '#/components/responses/RolesDocument'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
      operationId: list-portal-roles
      description: List roles that can be assigned to teams in a portal.
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
      tags:
        - Roles
components:
  parameters:
    PageSize:
      name: 'page[size]'
      description: How many items to include in a page.
      in: query
      schema:
        type: integer
        example: 10
    PageNumber:
      name: 'page[number]'
      description: The specific page number in the collection results.
      in: query
      schema:
        type: integer
        example: 2
  responses:
    Error:
      description: A response in which an error has occurred.
      content:
        application/json:
          schema:
            type: object
            x-examples:
              Example:
                type: 'https://kongapi.info/konnect/invalid-permissions'
                status: 403
                title: Invalid Permissions
                detail: 'You must have the [administrator] role to perform this action'
                instance: 'kong:trace:6c1ef33ae5bce33634d7d7d695c7f203'
            properties:
              type:
                type: string
                example: 'https://kongapi.info/konnect/invalid-permissions'
                readOnly: true
              status:
                type: integer
                example: 403
                readOnly: true
              title:
                type: string
                example: Invalid Permissions
                readOnly: true
              instance:
                type: string
                example: 'konnect:trace:6c1ef33ae5bce33634d7d7d695c7f203'
                readOnly: true
              detail:
                type: string
                example: 'You must have the [administrator] role to perform this action'
                readOnly: true
              invalid_parameters:
                type: array
                items:
                  type: object
                  properties:
                    field:
                      type: string
                      example: name
                      readOnly: true
                    rule:
                      type: string
                      example: required
                      readOnly: true
                    reason:
                      type: string
                      example: is a required field
                      readOnly: true
                    choices:
                      type: array
                      uniqueItems: true
                      items: {}
                      readOnly: true
          examples:
            '400':
              value:
                type: 'https://kongapi.info/konnect/validation-failed'
                status: 400
                title: Validation Failed
                instance: 'konnect:trace:6c1ef33ae5bce33634d7d7d695c7f203'
                invalid_parameters:
                  - field: name
                    rule: required
                    reason: is a required field
                  - field: role
                    reason: 'must be one of: [admin, member]'
                    rule: enum
                    choices:
                      - admin
                      - member
            '401':
              value:
                type: 'https://kongapi.info/konnect/failed-authentication'
                status: 403
                title: Failed Authentication
                instance: 'konnect:trace:6c1ef33ae5bce33634d7d7d695c7f203'
                detail: 'The [username] or [password] are invalid'
            '403':
              value:
                type: 'https://kongapi.info/konnect/invalid-permissions'
                status: 403
                title: Invalid Permissions
                detail: 'You must have the [administrator] role to perform this action'
                instance: 'konnect:trace:6c1ef33ae5bce33634d7d7d695c7f203'
            '412':
              value:
                type: 'https://kongapi.info/konnect/precondition-failed'
                status: 412
                title: Precondition Failed
                instance: 'konnect:trace:6c1ef33ae5bce33634d7d7d695c7f203'
                detail: Group mapping is disabled
    DeveloperCollection:
      description: A paginated list of developers.
      content:
        application/json:
          schema:
            type: object
            properties:
              meta:
                $ref: '#/components/schemas/PaginatedMeta'
              data:
                type: array
                items:
                  $ref: '#/components/schemas/Developer'
          examples:
            Example:
              value:
                meta:
                  page:
                    number: 2
                    size: 1
                    total: 10
                data:
                  - id: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
                    email: james.woods@email.com
                    full_name: James Woods
                    preferred_name: Jimmy
                    active: true
                    created_at: '2022-08-17T17:46:57.52Z'
                    updated_at: '2022-10-03T17:00:00.00Z'
    TeamSingle:
      description: A response including a single team.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Team'
          examples:
            Example:
              value:
                id: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
                name: IDM - Developers
                description: The developers for the IDM API.
                created_at: '2022-02-07T17:46:57.52Z'
                updated_at: '2022-09-25T13:00:00.00Z'
    TeamCollection:
      description: A paginated list of teams.
      content:
        application/json:
          schema:
            type: object
            required: 
              - data
              - meta
            properties:
              meta:
                $ref: '#/components/schemas/PaginatedMeta'
              data:
                type: array
                items:
                  $ref: '#/components/schemas/Team'
          examples:
            Example:
              value:
                meta:
                  page:
                    number: 2
                    size: 1
                    total: 10
                data:
                  - id: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
                    name: IDM - Developers
                    description: The developers for the IDM API.
                    created_at: '2022-02-07T17:46:57.52Z'
                    updated_at: '2022-09-25T13:00:00.00Z'
    RolesDocument:
      description: A set of roles available in portals.
      content:
        application/json:
          schema:
            type: object
            required:
              - services
            properties:
              services:
                type: object
                properties:
                  name:
                    type: string
                    enum:
                      - Services
                  roles:
                    type: object
                    required:
                      - viewer
                      - apiconsumer
                    properties:
                      viewer:
                        type: object
                        required:
                          - name
                          - description
                        properties:
                          name:
                            type: string
                            enum:
                              - Viewer
                          description:
                            type: string
                            enum:
                              - Viewers have read-only access to the documentation of a service in a portal
                      apiconsumer:
                        type: object
                        required:
                          - name
                          - description
                        properties:
                          name:
                            type: string
                            enum:
                              - API Consumer
                          description:
                            type: string
                            enum:
                              - API Consumers can make calls to the given service
    AssignedRoleSingle:
      description: A get action response of a single assigned role.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AssignedRole'
          examples:
            Example:
              value:
                id: eaf7adf1-32c8-4bbf-b960-d1f8456afe67
                role: viewer
                entity_id: 817d0422-45c9-4d88-8d64-45aef05c1ae7
                entity_type: runtime_groups
                entity_region: eu
    AssignedRoleCollection:
      description: A paginated collection of assigned roles.
      content:
        application/json:
          schema:
            type: object
            required:
              - meta
              - data
            properties:
              meta:
                $ref: '#/components/schemas/PaginatedMeta'
              data:
                type: array
                items:
                  $ref: '#/components/schemas/AssignedRole'
          examples:
            CollectionExample:
              value:
                meta:
                  page:
                    number: 2
                    size: 10
                    total: 100
                data:
                  - id: b02e23c5-8ee4-4e5a-99f4-43329923adce
                    role: viewer
                    entity_id: 437c7192-fea0-4f35-8478-c8d57783f8c1
                    entity_type: runtime_groups
                    entity_region: eu
                  - id: 869d9402-f117-4f9a-840f-69acaf70a81a
                    role: admin
                    entity_id: 18ee2573-dec0-4b83-be99-fa7700bcdc61
                    entity_type: services
                    entity_region: '*'
  requestBodies:
    CreateTeam:
      description: The request schema for the create team request.
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                example: IDM - Developers
                pattern: '^[\w \W]+$'
                writeOnly: true
              description:
                type: string
                maxLength: 250
                example: The Identity Management (IDM) team.
                writeOnly: true
            required:
              - name
          examples:
            Example:
              value:
                name: IDM - Developers
                description: The Identity Management (IDM) team.
    UpdateTeam:
      description: The request schema for the update team request.
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                example: IDM - Developers
                pattern: '^[\w \W]+$'
                writeOnly: true
              description:
                type: string
                maxLength: 250
                example: The Identity Management (IDM) API team.
                writeOnly: true
          examples:
            Example:
              value:
                name: IDM - Developers
                description: The Identity Management (IDM) API team.
    AddDeveloperToTeam:
      description: The request schema for adding a developer to a team.
      content:
        application/json:
          schema:
            type: object
            properties:
              id:
                type: string
                example: df120cb4-f60b-47bc-a2f8-6a28e6a3c63b
                format: uuid
                writeOnly: true
            required:
              - id
          examples:
            Example:
              value:
                id: df120cb4-f60b-47bc-a2f8-6a28e6a3c63b
    AssignRole:
      content:
        application/json:
          schema:
            type: object
            description: An assigned role associates a service and an action to a team.
            properties:
              role:
                type: string
                example: viewer
              entity_id:
                type: string
                format: uuid
                example: e67490ce-44dc-4cbd-b65e-b52c746fc26a
              entity_type:
                type: string
                example: runtime_groups
              entity_region:
                type: string
                enum:
                  - us
                  - eu
                  - '*'
                example: eu
          examples:
            US Example:
              value:
                role: viewer
                entity_id: 18ee2573-dec0-4b83-be99-fa7700bcdc61
                entity_type: runtime_groups
                entity_region: us
      description: Assign a role to a team.
  schemas:
    PaginatedMeta:
      type: object
      properties:
        page:
          type: object
          properties:
            number:
              type: integer
              example: 2
            size:
              type: integer
              example: 10
            total:
              type: integer
              maximum: 1000
              example: 100
    Developer:
      title: Developer
      type: object
      description: A developer is an individual who can use a developer portal.
      properties:
        id:
          type: string
          format: uuid
          example: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
          readOnly: true
        email:
          type: string
          format: email
          example: developer@email.com
          maxLength: 250
        full_name:
          type: string
          pattern: '^[\w \W]+$'
          example: API Developer
          maxLength: 250
        status:
          type: string
          default: pending
          readOnly: true
        portal_id:
          type: string
          example: 51d313f4-e13d-43d0-a2b4-8d4bf2aa172b
          readOnly: true
        created_at:
          type: string
          format: date-time
          example: '2022-02-07T17:46:57.52Z'
          readOnly: true
        updated_at:
          type: string
          format: date-time
          example: '2022-10-08T17:00:00.52Z'
          readOnly: true
      x-examples:
        Example:
          id: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
          email: user@email.com
          full_name: API Developer
          preferred_name: apidev
          status: active
          portal_id: 51d313f4-e13d-43d0-a2b4-8d4bf2aa172b
          created_at: '2022-02-07T17:46:57.52Z'
          updated_at: '2022-10-08T17:00:00.52Z'
    Team:
      title: Team
      type: object
      description: A team is a group of developers.
      x-examples:
        Example:
          id: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
          name: IDM - Developers
          description: The developers for the IDM API.
          created_at: '1992-02-07T17:46:57.52Z'
          updated_at: '2022-08-31T17:00:00.52Z'
      properties:
        id:
          type: string
          format: uuid
          example: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
          readOnly: true
        name:
          type: string
          pattern: '^[\w \W]+$'
          example: IDM - Developers
          maxLength: 250
        description:
          type: string
          example: The developers for the IDM API.
          maxLength: 250
        created_at:
          type: string
          format: date-time
          example: '1992-02-07T17:46:57.52Z'
          readOnly: true
        updated_at:
          type: string
          format: date-time
          example: '2022-02-07T17:00:00.52Z'
          readOnly: true
    AssignedRole:
      title: AssignedRole
      type: object
      description: An assigned role associates a service and an action to a team.
      x-examples:
        US Example:
          id: 1a3c2169-27f8-4594-926b-41df3432d5dc
          role: viewer
          entity_id: 18ee2573-dec0-4b83-be99-fa7700bcdc61
          entity_type: runtime_groups
          entity_region: us
        All Regions Example:
          id: 1a3c2169-27f8-4594-926b-41df3432d5dc
          role: admin
