products:
  konnect:
    match:
      - "konnect/definitions/**/openapi.yaml"
    notMatch:
      - "konnect/definitions/portal-management/v3/openapi.yaml"
      - "konnect/definitions/identity/v2/openapi.yaml"
      - "konnect/definitions/cloud-gateways/v3/openapi.yaml"
      - "konnect/definitions/runtime-groups/v2/openapi.yaml"
      - "konnect/definitions/runtime-groups-config/v2/openapi.yaml"

  portal:
    match:
      - "portal/definitions/**/openapi.yaml"
    notMatch: []

  internal:
    match:
      - "internal/definitions/**/openapi.yaml"
    notMatch: []

  terraform:
    onDemand: true
    match:
      - "konnect/definitions/control-planes/v2/openapi.yaml"
      - "konnect/definitions/cloud-gateways/v2/openapi.yaml"
      - "konnect/definitions/control-planes-config/v2/openapi.yaml"
      - "konnect/definitions/mesh-control-planes/v0/openapi.yaml"
      - "konnect/definitions/api-products/v2/openapi.yaml"
      - "konnect/definitions/portal-management/v2/openapi.yaml"
      - "konnect/definitions/application-auth-strategies/v2/openapi.yaml"
      - "konnect/definitions/identity/v3/openapi.yaml"
      - "konnect/definitions/serverless-cloud-gateways/v0/openapi.yaml"
    notMatch: []

  go-sdk:
    onDemand: true
    match:
      - "konnect/definitions/control-planes/v2/openapi.yaml"
      - "konnect/definitions/control-planes-config/v2/openapi.yaml"
      - "konnect/definitions/identity/v3/openapi.yaml"
    notMatch: []

  go-sdk-internal:
    onDemand: true
    match:
      - "konnect/definitions/control-planes/v2/openapi.yaml"
      - "konnect/definitions/control-planes-config/v2/openapi.yaml"
      - "konnect/definitions/identity/v3/openapi.yaml"
    notMatch: []