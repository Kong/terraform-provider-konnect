overlay: 1.0.0
info:
  title: Konnect Control Plane Config Overlay
  version: 0.0.0
actions:
  - target: $["components"]["parameters"]["pagination-tags-filter"]
    update:
      x-speakeasy-name-override: filter-tags

  # Service
  - target: $["components"]["schemas"]["Service"]["properties"]["url"]
    update:
      x-speakeasy-ignore: true
  
  # Route
  - target: $["components"]["schemas"]["RouteWithoutParents"]["properties"]["methods"]
    update:
      items:
        type: string

  # Plugin
  # This triggers a bug in Koko right now
  - target: $["components"]["schemas"]["PluginWithoutParents"]["properties"]["ordering"]
    remove: true

  - target: $["components"]["schemas"]["PluginWithoutParents"]["properties"]["config"]
    update:
      x-speakeasy-type-override: any

  # Vault
  - target: $["components"]["schemas"]["Vault"]["properties"]["config"]
    update:
      x-speakeasy-type-override: any

  # Credentials
  - target: $["components"]["schemas"]["BasicAuthWithoutParents"]["properties"]["password"]
    update:
      writeOnly: true 
      x-speakeasy-param-sensitive: true

  # Consumer Group Members
  - target: $["paths"]["/v2/control-planes/{controlPlaneId}/core-entities/consumer_groups/{ConsumerGroupId}/consumers"]["post"]["responses"]["201"]["content"]
    remove: true