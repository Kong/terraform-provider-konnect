overlay: 1.0.0
info:
  title: Remove all filter endpoints
  version: 0.0.0
actions:
  # Portal Management
  - target: $["paths"]["/v2/portals"]["get"]["parameters"][?(@.name=='filter')]
    remove: true
  # Cloud Gateways Provider Accounts
  - target: $["paths"]["/v2/cloud-gateways/provider-accounts"]["get"]["parameters"][0]
    remove: true