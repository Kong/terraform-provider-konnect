name: Generate Test SDK Packages

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  all-client-v2-axios-npm:
    timeout-minutes: 10
    name: Publish Dev, Internal and Public packages to NPM

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18.x"
          registry-url: "https://registry.npmjs.org"

      - name: Install Dependencies
        run: |
          npm ci

      - name: Bundle + Process OpenAPI specs
        run: |
          ./tools/run.sh

      - name: Check that /build/ is up to date
        run: |
          ./bin/fails_if_changed.sh

      - name: "[Konnect] Generate Dev Client"
        run: npm run generate:konnect-dev-client

      - name: "[Konnect] Generate Internal Client"
        run: npm run generate:konnect-internal-client

      - name: "[Konnect] Generate Public Client"
        run: npm run generate:konnect-public-client

      - uses: actions/upload-artifact@v3
        with:
          name: generated-sdks
          path: packages/

