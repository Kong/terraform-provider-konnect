name: Push OAS Downstream
on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to check out, useful to test out stuff
        required: false
        type: string
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  raise-pr-on-change:
    timeout-minutes: 10
    if: github.event.pull_request.merged == true
    name: Raise PR on change
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ inputs.branch || '' }} # '' uses default branch
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "16.x"
          registry-url: "https://registry.npmjs.org"

      - name: Install Dependencies
        run: |
          npm ci

      - name: Bundle + Process OpenAPI specs
        run: |
          ./tools/run.sh

      - name: Check that /build/ is up to date
        run: |
          ./bin/fails_if_changed.sh

      - name: Update OpenAPI files before pushing them downstream
        run: |
          ./tools/process-mesh.sh

      - name: Raise PR in downstream repos
        uses: mheap/raise-pr-on-change-action@v1
        with:
          token: ${{ secrets.APIOPS_PAT }}
          mode: check-upstream
          configFile: ".github/raise-pr-on-change.json"
          prBranch: automated-update
          targetBranch: main
          prTitle: "Automated OAS Update"
          prBody: "Generated OAS files from platform-api"
