name: Push OAS Downstream
on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  raise-pr-on-change:
    if: github.event.pull_request.merged == true
    name: Raise PR on change
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "16.x"
          registry-url: "https://registry.npmjs.org"

      - name: Install Dependencies
        run: |
          npm ci

      - name: Merge OAS in to konnect/portal
        run: |
          ./tools/merge-oas.sh

      - name: Process OpenAPI files
        run: |
          npm run generate-sdk-oas

      - name: Process OpenAPI files
        run: |
          node ./tools/split-service-specs.js

      - name: Update OpenAPI files before pushing them downstream
        run: |
          ./tools/process-mesh.sh

      - name: Raise PR in downstream repos
        uses: mheap/raise-pr-on-change-action@v1
        with:
          token: ${{ secrets.APIOPS_PAT }}
          mode: check-upstream
          configFile: ".github/raise-pr-on-change.json"
          prBranch: automated-update
          targetBranch: main
          prTitle: "Automated OAS Update"
          prBody: "Generated OAS files from platform-api"
