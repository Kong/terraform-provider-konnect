openapi: 3.0.3
info:
  title: DocumentHub Developer Api
  description: DocumentHub Developer Api
  version: 0.0.1
  contact:
    name: Kong
    url: https://konghq.com
servers:
  - url: http://localhost:4400/developer/v0
    description: Local
  - url: http://documenthub.documenthub.svc.cluster.local:4400/developer/v0
    description: Konnect cluster
security:
  - bearerAuth: []
tags: []
paths:
  /has-documentation:
    post:
      description: Has documentation
      summary: Returns wether the resourceKind resourceId pairs has documentation
      requestBody:
        $ref: '#/components/requestBodies/HasDocumentation'
      responses:
        '200':
          description: Has Documentation response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HasDocumentationResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ResourceKind:
      type: string
      enum:
        - services
    HasDocumentationRequestPayload:
      type: object
      properties:
        resource_kind:
          $ref: '#/components/schemas/ResourceKind'
        resource_ids:
          type: array
          minItems: 1
          maxItems: 100
          uniqueItems: true
          items:
            type: string
            format: uuid
      required:
        - resource_kind
        - resource_ids
    HasDocumentationResponse:
      type: array
      items:
        $ref: '#/components/schemas/HasDocumentationItem'
    HasDocumentationItem:
      type: object
      properties:
        resource_kind:
          type: string
        resource_id:
          type: string
          format: uuid
        has_documentation:
          type: boolean
        document_count:
          type: integer
      required:
        - resource_kind
        - resource_id
        - has_documentation
        - document_count
  requestBodies:
    HasDocumentation:
      description: has documentation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/HasDocumentationRequestPayload'
