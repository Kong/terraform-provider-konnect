openapi: 3.0.3
info:
  title: Internal Portal
  description: Internal api for konnect to allow retrieving of entities in konnect db.
  version: 1.0.0
  contact:
    name: Kong
    url: 'https://konghq.com'
servers:
  - url: 'http://konnect-api.konnect.svc.cluster.local:300/v0'
    description: Konnect cluster
paths:
  '/internal/application-auth-strategies/{authStrategyId}':
    parameters:
      - $ref: '#/components/parameters/AuthStrategyId'
    get:
      operationId: get-authstrat
      summary: retrieve an auth strategy
      description: Returns a raw database representation of the auth strategy.
      responses:
        '200':
          $ref: '#/components/responses/GetAuthStrat'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - App Auth Strategies
  '/internal/portals/{portalId}':
    parameters:
      - $ref: '#/components/parameters/PortalId'
    get:
      operationId: get-portal
      summary: retrieve a portal
      description: Returns a raw database representation of the portal.
      responses:
        '200':
          $ref: '#/components/responses/GetPortal'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - portal
  '/internal/control-planes/{controlPlaneId}/gateway-services/{gatewayServiceId}/product-version':
    parameters:
      - $ref: '#/components/parameters/controlPlaneId'
      - $ref: '#/components/parameters/GatewayServiceId'
    get:
      operationId: get-cp-gw-product-version
      summary: retrieves a product version id by control plane and gateway service
      description: returns product version id or 404 if not found
      responses:
        '200':
          $ref: '#/components/responses/GetProductVersion'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - api-products
components:
  parameters:
    AuthStrategyId:
      name: authStrategyId
      description: ID of the auth strategy to use for the application
      in: path
      required: true
      schema:
        type: string
        format: uuid
        example: ebbac5b0-ac89-45c3-9d2e-c4542c657e79
    GatewayServiceId:
      schema:
        type: string
        format: uuid
      name: gatewayServiceId
      in: path
      required: true
      description: ID of the gateway service.
    PortalId:
      schema:
        type: string
        format: uuid
      name: portalId
      in: path
      required: true
      description: ID of the portal.
    controlPlaneId:
      name: controlPlaneId
      in: path
      required: true
      schema:
        type: string
        format: uuid
        example: 9524ec7d-36d9-465d-a8c5-83a3c9390458
      description: The UUID of your control plane. This variable is available in the Konnect manager.
  schemas:
    Portal:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        display_name:
          type: string
        uri:
          type: string
        custom_domain:
          type: string
        is_domain_verified:
          type: boolean
        logo:
          type: string
        logo_filename:
          type: string
        favicon:
          type: string
        favicon_filename:
          type: string
        is_public:
          type: boolean
        auto_approve_developers:
          type: boolean
        auto_approve_applications:
          type: boolean
        rbac_enabled:
          type: boolean
        config:
          type: object
          additionalProperties: true
        version:
          type: string
        customization:
          $ref: '#/components/schemas/PortalCustomization'
        labels:
          $ref: '#/components/schemas/Labels'
        description:
          type: string
        default_application_auth_strategy:
          $ref: '#/components/schemas/NullableAuthStrategy'
      additionalProperties: true
      required:
        - id
        - default_application_auth_strategy
        - name
        - uri
        - labels
        - version
    ProductVersion:
      type: object
      properties:
        id:
          type: string
          format: uuid
      additionalProperties: false
      required:
        - id
    AuthStrategy:
      allOf:
        - $ref: '#/components/schemas/BaseAuthStrategy'
    NullableAuthStrategy:
      allOf:
        - $ref: '#/components/schemas/BaseAuthStrategy'
      nullable: true
    BaseAuthStrategy:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        display_name:
          type: string
        strategy_type:
          type: string
        configs:
          type: object
        labels:
          $ref: '#/components/schemas/Labels'
        dcr_provider:
          $ref: '#/components/schemas/NullableDcrProvider'
      required:
        - id
        - name
        - display_name
        - strategy_type
        - dcr_provider
        - configs
        - labels
    NullableDcrProvider:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        provider_type:
          type: string
        issuer:
          type: string
        dcr_config:
          type: object
        labels:
          $ref: '#/components/schemas/Labels'
      nullable: true
      required:
        - id
        - name
        - provider_type
        - issuer
        - dcr_config
        - labels
    Labels:
      description: |
        Labels store metadata of an entity that can be used for filtering an entity list or for searching across entity types. 

        Keys must be of length 1-63 characters, and cannot start with "kong", "konnect", "mesh", "kic", or "_".
      type: object
      example:
        env: test
      additionalProperties:
        type: string
        pattern: '^[a-z0-9A-Z]{1}([a-z0-9A-Z-._]*[a-z0-9A-Z]+)?$'
        minLength: 1
        maxLength: 63
      maxProperties: 50
      title: Labels
    BaseError:
      description: standard error
      type: object
      properties:
        status:
          description: |
            The HTTP status code of the error. Useful when passing the response
            body to child properties in a frontend UI. Must be returned as an integer.
          type: integer
          readOnly: true
        title:
          description: |
            A short, human-readable summary of the problem. It should not
            change between occurences of a problem, except for localization.
            Should be provided as "Sentence case" for direct use in the UI.
          type: string
          readOnly: true
        type:
          description: The error type.
          type: string
          readOnly: true
        instance:
          description: |
            Used to return the correlation ID back to the user, in the format
            kong:trace:<correlation_id>. This helps us find the relevant logs
            when a customer reports an issue.
          type: string
          readOnly: true
        detail:
          description: |
            A human readable explanation specific to this occurence of the problem.
            This field may contain request/entity data to help the user understand
            what went wrong. Enclose variable values in square brackets. Should be
            provided as "Sentence case" for direct use in the UI.
          type: string
          readOnly: true
      required:
        - status
        - title
        - instance
        - detail
      title: Error
    NotFoundError:
      allOf:
        - $ref: '#/components/schemas/BaseError'
        - type: object
          properties:
            status:
              example: 404
            title:
              example: Not Found
            type:
              example: 'https://httpstatuses.com/404'
            instance:
              example: 'kong:trace:1234567890'
            detail:
              example: Not found
    PortalCustomization:
      type: object
      additionalProperties: true
      title: PortalCustomization
  examples:
    NotFoundExample:
      value:
        status: 404
        title: Not Found
        instance: 'kong:trace:6816496025408232265'
        detail: Not Found
  responses:
    GetPortal:
      description: A raw database portal
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Portal'
    GetAuthStrat:
      description: A raw database auth strategy
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AuthStrategy'
    GetProductVersion:
      description: A product version
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProductVersion'
    NotFound:
      description: Not Found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/NotFoundError'
          examples:
            NotFoundExample:
              $ref: '#/components/examples/NotFoundExample'
tags:
  - name: portal
  - name: App Auth Strategies
  - name: api-products
