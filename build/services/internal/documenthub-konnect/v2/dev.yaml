openapi: 3.0.3
info:
  title: DocumentHub admin Api v2
  description: DocumentHub admin Api
  version: 0.0.1
  contact:
    name: Kong
    url: https://konghq.com
servers:
  - url: http://localhost:4400/v2
    description: Local
  - url: http://documenthub.documenthub.svc.cluster.local:4400/v2
    description: Konnect cluster
security:
  - konnectAccessToken: []
tags: []
paths: {}
components:
  securitySchemes:
    konnectAccessToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        The Konnect access token is meant to be used by the Konnect dashboard
        and the decK CLI authenticate with.
  schemas:
    DocumentItem:
      type: object
      title: Document item
      additionalProperties: false
      required:
        - id
        - parent_document_id
        - slug
        - title
        - filename
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: the id of the document
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        parent_document_id:
          type: string
          format: uuid
          description: the id of the parent document
          nullable: true
          example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
        slug:
          type: string
          description: the slug of the document
          example: getting-started
        title:
          type: string
          description: the title of the document
          example: Getting Started
        filename:
          type: string
          description: the filename of the document
          example: myDocument.md
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
    RevisionRaw:
      type: object
      title: Revision
      description: revision of a document
      required:
        - id
        - document_id
        - content
        - metadata
        - title
      properties:
        id:
          type: string
          format: uuid
          description: the id of the revision
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        document_id:
          type: string
          format: uuid
          description: the id of the document
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        content:
          type: string
          description: Markdown document
        metadata:
          type: object
          description: the metadata of the document
          example:
            title: Hello World
            description: This is a description
            keywords: hello, world
        title:
          type: string
          description: the title of the document
          example: Hello World
    Slug:
      type: string
      description: document slug
      pattern: ^[\w-]+$
      maxLength: 80
      example: path-for-seo
    PublishStatus:
      description: document publish status. Default to published.
      type: string
      enum:
        - published
        - unpublished
    DocumentCollection:
      type: object
      title: Document Collection
      description: a document collection
      required:
        - id
        - name
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        name:
          type: string
          example: my document collection
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
    DocumentTree:
      type: object
      title: DocumentTree
      description: a document tree
      required:
        - id
        - title
        - filename
        - slug
        - metadata
        - children
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        parent_document_id:
          type: string
          format: uuid
          example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
          nullable: true
        title:
          type: string
        filename:
          type: string
          example: myDocument.md
        slug:
          type: string
          description: document slug
          example: path-for-seo
        metadata:
          type: object
          description: metadata of the document
          example:
            author: John Doe
        children:
          type: array
          description: children of the document
          example:
            - id: d32d905a-ed33-46a3-a093-d8f536af9a8a
              title: Hello world
              filename: myDocument.md
              slug: hello-world
              status: published
              created_at: '2023-01-11T02:30:42.227Z'
              updated_at: '2023-01-11T02:30:42.227Z'
              metadata:
                author: John Doe
              children: []
          items:
            $ref: '#/components/schemas/DocumentTree'
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
    Revision:
      type: object
      title: Revision
      description: revision of a document
      required:
        - content
        - document_id
        - id
        - metadata
        - title
        - file
      properties:
        id:
          type: string
          format: uuid
          description: revision id
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        document_id:
          type: string
          format: uuid
          description: document id
          example: 2272b454-4af6-4c56-8a02-d6145ac62e67
        content:
          $ref: '#/components/schemas/DocumentBlock'
        metadata:
          type: object
          example:
            author: John Doe
        title:
          type: string
          example: Hello world
        raw_md_content:
          type: string
          format: byte
          description: raw markdown content
          example: I0ludHJvZHVjdGlvbg==
        file:
          description: file of the revision
          type: object
          required:
            - filename
            - modified_at
          properties:
            filename:
              type: string
              example: my_doc.md
            modified_at:
              type: string
              format: date-time
              example: '2023-01-11T02:30:42.227Z'
    CreateCollectionPayload:
      type: object
      title: CreateCollectionPayload
      description: payload to create the document collection
      required:
        - name
      properties:
        name:
          type: string
    UpdateCollectionPayload:
      type: object
      title: UpdateCollectionPayload
      description: payload to update the document collection
      required:
        - name
      properties:
        name:
          type: string
    CreateDocumentPayload:
      type: object
      title: CreateDocumentPayload
      description: a document payload
      required:
        - slug
        - title
        - raw_content
        - filename
      properties:
        parent_document_id:
          type: string
          format: uuid
          description: parent document id
          example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
        slug:
          $ref: '#/components/schemas/Slug'
        status:
          $ref: '#/components/schemas/PublishStatus'
        title:
          type: string
          description: document title
          example: How to create a document in Konnect DocumentHub
        raw_content:
          type: string
          format: byte
          example: YmFzZTY0LWVuY29kZWQgdGV4dCBzdHJpbmc=
        metadata:
          type: object
          nullable: true
          description: metadata of the document
          example:
            author: John Doe
        filename:
          type: string
          description: name of the uploaded file
          example: my_doc.md
    UpdateDocumentPayload:
      type: object
      title: UpdateDocumentPayload
      description: a document payload
      properties:
        parent_document_id:
          type: string
          format: uuid
          nullable: true
          description: >
            Parent document Id. If this value is explicitly set to null, the

            document will be put as a top level document at the bottom of the
            tree.
          example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
        slug:
          $ref: '#/components/schemas/Slug'
        status:
          $ref: '#/components/schemas/PublishStatus'
        title:
          type: string
          description: document title
          example: How to update a document in Konnect DocumentHub
        raw_content:
          type: string
          format: byte
          description: base64 encoded string of the document content
          example: YmFzZTY0LWVuY29kZWQgdGV4dCBzdHJpbmc=
        filename:
          type: string
          description: name of the uploaded file
          example: my_doc.md
        metadata:
          type: object
          nullable: true
    MoveDocumentRequestPayload:
      type: object
      title: Move document
      description: move document request payload
      properties:
        parent_document_id:
          type: string
          format: uuid
          description: parent document id
          example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
        index:
          type: integer
          description: index of the document in the parent document's children
          example: 1
    StringFieldEqualsFilter:
      title: StringFieldEqualsFilter
      description: Filters on the given string field value by exact match.
      oneOf:
        - type: string
        - type: object
          title: StringFieldEqualsComparison
          additionalProperties: false
          properties:
            eq:
              type: string
          required:
            - eq
      x-examples:
        example-1: equals-some-value
        example-2:
          eq: some-value
    StringFieldOEQFilter:
      title: StringFieldOEQFilter
      description: >-
        Returns entities that exact match any of the comma-delimited phrases in
        the filter string.
      type: object
      additionalProperties: false
      properties:
        oeq:
          type: string
      required:
        - oeq
      x-examples:
        example-1:
          oeq: some-value,some-other-value
    StringFieldNEQFilter:
      title: StringFieldNEQFilter
      description: Filters on the given string field value by exact match inequality.
      type: object
      additionalProperties: false
      properties:
        neq:
          type: string
      required:
        - neq
      x-examples:
        example-1:
          neq: not-this-value
    StringFieldContainsFilter:
      title: StringFieldContainsFilter
      description: Filters on the given string field value by fuzzy match.
      type: object
      additionalProperties: false
      properties:
        contains:
          type: string
      required:
        - contains
      x-examples:
        example-1:
          contains: some-value
    StringFieldOContainsFilter:
      title: StringFieldOContainsFilter
      description: >-
        Returns entities that fuzzy-match any of the comma-delimited phrases in
        the filter string.
      type: object
      additionalProperties: false
      properties:
        ocontains:
          type: string
      required:
        - ocontains
      x-examples:
        example-1:
          ocontains: this-value,or-that-value
    PageMeta:
      type: object
      description: >-
        Contains pagination query parameters and the total number of objects
        returned.
      required:
        - number
        - size
        - total
      properties:
        number:
          type: number
          example: 1
        size:
          type: number
          example: 10
        total:
          type: number
          example: 100
    PaginatedMeta:
      type: object
      title: PaginatedMeta
      description: returns the pagination information
      properties:
        page:
          $ref: '#/components/schemas/PageMeta'
      required:
        - page
    CreatedAt:
      type: string
      format: date-time
      example: '2022-11-04T20:10:06.927Z'
      description: An ISO-8601 timestamp representation of entity creation date.
      readOnly: true
    UpdatedAt:
      type: string
      format: date-time
      example: '2022-11-04T20:10:06.927Z'
      description: An ISO-8601 timestamp representation of entity update date.
      readOnly: true
    BaseError:
      type: object
      title: Error
      description: standard error
      required:
        - status
        - title
        - instance
        - detail
      properties:
        status:
          type: integer
          description: >
            The HTTP status code of the error. Useful when passing the response

            body to child properties in a frontend UI. Must be returned as an
            integer.
          readOnly: true
        title:
          type: string
          description: |
            A short, human-readable summary of the problem. It should not
            change between occurences of a problem, except for localization.
            Should be provided as "Sentence case" for direct use in the UI.
          readOnly: true
        type:
          type: string
          description: The error type.
          readOnly: true
        instance:
          type: string
          description: |
            Used to return the correlation ID back to the user, in the format
            kong:trace:<correlation_id>. This helps us find the relevant logs
            when a customer reports an issue.
          readOnly: true
        detail:
          type: string
          description: >
            A human readable explanation specific to this occurence of the
            problem.

            This field may contain request/entity data to help the user
            understand

            what went wrong. Enclose variable values in square brackets. Should
            be

            provided as "Sentence case" for direct use in the UI.
          readOnly: true
    InvalidRules:
      description: invalid parameters rules
      type: string
      readOnly: true
      nullable: true
      enum:
        - required
        - enum
        - min_length
        - max_length
        - min_digits
        - min_lowercase
        - min_uppercase
        - min_symbols
        - is_array
        - is_base64
        - is_boolean
        - is_date_time
        - is_integer
        - is_null
        - is_number
        - is_object
        - is_string
        - is_uuid
        - unknown_property
        - is_label
        - matches_regex
    InvalidParameterChoiceItem:
      type: object
      properties:
        field:
          type: string
          example: name
          readOnly: true
        rule:
          $ref: '#/components/schemas/InvalidRules'
        reason:
          type: string
          example: is a required field
          readOnly: true
        choices:
          type: array
          uniqueItems: true
          nullable: true
          items: {}
          readOnly: true
      required:
        - field
        - reason
    InvalidParameterDependentItem:
      type: object
      properties:
        field:
          type: string
          example: name
          readOnly: true
        rule:
          description: invalid parameters rules
          type: string
          readOnly: true
          nullable: true
          enum:
            - dependent_fields
        reason:
          type: string
          example: is a required field
          readOnly: true
        dependents:
          type: array
          uniqueItems: true
          nullable: true
          items: {}
          readOnly: true
      required:
        - field
        - rule
        - reason
        - dependents
    InvalidParameters:
      type: array
      nullable: false
      uniqueItems: true
      minItems: 1
      description: invalid parameters
      items:
        oneOf:
          - $ref: '#/components/schemas/InvalidParameterChoiceItem'
          - $ref: '#/components/schemas/InvalidParameterDependentItem'
    BadRequestError:
      type: object
      required:
        - invalid_parameters
      properties:
        status:
          example: 400
        title:
          example: Bad Request
        type:
          example: https://httpstatuses.com/400
        instance:
          example: kong:trace:1234567890
        detail:
          example: Invalid request body
        invalid_parameters:
          $ref: '#/components/schemas/InvalidParameters'
      allOf:
        - $ref: '#/components/schemas/BaseError'
    NotFoundError:
      type: object
      properties:
        status:
          example: 404
        title:
          example: Not Found
        type:
          example: https://httpstatuses.com/404
        instance:
          example: kong:trace:1234567890
        detail:
          example: Not found
      allOf:
        - $ref: '#/components/schemas/BaseError'
    NodeChildren:
      description: List of children nodes of the current node
      type: array
      items:
        $ref: '#/components/schemas/ChildNode'
    HeadingBlock:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - heading
        level:
          description: Level of the heading which maps to HTML <h> tag
          type: number
          minimum: 1
          maximum: 6
        children:
          $ref: '#/components/schemas/NodeChildren'
    BlockQuoteBlock:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - blockquote
        children:
          $ref: '#/components/schemas/NodeChildren'
    ParagraphBlock:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - paragraph
        children:
          $ref: '#/components/schemas/NodeChildren'
    TextBlock:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - text_block
        children:
          $ref: '#/components/schemas/NodeChildren'
    BreakBlock:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - break
        children:
          $ref: '#/components/schemas/NodeChildren'
    CodeBlock:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - code_block
        lang:
          type: string
        children:
          $ref: '#/components/schemas/NodeChildren'
    ListBlock:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - list
        isOrdered:
          description: Defines if the list is ordered or not
          type: boolean
        children:
          $ref: '#/components/schemas/NodeChildren'
    ListItemBlock:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - list_item
        children:
          $ref: '#/components/schemas/NodeChildren'
    Text:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - text
        text:
          type: string
        hardBreak:
          description: |
            If this property is true the end of this block should
            be a carriage return and not concatenated to the next Text block.
          type: boolean
        softBreak:
          description: |
            If this property is true the end of this block should should be
            concatenated with a space caracter before the next block. This is
            the flag showing that the parsed markdown block was at the end of
            the line.
          type: boolean
        children:
          $ref: '#/components/schemas/NodeChildren'
    Emphasis:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - emphasis
        level:
          type: number
          minimum: 1
          maximum: 2
          description: |
            Level of emphasis
            1 - italic
            2 - bold
        children:
          $ref: '#/components/schemas/NodeChildren'
    Code:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - code
        children:
          $ref: '#/components/schemas/NodeChildren'
    Link:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - link
        href:
          description: Target url of the link
          type: string
        title:
          description: Title of the link
          type: string
    Image:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - image
        url:
          description: Url of the image
          type: string
        alt:
          description: Alternate tag of the image
          type: string
        title:
          description: Title of the image
          type: string
    StrikeThrough:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - strikethrough
    AlignmentKind:
      type: string
      enum:
        - left
        - right
        - center
        - none
    TableAlignments:
      type: array
      nullable: true
      items:
        $ref: '#/components/schemas/AlignmentKind'
    TableBlock:
      type: object
      required:
        - type
        - alignments
      properties:
        type:
          type: string
          enum:
            - table
        alignments:
          $ref: '#/components/schemas/TableAlignments'
        children:
          $ref: '#/components/schemas/NodeChildren'
    TableHeaderBlock:
      type: object
      required:
        - type
        - alignments
      properties:
        type:
          type: string
          enum:
            - table_header
        alignments:
          $ref: '#/components/schemas/TableAlignments'
        children:
          $ref: '#/components/schemas/NodeChildren'
    TableCellBlock:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - table_cell
        alignment:
          $ref: '#/components/schemas/AlignmentKind'
        children:
          $ref: '#/components/schemas/NodeChildren'
    TableRowBlock:
      type: object
      required:
        - type
        - alignments
      properties:
        type:
          type: string
          enum:
            - table_row
        alignments:
          $ref: '#/components/schemas/TableAlignments'
        children:
          $ref: '#/components/schemas/NodeChildren'
    TaskCheckbox:
      type: object
      required:
        - checked
        - type
      properties:
        type:
          type: string
          enum:
            - task_checkbox
        checked:
          type: boolean
          description: State of the checkbox
    ChildNode:
      type: object
      oneOf:
        - $ref: '#/components/schemas/HeadingBlock'
        - $ref: '#/components/schemas/BlockQuoteBlock'
        - $ref: '#/components/schemas/ParagraphBlock'
        - $ref: '#/components/schemas/TextBlock'
        - $ref: '#/components/schemas/BreakBlock'
        - $ref: '#/components/schemas/CodeBlock'
        - $ref: '#/components/schemas/ListBlock'
        - $ref: '#/components/schemas/ListItemBlock'
        - $ref: '#/components/schemas/Text'
        - $ref: '#/components/schemas/Emphasis'
        - $ref: '#/components/schemas/Code'
        - $ref: '#/components/schemas/Link'
        - $ref: '#/components/schemas/Image'
        - $ref: '#/components/schemas/StrikeThrough'
        - $ref: '#/components/schemas/TableBlock'
        - $ref: '#/components/schemas/TableHeaderBlock'
        - $ref: '#/components/schemas/TableCellBlock'
        - $ref: '#/components/schemas/TableRowBlock'
        - $ref: '#/components/schemas/TaskCheckbox'
      discriminator:
        propertyName: type
    DocumentBlock:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - document
        version:
          type: string
        children:
          $ref: '#/components/schemas/NodeChildren'
      description: content of the document
      example:
        type: document
        content:
          - type: paragraph
            content:
              - type: text
                text: Hello World
    ConflictError:
      type: object
      properties:
        status:
          example: 409
        title:
          example: Conflict
        type:
          example: https://httpstatuses.com/409
        instance:
          example: kong:trace:1234567890
        detail:
          example: Conflict
      allOf:
        - $ref: '#/components/schemas/BaseError'
  examples:
    NotFoundExample:
      value:
        status: 404
        title: Not Found
        instance: kong:trace:6816496025408232265
        detail: Not Found
