openapi: 3.0.3
info:
  title: Internal DocumentHub admin Api
  description: DocumentHub admin Api
  version: 0.0.1
  contact:
    name: Kong
    url: 'https://konghq.com'
servers:
  - url: 'http://documenthub.documenthub.svc.cluster.local:4400/v0'
    description: Konnect cluster
paths:
  '/{resourceKind}/{resourceId}/documents/tree':
    get:
      operationId: getDocumentTree
      summary: Get the document tree
      description: Get the document tree
      parameters:
        - $ref: '#/components/parameters/resourceKind'
        - $ref: '#/components/parameters/resourceId'
      responses:
        '200':
          description: Tree of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DocumentTree'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - Customization
  '/{resourceKind}/{resourceId}/documents':
    get:
      operationId: getManyDocuments
      summary: Get many documents
      description: Get many documents
      parameters:
        - name: Accept
          in: header
          schema:
            $ref: '#/components/schemas/DocumentContentTypeEnum'
        - $ref: '#/components/parameters/resourceKind'
        - $ref: '#/components/parameters/resourceId'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
      responses:
        '200':
          description: Tree of documents or flat list of documents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDocumentsWithStatus'
            application/vnd.konnect.document-tree+json:
              schema:
                $ref: '#/components/schemas/GetManyDocumentTrees'
        '400':
          $ref: '#/components/responses/BadRequest'
      tags:
        - Customization
    post:
      operationId: createDocument
      summary: Create document
      description: Create document and associate it with a Konnect resource
      parameters:
        - $ref: '#/components/parameters/resourceKind'
        - $ref: '#/components/parameters/resourceId'
      requestBody:
        $ref: '#/components/requestBodies/CreateDocument'
      responses:
        '201':
          description: The document has been created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentCreationResponsePayload'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - Customization
  '/{resourceKind}/{resourceId}/documents/{documentId}':
    get:
      operationId: getDocument
      summary: Get the document
      description: Get the document
      parameters:
        - $ref: '#/components/parameters/resourceKind'
        - $ref: '#/components/parameters/resourceId'
        - $ref: '#/components/parameters/documentId'
        - name: raw
          in: query
          description: include raw document data in the response
          required: false
          schema:
            type: boolean
          example: true
      responses:
        '200':
          description: The document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
            text/markdown:
              schema:
                description: the markdown content
                type: string
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - Customization
    put:
      operationId: updateDocument
      summary: Update the document
      description: Update the document
      parameters:
        - $ref: '#/components/parameters/resourceKind'
        - $ref: '#/components/parameters/resourceId'
        - $ref: '#/components/parameters/documentId'
      requestBody:
        $ref: '#/components/requestBodies/UpdateDocument'
      responses:
        '200':
          description: The document has been updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - Customization
    delete:
      operationId: deleteDocument
      summary: Delete the document
      description: |
        Delete the document and all its associated revisions including the saved
        files in the datastore. This is a hard delete, files are not recoverable.
        Returns 404 if the document cannot be found, 409 if deleting the document would result in other orphaned documents.
      parameters:
        - $ref: '#/components/parameters/resourceKind'
        - $ref: '#/components/parameters/resourceId'
        - $ref: '#/components/parameters/documentId'
      responses:
        '204':
          description: The document has been deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
      tags:
        - Customization
  '/{resourceKind}/{resourceId}/documents/{documentId}/move':
    put:
      operationId: moveDocument
      summary: Move a document
      description: |
        This api allows the user to move a document within the document tree using the
        parameters parent_document_id and index. If parent_document_id is not
        provided, the document will be placed at the top level of the document tree.
        index represents a zero-indexed document order relative to its siblings under
        the same parent. For example, if we want to put the document at top level in
        first position we would send parent_document_id: null and index: 0. This api
        also supports using a negative index to count backwards from the end of the
        document list, which means you can put the document in last position by using
        index: -1.
      parameters:
        - $ref: '#/components/parameters/resourceKind'
        - $ref: '#/components/parameters/resourceId'
        - $ref: '#/components/parameters/documentId'
      requestBody:
        $ref: '#/components/requestBodies/MoveDocument'
      responses:
        '200':
          description: The document has been moved
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - Customization
components:
  parameters:
    PageNumber:
      name: 'page[number]'
      description: Determines which page of the entities to retrieve.
      required: false
      in: query
      allowEmptyValue: true
      schema:
        type: integer
        example: 1
    PageSize:
      name: 'page[size]'
      description: The maximum number of items to include per page. The last page of a collection may include fewer items.
      required: false
      in: query
      allowEmptyValue: true
      schema:
        type: integer
        example: 10
    documentId:
      name: documentId
      in: path
      required: true
      description: Targeted document
      example: bb84c46a-432d-4314-81e4-478614a52dcb
      schema:
        type: string
        format: uuid
    resourceId:
      name: resourceId
      in: path
      required: true
      description: Id of the Konnect resource
      example: bf138ba2-c9b1-4229-b268-04d9d8a6410b
      schema:
        type: string
        format: uuid
    resourceKind:
      name: resourceKind
      in: path
      required: true
      description: Kind of the Konnect resource
      example: services
      schema:
        type: string
        enum:
          - services
  schemas:
    Slug:
      description: document slug
      type: string
      example: path-for-seo
      maxLength: 80
      pattern: '^[\w-]+$'
    PublishStatus:
      description: document publish status
      type: string
      enum:
        - published
        - unpublished
    Document:
      description: a document
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        status:
          $ref: '#/components/schemas/PublishStatus'
        parent_document_id:
          type: string
          format: uuid
          example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
          nullable: true
        slug:
          $ref: '#/components/schemas/Slug'
        created_at:
          type: string
          format: date-time
          example: '2023-01-11T02:30:42.227Z'
        modified_at:
          type: string
          format: date-time
          example: '2023-01-11T02:30:42.227Z'
        revision:
          $ref: '#/components/schemas/Revision'
      required:
        - id
        - parent_document_id
        - slug
        - revision
        - status
        - modified_at
        - created_at
      title: Document
    GetManyDocumentTrees:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/PaginatedMeta'
        data:
          type: array
          items:
            $ref: '#/components/schemas/DocumentTree'
      required:
        - meta
        - data
    DocumentTree:
      description: a document tree
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        parent_document_id:
          type: string
          format: uuid
          example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
          nullable: true
        title:
          type: string
        slug:
          description: document slug
          type: string
          example: path-for-seo
        metadata:
          description: metadata of the document
          type: object
          example:
            author: John Doe
        status:
          $ref: '#/components/schemas/PublishStatus'
        children:
          description: children of the document
          type: array
          items:
            $ref: '#/components/schemas/DocumentTree'
          example:
            - id: d32d905a-ed33-46a3-a093-d8f536af9a8a
              title: Hello world
              status: published
              slug: hello-world
              metadata:
                author: John Doe
              children: []
      required:
        - id
        - title
        - slug
        - metadata
        - children
        - status
      title: DocumentTree
    Revision:
      description: revision of a document
      type: object
      properties:
        id:
          description: revision id
          type: string
          format: uuid
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        document_id:
          description: document id
          type: string
          format: uuid
          example: 2272b454-4af6-4c56-8a02-d6145ac62e67
        content:
          $ref: '#/components/schemas/DocumentBlock'
        metadata:
          type: object
          example:
            author: John Doe
        title:
          type: string
          example: Hello world
        raw_md_content:
          description: raw markdown content
          type: string
          format: byte
          example: I0ludHJvZHVjdGlvbg==
        str_md_content:
          description: markdown content
          type: string
          example: '## My Markdown'
        file:
          description: file of the revision
          type: object
          properties:
            filename:
              type: string
              example: my_doc.md
            modified_at:
              type: string
              format: date-time
              example: '2023-01-11T02:30:42.227Z'
          required:
            - filename
            - modified_at
      required:
        - content
        - document_id
        - id
        - metadata
        - title
        - file
      title: Revision
    CreateDocumentPayload:
      description: a document payload
      type: object
      properties:
        parent_document_id:
          description: parent document id
          type: string
          format: uuid
          example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
          nullable: true
        slug:
          $ref: '#/components/schemas/Slug'
        status:
          $ref: '#/components/schemas/PublishStatus'
        title:
          description: document title
          type: string
          example: How to create a document in Konnect DocumentHub
        raw_content:
          description: Must be a base64 encoded string. Either raw_content or str_mdr_content are required.
          type: string
          format: byte
          example: YmFzZTY0LWVuY29kZWQgdGV4dCBzdHJpbmc=
        str_md_content:
          description: Markdown content. Either raw_content or str_mdr_content are required.
          type: string
          example: '## My Markdown'
        metadata:
          description: metadata of the document
          type: object
          example:
            author: John Doe
          nullable: true
        filename:
          description: name of the uploaded file
          type: string
          example: my_doc.md
      required:
        - slug
        - status
        - title
        - filename
      title: CreateDocumentPayload
    UpdateDocumentPayload:
      description: a document payload
      type: object
      properties:
        parent_document_id:
          description: |
            Parent document Id. If this value is explicitly set to null, the
            document will be put as a top level document at the bottom of the tree.
          type: string
          format: uuid
          example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
          nullable: true
        slug:
          $ref: '#/components/schemas/Slug'
        status:
          $ref: '#/components/schemas/PublishStatus'
        title:
          description: document title
          type: string
          example: How to update a document in Konnect DocumentHub
        raw_content:
          description: base64 encoded string of the document content
          type: string
          format: byte
          example: YmFzZTY0LWVuY29kZWQgdGV4dCBzdHJpbmc=
        str_md_content:
          description: markdown content
          type: string
          example: '## My Markdown'
        filename:
          description: name of the uploaded file
          type: string
          example: my_doc.md
        metadata:
          type: object
          nullable: true
      title: UpdateDocumentPayload
    DocumentCreationResponsePayload:
      description: a document payload
      type: object
      properties:
        document_id:
          description: document id
          type: string
          format: uuid
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        revision_id:
          description: revision id
          type: string
          format: uuid
          example: ecfb698d-77a8-4ab5-91fa-45ee383b48ba
      required:
        - document_id
        - revision_id
      title: Document Creation Response Payload
    MoveDocumentRequestPayload:
      description: move document request payload
      type: object
      properties:
        parent_document_id:
          description: parent document id
          type: string
          format: uuid
          example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
        index:
          description: index of the document in the parent document's children
          type: integer
          example: 1
      title: Move document
    BaseError:
      description: standard error
      type: object
      properties:
        status:
          description: |
            The HTTP status code of the error. Useful when passing the response
            body to child properties in a frontend UI. Must be returned as an integer.
          type: integer
          readOnly: true
        title:
          description: |
            A short, human-readable summary of the problem. It should not
            change between occurences of a problem, except for localization.
            Should be provided as "Sentence case" for direct use in the UI.
          type: string
          readOnly: true
        type:
          description: The error type.
          type: string
          readOnly: true
        instance:
          description: |
            Used to return the correlation ID back to the user, in the format
            kong:trace:<correlation_id>. This helps us find the relevant logs
            when a customer reports an issue.
          type: string
          readOnly: true
        detail:
          description: |
            A human readable explanation specific to this occurence of the problem.
            This field may contain request/entity data to help the user understand
            what went wrong. Enclose variable values in square brackets. Should be
            provided as "Sentence case" for direct use in the UI.
          type: string
          readOnly: true
      required:
        - status
        - title
        - instance
        - detail
      title: Error
    NotFoundError:
      allOf:
        - $ref: '#/components/schemas/BaseError'
        - type: object
          properties:
            status:
              example: 404
            title:
              example: Not Found
            type:
              example: 'https://httpstatuses.com/404'
            instance:
              example: 'kong:trace:1234567890'
            detail:
              example: Not found
    DocumentContentTypeEnum:
      type: string
      default: application/json
      enum:
        - application/json
        - application/vnd.konnect.document-tree+json
    PageMeta:
      description: Contains pagination query parameters and the total number of objects returned.
      type: object
      properties:
        number:
          type: number
          example: 1
        size:
          type: number
          example: 10
        total:
          type: number
          example: 100
      required:
        - number
        - size
        - total
    PaginatedMeta:
      description: returns the pagination information
      type: object
      properties:
        page:
          $ref: '#/components/schemas/PageMeta'
      required:
        - page
      title: PaginatedMeta
    DocumentItem:
      type: object
      properties:
        id:
          description: the id of the document
          type: string
          format: uuid
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        parent_document_id:
          description: the id of the parent document
          type: string
          format: uuid
          example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
          nullable: true
        slug:
          description: the slug of the document
          type: string
          example: getting-started
        title:
          description: the title of the document
          type: string
          example: Getting Started
      additionalProperties: false
      required:
        - id
        - parent_document_id
        - slug
        - title
      title: Document item
    DocumentItemWithStatus:
      allOf:
        - $ref: '#/components/schemas/DocumentItem'
        - type: object
          title: Document item with status
          additionalProperties: false
          required:
            - status
          properties:
            status:
              description: document publish status
              type: string
              enum:
                - published
                - unpublished
    ListDocumentsWithStatus:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/PaginatedMeta'
        data:
          type: array
          items:
            $ref: '#/components/schemas/DocumentItemWithStatus'
      additionalProperties: false
      required:
        - meta
        - data
    InvalidRules:
      description: invalid parameters rules
      type: string
      enum:
        - required
        - max_length
        - is_array
        - is_base64
        - is_boolean
        - is_date_time
        - is_integer
        - is_null
        - is_number
        - is_object
        - is_string
        - is_uuid
        - is_fqdn
        - is_arn
        - unknown_property
        - is_label
        - matches_regex
        - invalid
        - is_supported_network_availability_zone_list
        - is_supported_network_cidr_block
        - is_supported_provider_region
      nullable: true
      readOnly: true
    InvalidParameterStandard:
      type: object
      properties:
        field:
          type: string
          example: name
          readOnly: true
        rule:
          $ref: '#/components/schemas/InvalidRules'
        source:
          type: string
          example: body
        reason:
          type: string
          example: is a required field
          readOnly: true
      additionalProperties: false
      required:
        - field
        - reason
    InvalidParameterMinimumLength:
      type: object
      properties:
        field:
          type: string
          example: name
          readOnly: true
        rule:
          description: invalid parameters rules
          type: string
          enum:
            - min_length
            - min_digits
            - min_lowercase
            - min_uppercase
            - min_symbols
          nullable: false
          readOnly: true
        minimum:
          type: integer
          example: 8
        source:
          type: string
          example: body
        reason:
          type: string
          example: is a required field
          readOnly: true
      additionalProperties: false
      required:
        - field
        - reason
        - rule
        - minimum
    InvalidParameterChoiceItem:
      type: object
      properties:
        field:
          type: string
          example: name
          readOnly: true
        rule:
          description: invalid parameters rules
          type: string
          enum:
            - enum
          nullable: false
          readOnly: true
        reason:
          type: string
          example: is a required field
          readOnly: true
        choices:
          type: array
          items: {}
          minimum: 1
          nullable: false
          readOnly: true
          uniqueItems: true
        source:
          type: string
          example: body
      additionalProperties: false
      required:
        - field
        - reason
        - rule
        - choices
    InvalidParameterDependentItem:
      type: object
      properties:
        field:
          type: string
          example: name
          readOnly: true
        rule:
          description: invalid parameters rules
          type: string
          enum:
            - dependent_fields
          nullable: true
          readOnly: true
        reason:
          type: string
          example: is a required field
          readOnly: true
        dependents:
          type: array
          items: {}
          nullable: true
          readOnly: true
          uniqueItems: true
        source:
          type: string
          example: body
      additionalProperties: false
      required:
        - field
        - rule
        - reason
        - dependents
    InvalidParameters:
      description: invalid parameters
      type: array
      items:
        oneOf:
          - $ref: '#/components/schemas/InvalidParameterStandard'
          - $ref: '#/components/schemas/InvalidParameterMinimumLength'
          - $ref: '#/components/schemas/InvalidParameterChoiceItem'
          - $ref: '#/components/schemas/InvalidParameterDependentItem'
      minItems: 1
      nullable: false
      uniqueItems: true
    BadRequestError:
      allOf:
        - $ref: '#/components/schemas/BaseError'
        - type: object
          required:
            - invalid_parameters
          properties:
            invalid_parameters:
              $ref: '#/components/schemas/InvalidParameters'
    BaseNode:
      type: object
      properties:
        type:
          type: string
      required:
        - type
    DocumentBlock:
      description: content of the document
      example:
        type: doc
        content:
          - type: paragraph
            content:
              - text: Hello World
                type: text
      allOf:
        - $ref: '#/components/schemas/BlockNode'
        - type: object
          properties:
            version:
              type: string
    BlockNode:
      allOf:
        - $ref: '#/components/schemas/BaseNode'
        - type: object
          properties:
            children:
              description: List of children nodes of the current node
              type: array
              items:
                $ref: '#/components/schemas/AnyNode'
    HeadingBlock:
      allOf:
        - $ref: '#/components/schemas/BlockNode'
        - type: object
          properties:
            level:
              description: Level of the heading which maps to HTML <h> tag
              type: number
              maximum: 6
              minimum: 1
    BlockQuoteBlock:
      allOf:
        - $ref: '#/components/schemas/BlockNode'
    ParagraphBlock:
      allOf:
        - $ref: '#/components/schemas/BlockNode'
    TextBlock:
      allOf:
        - $ref: '#/components/schemas/BlockNode'
    BreakBlock:
      allOf:
        - $ref: '#/components/schemas/BlockNode'
    CodeBlock:
      allOf:
        - $ref: '#/components/schemas/BlockNode'
        - type: object
          properties:
            lang:
              type: string
    ListBlock:
      allOf:
        - $ref: '#/components/schemas/BlockNode'
        - type: object
          properties:
            isOrdered:
              description: Defines if the list is ordered or not
              type: boolean
    ListItemBlock:
      allOf:
        - $ref: '#/components/schemas/BlockNode'
    Text:
      allOf:
        - $ref: '#/components/schemas/BaseNode'
        - $ref: '#/components/schemas/BlockNode'
        - type: object
          properties:
            text:
              type: string
            hardBreak:
              description: |
                If this property is true the end of this block should
                be a carriage return and not concatenated to the next Text block.
              type: boolean
            softBreak:
              description: |
                If this property is true the end of this block should should be
                concatenated with a space caracter before the next block. This is
                the flag showing that the parsed markdown block was at the end of
                the line.
              type: boolean
    Emphasis:
      allOf:
        - $ref: '#/components/schemas/BaseNode'
        - $ref: '#/components/schemas/BlockNode'
        - type: object
          properties:
            level:
              description: |
                Level of emphasis
                1 - italic
                2 - bold
              type: number
              maximum: 2
              minimum: 1
    Code:
      allOf:
        - $ref: '#/components/schemas/BaseNode'
        - $ref: '#/components/schemas/BlockNode'
    Link:
      allOf:
        - $ref: '#/components/schemas/BaseNode'
        - type: object
          properties:
            href:
              description: Target url of the link
              type: string
            title:
              description: Title of the link
              type: string
    Image:
      allOf:
        - $ref: '#/components/schemas/BaseNode'
        - type: object
          properties:
            url:
              description: Url of the image
              type: string
            alt:
              description: Alternate tag of the image
              type: string
            title:
              description: Title of the image
              type: string
    StrikeThrough:
      allOf:
        - $ref: '#/components/schemas/BaseNode'
    TaskCheckbox:
      allOf:
        - $ref: '#/components/schemas/BaseNode'
        - type: object
          properties:
            checked:
              description: State of the checkbox
              type: boolean
          required:
            - checked
    AlignmentKind:
      type: string
      enum:
        - left
        - right
        - center
        - none
    TableAlignments:
      type: object
      properties:
        alignments:
          type: array
          items:
            $ref: '#/components/schemas/AlignmentKind'
          nullable: true
