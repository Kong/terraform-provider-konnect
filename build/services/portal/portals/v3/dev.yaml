openapi: 3.0.0
info:
  title: Portal
  version: 3.0.0
  description: N/A (this description is removed during bundling)
  contact:
    name: Kong
    url: 'https://cloud.konghq.com'
paths:
  /api/v3/portal:
    get:
      operationId: get-portal-context-v3
      summary: Get portal context
      description: Returns the portal context object.
      responses:
        '200':
          $ref: '#/components/responses/GetPortalContextResponseV3'
      security:
        - portalAccessToken: []
        - {}
      tags:
        - portal
  /api/v3/portal/pages:
    get:
      operationId: list-portal-pages
      summary: List Portal Pages
      description: 'Returns a paginated list of pages for the portal. Each page has a path, title, and content. Public pages will be returned for non-authenticated users, while both private and public pages will be returned for authenticated users.'
      parameters:
        - $ref: '#/components/parameters/SortPortalPages'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/FilterByTitleEquality'
        - $ref: '#/components/parameters/FilterByTitleEqualityShort'
        - $ref: '#/components/parameters/FilterByTitleContains'
        - $ref: '#/components/parameters/FilterByPathEquality'
        - $ref: '#/components/parameters/FilterByPathEqualityShort'
        - $ref: '#/components/parameters/FilterByPathContains'
        - $ref: '#/components/parameters/FilterByPublicEquality'
        - $ref: '#/components/parameters/FilterByPublicEqualityShort'
      responses:
        '200':
          $ref: '#/components/responses/ListPortalPagesResponse'
      security:
        - portalAccessToken: []
        - {}
      tags:
        - portal
  /api/v3/portal/pages/content:
    get:
      operationId: get-portal-page
      summary: Get Portal Page
      description: 'Returns a single page for the portal. Each page has a path, title, and content. Public pages will be returned for non-authenticated users, while both private and public pages will be returned for authenticated users.'
      parameters:
        - name: path
          in: query
          description: The unique identifier of the page
          required: true
          schema:
            type: string
          example: /about/company
      responses:
        '200':
          $ref: '#/components/responses/GetPortalPageResponse'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - portalAccessToken: []
        - {}
      tags:
        - portal
  /api/v3/portal/snippets:
    get:
      operationId: list-portal-snippets
      summary: List Portal Snippets
      description: 'Returns a paginated list of snippets for the portal. Each snippet has a name, title, and content. Public snippets will be returned for non-authenticated users, while both private and public snippets will be returned for authenticated users.'
      parameters:
        - $ref: '#/components/parameters/SortPortalSnippets'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/FilterByTitleEquality'
        - $ref: '#/components/parameters/FilterByTitleEqualityShort'
        - $ref: '#/components/parameters/FilterByTitleContains'
        - $ref: '#/components/parameters/FilterByNameEquality'
        - $ref: '#/components/parameters/FilterByNameEqualityShort'
        - $ref: '#/components/parameters/FilterByPathContains'
        - $ref: '#/components/parameters/FilterByPublicEquality'
        - $ref: '#/components/parameters/FilterByPublicEqualityShort'
      responses:
        '200':
          $ref: '#/components/responses/ListPortalSnippetsResponse'
      security:
        - portalAccessToken: []
        - {}
      tags:
        - portal
  /api/v3/portal/snippets/content:
    get:
      operationId: get-portal-snippet
      summary: Get Portal Snippet
      description: 'Returns a single snippet for the portal. Each snippet has a name, title, and content. Public snippets will be returned for non-authenticated users, while both private and public snippets will be returned for authenticated users.'
      parameters:
        - name: name
          in: query
          description: The name of the snippet
          required: true
          schema:
            type: string
          example: snip1
      responses:
        '200':
          $ref: '#/components/responses/GetPortalSnippetResponse'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - portalAccessToken: []
        - {}
      tags:
        - portal
components:
  parameters:
    FilterByNameEquality:
      name: 'filter[name][eq]'
      description: Filter by direct equality comparison of the name property with a supplied value.
      in: query
      required: false
      schema:
        type: string
        example: good service
    FilterByNameEqualityShort:
      name: 'filter[name]'
      description: Filter by direct equality comparison (short-hand) of the name property with a supplied value.
      in: query
      required: false
      schema:
        type: string
        example: good service
    FilterByPathContains:
      name: 'filter[path][contains]'
      description: Filter by contains comparison of the path property with a supplied substring
      in: query
      required: false
      schema:
        type: string
        example: good
    FilterByPathEquality:
      name: 'filter[path][eq]'
      description: Filter by direct equality comparison of the path property with a supplied value.
      in: query
      required: false
      schema:
        type: string
        example: good-page
    FilterByPathEqualityShort:
      name: 'filter[path]'
      description: Filter by direct equality comparison (short-hand) of the path property with a supplied value.
      in: query
      required: false
      schema:
        type: string
        example: good-page
    FilterByPublicEquality:
      name: 'filter[public][eq]'
      description: 'Filter by whether the pages returned are public or private. Private pages are only accessible to authenticated users. For authenticated users, results will include both public and private pages if not specified.'
      in: query
      required: false
      schema:
        type: string
        example: 'true'
        enum:
          - 'true'
          - 'false'
    FilterByPublicEqualityShort:
      name: 'filter[public]'
      description: 'Filter (short-hand) by whether the pages returned are public or private. Private pages are only accessible to authenticated users. For authenticated users, results will include both public and private pages if not specified.'
      in: query
      required: false
      schema:
        type: string
        example: 'true'
        enum:
          - 'true'
          - 'false'
    FilterByTitleContains:
      name: 'filter[title][contains]'
      description: Filter by contains comparison of the title property with a supplied substring
      in: query
      required: false
      schema:
        type: string
        example: Good
    FilterByTitleEquality:
      name: 'filter[title][eq]'
      description: Filter by direct equality comparison of the title property with a supplied value.
      in: query
      required: false
      schema:
        type: string
        example: Good Page
    FilterByTitleEqualityShort:
      name: 'filter[title]'
      description: Filter by direct equality comparison (short-hand) of the title property with a supplied value.
      in: query
      required: false
      schema:
        type: string
        example: Good Page
    PageNumber:
      name: 'page[number]'
      description: Determines which page of the entities to retrieve.
      required: false
      in: query
      allowEmptyValue: true
      schema:
        type: integer
        example: 1
    PageSize:
      name: 'page[size]'
      description: The maximum number of items to include per page. The last page of a collection may include fewer items.
      required: false
      in: query
      allowEmptyValue: true
      schema:
        type: integer
        example: 10
    SortPortalPages:
      name: sort
      description: |
        Sorts a collection of portal pages. Supported sort attributes are:
          - created_at
          - updated_at
          - path
          - title
          - public
      in: query
      required: false
      schema:
        type: string
    SortPortalSnippets:
      name: sort
      description: |
        Sorts a collection of portal snippets. Supported sort attributes are:
          - created_at
          - updated_at
          - name
          - title
          - public
      in: query
      required: false
      schema:
        type: string
  schemas:
    PortalContextV3:
      description: Describes the portal execution context
      type: object
      properties:
        portal_id:
          description: ID of the portal
          type: string
          format: uuid
        org_id:
          description: ID of the organization
          type: string
          format: uuid
        basic_auth_enabled:
          description: Whether the portal can be accessed via email and password
          type: boolean
        oidc_auth_enabled:
          description: Whether the portal can be accessed via authentication with Single Sign On (SSO) through OpenID Connect (OIDC) from a third-party Identity Provider
          type: boolean
        saml_auth_enabled:
          description: Whether the portal can be accessed via SAML authentication
          type: boolean
        authentication_enabled:
          description: Whether authentication is enabled for the portal
          type: boolean
        rbac_enabled:
          description: Whether Role-Based Access Control is enabled for the portal
          type: boolean
        allowed_time_period:
          description: Allowed time period for Analytics queries
          type: string
        name:
          description: Name of the developer portal
          type: string
        canonical_domain:
          description: The canonical domain of the developer portal
          type: string
      additionalProperties: false
      required:
        - portal_id
        - org_id
        - basic_auth_enabled
        - oidc_auth_enabled
        - saml_auth_enabled
        - authentication_enabled
        - rbac_enabled
        - allowed_time_period
        - name
        - canonical_domain
      title: Portal Context
    PageId:
      description: The unique identifier of the page
      type: string
      format: uuid
      example: 582b9327-3eba-4bfe-9438-6066840dbbca
      title: Page ID
    PagePath:
      description: The path of the page with a leading slash
      type: string
      example: /my-page
      title: Page Path
    PageTitle:
      description: The title of the page
      type: string
      example: My Page
      title: Page Title
    PageContent:
      description: The renderable markdown content of the page
      type: string
      example: '# Welcome to the Developer Portal'
      title: Page Content
    PublicStatus:
      description: Whether the page or snippet is public or private. Private pages and snippets are only accessible to authenticated users.
      type: boolean
      example: true
      title: Resource Public Status
    Description:
      type: string
      example: A custom page about developer portals
      title: Resource Description
    SnippetId:
      description: The unique identifier of the snippet
      type: string
      format: uuid
      example: 582b9327-3eba-4bfe-9438-6066840dbbcb
      title: Snippet ID
    SnippetTitle:
      description: The title of the snippet
      type: string
      example: My Snippet
      title: Snippet Title
    SnippetContent:
      description: The renderable markdown content of the snippet
      type: string
      example: '# Welcome to the Developer Portal'
      title: Snippet Content
    SnippetName:
      description: The name of the snippet (no leading slash)
      type: string
      example: my-snippet
      title: Snippet Name
    ListPortalPages:
      description: A paginated list of pages for the portal
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PortalPageInfo'
        meta:
          $ref: '#/components/schemas/PaginatedMeta'
      additionalProperties: false
      title: List Portal Pages
    ListPortalSnippets:
      description: A paginated list of snippets for the portal
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PortalSnippetInfo'
        meta:
          $ref: '#/components/schemas/PaginatedMeta'
      additionalProperties: false
      title: List Portal Snippets
    PortalPageInfo:
      description: A single page for the portal
      type: object
      properties:
        id:
          $ref: '#/components/schemas/PageId'
        path:
          $ref: '#/components/schemas/PagePath'
        title:
          $ref: '#/components/schemas/PageTitle'
        public:
          $ref: '#/components/schemas/PublicStatus'
        description:
          $ref: '#/components/schemas/Description'
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
      additionalProperties: false
      required:
        - id
        - path
        - title
        - public
        - created_at
        - updated_at
      title: Portal Page Info
    PortalSnippetInfo:
      description: A single snippet for the portal
      type: object
      properties:
        id:
          $ref: '#/components/schemas/SnippetId'
        name:
          $ref: '#/components/schemas/SnippetName'
        title:
          $ref: '#/components/schemas/SnippetTitle'
        public:
          $ref: '#/components/schemas/PublicStatus'
        description:
          $ref: '#/components/schemas/Description'
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
      additionalProperties: false
      required:
        - id
        - name
        - title
        - public
        - created_at
        - updated_at
      title: Portal Snippet Info
    PortalPage:
      description: A single page for the portal
      type: object
      properties:
        id:
          $ref: '#/components/schemas/PageId'
        title:
          $ref: '#/components/schemas/PageTitle'
        path:
          $ref: '#/components/schemas/PagePath'
        content:
          $ref: '#/components/schemas/PageContent'
        public:
          $ref: '#/components/schemas/PublicStatus'
        description:
          $ref: '#/components/schemas/Description'
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
      additionalProperties: false
      required:
        - id
        - title
        - path
        - content
        - public
        - created_at
        - updated_at
      title: Portal Page
    PortalSnippet:
      description: A single snippet for the portal
      type: object
      properties:
        id:
          $ref: '#/components/schemas/PageId'
        title:
          $ref: '#/components/schemas/SnippetTitle'
        name:
          $ref: '#/components/schemas/SnippetName'
        content:
          $ref: '#/components/schemas/SnippetContent'
        public:
          $ref: '#/components/schemas/PublicStatus'
        description:
          $ref: '#/components/schemas/Description'
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
      additionalProperties: false
      required:
        - id
        - title
        - name
        - content
        - public
        - created_at
        - updated_at
      title: Portal Snippet
    CreatedAt:
      description: An ISO-8601 timestamp representation of entity creation date.
      type: string
      format: date-time
      example: '2022-11-04T20:10:06.927Z'
      readOnly: true
    UpdatedAt:
      description: An ISO-8601 timestamp representation of entity update date.
      type: string
      format: date-time
      example: '2022-11-04T20:10:06.927Z'
      readOnly: true
    PageMeta:
      description: Contains pagination query parameters and the total number of objects returned.
      type: object
      properties:
        number:
          type: number
          example: 1
        size:
          type: number
          example: 10
        total:
          type: number
          example: 100
      required:
        - number
        - size
        - total
    PaginatedMeta:
      description: returns the pagination information
      type: object
      properties:
        page:
          $ref: '#/components/schemas/PageMeta'
      required:
        - page
      title: PaginatedMeta
    BaseError:
      description: standard error
      type: object
      properties:
        status:
          description: |
            The HTTP status code of the error. Useful when passing the response
            body to child properties in a frontend UI. Must be returned as an integer.
          type: integer
          readOnly: true
        title:
          description: |
            A short, human-readable summary of the problem. It should not
            change between occurences of a problem, except for localization.
            Should be provided as "Sentence case" for direct use in the UI.
          type: string
          readOnly: true
        type:
          description: The error type.
          type: string
          readOnly: true
        instance:
          description: |
            Used to return the correlation ID back to the user, in the format
            kong:trace:<correlation_id>. This helps us find the relevant logs
            when a customer reports an issue.
          type: string
          readOnly: true
        detail:
          description: |
            A human readable explanation specific to this occurence of the problem.
            This field may contain request/entity data to help the user understand
            what went wrong. Enclose variable values in square brackets. Should be
            provided as "Sentence case" for direct use in the UI.
          type: string
          readOnly: true
      required:
        - status
        - title
        - instance
        - detail
      title: Error
    NotFoundError:
      allOf:
        - $ref: '#/components/schemas/BaseError'
        - type: object
          properties:
            status:
              example: 404
            title:
              example: Not Found
            type:
              example: 'https://httpstatuses.com/404'
            instance:
              example: 'kong:trace:1234567890'
            detail:
              example: Not found
  examples:
    NotFoundExample:
      value:
        status: 404
        title: Not Found
        instance: 'kong:trace:6816496025408232265'
        detail: Not Found
  responses:
    ListPortalPagesResponse:
      description: Paginated list of portal pages
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ListPortalPages'
          examples:
            ListPortalPageResponseExample1:
              value:
                data:
                  - id: 582b9327-3eba-4bfe-9438-6066840dbbca
                    title: Home
                    path: /
                    public: true
                    description: Welcome page
                    created_at: '2021-09-01T00:00:00Z'
                    updated_at: '2021-09-01T00:00:00Z'
                meta:
                  page:
                    size: 10
                    total: 1
                    number: 1
    ListPortalSnippetsResponse:
      description: Paginated list of portal snippets
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ListPortalSnippets'
          examples:
            ListPortalSnippetResponseExample1:
              value:
                data:
                  - id: 582b9327-3eba-4bfe-9438-6066840dbbca
                    title: Home
                    name: snip1
                    public: true
                    description: Welcome snippet
                    created_at: '2021-09-01T00:00:00Z'
                    updated_at: '2021-09-01T00:00:00Z'
                meta:
                  page:
                    size: 10
                    total: 1
                    number: 1
    GetPortalPageResponse:
      description: A single portal page
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PortalPage'
          examples:
            PortalPageResponseExample1:
              value:
                id: 582b9327-3eba-4bfe-9438-6066840dbbca
                title: Home
                path: /
                content: '# Welcome to the Developer Portal'
                public: true
                created_at: '2021-09-01T00:00:00Z'
                updated_at: '2021-09-01T00:00:00Z'
    GetPortalSnippetResponse:
      description: A single portal snippet
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PortalSnippet'
          examples:
            PortalPageResponseExample1:
              value:
                id: 582b9327-3eba-4bfe-9438-6066840dbbca
                title: Home
                name: snip1
                content: '# Welcome to the Developer Portal'
                public: true
                created_at: '2021-09-01T00:00:00Z'
                updated_at: '2021-09-01T00:00:00Z'
    GetPortalContextResponseV3:
      description: The portal context object
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PortalContextV3'
          examples:
            GetPortalContextResponseV3Example1:
              value:
                portal_id: 18a9b697-7e68-411b-8e1d-102b261ab18e
                org_id: a40f5d1f-d889-42e9-94ea-b9b33585fc6b
                basic_auth_enabled: true
                oidc_auth_enabled: true
                saml_auth_enabled: true
                authentication_enabled: true
                rbac_enabled: true
                allowed_time_period: 90d
                name: my portal
                canonical_domain: portal.example.com
    NotFound:
      description: Not Found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/NotFoundError'
          examples:
            NotFoundExample:
              $ref: '#/components/examples/NotFoundExample'
  securitySchemes:
    portalAccessToken:
      type: apiKey
      in: cookie
      name: portalaccesstoken
      description: |
        The Developer portal cookie is meant to be used by the Developer API to authenticate with.
tags:
  - name: portal
    description: The API for retrieving details about a single Konnect Portal.
