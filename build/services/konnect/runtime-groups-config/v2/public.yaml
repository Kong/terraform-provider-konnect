        example: 7fca84d6-7d37-4a74-a7b0-93e576089a41
    certificate_id:
      name: certificate_id
      in: path
      required: true
      schema:
        type: string
        example: 7fca84d6-7d37-4a74-a7b0-93e576089a41
      description: The unique identifier of the Certificate to retrieve.
    certificate_name_or_id:
      name: certificate_name_or_id
