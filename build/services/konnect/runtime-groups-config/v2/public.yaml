openapi: 3.0.0
info:
  contact:
    email: support@konghq.com
    name: Kong Inc
    url: 'https://konghq.com'
  description: The API for configurating Konnect Runtime Groups.
  license:
    name: Apache 2.0
    url: 'https://www.apache.org/licenses/LICENSE-2.0.html'
  title: Konnect Runtime Groups Configuration
  version: 0.0.1
servers:
  - url: 'https://us.api.konghq.com/v2'
    description: United-States Production region
  - url: 'https://eu.api.konghq.com/v2'
    description: Europe Production region
  - url: 'https://au.api.konghq.com/v2'
    description: Australia Production region
  - url: 'https://me.api.konghq.com/v2'
    description: Middle-East Production region
paths:
  '/runtime-groups/{runtimeGroupId}/expected-config-hash':
    get:
      operationId: get-expected-config-hash
      summary: Fetch Expected Config Hash
      description: Retrieve the expected config hash for this runtime group. The expected config hash can be used to verify if the config hash of a runtime instance is up to date with the runtime group. The config hash will be the same if they are in sync.
      responses:
        '200':
          $ref: '#/components/responses/get-expected-config-hash'
      tags:
        - DP Nodes
    parameters:
      - $ref: '#/components/parameters/runtimeGroupId'
  '/runtime-groups/{runtimeGroupId}/dp-client-certificates':
    parameters:
      - $ref: '#/components/parameters/runtimeGroupId'
    get:
      operationId: get-dp-client-certificates
      summary: List DP Client Certificates
      description: Returns a list of pinned dataplane client certificates that are associated to this runtime group. A pinned dataplane certificate allows dataplanes configured with the certificate and corresponding private key to establish connection with this runtime group.
      responses:
        '200':
          $ref: '#/components/responses/list-dp-client-certs'
      tags:
        - DP Certificates
    post:
      operationId: post-dp-client-certificates
      summary: Pin New DP Client Certificate
      description: Pin a new DP Client Certificate to this runtime group. A pinned dataplane certificate allows dataplanes configured with the certificate and corresponding private key to establish connection with this runtime group.
      requestBody:
        $ref: '#/components/requestBodies/create-dp-client-cert'
      responses:
        '201':
          $ref: '#/components/responses/get-dp-client-cert'
      tags:
        - DP Certificates
  '/runtime-groups/{runtimeGroupId}/dp-client-certificates/{certificateId}':
    parameters:
      - $ref: '#/components/parameters/runtimeGroupId'
      - name: certificateId
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: get-dp-client-certificates-cert_id
      summary: Fetch DP Client Certificate
      description: Retrieve a pinned dataplane client certificate associated to this runtime group. A pinned dataplane certificate allows dataplanes configured with the certificate and corresponding private key to establish connection with this runtime group.
      parameters:
        - $ref: '#/components/parameters/page_size'
        - $ref: '#/components/parameters/page_number'
      responses:
        '200':
          $ref: '#/components/responses/get-dp-client-cert'
      tags:
        - DP Certificates
    delete:
      operationId: delete-dp-client-certificates-cert_id
      summary: Delete DP Client Certificate
      description: Remove a pinned dataplane client certificate associated to this runtime group. Removing a pinned dataplane certificate would invalidate any dataplanes currently connected to this runtime group using this certificate.
      responses:
        '204':
          description: No Content
      tags:
        - DP Certificates
  '/runtime-groups/{runtimeGroupId}/nodes':
    get:
      operationId: get-nodes
      summary: List Runtime Instance Records
      description: Returns a list of runtime instance records that are associated to this runtime group. A runtime instance record contains all the metadata information of the Kong Gateway dataplane.
      parameters:
        - $ref: '#/components/parameters/page_size'
        - $ref: '#/components/parameters/page_number'
      responses:
        '200':
          $ref: '#/components/responses/list-nodes'
      tags:
        - DP Nodes
    parameters:
      - $ref: '#/components/parameters/runtimeGroupId'
  '/runtime-groups/{runtimeGroupId}/nodes/eol':
    get:
      operationId: get-nodes-eol
      summary: List Runtime Instance End-of-Life Records
      description: 'Returns a list of records of runtime instances, whose versions are approaching End of Full Support/End of Life, that are associated to this runtime group. Each record contains a runtime''s id, version, and corresponding resolution message to upgrade to the closest Long Term Support version.'
      parameters:
        - $ref: '#/components/parameters/page_size'
        - $ref: '#/components/parameters/page_number'
      responses:
        '200':
          $ref: '#/components/responses/list-nodes-eol'
      tags:
        - DP Nodes
    parameters:
      - $ref: '#/components/parameters/runtimeGroupId'
  '/runtime-groups/{runtimeGroupId}/nodes/{nodeId}':
    parameters:
      - name: nodeId
        in: path
        required: true
        schema:
          type: string
      - $ref: '#/components/parameters/runtimeGroupId'
    get:
      operationId: get-nodes-node_id
      summary: Fetch Runtime Instance Record
      description: Retrieve a specific runtime instance record associated to this runtime group. A runtime instance record contains all the metadata information of the Kong Gateway dataplane.
      parameters:
        - $ref: '#/components/parameters/pagination-size'
        - $ref: '#/components/parameters/pagination-tags-filter'
      responses:
        '200':
          $ref: '#/components/responses/get-node'
      tags:
        - DP Nodes
    delete:
      operationId: delete-nodes-node_id
      summary: Delete Runtime Instance Record
      description: Remove a specific runtime instance record associated to this runtime group. Deleting this record does not prevent the runtime instance from re-connecting to the runtime group.
      responses:
        '204':
          description: No Content
      tags:
        - DP Nodes
  '/runtime-groups/{runtimeGroupId}/core-entities/plugin-schemas':
    parameters:
      - $ref: '#/components/parameters/runtimeGroupId'
    get:
      operationId: list-plugin-schemas
      summary: List custom plugin schemas associated with a runtime group
      description: Returns an array of custom plugins schemas associated with a runtime group.
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageAfter'
        - $ref: '#/components/parameters/PageBefore'
      responses:
        '200':
          $ref: '#/components/responses/list-plugin-schemas'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      tags:
        - Custom Plugin Schemas
    post:
      operationId: create-plugin-schemas
      summary: Upload custom plugin schema
      description: Upload a custom plugin schema associated with a runtime group.
      requestBody:
        $ref: '#/components/requestBodies/create-plugin-schemas'
      responses:
        '201':
          $ref: '#/components/responses/plugin-schemas'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
      tags:
        - Custom Plugin Schemas
  '/runtime-groups/{runtimeGroupId}/core-entities/plugin-schemas/{name}':
    parameters:
      - $ref: '#/components/parameters/runtimeGroupId'
      - name: name
        in: path
        description: The custom plugin name
        required: true
        schema:
          type: string
          example: myplugin
    get:
      operationId: get-plugin-schema
      summary: Fetch custom plugin schema
      description: Returns information about a custom plugin from a given name.
      responses:
        '200':
          $ref: '#/components/responses/plugin-schemas'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - Custom Plugin Schemas
    delete:
      operationId: delete-plugin-schemas
      summary: Delete custom plugin schema
      description: Delete an individual custom plugin schema.
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - Custom Plugin Schemas
    put:
      operationId: update-plugin-schemas
      summary: Create or update a custom plugin schema
      description: Create or update an individual custom plugin schema.
      requestBody:
        $ref: '#/components/requestBodies/create-plugin-schemas'
      responses:
        '200':
          $ref: '#/components/responses/plugin-schemas'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - Custom Plugin Schemas
  '/runtime-groups/{runtimeGroupId}/core-entities/ca_certificates':
    parameters:
      - $ref: '#/components/parameters/runtimeGroupId'
    get:
      operationId: list-ca_certificates
      summary: List all CA certificates
      description: 'Retrieve a list of all available Certificate Authority (CA) certificates, including the certificate ID, creation date, and other details. You can use query parameters to filter the results by size or tags, for example `/ca-certificates?size=50&tags=enterprise`.'
      parameters:
        - $ref: '#/components/parameters/pagination-size'
        - $ref: '#/components/parameters/pagination-offset'
        - $ref: '#/components/parameters/pagination-tags-filter'
      responses:
        '200':
          description: A successful response listing CA Certificates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CA-Certificate'
      tags:
        - CA Certificates
    post:
      operationId: create-ca_certificate
      summary: Create a new CA certificate
      description: 'Create a new Certificate Authority (CA) certificate. The request body must include the `cert` property, the certificate data in PEM format; it can also include `cert_digest`, a digest of the certificate in hex format for verifying the certificates integrity, and `tags`, an optional list of tags to categorize the certificate. '
      requestBody:
        $ref: '#/components/requestBodies/CA-cert-request'
      responses:
        '201':
          description: The created certificate object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CA-Certificate'
        '400':
          description: Invalid CA certificate
      tags:
        - CA Certificates
  '/runtime-groups/{runtimeGroupId}/core-entities/ca_certificates/{ca_certificate_id}':
    delete:
      operationId: delete-ca_certificate
      summary: Delete a CA Certificate
      description: Delete the specified Certificate Authority (CA) certificate using the provided ca_certificate_id.
      responses:
        '204':
          description: Successfully deleted CA Certificate or the resource didn't exist
      tags:
        - CA Certificates
    get:
      operationId: get-ca_certificate
      summary: Fetch a CA certificate
      description: Retrieve details about the specified Certificate Authority (CA) certificate using the provided path parameter `ca_certificate_id`.
      parameters:
        - name: ca_certificate_id
          in: path
          description: The unique identifier of the certificate to retrieve.
          required: true
          schema:
            type: string
          examples:
            example:
              summary: Example CA certificate ID
              value: 04fbeacf-a9f1-4a5d-ae4a-b0407445db3f
        - $ref: '#/components/parameters/pagination-offset'
        - $ref: '#/components/parameters/pagination-size'
        - $ref: '#/components/parameters/pagination-tags-filter'
      responses:
        '200':
          description: 'The specified CA certificate exists in the system, and the response includes details about the certificate.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CA-Certificate'
        '404':
          description: Resource does not exist
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    description: Error code
                    type: integer
                    example: 5
                  message:
                    description: A message describing the error message.
                    type: string
                    example: not found
                x-examples:
                  Example 1:
                    code: 5
                    message: not found
              examples:
                404 Not Found:
                  value:
                    code: 5
                    message: not found
      tags:
        - CA Certificates
    put:
      operationId: updatet-ca_certificate
      summary: Update a CA Certificate
      description: Create or Update a CA Certificate using the provided path parameter `ca_certificate_id`.
      requestBody:
        $ref: '#/components/requestBodies/CA-cert-request'
      responses:
        '200':
          description: Successfully upserted CA Certificate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CA-Certificate'
        '400':
          description: Invalid CA Certificate
          content:
            application/json:
              schema:
                type: object
      tags:
        - CA Certificates
    parameters:
      - $ref: '#/components/parameters/ca_certificate_id'
      - $ref: '#/components/parameters/runtimeGroupId'
  '/runtime-groups/{runtimeGroupId}/core-entities/certificates':
    get:
      operationId: list-certificates
      summary: List all certificates
      description: 'Retrieve a list of all available certificate/ You can use query parameters to filter the results by size or tags, for example `/certificates?size=50&tags=enterprise`.'
      parameters:
        - $ref: '#/components/parameters/pagination-size'
        - $ref: '#/components/parameters/pagination-offset'
        - $ref: '#/components/parameters/pagination-tags-filter'
      responses:
        '200':
          $ref: '#/components/responses/certificate_response'
      tags:
        - Certificates
    post:
      operationId: create-certificate
      summary: Create a new Certificate
      description: Create a new certificate with the provided details. Use this endpoint to add a new certificate to the system. The request body must include the certificate data and other details required for creating a new certificate.
      requestBody:
        $ref: '#/components/requestBodies/cert-request'
      responses:
        '200':
          $ref: '#/components/responses/certificate_response'
        '400':
          description: Invalid Certificate
          content:
            application/json:
              schema:
                type: object
      tags:
        - Certificates
    parameters:
      - name: runtimeGroupId
        in: path
        description: The ID of your runtime group. This variable is available in the Konnect manager
        required: true
        schema:
          type: string
          example: 9524ec7d-36d9-465d-a8c5-83a3c9390458
  '/runtime-groups/{runtimeGroupId}/core-entities/certificates/{certificate_id}':
    delete:
      operationId: delete-certificate
      summary: Delete a Certificate
      description: |
        Delete a Certificate
      parameters:
        - name: certificate_id
          in: path
          description: ID of the Certificate to delete
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Successfully deleted Certificate or the resource didn't exist
      tags:
        - Certificates
    get:
      operationId: get-certificate
      summary: Fetch a Certificate
      description: Retrieve details about the specified certificate using the provided path parameter `certificate_id`.
      parameters:
        - $ref: '#/components/parameters/pagination-offset'
        - $ref: '#/components/parameters/pagination-tags-filter'
        - $ref: '#/components/parameters/pagination-size'
      responses:
        '200':
          description: HTTP 200 OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Certificate'
        '404':
          description: Resource does not exist
      tags:
        - Certificates
    put:
      operationId: update-certificate-put
      summary: Update a Certificate
      description: |
        Update details about the specified certificate using the provided path parameter `certificate_id`.

        Inserts (or replaces) the certificate under the requested `certificate_id`with the definition specified in the request body. When the `id` attribute has the structure of a UUID, the certificate being inserted/replaced will be identified by its `id`. Otherwise it will be identified by the `name`.

        When creating a new Certificate without specifying `id` (neither in the path or the request body), then it will be auto-generated.
      requestBody:
        $ref: '#/components/requestBodies/cert-request'
      responses:
        '200':
          description: Successfully upserted Certificate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Certificate'
        '400':
          description: Invalid Certificate
          content:
            application/json:
              schema:
                type: object
      tags:
        - Certificates
    parameters:
      - name: certificate_id
        in: path
        description: The unique identifier of the Certificate to retrieve.
        required: true
        schema:
          type: string
          example: 7fca84d6-7d37-4a74-a7b0-93e576089a41
      - name: runtimeGroupId
        in: path
        description: The ID of your runtime group. This variable is available in the Konnect manager
        required: true
        schema:
          type: string
          example: 9524ec7d-36d9-465d-a8c5-83a3c9390458
  '/runtime-groups/{runtimeGroupId}/core-entities/certificates/{certificate_name_or_id}/snis':
    get:
      operationId: get-sni-with-certificate
      summary: List SNIs associated with a certificate
      description: Retrieve a paginated list of all SNIs associated with a certificate. Use this endpoint to retrieve a list of SNIs that are linked to a specific certificate. You can use the optional query parameters to filter the results based on specific criteria. The response will include the list of SNIs and pagination information. See the response schema for details on the expected format of the response body.
      parameters:
        - $ref: '#/components/parameters/pagination-size'
        - $ref: '#/components/parameters/pagination-offset'
        - $ref: '#/components/parameters/pagination-tags-filter'
      responses:
        '200':
          $ref: '#/components/responses/sni-response'
      tags:
        - SNIs
    post:
      operationId: create-sni-for-certificate
      summary: Create a new SNI associated with a Certificate
      description: Create a new SNI and associate it with a certificate in the system. Use this endpoint to add a new SNI to the system and link it to a specific certificate.
      requestBody:
        $ref: '#/components/requestBodies/create-sni'
      responses:
        '200':
          description: Successfully created SNI
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SNI'
        '400':
          description: Invalid SNI
          content:
            application/json:
              schema:
                type: object
              examples:
                Bad Request:
                  value:
                    code: 3
                    message: data constraint error
                    details:
                      - '@type': type.googleapis.com/kong.admin.model.v1.ErrorDetail
                        type: ERROR_TYPE_REFERENCE
                        field: certificate.id
                        messages:
                          - 'certificate_id (type: foreign) constraint failed for value ''a3ad71a8-6685-4b03-a101-980a953544f6'': '
      tags:
        - SNIs
    parameters:
      - $ref: '#/components/parameters/certificate_name_or_id'
      - $ref: '#/components/parameters/runtimeGroupId'
  '/runtime-groups/{runtimeGroupId}/core-entities/certificates/{certificate_id}/snis/{sni_id}':
    delete:
      operationId: delete-sni-for-certificate
      summary: Delete a an SNI associated with a Certificate
      description: Delete a an SNI associated with a a Certificate using an ID.
      responses:
        '204':
          description: Successfully deleted SNI or the resource didn't exist
      tags:
        - SNIs
    get:
      operationId: fetch-sni-with-certificate
      summary: Fetch an SNI associated with a certificate
      description: Get an SNI associated with a Certificate using ID or name.
      parameters:
        - $ref: '#/components/parameters/pagination-offset'
        - $ref: '#/components/parameters/pagination-size'
        - $ref: '#/components/parameters/pagination-tags-filter'
      responses:
        '200':
          description: Successfully fetched SNI
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SNI'
        '404':
          description: Resource does not exist
      tags:
        - SNIs
    put:
      operationId: upsert-sni-for-certificate
      summary: Upsert an SNI associated with a certificate
      description: |-
        Create or Update an SNI associated with a Certificate using ID or name.

        Inserts (or replaces) the SNI under the requested resource with the definition specified in the body. The SNI will be identified by the id attribute.

        When the name or id attribute has the structure of a UUID, the SNI being inserted/replaced will be identified by its id. Otherwise it will be identified by its name.

        When creating a new SNI without specifying id (neither in the URL nor in the body), then it will be auto-generated.
      requestBody:
        description: Description of the SNI
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SNI'
      responses:
        '200':
          description: Successfully upserted SNI
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SNI'
        '400':
          description: Invalid SNI
          content:
            application/json:
              schema:
                type: object
      tags:
        - SNIs
    parameters:
      - $ref: '#/components/parameters/certificate_id'
      - $ref: '#/components/parameters/sni_id'
      - $ref: '#/components/parameters/runtimeGroupId'
  '/runtime-groups/{runtimeGroupId}/core-entities/consumers':
    get:
      operationId: list-consumers
      summary: List all Consumers
      description: 'Retrieve a list of all consumers.You can use query parameters to filter the results by size or tags, for example `/consumers?size=50&tags=enterprise`.'
      parameters:
        - $ref: '#/components/parameters/pagination-size'
        - $ref: '#/components/parameters/pagination-offset'
        - $ref: '#/components/parameters/pagination-tags-filter'
      responses:
        '200':
          $ref: '#/components/responses/consumer-create-response'
      tags:
        - Consumers
    post:
      operationId: create-consumer
      summary: Create a new Consumer
      description: Create a new Consumer
      requestBody:
        $ref: '#/components/requestBodies/consumer-request'
      responses:
        '200':
          $ref: '#/components/responses/consumer-create-response'
        '400':
          description: Invalid Consumer
          content:
            application/json:
              schema:
                type: object
      tags:
        - Consumers
    parameters:
      - $ref: '#/components/parameters/runtimeGroupId'
  '/runtime-groups/{runtimeGroupId}/core-entities/consumers/{consumer_id}':
    delete:
      operationId: delete-consumer
      summary: Delete a Consumer
      description: Delete a specific consumer from the system using either the consumer ID or the consumer username. This operation is irreversible and permanently removes all data associated with the specified consumer. If the consumer was deleted succesfully the endpoint will return a 204 response indicating that the resource did not exist.
      responses:
        '204':
          description: Successfully deleted Consumer or the resource didn't exist
      tags:
        - Consumers
    get:
      operationId: get-consumer
      summary: Fetch a Consumer
      description: 'Retrieve the details of a specific consumer in the system using either the consumer ID or the consumer username. If the consumer with the specified ID or username cannot be found, the endpoint will return a 404.'
      parameters:
        - $ref: '#/components/parameters/pagination-offset'
        - $ref: '#/components/parameters/pagination-size'
        - $ref: '#/components/parameters/pagination-tags-filter'
      responses:
        '200':
          $ref: '#/components/responses/consumer-create-response'
        '404':
          description: Resource does not exist
      tags:
        - Consumers
    put:
      operationId: upsert-consumer
      summary: Update a Consumer
      description: |-
        Create or Update Consumer using ID or username. The consumer will be identified via the username or id attribute.If the consumer with the specified ID or username cannot be found, the endpoint will return a 404.

        When the username or id attribute has the structure of a UUID, the Consumer being inserted/replaced will be identified by its id. Otherwise it will be identified by its username.

        When creating a new Consumer without specifying id (neither in the URL nor in the body), then it will be auto-generated.

        Notice that specifying a username in the URL and a different one in the request body is not allowed.
      requestBody:
        $ref: '#/components/requestBodies/consumer-request'
      responses:
        '200':
          $ref: '#/components/responses/consumer-response-data'
        '400':
          description: Bad Request
        '404':
          description: Not Found
      tags:
        - Consumers
    parameters:
      - $ref: '#/components/parameters/consumer_id'
      - $ref: '#/components/parameters/runtimeGroupId'
  '/runtime-groups/{runtimeGroupId}/core-entities/consumers/{consumer_id}/plugins':
    get:
      operationId: list-plugins-for-consumer
      summary: List all plugins associated with a consumer
      description: 'Retrieve a list of all plugins associated with a consumer. '
      parameters:
        - $ref: '#/components/parameters/pagination-size'
        - $ref: '#/components/parameters/pagination-offset'
        - $ref: '#/components/parameters/pagination-tags-filter'
      responses:
        '200':
          $ref: '#/components/responses/plugin-response'
      tags:
        - Plugins
    post:
      operationId: create-plugin-for-consumer
      summary: Create a new Plugin associated with a Consumer
      description: Create a new Plugin associated with a Consumer
      requestBody:
        $ref: '#/components/requestBodies/plugin-request'
      responses:
        '200':
          $ref: '#/components/responses/plugin-response'
        '400':
          description: Invalid Plugin
          content:
            application/json:
              schema:
                type: object
      tags:
        - Plugins
    parameters:
      - $ref: '#/components/parameters/consumer_id'
      - $ref: '#/components/parameters/runtimeGroupId'
  '/runtime-groups/{runtimeGroupId}/core-entities/consumers/{consumer_id}/plugins/{plugin_id_or_instance_name}':
    delete:
      operationId: delete-plugin-for-consumer
      summary: Delete a a Plugin associated with a a Consumer
      description: Delete a a Plugin associated with a a Consumer using ID.
      responses:
        '204':
          description: Successfully deleted Plugin or the resource didn't exist
      tags:
        - Plugins
    get:
      operationId: fetch-plugin-for-consumer
      summary: Fetch a Plugin associated with a Consumer
      description: Get a Plugin associated with a Consumer using ID.
      parameters:
        - $ref: '#/components/parameters/pagination-offset'
        - $ref: '#/components/parameters/pagination-size'
