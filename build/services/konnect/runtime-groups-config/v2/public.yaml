    return-consumer-group:
      description: The response body returns a consumer group and the associated consumers.
      content:
        application/json:
          schema:
            type: object
            properties:
              consumer_group:
                type: object
                properties:
                  created_at:
                    description: Unix epoch when the resource was created.
                    type: integer
                    example: 1685551597
                  id:
                    type: string
                    format: uuid
                    example: 04fbeacf-a9f1-4a5d-ae4a-b0407445db3f
                  name:
                    description: The name of the consumer group
                    type: string
                    example: example
                  tags:
                    description: |
                      An optional set of strings associated with the Consumer for grouping and filtering.
                    type: array
                    items:
                      type: string
                  updated_at:
                    description: The unix epoc representation of when the consumer group was updated.
                    type: integer
                    example: 1685551597
              consumers:
                type: array
                items:
                  type: object
                  properties:
                    created_at:
                      description: Unix epoch when the resource was created.
                      type: integer
                      example: 1685551597
                    custom_id:
                      description: A custom ID for the resource
                      type: string
                      example: null
                      nullable: true
                    id:
                      description: The UUID of the consumer
                      type: string
                      example: 0cf03a37-8987-4c3b-a792-5b1db3eeedc6
                    tags:
                      type: array
                      items:
                        type: string
                    updated_at:
                      description: Unix epoch when the resource was updated.
                      type: integer
                      example: 1685551597
                    username:
                      description: the username for the consumer
                      type: string
                      example: example-username
