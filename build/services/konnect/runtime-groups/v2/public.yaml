openapi: 3.0.0
info:
  title: Konnect Runtime Groups
  version: 2.0.0
  description: The API for Kong Konnect Runtime Groups.
  contact:
    name: Kong
    url: 'https://cloud.konghq.com'
servers:
  - url: 'https://us.api.konghq.com/v2'
    description: United-States Production region
  - url: 'https://eu.api.konghq.com/v2'
    description: Europe Production region
  - url: 'https://au.api.konghq.com/v2'
    description: Australia Production region
  - url: 'https://me.api.konghq.com/v2'
    description: Middle-East Production region
paths:
  /runtime-groups:
    get:
      operationId: list-runtime-groups
      summary: List Runtime Groups
      description: Returns an array of runtime groups objects containing information about the Konnect Runtime Groups.
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/FilterByNameEquality'
        - $ref: '#/components/parameters/FilterByNameEqualityShort'
        - $ref: '#/components/parameters/FilterByNameContains'
        - $ref: '#/components/parameters/FilterByNameNotEquals'
        - $ref: '#/components/parameters/FilterByIdEquality'
        - $ref: '#/components/parameters/FilterByIdEqualityShort'
        - $ref: '#/components/parameters/FilterByIdsEquality'
        - $ref: '#/components/parameters/FilterByClusterTypeEquality'
        - $ref: '#/components/parameters/FilterByClusterTypeEqualityShort'
        - $ref: '#/components/parameters/FilterByClusterTypeNotEquals'
        - $ref: '#/components/parameters/FilterByLabels'
        - $ref: '#/components/parameters/RuntimeGroupSort'
      responses:
        '200':
          $ref: '#/components/responses/ListRuntimeGroupsResponse'
        '400':
          $ref: '#/components/responses/RuntimeGroupsBadRequest'
        '401':
          $ref: '#/components/responses/RuntimeGroupUnauthenticated'
        '403':
          $ref: '#/components/responses/RuntimeGroupPermissionDenied'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
      tags:
        - Runtime Groups
    parameters: []
    post:
      operationId: create-runtime-group
      summary: Create Runtime Group
      description: Create a runtime group in the Konnect Organization.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRuntimeGroupRequest'
            examples:
              Example Request Body:
                $ref: '#/components/examples/CreateRuntimeGroupRequestExample'
      responses:
        '201':
          $ref: '#/components/responses/CreateRuntimeGroupResponse'
        '400':
          $ref: '#/components/responses/RuntimeGroupsBadRequest'
        '401':
          $ref: '#/components/responses/RuntimeGroupUnauthenticated'
        '403':
          $ref: '#/components/responses/RuntimeGroupPermissionDenied'
        '409':
          $ref: '#/components/responses/RuntimeGroupConflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
      tags:
        - Runtime Groups
  '/runtime-groups/{id}':
    parameters:
      - name: id
        in: path
        description: The runtime group ID
        required: true
        schema:
          type: string
          format: uuid
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
    get:
      operationId: get-runtime-group
      summary: Fetch Runtime Group
      description: Returns information about a team from a given team ID.
      responses:
        '200':
          $ref: '#/components/responses/RetrieveRuntimeGroupResponse'
        '400':
          $ref: '#/components/responses/RuntimeGroupsBadRequest'
        '401':
          $ref: '#/components/responses/RuntimeGroupUnauthenticated'
        '403':
          $ref: '#/components/responses/RuntimeGroupPermissionDenied'
        '404':
          $ref: '#/components/responses/RuntimeGroupNotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
      tags:
        - Runtime Groups
    patch:
      operationId: update-runtime-group
      summary: Update Runtime Group
      description: Update an individual runtime group.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRuntimeGroupRequest'
            examples:
              Example Request Body:
                $ref: '#/components/examples/UpdateRuntimeGroupRequestExample'
      responses:
        '200':
          $ref: '#/components/responses/UpdateRuntimeGroupResponse'
        '400':
          $ref: '#/components/responses/RuntimeGroupsBadRequest'
        '401':
          $ref: '#/components/responses/RuntimeGroupUnauthenticated'
        '403':
          $ref: '#/components/responses/RuntimeGroupPermissionDenied'
        '404':
          $ref: '#/components/responses/RuntimeGroupNotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
      tags:
        - Runtime Groups
    delete:
      operationId: delete-runtime-group
      summary: Delete Runtime Group
      description: Delete an individual runtime group.
      responses:
        '204':
          description: No Content
        '400':
          $ref: '#/components/responses/RuntimeGroupsBadRequest'
        '401':
          $ref: '#/components/responses/RuntimeGroupUnauthenticated'
        '403':
          $ref: '#/components/responses/RuntimeGroupPermissionDenied'
        '404':
          $ref: '#/components/responses/RuntimeGroupNotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
      tags:
        - Runtime Groups
  '/runtime-groups/{id}/composite-memberships':
    parameters:
      - name: id
        in: path
        description: ID of a composite runtime group
        required: true
        schema:
          type: string
    get:
      operationId: get-runtime-groups-id-composite-memberships
      summary: List Composite RG Memberships
      description: Returns an array of runtime groups that are a member of this composite runtime group.
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
      responses:
        '200':
          $ref: '#/components/responses/ListCompositeMemberships'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
      tags:
        - Composite Runtime Groups
    put:
      operationId: put-runtime-groups-id-composite-memberships
      summary: Upsert Composite RG Members
      description: Upserts runtime groups as a member of a composite runtime group.
      requestBody:
        $ref: '#/components/requestBodies/CompositeMemebershipUpsert'
      responses:
        '204':
          description: No Content
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
      tags:
        - Composite Runtime Groups
  '/runtime-groups/{id}/composite-memberships/add':
    parameters:
      - name: id
        in: path
        description: ID of a composite runtime group
        required: true
        schema:
          type: string
    post:
      operationId: post-runtime-groups-id-composite-memberships-add
      summary: Add Composite RG Members
      description: Adds one or more runtime groups as a member of a composite runtime group.
      requestBody:
        $ref: '#/components/requestBodies/CompositeMemebershipAdd'
      responses:
        '204':
          description: No Content
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
      tags:
        - Composite Runtime Groups
  '/runtime-groups/{id}/composite-memberships/remove':
    parameters:
      - name: id
        in: path
        description: ID of a composite runtime group
        required: true
        schema:
          type: string
    post:
      operationId: post-runtime-groups-id-composite-memberships-remove
      summary: Remove Composite RG Members
      description: Removes one or more runtime groups from the members of a composite runtime group.
      requestBody:
        $ref: '#/components/requestBodies/CompositeMembershipRemove'
      responses:
        '204':
          description: No Content
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
      tags:
        - Composite Runtime Groups
  '/runtime-groups/{id}/composite-member-status':
    parameters:
      - name: id
        in: path
        description: ID of a runtime group
        required: true
        schema:
          type: string
    get:
      operationId: get-runtime-groups-id-composite-member-status
      summary: Composite Membership Status
      description: Determines the composite membership status of a runtime group.
      responses:
        '200':
          $ref: '#/components/responses/GetCompositeMemberStatus'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/NotAvailable'
      tags:
        - Composite Runtime Groups
  '/runtime-groups/{id}/composite-status':
    parameters:
      - name: id
        in: path
        description: ID of a composite runtime group
        required: true
        schema:
          type: string
    get:
      operationId: get-runtime-groups-id-composite-status
      summary: Get Composite RG Status
      description: 'Returns the status of a composite runtime group, including existing conflicts.'
      responses:
        '200':
          $ref: '#/components/responses/GetCompositeStatus'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
      tags:
        - Composite Runtime Groups
components:
  parameters:
    FilterByClusterTypeEquality:
      name: 'filter[cluster_type][eq]'
      description: Filter by direct equality comparison of the cluster_type property with a supplied value.
      in: query
      required: false
      schema:
        type: string
      example: CLUSTER_TYPE_HYBRID
    FilterByClusterTypeEqualityShort:
      name: 'filter[cluster_type]'
      description: Filter by direct equality comparison (short-hand) of the cluster_type property with a supplied value.
      in: query
      required: false
      schema:
        type: string
        example: CLUSTER_TYPE_HYBRID
    FilterByClusterTypeNotEquals:
      name: 'filter[cluster_type][neq]'
      description: Filter by non-equality comparison of the cluster_type property with a supplied value.
      in: query
      required: false
      schema:
        type: string
        example: test
    FilterByIdEquality:
      name: 'filter[id][eq]'
      description: Filter by direct equality comparison of the id property with a supplied value.
      in: query
      required: false
      schema:
        type: string
        example: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
    FilterByIdEqualityShort:
      name: 'filter[id]'
      description: Filter by direct equality comparison (short-hand) of the id property with a supplied value.
      in: query
      required: false
      schema:
        type: string
        example: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
    FilterByIdsEquality:
      name: 'filter[id][oeq]'
      description: Filter by direct equality comparison of id property with multiple supplied values.
      in: query
      required: false
      schema:
        type: string
        example: 'some-value,some-other-value'
    FilterByLabels:
      name: labels
      description: Filter runtime groups in the response by associated labels.
      in: query
      required: false
      schema:
        type: string
        example: 'key:value,existCheck'
    FilterByNameContains:
      name: 'filter[name][contains]'
      description: Filter by contains comparison of the name property with a supplied substring.
      in: query
      required: false
      schema:
        type: string
        example: test
    FilterByNameEquality:
      name: 'filter[name][eq]'
      description: Filter by direct equality comparison of the name property with a supplied value.
      in: query
      required: false
      schema:
        type: string
        example: test
    FilterByNameEqualityShort:
      name: 'filter[name]'
      description: Filter by direct equality comparison (short-hand) of the name property with a supplied value.
      in: query
      required: false
      schema:
        type: string
        example: test
    FilterByNameNotEquals:
      name: 'filter[name][neq]'
      description: Filter by non-equality comparison of the name property with a supplied value.
      in: query
      required: false
      schema:
        type: string
        example: test
    PageNumber:
      name: 'page[number]'
      description: Determines which page of the entities to retrieve.
      required: false
      in: query
      allowEmptyValue: true
      schema:
        type: integer
        example: 1
    PageSize:
      name: 'page[size]'
      description: The maximum number of items to include per page. The last page of a collection may include fewer items.
      required: false
      in: query
      allowEmptyValue: true
      schema:
        type: integer
        example: 10
    RuntimeGroupSort:
      name: sort
      description: |
        Sorts a collection of runtime-groups. Supported sort attributes are:
          - created_at
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/SortQuery'
  schemas:
    CreateRuntimeGroupRequest:
      description: The request schema for the create runtime group request.
      type: object
      properties:
        name:
          description: The name of the runtime group.
          type: string
          example: Test Runtime Group
        description:
          description: The description of the runtime group in Konnect.
          type: string
          example: A test runtime group for exploration.
        cluster_type:
          description: The ClusterType value of the cluster associated with the Runtime Group.
          type: string
          example: CLUSTER_TYPE_HYBRID
          enum:
            - CLUSTER_TYPE_HYBRID
            - CLUSTER_TYPE_K8S_INGRESS_CONTROLLER
            - CLUSTER_TYPE_COMPOSITE
            - CLUSTER_TYPE_SERVERLESS
        auth_type:
          description: The auth type value of the cluster associated with the Runtime Group.
          type: string
          example: pinned_client_certs
          enum:
            - pinned_client_certs
            - pki_client_certs
        cloud_gateway:
          description: Whether this runtime group can be used for cloud-gateways.
          type: boolean
          example: false
        proxy_urls:
          $ref: '#/components/schemas/ProxyURLs'
        labels:
          $ref: '#/components/schemas/Labels'
      additionalProperties: false
      required:
        - name
      title: CreateRuntimeGroupRequest
    UpdateRuntimeGroupRequest:
      description: The request schema for the update runtime group request.
      type: object
      properties:
        name:
          description: The name of the runtime group.
          type: string
          example: Test Runtime Group
        description:
          description: The description of the runtime group in Konnect.
          type: string
          example: A test runtime group for exploration.
        auth_type:
          description: The auth type value of the cluster associated with the Runtime Group.
          type: string
          example: pinned_client_certs
          enum:
            - pinned_client_certs
            - pki_client_certs
        proxy_urls:
          $ref: '#/components/schemas/ProxyURLs'
        labels:
          $ref: '#/components/schemas/Labels'
      additionalProperties: false
      title: UpdateRuntimeGroupRequest
    RuntimeGroup:
      allOf:
        - $ref: '#/components/schemas/RuntimeGroupSummary'
        - type: object
          properties:
            labels:
              $ref: '#/components/schemas/Labels'
            config:
              description: CP configuration object for related access endpoints.
              type: object
              properties:
                control_plane_endpoint:
                  description: Control Plane Endpoint.
                  type: string
                  format: url
                  example: 'https://acfe5f253f.cp0.konghq.com'
                  readOnly: true
                telemetry_endpoint:
                  description: Telemetry Endpoint.
                  type: string
                  format: url
                  example: 'https://acfe5f253f.tp0.konghq.com'
                  readOnly: true
            created_at:
              description: An ISO-8604 timestamp representation of runtime group creation date.
              type: string
              format: date-time
              example: '2022-11-04T20:10:06.927Z'
              readOnly: true
            updated_at:
              description: An ISO-8604 timestamp representation of runtime group update date.
              type: string
              format: date-time
              example: '2022-11-04T20:10:06.927Z'
              readOnly: true
      x-examples:
        Example 1:
          id: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
          name: Test Runtime Group
          description: A test runtime group for exploration.
          labels:
            test: 'true'
          config:
            control_plane_endpoint: 'https://acfe5f253f.cp0.konghq.com'
            telemetry_endpoint: 'https://acfe5f253f.tp0.konghq.com'
            cluster_type: CLUSTER_TYPE_HYBRID
            auth_type: pinned_client_certs
            cloud_gateway: false
            proxy_urls:
              - host: example.com
                port: 443
                protocol: https
          created_at: '2022-11-04T20:10:06.927Z'
          updated_at: '2022-11-04T20:10:06.927Z'
    RuntimeGroupSummary:
      description: The runtime group object contains information about a Kong control plane.
      type: object
      properties:
        id:
          description: The runtime group ID.
          type: string
          format: uuid
          example: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
          readOnly: true
        name:
          description: The name of the runtime group.
          type: string
          example: Test Runtime Group
        description:
          description: The description of the runtime group in Konnect.
          type: string
          example: A test runtime group for exploration.
        labels:
          $ref: '#/components/schemas/Labels'
        config:
          description: CP configuration object for related access endpoints.
          type: object
          additionalProperties: false
          properties:
            control_plane_endpoint:
              description: Control Plane Endpoint.
              type: string
              format: url
              example: 'https://acfe5f253f.cp0.konghq.com'
              readOnly: true
            telemetry_endpoint:
              description: Telemetry Endpoint.
              type: string
              format: url
              example: 'https://acfe5f253f.tp0.konghq.com'
              readOnly: true
            cluster_type:
              description: The ClusterType value of the cluster associated with the Runtime Group.
              type: string
              example: CLUSTER_TYPE_HYBRID
              enum:
                - CLUSTER_TYPE_HYBRID
                - CLUSTER_TYPE_K8S_INGRESS_CONTROLLER
                - CLUSTER_TYPE_COMPOSITE
                - CLUSTER_TYPE_SERVERLESS
              readOnly: true
            auth_type:
              description: The auth type value of the cluster associated with the Runtime Group.
              type: string
              example: pinned_client_certs
              enum:
                - pinned_client_certs
                - pki_client_certs
              readOnly: true
            cloud_gateway:
              description: Whether this Runtime Group can be used for cloud-gateways.
              type: boolean
              readOnly: true
            proxy_urls:
              $ref: '#/components/schemas/ProxyURLs'
          required:
            - control_plane_endpoint
            - telemetry_endpoint
            - cluster_type
            - auth_type
            - cloud_gateway
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      additionalProperties: false
      title: RuntimeGroupSummary
    CompositeStatus:
      description: The Composite Status object contains information about the status of a composite runtime group.
      type: object
      properties:
        id:
          description: The composite runtime group ID.
          type: string
          format: uuid
          example: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
          readOnly: true
        created_at:
          description: An ISO-8604 timestamp representation of composite runtime group status creation date.
          type: string
          format: date-time
          example: '2022-11-04T20:10:06.927Z'
          readOnly: true
        updated_at:
          description: An ISO-8604 timestamp representation of composite runtime group status update date.
          type: string
          format: date-time
          example: '2022-11-04T20:10:06.927Z'
          readOnly: true
        conflicts:
          type: array
          items:
            $ref: '#/components/schemas/CompositeConflict'
          maxItems: 256
        state:
          description: The state of the composite runtime group.
          type: string
          example: COMPOSITE_STATE_CONFLICT
          enum:
            - COMPOSITE_STATE_OK
            - COMPOSITE_STATE_CONFLICT
            - COMPOSITE_STATE_UNKNOWN
          readOnly: true
      title: CompositeStatus
    CompositeConflict:
      description: The Composite Conflict object contains information about a conflict in a composite runtime group.
      type: object
      properties:
        cluster_id:
          description: The ID of a runtime group member of a composite runtime group.
          type: string
          format: uuid
          example: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
          readOnly: true
        description:
          description: The description of the conflict.
          type: string
          example: 'conflicting entity found: ID=38d790ad-8b08-4ff5-a074-2e1e9e64d8bd, Name=foo'
          readOnly: true
        resource:
          $ref: '#/components/schemas/CompositeConflictResource'
      title: CompositeConflict
    CompositeConflictResource:
      description: A resource causing a conflict in a composite runtime group.
      type: object
      properties:
        id:
          description: The ID of the resource.
          type: string
          format: uuid
          example: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
          readOnly: true
        type:
          description: The type of the resource.
          type: string
          example: service
          readOnly: true
      required:
        - id
        - type
      title: CompositeConflictResource
    CompositeMemberStatus:
      description: Object with information determining the composite membership status of a runtime group.
      type: object
      properties:
        is_member:
          description: Boolean indicating if a runtime group is a member of a composite runtime group.
          type: boolean
          example: true
          readOnly: true
      required:
        - is_member
      title: CompositeMemberStatus
    Labels:
      description: 'Labels to facilitate tagged search on runtime groups. Keys must be of length 1-63 characters, and cannot start with ''kong'', ''konnect'', ''mesh'', ''kic'', or ''_''.'
      type: object
      example:
        test: 'true'
      additionalProperties:
        type: string
        pattern: '^[a-z0-9A-Z]{1}([a-z0-9A-Z\-\.\_]*[a-z0-9A-Z]+)?$'
        minLength: 1
        maxLength: 63
      title: Labels
    ProxyURL:
      description: Proxy URL associated with reaching the data-planes connected to a runtime group.
      type: object
      properties:
        host:
          description: Hostname of the proxy URL.
          type: string
        port:
          description: Port of the proxy URL.
          type: integer
        protocol:
          description: Protocol of the proxy URL.
          type: string
      example:
        host: example.com
        port: 443
        protocol: https
      additionalProperties: false
      required:
        - host
        - port
        - protocol
      title: ProxyURL
    ProxyURLs:
      description: Array of proxy URLs associated with reaching the data-planes connected to a runtime group.
      type: array
      items:
        $ref: '#/components/schemas/ProxyURL'
      example:
        - host: example.com
          port: 443
          protocol: https
      title: ProxyURLs
    SortQuery:
      description: |
        The `asc` suffix is optional as the default sort order is ascending.
        The `desc` suffix is used to specify a descending order.
        Multiple sort attributes may be provided via a comma separated list.
        JSONPath notation may be used to specify a sub-attribute (eg: 'foo.bar desc').
      type: string
      example: 'name,created_at desc'
      title: SortQuery
    PageMeta:
      description: Contains pagination query parameters and the total number of objects returned.
      type: object
      properties:
        number:
          type: number
          example: 1
        size:
          type: number
          example: 10
        total:
          type: number
          example: 100
      required:
        - number
        - size
        - total
    PaginatedMeta:
      description: returns the pagination information
      type: object
      properties:
        page:
          $ref: '#/components/schemas/PageMeta'
      required:
        - page
      title: PaginatedMeta
    BaseError:
      description: standard error
      type: object
      properties:
        status:
          description: |
            The HTTP status code of the error. Useful when passing the response
            body to child properties in a frontend UI. Must be returned as an integer.
          type: integer
          readOnly: true
        title:
          description: |
            A short, human-readable summary of the problem. It should not
            change between occurences of a problem, except for localization.
            Should be provided as "Sentence case" for direct use in the UI.
          type: string
