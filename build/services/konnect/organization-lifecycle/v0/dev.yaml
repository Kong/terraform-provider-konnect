openapi: 3.0.2
info:
  title: Konnect Organization Lifecycle
  version: 0.0.0
  description: The management API for Konnect Organization Lifecycle.
  contact:
    name: Kong
    url: https://konghq.com
servers:
  - url: https://global.api.konghq.com/v3
    description: Global Base URL
tags:
  - name: Organization Lifecycle
paths:
  /organizations/state:
    post:
      summary: Sets a new state for an organization.
      operationId: post-organization-state
      description: |
        Sets a new state for an organization and creates an organization state 
        history record. An organization can be set to active or inactive.
      tags:
        - Organization Lifecycle
      responses:
        '201':
          $ref: '#/components/responses/OrganizationStateResponse'
        '400':
          $ref: '#/components/responses/OrganizationStateBadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/OrganizationNotFound'
        '409':
          $ref: '#/components/responses/OrganizationStateConflict'
      requestBody:
        $ref: '#/components/requestBodies/UpdateOrganizationState'
  /organizations/state/history:
    get:
      summary: Returns the state history of an organization.
      operationId: get-organization-state-history
      description: >
        Returns the state history of an organization sorted in reverse
        chronological order.

        Possible states include active, inactive, deleting, and deleted. An
        organization state 

        will be transitioned to the deleting state if the organization remains
        inactive for 90 days. 

        After deletion is complete, the state will be transitioned to the final
        deleted state. 
      tags:
        - Organization Lifecycle
      responses:
        '200':
          $ref: '#/components/responses/OrganizationStateHistory'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/OrganizationNotFound'
components:
  schemas:
    OrganizationState:
      type: object
      title: Organization State
      properties:
        id:
          type: string
          description: UUID of the organization.
          format: uuid
          readOnly: true
          example: d99c041a-c7cf-46a2-bf3a-44bb5f75400e
        state:
          type: string
          description: State of the organization.
          example: active
          enum:
            - active
            - inactive
            - deleting
            - deleted
        reason:
          type: string
          description: The reason for the organization's state.
          example: invoice overdue (30 days)
        service:
          type: string
          description: The service that modified the state.
          example: kbilling
        changed_by:
          type: string
          description: |
            The ID of the Konger who modified the state.
          example: 00uerwcs8eC4ifanR256
        created_at:
          type: string
          description: Date the organization state was created.
          format: date-time
          readOnly: true
          example: '2023-01-23T17:22:52.150Z'
    BaseError:
      type: object
      title: Error
      description: standard error
      required:
        - status
        - title
        - instance
        - detail
      properties:
        status:
          type: integer
          description: >
            The HTTP status code of the error. Useful when passing the response

            body to child properties in a frontend UI. Must be returned as an
            integer.
          readOnly: true
        title:
          type: string
          description: |
            A short, human-readable summary of the problem. It should not
            change between occurences of a problem, except for localization.
            Should be provided as "Sentence case" for direct use in the UI.
          readOnly: true
        type:
          type: string
          description: The error type.
          readOnly: true
        instance:
          type: string
          description: |
            Used to return the correlation ID back to the user, in the format
            kong:trace:<correlation_id>. This helps us find the relevant logs
            when a customer reports an issue.
          readOnly: true
        detail:
          type: string
          description: >
            A human readable explanation specific to this occurence of the
            problem.

            This field may contain request/entity data to help the user
            understand

            what went wrong. Enclose variable values in square brackets. Should
            be

            provided as "Sentence case" for direct use in the UI.
          readOnly: true
    InvalidRules:
      description: invalid parameters rules
      type: string
      readOnly: true
      nullable: true
      enum:
        - required
        - max_length
        - is_array
        - is_base64
        - is_boolean
        - is_date_time
        - is_integer
        - is_null
        - is_number
        - is_object
        - is_string
        - is_uuid
        - is_fqdn
        - is_arn
        - unknown_property
        - is_label
        - matches_regex
        - invalid
        - is_supported_network_availability_zone_list
        - is_supported_network_cidr_block
        - is_supported_provider_region
    InvalidParameterStandard:
      type: object
      additionalProperties: false
      properties:
        field:
          type: string
          example: name
          readOnly: true
        rule:
          $ref: '#/components/schemas/InvalidRules'
        source:
          type: string
          example: body
        reason:
          type: string
          example: is a required field
          readOnly: true
      required:
        - field
        - reason
    InvalidParameterMinimumLength:
      type: object
      additionalProperties: false
      properties:
        field:
          type: string
          example: name
          readOnly: true
        rule:
          description: invalid parameters rules
          type: string
          readOnly: true
          nullable: false
          enum:
            - min_length
            - min_digits
            - min_lowercase
            - min_uppercase
            - min_symbols
        minimum:
          type: integer
          example: 8
        source:
          type: string
          example: body
        reason:
          type: string
          example: is a required field
          readOnly: true
      required:
        - field
        - reason
        - rule
        - minimum
    InvalidParameterChoiceItem:
      type: object
      additionalProperties: false
      properties:
        field:
          type: string
          example: name
          readOnly: true
        rule:
          description: invalid parameters rules
          type: string
          readOnly: true
          nullable: false
          enum:
            - enum
        reason:
          type: string
          example: is a required field
          readOnly: true
        choices:
          type: array
          uniqueItems: true
          readOnly: true
          nullable: false
          minimum: 1
          items: {}
        source:
          type: string
          example: body
      required:
        - field
        - reason
        - rule
        - choices
    InvalidParameterDependentItem:
      type: object
      additionalProperties: false
      properties:
        field:
          type: string
          example: name
          readOnly: true
        rule:
          description: invalid parameters rules
          type: string
          readOnly: true
          nullable: true
          enum:
            - dependent_fields
        reason:
          type: string
          example: is a required field
          readOnly: true
        dependents:
          type: array
          uniqueItems: true
          nullable: true
          items: {}
          readOnly: true
        source:
          type: string
          example: body
      required:
        - field
        - rule
        - reason
        - dependents
    InvalidParameters:
      type: array
      nullable: false
      uniqueItems: true
      minItems: 1
      description: invalid parameters
      items:
        oneOf:
          - $ref: '#/components/schemas/InvalidParameterStandard'
          - $ref: '#/components/schemas/InvalidParameterMinimumLength'
          - $ref: '#/components/schemas/InvalidParameterChoiceItem'
          - $ref: '#/components/schemas/InvalidParameterDependentItem'
    BadRequestError:
      allOf:
        - $ref: '#/components/schemas/BaseError'
        - type: object
          required:
            - invalid_parameters
          properties:
            invalid_parameters:
              $ref: '#/components/schemas/InvalidParameters'
    UnauthorizedError:
      allOf:
        - $ref: '#/components/schemas/BaseError'
        - type: object
          properties:
            status:
              example: 401
            title:
              example: Unauthorized
            type:
              example: https://httpstatuses.com/401
            instance:
              example: kong:trace:1234567890
            detail:
              example: Invalid credentials
    ForbiddenError:
      allOf:
        - $ref: '#/components/schemas/BaseError'
        - type: object
          properties:
            status:
              example: 403
            title:
              example: Forbidden
            type:
              example: https://httpstatuses.com/403
            instance:
              example: kong:trace:1234567890
            detail:
              example: Forbidden
    NotFoundError:
      allOf:
        - $ref: '#/components/schemas/BaseError'
        - type: object
          properties:
            status:
              example: 404
            title:
              example: Not Found
            type:
              example: https://httpstatuses.com/404
            instance:
              example: kong:trace:1234567890
            detail:
              example: Not found
    ConflictError:
      allOf:
        - $ref: '#/components/schemas/BaseError'
        - type: object
          properties:
            status:
              example: 409
            title:
              example: Conflict
            type:
              example: https://httpstatuses.com/409
            instance:
              example: kong:trace:1234567890
            detail:
              example: Conflict
    PageMeta:
      type: object
      description: >-
        Contains pagination query parameters and the total number of objects
        returned.
      required:
        - number
        - size
        - total
      properties:
        number:
          type: number
          example: 1
        size:
          type: number
          example: 10
        total:
          type: number
          example: 100
    PaginatedMeta:
      type: object
      title: PaginatedMeta
      description: returns the pagination information
      properties:
        page:
          $ref: '#/components/schemas/PageMeta'
      required:
        - page
  responses:
    OrganizationStateResponse:
      description: A response for setting the organization state.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OrganizationState'
          examples:
            Example:
              value:
                id: d99c041a-c7cf-46a2-bf3a-44bb5f75400e
                state: active
                reason: invoice overdue (30 days)
                service: kadmin
                changed_by: 00uerwcs8eC4ifanR256
                created_at: '2023-01-18T11:35:45.130Z'
    OrganizationStateHistory:
      description: >-
        A paginated list response for a collection of organization state
        changes.
      content:
        application/json:
          schema:
            type: object
            title: Organizations State History.
            properties:
              meta:
                $ref: '#/components/schemas/PaginatedMeta'
              data:
                type: array
                items:
                  $ref: '#/components/schemas/OrganizationState'
          examples:
            Example:
              value:
                meta:
                  page:
                    number: 1
                    size: 2
                    total: 2
                data:
                  - id: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
                    state: inactive
                    service: kadmin
                    reason: invoice overdue (30 days)
                    changed_by: 00uerwcs8eC4ifanR256
                    created_at: '2022-09-25T13:00:00.00Z'
                  - id: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f8
                    state: active
                    service: kauth
                    created_at: '2021-09-25T13:00:00.00Z'
    OrganizationStateBadRequest:
      description: Bad Request
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/BadRequestError'
          examples:
            Request format is invalid:
              $ref: '#/components/examples/400InvalidRequestFormat'
    OrganizationNotFound:
      description: Not Found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/NotFoundError'
          examples:
            Not Found:
              $ref: '#/components/examples/404OrganizationStateNotFound'
    OrganizationStateConflict:
      description: Conflict
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ConflictError'
          examples:
            Conflict:
              $ref: '#/components/examples/409OrganizationStateConflict'
    Unauthorized:
      description: Unauthorized
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/UnauthorizedError'
          examples:
            UnauthorizedExample:
              $ref: '#/components/examples/UnauthorizedExample'
    Forbidden:
      description: Forbidden
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ForbiddenError'
          examples:
            UnauthorizedExample:
              $ref: '#/components/examples/ForbiddenExample'
  requestBodies:
    UpdateOrganizationState:
      required: true
      description: The request schema to set an organization's state.
      content:
        application/json:
          schema:
            type: object
            properties:
              state:
                type: string
                description: The state of the organization to set.
                example: inactive
                enum:
                  - active
                  - inactive
              reason:
                type: string
                description: The reason for the state change.
                example: invoice overdue (30 days)
              changed_by:
                type: string
                description: The uuid of the konger who modified the state.
                example: 00uerwcs8eC4ifanR256
            required:
              - state
          examples:
            Inactive Example:
              value:
                state: inactive
                reason: invoice overdue (30 days)
                changed_by: 00uerwcs8eC4ifanR256
            Active Example:
              value:
                state: active
                reason: organization was created
  examples:
    400InvalidRequestFormat:
      value:
        status: 400
        title: Bad Request
        instance: konnect:trace:3674017986744198214
        invalid_parameters:
          - field: body
            reason: request format is invalid
        detail: The request format is invalid
    404OrganizationStateNotFound:
      value:
        status: 404
        title: Not Found
        instance: konnect:trace:2287285207635123011
        detail: The requested organization was not found
    409OrganizationStateConflict:
      value:
        status: 409
        title: Conflict
        instance: konnect:trace:2287285207635123011
        detail: Organization is already set to the requested state
    UnauthorizedExample:
      value:
        status: 401
        title: Unauthorized
        instance: kong:trace:8347343766220159418
        detail: Unauthorized
    ForbiddenExample:
      value:
        status: 403
        title: Forbidden
        instance: kong:trace:2723154947768991354
        detail: You do not have permission to perform this action
