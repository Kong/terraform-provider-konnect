openapi: 3.0.3
info:
  title: Konnect Serverless Cloud Gateways Manager
  description: Serverless Cloud Gateways Manager API
  version: 0.0.1
  contact:
    name: Kong
    url: 'https://konghq.com'
servers:
  - url: 'https://global.api.konghq.com/v0'
    description: US Public API
paths:
  /serverless-cloud-gateways:
    get:
      operationId: list-serverless-cloud-gateway
      summary: List Serverless cloud gateways
      description: |-
        **Pre-release Endpoint**
        This endpoint is currently in beta and is subject to change.

        Returns an array of serverless cloud gateways objects.
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/FilterSCGWByLabels'
      responses:
        '200':
          $ref: '#/components/responses/ListServerlessCloudGatewaysResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      tags:
        - Serverless Cloud Gateways
    post:
      operationId: create-serverless-cloud-gateway
      summary: Create a new serverless cloud gateway
      description: |-
        **Pre-release Endpoint**
        This endpoint is currently in beta and is subject to change.

        Create a new serverless cloud gateway
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateServerlessCloudGatewayRequest'
            examples:
              Example Request Body:
                $ref: '#/components/examples/CreateServerlessCloudGatewayRequestExample'
      responses:
        '201':
          $ref: '#/components/responses/CreateServerlessCloudGatewayResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      tags:
        - Serverless Cloud Gateways
  '/serverless-cloud-gateways/{controlPlaneId}':
    parameters:
      - name: controlPlaneId
        in: path
        description: Id of the Serverless Cloud Gateway control plane
        required: true
        schema:
          type: string
          format: uuid
        example: bf138ba2-c9b1-4229-b268-04d9d8a6410b
    get:
      operationId: get-serverless-cloud-gateway
      summary: Get the serverless cloud gateway
      description: |-
        **Pre-release Endpoint**
        This endpoint is currently in beta and is subject to change.

        Get the serverless cloud gateway
      responses:
        '200':
          $ref: '#/components/responses/RetrieveServerlessCloudGatewayResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - Serverless Cloud Gateways
    delete:
      operationId: delete-serverless-cloud-gateway
      summary: Delete the serverless cloud gateway
      description: |-
        **Pre-release Endpoint**
        This endpoint is currently in beta and is subject to change.

        Delete the serverless cloud gateway
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - Serverless Cloud Gateways
components:
  parameters:
    FilterSCGWByLabels:
      name: labels
      description: Filter serverless cloud gateways in the response by associated labels.
      in: query
      required: false
      schema:
        type: string
        example: 'filter[labels][eq]=env:prod'
    PageNumber:
      name: 'page[number]'
      description: Determines which page of the entities to retrieve.
      required: false
      in: query
      allowEmptyValue: true
      schema:
        type: integer
        example: 1
    PageSize:
      name: 'page[size]'
      description: The maximum number of items to include per page. The last page of a collection may include fewer items.
      required: false
      in: query
      allowEmptyValue: true
      schema:
        type: integer
        example: 10
  schemas:
    ServerlessCloudGateway:
      description: A serverless cloud gateway
      type: object
      properties:
        control_plane:
          $ref: '#/components/schemas/ServerlessControlPlane'
        gateway_endpoint:
          description: Endpoint for the serverless cloud gateway.
          type: string
          format: hostname
          example: us-kong-4594857kpl.kongcloud.dev
          readOnly: true
        created_at:
          type: string
          format: date-time
          example: '2023-01-11T02:30:42.227Z'
          readOnly: true
        updated_at:
          type: string
          format: date-time
          example: '2023-01-11T02:30:42.227Z'
          readOnly: true
        labels:
          $ref: '#/components/schemas/SCGWLabels'
      required:
        - control_plane
        - gateway_endpoint
        - updated_at
        - created_at
      title: ServerlessCloudGateway
    CreateServerlessCloudGatewayRequest:
      description: Schema to create a serverless cloud gateway.
      type: object
      properties:
        control_plane:
          $ref: '#/components/schemas/ServerlessControlPlane'
        cluster_cert:
          description: The cluster certificate (public key).
