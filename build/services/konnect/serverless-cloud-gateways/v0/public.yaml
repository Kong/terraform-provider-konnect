              $ref: >-
                #/components/examples/RetrieveServerlessCloudGatewayResponseExample
    CreateServerlessCloudGatewayResponse:
      description: A response to creating a serverless cloud gateway.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ServerlessCloudGateway'
          examples:
            Create Serverless cloud gateway Response:
              $ref: >-
                #/components/examples/CreateServerlessCloudGatewayResponseExample
    ListServerlessCloudGatewaysResponse:
      description: A paginated list response for a collection of serverless cloud gateways.
      content:
        application/json:
          schema:
            title: ListServerlessCloudGatewaysResponse
            type: object
            properties:
              meta:
                $ref: '#/components/schemas/PaginatedMeta'
              data:
                type: array
                items:
                  $ref: '#/components/schemas/ServerlessCloudGateway'
          examples:
            Serverless cloud gateway Collection:
              $ref: '#/components/examples/ListServerlessCloudGatewaysResponseExample'
    Unauthorized:
      description: Unauthorized
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/UnauthorizedError'
          examples:
            UnauthorizedExample:
              $ref: '#/components/examples/UnauthorizedExample'
    Forbidden:
