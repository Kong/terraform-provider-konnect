openapi: 3.0.3
info:
  title: Konnect Serverless Cloud Gateways Manager
  description: Serverless Cloud Gateways Manager API
  version: 0.0.1
  contact:
    name: Kong
    url: https://konghq.com
servers:
  - url: https://global.api.konghq.com/v0
    description: US Public API
security:
  - personalAccessToken: []
  - systemAccountAccessToken: []
tags:
  - name: Serverless Cloud Gateways
paths:
  /serverless-cloud-gateways/{controlPlaneId}:
    parameters:
      - name: controlPlaneId
        in: path
        required: true
        description: Id of the Serverless Cloud Gateway control plane
        example: bf138ba2-c9b1-4229-b268-04d9d8a6410b
        schema:
          type: string
          format: uuid
    patch:
      summary: Update the serverless cloud gateway
      operationId: update-serverless-cloud-gateway
      responses:
        '200':
          $ref: '#/components/responses/UpdateServerlessCloudGatewayResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      description: Update an individual serverless cloud gateway.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateServerlessCloudGatewayRequest'
            examples:
              Example Request Body:
                $ref: >-
                  #/components/examples/UpdateServerlessCloudGatewayRequestExample
      tags:
        - Serverless Cloud Gateways
components:
  securitySchemes:
    personalAccessToken:
      type: http
      scheme: bearer
      bearerFormat: Token
      description: >
        The personal access token is meant to be used as an alternative to
        basic-auth when accessing Konnect via APIs.

        You can generate a Personal Access Token (PAT) from the [personal access
        token page](https://cloud.konghq.com/global/tokens/) in the Konnect
        dashboard.

        The PAT token must be passed in the header of a request, for example:

        `curl -X GET 'https://global.api.konghq.com/v2/users/' --header
        'Authorization: Bearer kpat_xgfT...'`
    systemAccountAccessToken:
      type: http
      scheme: bearer
      bearerFormat: Token
      description: >
        The system account access token is meant for automations and
        integrations that are not directly associated with a human identity.

        You can generate a system account Access Token by creating a system
        account and then obtaining a system account access token for that
        account.

        The access token must be passed in the header of a request, for example:

        `curl -X GET 'https://global.api.konghq.com/v2/users/' --header
        'Authorization: Bearer spat_i2Ej...'`
  schemas:
    ServerlessCloudGateway:
      type: object
      title: ServerlessCloudGateway
      description: A serverless cloud gateway
      required:
        - control_plane
        - gateway_endpoint
        - updated_at
        - created_at
      properties:
        control_plane:
          $ref: '#/components/schemas/ServerlessControlPlane'
        gateway_endpoint:
          type: string
          format: hostname
          description: Endpoint for the serverless cloud gateway.
          example: us-kong-4594857kpl.kongcloud.dev
          readOnly: true
        created_at:
          type: string
          format: date-time
          example: '2023-01-11T02:30:42.227Z'
          readOnly: true
        updated_at:
          type: string
          format: date-time
          example: '2023-01-11T02:30:42.227Z'
          readOnly: true
        labels:
          $ref: '#/components/schemas/SCGWLabels'
    UpdateServerlessCloudGatewayRequest:
      type: object
      title: UpdateServerlessCloudGatewayRequest
      description: Schema to update a serverless cloud gateway.
      additionalProperties: false
      properties:
        cp_prefix:
          type: string
          description: The prefix of the serverless cloud gateway CP.
          example: 518da50bf7
        cp_region:
          $ref: '#/components/schemas/CpRegion'
        labels:
          $ref: '#/components/schemas/SCGWLabels'
    SCGWLabels:
      title: Labels
      type: object
      example:
        env: test
      description: >-
        Labels to facilitate tagged search on serverless cloud gateways. Keys
        must be of length 1-63 characters, and cannot start with 'kong',
        'konnect', 'mesh', 'kic', or '_'.
      additionalProperties:
        type: string
        pattern: ^[a-z0-9A-Z]{1}([a-z0-9A-Z\-\.\_]*[a-z0-9A-Z]+)?$
        minLength: 1
        maxLength: 63
    CpRegion:
      title: Control plane region
      type: string
      description: The control plane region.
      example: us
      enum:
        - us
        - eu
        - au
      x-enum-varnames:
        - US
        - Europe
        - Aus
    ServerlessControlPlane:
      type: object
      title: Control plane
      x-go-name: ControlPlane
      required:
        - id
        - prefix
        - region
      properties:
        id:
          type: string
          format: uuid
          description: ID of the serverless cloud gateway CP.
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        prefix:
          type: string
          description: The prefix of the serverless cloud gateway CP.
          example: 518da50bf7
        region:
          $ref: '#/components/schemas/CpRegion'
    BaseError:
      type: object
      title: Error
      description: standard error
      required:
        - status
        - title
        - instance
        - detail
      properties:
        status:
          type: integer
          description: >
            The HTTP status code of the error. Useful when passing the response

            body to child properties in a frontend UI. Must be returned as an
            integer.
          readOnly: true
        title:
          type: string
          description: |
            A short, human-readable summary of the problem. It should not
            change between occurences of a problem, except for localization.
            Should be provided as "Sentence case" for direct use in the UI.
          readOnly: true
        type:
          type: string
          description: The error type.
          readOnly: true
        instance:
          type: string
          description: |
            Used to return the correlation ID back to the user, in the format
            kong:trace:<correlation_id>. This helps us find the relevant logs
            when a customer reports an issue.
          readOnly: true
        detail:
          type: string
          description: >
            A human readable explanation specific to this occurence of the
            problem.

            This field may contain request/entity data to help the user
            understand

            what went wrong. Enclose variable values in square brackets. Should
            be

            provided as "Sentence case" for direct use in the UI.
          readOnly: true
    UnauthorizedError:
      type: object
      properties:
        status:
          example: 401
        title:
          example: Unauthorized
        type:
          example: https://httpstatuses.com/401
        instance:
          example: kong:trace:1234567890
        detail:
          example: Invalid credentials
      allOf:
        - $ref: '#/components/schemas/BaseError'
    ForbiddenError:
      type: object
      properties:
        status:
          example: 403
        title:
          example: Forbidden
        type:
          example: https://httpstatuses.com/403
        instance:
          example: kong:trace:1234567890
        detail:
          example: Forbidden
      allOf:
        - $ref: '#/components/schemas/BaseError'
    InvalidRules:
      description: invalid parameters rules
      type: string
      readOnly: true
      nullable: true
      enum:
        - required
        - enum
        - min_length
        - max_length
        - min_digits
        - min_lowercase
        - min_uppercase
        - min_symbols
        - is_array
        - is_base64
        - is_boolean
        - is_date_time
        - is_integer
        - is_null
        - is_number
        - is_object
        - is_string
        - is_uuid
        - unknown_property
        - is_label
        - matches_regex
    InvalidParameterChoiceItem:
      type: object
      properties:
        field:
          type: string
          example: name
          readOnly: true
        rule:
          $ref: '#/components/schemas/InvalidRules'
        reason:
          type: string
          example: is a required field
          readOnly: true
        choices:
          type: array
          uniqueItems: true
          nullable: true
          items: {}
          readOnly: true
      required:
        - field
        - reason
    InvalidParameterDependentItem:
      type: object
      properties:
        field:
          type: string
          example: name
          readOnly: true
        rule:
          description: invalid parameters rules
          type: string
          readOnly: true
          nullable: true
          enum:
            - dependent_fields
        reason:
          type: string
          example: is a required field
          readOnly: true
        dependents:
          type: array
          uniqueItems: true
          nullable: true
          items: {}
          readOnly: true
      required:
        - field
        - rule
        - reason
        - dependents
    InvalidParameters:
      type: array
      nullable: false
      uniqueItems: true
      minItems: 1
      description: invalid parameters
      items:
        oneOf:
          - $ref: '#/components/schemas/InvalidParameterChoiceItem'
          - $ref: '#/components/schemas/InvalidParameterDependentItem'
    BadRequestError:
      type: object
      required:
        - invalid_parameters
      properties:
        status:
          example: 400
        title:
          example: Bad Request
        type:
          example: https://httpstatuses.com/400
        instance:
          example: kong:trace:1234567890
        detail:
          example: Invalid request body
        invalid_parameters:
          $ref: '#/components/schemas/InvalidParameters'
      allOf:
        - $ref: '#/components/schemas/BaseError'
    NotFoundError:
      type: object
      properties:
        status:
          example: 404
        title:
          example: Not Found
        type:
          example: https://httpstatuses.com/404
        instance:
          example: kong:trace:1234567890
        detail:
          example: Not found
      allOf:
        - $ref: '#/components/schemas/BaseError'
  responses:
    UpdateServerlessCloudGatewayResponse:
      description: A response to updating a serverless cloud gateway.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ServerlessCloudGateway'
          examples:
            Update Serverless cloud gateway Response:
              $ref: '#/components/examples/ServerlessCloudGatewayExample'
    Unauthorized:
      description: Unauthorized
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/UnauthorizedError'
          examples:
            UnauthorizedExample:
              $ref: '#/components/examples/UnauthorizedExample'
    Forbidden:
      description: Forbidden
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ForbiddenError'
          examples:
            UnauthorizedExample:
              $ref: '#/components/examples/ForbiddenExample'
    BadRequest:
      description: Bad Request
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/BadRequestError'
    NotFound:
      description: Not Found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/NotFoundError'
          examples:
            NotFoundExample:
              $ref: '#/components/examples/NotFoundExample'
  examples:
    ServerlessCloudGatewayExample:
      value:
        control_plane:
          id: d32d905a-ed33-46a3-a093-d8f536af9a8a
          prefix: 518da50bf7
          region: eu
        gateway_endpoint: kong-518da50bf7euab123.kongcloud.dev
        created_at: '2023-01-11T02:30:42.227Z'
        updated_at: '2023-01-11T02:30:42.227Z'
        labels:
          test: 'true'
    UpdateServerlessCloudGatewayRequestExample:
      value:
        labels:
          test: 'true'
    UnauthorizedExample:
      value:
        status: 401
        title: Unauthorized
        instance: kong:trace:8347343766220159418
        detail: Unauthorized
    ForbiddenExample:
      value:
        status: 403
        title: Forbidden
        instance: kong:trace:2723154947768991354
        detail: You do not have permission to perform this action
    NotFoundExample:
      value:
        status: 404
        title: Not Found
        instance: kong:trace:6816496025408232265
        detail: Not Found
