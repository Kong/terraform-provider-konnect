openapi: 3.0.3
info:
  title: Konnect ServiceHub
  description: The platform API for Kong Konnect ServiceHub core.
  version: 2.1.0
  contact:
    name: Kong
    url: https://konghq.com
servers:
  - url: https://us.api.konghq.com/v2
    description: Base URL for the US region
  - url: https://eu.api.konghq.com/v2
    description: Base URL for the EU region
  - url: https://au.api.konghq.com/v2
    description: Base URL for the AU region
security:
  - konnectAccessToken: []
  - personalAccessToken: []
  - systemAccountAccessToken: []
tags:
  - name: Addons
  - name: Service Hub Services
  - name: Integrations
  - name: Integration Auth Credentials
  - name: Discovery Settings
  - name: Service Documents
  - name: Discovered Entities
  - name: Suggestion Rules
  - name: Suggested Discovery Actions
  - name: Discovery Actions
  - name: Discovery Ingestion
  - name: Metadata Field
paths:
  /servicehub/addons:
    get:
      summary: List Addons
      operationId: list-addons
      description: Returns a paginated collection of ServiceHub addons.
      responses:
        '200':
          $ref: '#/components/responses/ListAddonsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/AddonFilter'
        - $ref: '#/components/parameters/AddonSort'
      tags:
        - Addons
  /servicehub/services:
    get:
      summary: List Services
      operationId: list-services
      description: Returns a paginated collection of services.
      responses:
        '200':
          $ref: '#/components/responses/ListServicesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/Internal'
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/ServiceFilter'
        - $ref: '#/components/parameters/ServiceSort'
      tags:
        - Service Hub Services
    post:
      summary: Create Service
      operationId: create-service
      description: Creates a service.
      requestBody:
        $ref: '#/components/requestBodies/CreateServiceBody'
      responses:
        '201':
          $ref: '#/components/responses/ServiceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/Internal'
      tags:
        - Service Hub Services
  /servicehub/services/{serviceId}:
    parameters:
      - schema:
          type: string
          example: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
          format: uuid
        name: serviceId
        in: path
        required: true
        description: ID of the service.
    get:
      summary: Fetch Service
      operationId: get-service
      description: Returns information about a service from a given service ID.
      responses:
        '200':
          $ref: '#/components/responses/ServiceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
      tags:
        - Service Hub Services
    patch:
      summary: Update Service
      operationId: update-service
      description: Updates an individual service.
      requestBody:
        $ref: '#/components/requestBodies/UpdateServiceBody'
      responses:
        '200':
          $ref: '#/components/responses/ServiceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/Internal'
      tags:
        - Service Hub Services
    delete:
      summary: Delete Service
      operationId: delete-service
      description: Deletes an individual service. Returns 404 if the service is not found.
      responses:
        '204':
          description: No Content
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
      tags:
        - Service Hub Services
  /services/{serviceId}/documents:
    parameters:
      - schema:
          type: string
          example: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
          format: uuid
        name: serviceId
        in: path
        required: true
        description: ID of the service.
    get:
      summary: List Service Documents
      operationId: list-service-documents
      description: >-
        Returns a paginated collection of documents belonging to the given
        service.
      responses:
        '200':
          $ref: '#/components/responses/ListDocumentsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
      parameters:
        - in: header
          name: Accept
          schema:
            $ref: '#/components/schemas/DocumentContentTypeEnum'
        - $ref: '#/components/parameters/LimitOffsetPage'
      tags:
        - Service Documents
    post:
      summary: Create Service Document
      operationId: create-service-document
      description: Creates a document associated to the given service.
      requestBody:
        $ref: '#/components/requestBodies/CreateDocumentBody'
      responses:
        '201':
          $ref: '#/components/responses/CreateDocumentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
      tags:
        - Service Documents
  /services/{serviceId}/documents/{documentId}:
    parameters:
      - schema:
          type: string
          example: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
          format: uuid
        name: serviceId
        in: path
        required: true
        description: ID of the service.
      - schema:
          type: string
          example: 6c1118d3-0fe3-4695-ae55-84d6ea020916
          format: uuid
        name: documentId
        in: path
        required: true
        description: ID of the document belonging to the given service.
    get:
      summary: Fetch Service Document
      operationId: get-service-document
      description: Returns information about a document belonging to a given service.
      parameters:
        - in: header
          name: Accept
          schema:
            $ref: '#/components/schemas/DocumentFormatContentTypeEnum'
      responses:
        '200':
          $ref: '#/components/responses/DocumentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
      tags:
        - Service Documents
    patch:
      summary: Update Service Document
      operationId: update-service-document
      description: Updates a document belonging to a given service.
      requestBody:
        $ref: '#/components/requestBodies/UpdateDocumentBody'
      responses:
        '200':
          $ref: '#/components/responses/UpdateDocumentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/Internal'
      tags:
        - Service Documents
    delete:
      summary: Delete Service Document
      operationId: delete-service-document
      description: |
        Deletes an individual document belonging to the given service.
        Returns 404 if either the service or document is not found.
      responses:
        '204':
          description: No Content
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
      tags:
        - Service Documents
  /services/{serviceId}/documents/{documentId}/move:
    parameters:
      - schema:
          type: string
          example: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
          format: uuid
        name: serviceId
        in: path
        required: true
        description: ID of the service.
      - schema:
          type: string
          example: 6c1118d3-0fe3-4695-ae55-84d6ea020916
          format: uuid
        name: documentId
        in: path
        required: true
        description: ID of the document belonging to the given service.
    put:
      summary: Move Service Document
      operationId: move-service-document
      description: >-
        Moves a document within the document tree under the given service, using
        parameters parent_document_id and index.
      requestBody:
        $ref: '#/components/requestBodies/MoveDocumentBody'
      responses:
        '200':
          description: The document has been moved
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/Internal'
      tags:
        - Service Documents
  /installed-integrations:
    get:
      summary: List Installed Integrations
      operationId: list-installed-integrations
      description: Returns a paginated collection of installed ServiceHub integrations.
      responses:
        '200':
          $ref: '#/components/responses/ListInstalledIntegrationsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/Internal'
      parameters:
        - $ref: '#/components/parameters/LimitOffsetPage'
        - $ref: '#/components/parameters/InstalledIntegrationFilter'
        - $ref: '#/components/parameters/InstalledIntegrationSort'
      tags:
        - Integrations
  /installed-integrations/{integration}:
    parameters:
      - schema:
          type: string
          example: gateway-manager
        name: integration
        in: path
        required: true
        description: Machine name of the integration.
    get:
      summary: Fetch Installed Integration
      operationId: get-installed-integration
      description: Returns information about a specific installed ServiceHub integration.
      responses:
        '200':
          $ref: '#/components/responses/InstalledIntegrationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
      tags:
        - Integrations
    post:
      summary: Install Integration
      operationId: install-integration
      description: Installs the given ServiceHub integration.
      requestBody:
        $ref: '#/components/requestBodies/InstallIntegrationBody'
      responses:
        '201':
          $ref: '#/components/responses/InstalledIntegrationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/Internal'
      tags:
        - Integrations
    patch:
      summary: Update Installed Integration
      operationId: update-installed-integration
      description: Updates the given installed ServiceHub integration.
      requestBody:
        $ref: '#/components/requestBodies/UpdateInstalledIntegrationBody'
      responses:
        '200':
          $ref: '#/components/responses/InstalledIntegrationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/Internal'
      tags:
        - Integrations
    delete:
      summary: Delete Installed Integration
      operationId: delete-installed-integration
      description: >
        Deletes an installed ServiceHub integration. Returns 404 if the
        integration is not installed or not found.
      responses:
        '204':
          description: No Content
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
      tags:
        - Integrations
  /installed-integrations/{integration}/auth-credentials:
    parameters:
      - schema:
          type: string
          example: pagerduty
        name: integration
        in: path
        required: true
        description: Machine name of the integration.
    get:
      summary: List Installed Integration Auth Credentials
      operationId: list-installed-integration-auth-credentials
      description: >-
        Returns a paginated collection of installed integration auth
        credentials.
      responses:
        '200':
          $ref: >-
            #/components/responses/ListInstalledIntegrationAuthCredentialsResponse
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
      parameters:
        - $ref: '#/components/parameters/LimitOffsetPage'
      tags:
        - Integration Auth Credentials
    post:
      summary: Create Installed Integration Auth Credential
      operationId: create-installed-integration-auth-credential
      description: Creates an auth credential for the integration.
      requestBody:
        $ref: >-
          #/components/requestBodies/CreateInstalledIntegrationAuthCredentialBody
      responses:
        '201':
          $ref: '#/components/responses/InstalledIntegrationAuthCredentialResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/Internal'
        '503':
          $ref: '#/components/responses/NotAvailable'
      tags:
        - Integration Auth Credentials
  /installed-integrations/{integration}/auth-credentials/{authCredentialId}:
    parameters:
      - schema:
          type: string
          example: pagerduty
        name: integration
        in: path
        required: true
        description: Machine name of the integration.
      - schema:
          type: string
          format: uuid
          example: 95e4f10a-bf10-4724-9378-c3591ad8c6ed
        name: authCredentialId
        in: path
        required: true
        description: ID of the auth credential.
    get:
      summary: Fetch Installed Integration Auth Credential
      operationId: fetch-installed-integration-auth-credential
      description: >-
        Returns context associated to an auth credential for the given installed
        integration.
      responses:
        '200':
          $ref: '#/components/responses/InstalledIntegrationAuthCredentialResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
      tags:
        - Integration Auth Credentials
    delete:
      summary: Delete Installed Integration Auth Credential
      operationId: delete-installed-integration-auth-credential
      description: >-
        Deletes an auth credential for an integration. Returns 404 if the given
        credential is not found.
      responses:
        '204':
          description: No Content
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
      tags:
        - Integration Auth Credentials
  /services/{serviceId}/integrations:
    parameters:
      - schema:
          type: string
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
          format: uuid
        name: serviceId
        in: path
        required: true
        description: ID of the service.
    get:
      summary: List Integrations for Service
      operationId: list-service-integrations
      description: >-
        Returns a paginated collection of ServiceHub integrations associated to
        the given service.
      responses:
        '200':
          $ref: '#/components/responses/ListServiceIntegrationsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
      parameters:
        - $ref: '#/components/parameters/LimitOffsetPage'
        - $ref: '#/components/parameters/ServiceIntegrationFilter'
        - $ref: '#/components/parameters/ServiceIntegrationSort'
      tags:
        - Integrations
        - Service Hub Services
  /services/{serviceId}/integrations/{integration}:
    parameters:
      - schema:
          type: string
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
          format: uuid
        name: serviceId
        in: path
        required: true
        description: ID of the service.
      - schema:
          type: string
          example: gateway-manager
        name: integration
        in: path
        required: true
        description: Machine name of the integration.
    post:
      summary: Create Service Integration
      operationId: create-service-integration
      description: >-
        Creates an association between the given integration and service using
        the data binding provided in the request.
      requestBody:
        $ref: '#/components/requestBodies/CreateServiceIntegrationBody'
      responses:
        '201':
          $ref: '#/components/responses/ServiceIntegrationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/Internal'
      tags:
        - Service Hub Services
        - Integrations
  /services/{serviceId}/integrations/{integration}/{serviceIntegrationId}:
    parameters:
      - schema:
          type: string
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
          format: uuid
        name: serviceId
        in: path
        required: true
        description: ID of the service.
      - schema:
          type: string
          example: gateway-manager
        name: integration
        in: path
        required: true
        description: Machine name of the integration.
      - schema:
          type: string
          example: 123e4567-e89b-12d3-a456-426614174000
        name: serviceIntegrationId
        in: path
        required: true
        description: ID of the service integration.
    put:
      summary: Update Service Integration
      operationId: update-service-integration
      description: Updates the association between the given integration and service.
      requestBody:
        $ref: '#/components/requestBodies/UpdateServiceIntegrationBody'
      responses:
        '200':
          $ref: '#/components/responses/ServiceIntegrationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/Internal'
      tags:
        - Service Hub Services
        - Integrations
    delete:
      summary: Delete Service Integration
      operationId: delete-service-integration
      description: >
        Deletes a Service integration. Returns 404 if the given service or
        integration is not found.
      responses:
        '204':
          description: No Content
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
      tags:
        - Service Hub Services
        - Integrations
  /integrations/{integration}/proxy:
    parameters:
      - schema:
          type: string
          example: pagerduty
        name: integration
        in: path
        required: true
        description: Machine name of the integration.
    post:
      summary: Integration Proxy Request
      operationId: integration-proxy-request
      description: Proxies a request to an external API made by a ServiceHub integration.
      requestBody:
        $ref: '#/components/requestBodies/IntegrationProxyBody'
      responses:
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
        2XX:
          description: 2XX response code returned from the proxied API
          headers:
            x-service-hub-integration-proxy:
              schema:
                type: boolean
                description: >-
                  Set to 'true' to indicate that the response was in fact
                  proxied from the upstream.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        3XX:
          description: 3XX response code returned from the proxied API
          headers:
            x-service-hub-integration-proxy:
              schema:
                type: boolean
                description: >-
                  Set to 'true' to indicate that the response was in fact
                  proxied from the upstream.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        4XX:
          description: 4XX response code returned from the proxied API
          headers:
            x-service-hub-integration-proxy:
              schema:
                type: boolean
                description: >-
                  Set to 'true' to indicate that the response was in fact
                  proxied from the upstream.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        5XX:
          description: 5XX response code returned from the proxied API
          headers:
            x-service-hub-integration-proxy:
              schema:
                type: boolean
                description: >-
                  Set to 'true' to indicate that the response was in fact
                  proxied from the upstream.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
      tags:
        - Integrations
  /discovery/discovered-entities:
    get:
      summary: List Discovered Entities
      operationId: list-discovered-entities
      description: |
        Returns a paginated collection of discovered entities.
      responses:
        '200':
          $ref: '#/components/responses/ListDiscoveredEntitiesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/Internal'
      parameters:
        - $ref: '#/components/parameters/CursorPage'
