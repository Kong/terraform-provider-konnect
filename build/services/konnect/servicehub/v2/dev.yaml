            Contains pagination query parameters and the total number of objects
            returned.
          additionalProperties: false
          required:
            - number
            - size
          properties:
            number:
              type: integer
              example: 2
              description: Specifies the number of objects returned per page.
            size:
              type: integer
              example: 10
              maximum: 100
              description: Specifies the requested size of the page.
            total:
              type: integer
              maximum: 1000
              example: 100
              description: Integer representation of the amount of items returned.
    CursorPaginatedMeta:
      type: object
      title: CursorPaginatedMeta
      description: >-
        Contains cursor pagination metadata pertaining to the associated
        collection.
      additionalProperties: false
      required:
        - page
      properties:
        page:
          type: object
          description: Contains cursor pagination links and metadata.
          additionalProperties: false
          required:
            - size
            - first
            - next
            - previous
          properties:
            size:
              type: integer
              example: 10
              maximum: 100
              description: Specifies the requested size of the page.
            first:
              type: string
              nullable: true
              description: Relative URI link to the first page of data
              example: /v2/services
            next:
              type: string
              nullable: true
              description: Relative URI link to the next page of data
              example: /v2/services?after=ewogICJpZCI6ICJoZWxsbyB3b3JsZCIKfQ
            previous:
              type: string
              nullable: true
              description: Relative URI link to the previous page of data
              example: /v2/services?before=ewogICJpZCI6ICJoZWxsbyB3b3JsZCIKfQ
    LimitOffsetPageParameters:
      title: LimitOffsetPageParameters
      type: object
      additionalProperties: false
      properties:
        size:
          description: The number of items included per page.
          type: integer
          example: 10
        number:
          description: The specific page number of the collection results.
          type: integer
          example: 2
    CursorPageParameters:
      title: CursorPageParameters
      type: object
      additionalProperties: false
      properties:
        size:
          type: integer
          description: The number of items included per page.
          example: 10
        after:
          type: string
          description: >-
            Cursor param specifying the page (i.e. the next page) of data
            returned.
          example: ewogICJpZCI6ICJoZWxsbyB3b3JsZCIKfQ
        before:
          type: string
          description: >-
            Cursor param specifying the page (i.e. the previous page) of data
            returned.
          example: ewogICJpZCI6ICJoZWxsbyB3b3JsZCIKfQ
    ServiceHubSortQuery:
      title: SortQuery
      type: string
      example: name,created_at desc
      description: >
        The `asc` suffix is optional as the default sort order is ascending.

        The `desc` suffix is used to specify a descending order.

        Multiple sort attributes may be provided via a comma separated list.

        JSONPath notation may be used to specify a sub-attribute (eg: 'foo.bar
        desc').
    StringFieldFilter:
      title: StringFieldFilter
      description: Filters on the given string field value by either exact or fuzzy match.
      oneOf:
        - $ref: '#/components/schemas/StringFieldEqualsFilter'
        - $ref: '#/components/schemas/StringFieldContainsFilter'
        - $ref: '#/components/schemas/StringFieldOContainsFilter'
        - $ref: '#/components/schemas/StringFieldOEQFilter'
        - $ref: '#/components/schemas/StringFieldNEQFilter'
      x-examples:
        example-1: equals-some-value
        example-2:
          eq: some-value
        example-3:
          contains: some-value
    StringFieldEqualsFilter:
      title: StringFieldEqualsFilter
      description: Filters on the given string field value by exact match.
      oneOf:
        - type: string
        - type: object
          title: StringFieldEqualsComparison
          additionalProperties: false
          properties:
            eq:
              type: string
          required:
            - eq
      x-examples:
        example-1: equals-some-value
        example-2:
          eq: some-value
    StringFieldContainsFilter:
      title: StringFieldContainsFilter
      description: Filters on the given string field value by fuzzy match.
      type: object
      additionalProperties: false
      properties:
        contains:
          type: string
      required:
        - contains
      x-examples:
        example-1:
          contains: some-value
    StringFieldOContainsFilter:
      title: StringFieldOContainsFilter
      description: Filters on the union of given string values by fuzzy match.
      type: object
      additionalProperties: false
      properties:
        ocontains:
          type: string
      required:
        - ocontains
      x-examples:
        example-1:
          ocontains: dev,prod
    StringFieldOEQFilter:
      title: StringFieldOEQFilter
      description: Filters on the given comma separated string by one or more exact match.
      type: object
      additionalProperties: false
      properties:
        oeq:
          type: string
      required:
        - oeq
      x-examples:
        example-1:
          oeq: some-value,some-other-value
    StringFieldNEQFilter:
      title: StringFieldNEQFilter
      description: Filters on the given string field value by exact match inequality.
      type: object
      additionalProperties: false
      properties:
        oeq:
          type: string
      required:
        - neq
      x-examples:
        example-1:
          oeq: not-this-value
    ServiceHubBooleanFieldFilter:
      title: BooleanFieldFilter
      description: Filter by a boolean value (true/false).
      type: boolean
      x-examples:
        example-1: true
    DateTimeFieldFilter:
      title: DateTimeFieldFilter
      description: Filters on the given datetime (RFC-3339) field value.
      oneOf:
        - type: string
          format: date-time
          description: Value strictly equals given RFC-3339 formatted timestamp in UTC
          example: '2022-03-30T07:20:50Z'
        - type: object
          title: DateTimeFieldEqualsFilter
          additionalProperties: false
          properties:
            eq:
              type: string
              format: date-time
              description: Value strictly equals given RFC-3339 formatted timestamp in UTC
              example: '2022-03-30T07:20:50Z'
          required:
            - eq
        - type: object
          title: DateTimeFieldLTFilter
          additionalProperties: false
          properties:
            lt:
              type: string
              format: date-time
              description: Value is less than the given RFC-3339 formatted timestamp in UTC
              example: '2022-03-30T07:20:50Z'
          required:
            - lt
        - type: object
          title: DateTimeFieldLTEFilter
          additionalProperties: false
          properties:
            lte:
              type: string
              format: date-time
              description: >-
                Value is less than or equal to the given RFC-3339 formatted
                timestamp in UTC
              example: '2022-03-30T07:20:50Z'
          required:
            - lte
        - type: object
          title: DateTimeFieldGTFilter
          additionalProperties: false
          properties:
            lt:
              type: string
              format: date-time
              description: >-
                Value is greater than the given RFC-3339 formatted timestamp in
                UTC
              example: '2022-03-30T07:20:50Z'
          required:
            - gt
        - type: object
          title: DateTimeFieldGTEFilter
          additionalProperties: false
          properties:
            lte:
              type: string
              format: date-time
              description: >-
                Value is greater than or equal to the given RFC-3339 formatted
                timestamp in UTC
              example: '2022-03-30T07:20:50Z'
          required:
            - gte
      x-examples:
        datetime_field_1: '2022-03-30T07:20:50Z'
        datetime_field_2:
          eq: '2022-03-30T07:20:50Z'
        datetime_field_3:
          lt: '2022-03-30T07:20:50Z'
        datetime_field_4:
          lte: '2022-03-30T07:20:50Z'
        datetime_field_5:
          gt: '2022-03-30T07:20:50Z'
        datetime_field_6:
          gte: '2022-03-30T07:20:50Z'
