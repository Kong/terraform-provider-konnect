components:
  parameters:
    LimitOffsetPage:
      name: page
      description: Determines which page of the collection to retrieve.
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/LimitOffsetPageParameters'
    CursorPage:
      name: page
      description: Determines which page of the collection to retrieve.
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/CursorPageParameters'
    ServiceFilter:
      name: filter
      description: Filters a collection of services.
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/ServiceFilterParameters'
      style: deepObject
    ServiceSort:
      name: sort
      description: |
        Sorts a collection of services. Supported sort attributes are:
          - name
          - created_at
          - updated_at
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/ServiceHubSortQuery'
    AddonFilter:
      name: filter
      description: Filters a collection of ServiceHub addons.
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/AddonFilterParameters'
      style: deepObject
    AddonSort:
      name: sort
      description: |
        Sorts a collection of ServiceHub addons. Supported sort attributes are:
          - name
          - display_name
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/SortQuery'
    InstalledIntegrationFilter:
      name: filter
      description: Filters a collection of installed ServiceHub integrations.
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/InstalledIntegrationFilterParameters'
      style: deepObject
    InstalledIntegrationSort:
      name: sort
      description: >
        Sorts a collection of installed ServiceHub integrations. Supported sort
        attributes are:
          - name
          - enabled
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/ServiceHubSortQuery'
    ServiceIntegrationFilter:
      name: filter
      description: Filters a collection of ServiceHub integrations associated to a service.
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/ServiceIntegrationFilterParameters'
      style: deepObject
    ServiceIntegrationSort:
      name: sort
      description: >
        Sorts a collection of ServiceHub integrations associated to a service.
        Supported sort attributes are:
          - name
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/ServiceHubSortQuery'
    MetadataSchemaFilter:
      name: filter
      description: Filters a collection of metadata schemas.
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/MetadataSchemaFilterParameters'
      style: deepObject
    MetadataSchemaSort:
      name: sort
      description: |
        Sorts a collection of metadata schemas. Supported sort attributes are:
          - created_at
          - updated_at
          - name
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/ServiceHubSortQuery'
    DiscoveredEntityFilter:
      name: filter
      description: Filters a collection of discovered entities.
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/DiscoveredEntityFilterParameters'
      style: deepObject
    DiscoveredEntitySort:
      name: sort
      description: >
        Sorts a collection of discovered entities. Supported sort attributes
        are:
          - integration
          - created_at
          - updated_at
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/ServiceHubSortQuery'
    DiscoveryActionFilter:
      name: filter
      description: Filters a collection of discovery actions.
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/DiscoveryActionFilterParameters'
      style: deepObject
    DiscoveryActonSort:
      name: sort
      description: |
        Sorts a collection of discovery actions. Supported sort attributes are:
          - created_at
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/ServiceHubSortQuery'
    DiscoverySuggestionRuleFilter:
      name: filter
      description: Filters a collection of discovery suggestion rules.
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/DiscoverySuggestionRuleFilterParameters'
      style: deepObject
    SuggestedDiscoveryActionFilter:
      name: filter
      description: Filters a collection of suggested discovery actions.
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/SuggestedDiscoveryActionFilterParameters'
      style: deepObject
    SuggestedDiscoveryActionSort:
      name: sort
      description: >
        Sorts a collection of suggested discovery actions. Supported sort
        attributes are:
          - created_at
          - updated_at
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/ServiceHubSortQuery'
    PageSize:
      name: page[size]
      description: >-
        The maximum number of items to include per page. The last page of a
        collection may include fewer items.
      required: false
      in: query
      allowEmptyValue: true
      schema:
        type: integer
        example: 10
    PageNumber:
      name: page[number]
      description: Determines which page of the entities to retrieve.
      required: false
      in: query
      allowEmptyValue: true
      schema:
        type: integer
        example: 1
  requestBodies:
    CreateServiceBody:
      description: Request body schema for creating a service.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreateService'
    UpdateServiceBody:
