            required:
              - data
            properties:
              data:
                type: array
                items:
                  $ref: '#/components/schemas/UpsertDiscoveredEntity'
    CreateDiscoveryActionBody:
      description: Request body schema for creating a service discovery action.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreateDiscoveryActionPayload'
    ScheduleDiscoveryIngestionBody:
      description: Request body schema for scheduling a discovery ingestion job.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ScheduleDiscoveryIngestionPayload'
    IntegrationProxyBody:
      description: Request body schema for an integration proxy request.
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            properties:
              method:
                type: string
                enum:
                  - DELETE
                  - GET
                  - PATCH
                  - POST
                  - PUT
                description: The HTTP request method.
                example: GET
                writeOnly: true
              base_url:
                type: string
                format: uri
                description: >-
                  The base URL of the proxied API as defined in the integration
                  manifest.
                example: https://api.pagerduty.com
                writeOnly: true
              path:
                type: string
                description: >-
                  The URL path of the proxied API request as defined in the
                  integration manifest.
                example: /incidents
                writeOnly: true
              body:
                type: object
                additionalProperties: true
                description: >-
                  JSON object representing the request body that will be sent to
                  the proxied API.
                example:
                  name: Foo
              query:
                type: object
                additionalProperties: true
                description: >-
                  JSON object representing the query parameters that will be
                  sent to the proxied API.
                example:
                  limit: 5
                  offset: 10
              headers:
                type: object
                additionalProperties: true
                description: >-
                  JSON object representing the request headers that will be sent
                  to the proxied API.
                example:
                  content-type: application/json
            required:
              - method
              - base_url
              - path
