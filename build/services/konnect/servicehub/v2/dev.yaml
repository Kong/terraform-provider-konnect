      description: Request body schema for installing a ServiceHub integration.
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            properties:
              enabled:
                type: boolean
                description: Whether the integration is enabled
                example: true
              config:
                $ref: '#/components/schemas/InstalledIntegrationConfig'
            required:
              - enabled
    UpdateInstalledIntegrationBody:
      description: Request body schema for updating an installed ServiceHub integration.
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            properties:
