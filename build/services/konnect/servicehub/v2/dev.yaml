  schemas:
    ServiceHubService:
      title: Service
      description: The service object contains information about a ServiceHub service.
      allOf:
        - type: object
          properties:
            id:
              type: string
              format: uuid
              example: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
              description: The service ID.
              readOnly: true
            name:
              type: string
              description: The name of the Service.
              minLength: 1
              maxLength: 120
              pattern: ^[0-9a-z.-]+$
              example: user-svc
            description:
              type: string
              description: The description of the Service.
              nullable: true
              maxLength: 2048
            display_name:
              type: string
              description: The display name of the Service.
              minLength: 1
              maxLength: 120
              example: User Service
            labels:
              $ref: '#/components/schemas/Labels'
            integrations:
              description: An array of ServiceHub integrations associated to the service.
              items:
                $ref: '#/components/schemas/ServiceIntegration'
              readOnly: true
            metadata:
              $ref: '#/components/schemas/Metadata'
          required:
            - id
            - name
            - description
            - display_name
            - labels
            - integrations
            - metadata
        - $ref: '#/components/schemas/EntityTimeFields'
    CreateService:
      type: object
      description: The DTO for create a Servicehub service.
      additionalProperties: false
      properties:
        name:
          type: string
          description: The name of the Service.
          minLength: 1
          maxLength: 120
          pattern: ^[0-9a-z.-]+$
          example: user-svc
        description:
          type: string
          description: The description of the Service.
          nullable: true
          maxLength: 2048
        display_name:
          type: string
          description: The display name of the Service.
          minLength: 1
          maxLength: 120
          example: User Service
        labels:
          $ref: '#/components/schemas/Labels'
        metadata:
          $ref: '#/components/schemas/Metadata'
      required:
        - name
        - display_name
    UpdateService:
      type: object
      description: The DTO for update a Servicehub service.
      additionalProperties: false
      properties:
        name:
          type: string
          description: The name of the Service.
          minLength: 1
          maxLength: 120
          pattern: ^[0-9a-z.-]+$
          example: user-svc
          writeOnly: true
        description:
          type: string
          description: The description of the Service.
          nullable: true
          maxLength: 2048
        display_name:
          type: string
          description: The display name of the Service.
          minLength: 1
          maxLength: 120
          example: User Service
          writeOnly: true
        labels:
          $ref: '#/components/schemas/LabelsPatch'
        metadata:
          $ref: '#/components/schemas/Metadata'
    DocumentContentTypeEnum:
      type: string
      default: application/json
      enum:
        - application/json
        - application/vnd.konnect.document-tree+json
    DocumentFormatContentTypeEnum:
      type: string
      default: application/json
      enum:
        - application/json
        - application/vnd.konnect.document-nodes+json
    CreateDocument:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
          description: document title
          example: How to create a document in Service Hub.
        parent_document_id:
          type: string
          format: uuid
          description: parent document id
          example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
        slug:
          $ref: '#/components/schemas/Slug'
        status:
          $ref: '#/components/schemas/PublishStatus'
        raw_content:
          type: string
          format: byte
          description: base64 encoded string of the document content
          example: YmFzZTY0LWVuY29kZWQgdGV4dCBzdHJpbmc=
        metadata:
          type: object
          nullable: true
          description: metadata of the document
          example:
            author: John Doe
        filename:
          type: string
          description: name of the uploaded file
          example: my_doc.md
      required:
        - title
        - slug
        - raw_content
        - filename
    Document:
      title: Document
      description: The document object contains information about a Service's document.
      allOf:
        - type: object
          properties:
            id:
              type: string
              format: uuid
              example: 6c1118d3-0fe3-4695-ae55-84d6ea020916
              description: The document ID.
            parent_document_id:
              type: string
              format: uuid
              example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
              description: The ID of the parent document.
              nullable: true
            slug:
              $ref: '#/components/schemas/Slug'
            status:
              $ref: '#/components/schemas/PublishStatus'
            revision:
              allOf:
                - $ref: '#/components/schemas/Revision'
          required:
            - id
            - parent_document_id
            - slug
            - revision
            - status
        - $ref: '#/components/schemas/EntityTimeFields'
    DocumentItem:
      type: object
      title: Document item schema, used in list response
      allOf:
        - type: object
          properties:
            id:
              type: string
              format: uuid
              description: the id of the document
              example: d32d905a-ed33-46a3-a093-d8f536af9a8a
            parent_document_id:
              type: string
              format: uuid
              description: the id of the parent document
              nullable: true
              example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
            slug:
              type: string
              description: the slug of the document
              example: getting-started
            title:
              type: string
              description: the title of the document
              example: Getting Started
            filename:
              type: string
              example: my_doc.md
          required:
            - id
            - parent_document_id
            - slug
            - title
            - filename
        - $ref: '#/components/schemas/EntityTimeFields'
    DocumentTree:
      type: object
      title: DocumentTree
      description: Document tree schema used in list documents response
      allOf:
        - type: object
          properties:
            id:
              type: string
              format: uuid
              example: 6c1118d3-0fe3-4695-ae55-84d6ea020916
              description: The document ID.
            parent_document_id:
              type: string
              format: uuid
              example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
              description: The ID of the parent document.
              nullable: true
            slug:
              $ref: '#/components/schemas/Slug'
            title:
              type: string
              description: document title
              example: How to create a document in Service Hub.
            filename:
              type: string
              description: The name of the uploaded file
              example: my_doc.md
            metadata:
              type: object
              description: Contains key value pairs information about document's metadata.
              example:
                author: John Doe
            children:
              type: array
              description: children of the document
              items:
                $ref: '#/components/schemas/DocumentTree'
              example:
                - id: d32d905a-ed33-46a3-a093-d8f536af9a8a
                  title: Hello world
                  status: published
                  slug: hello-world
                  metadata:
                    author: John Doe
                  children: []
          required:
            - id
            - title
            - slug
            - filename
            - metadata
            - children
        - $ref: '#/components/schemas/EntityTimeFields'
    Revision:
      title: Revision
      description: The revision of a document.
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 6c1118d3-0fe3-4695-ae55-84d6ea020916
          description: The revision ID.
        document_id:
          type: string
          format: uuid
          example: 6c1118d3-0fe3-4695-ae55-84d6ea020916
          description: The document ID.
        content:
          $ref: '#/components/schemas/ServicehubDocumentBlock'
        metadata:
          type: object
          description: Contains key value pairs information about document's metadata.
          example:
            author: John Doe
        title:
          type: string
          description: document title
          example: How to create a document in Service Hub.
        raw_md_content:
          type: string
          format: byte
          description: raw markdown content
          example: I0ludHJvZHVjdGlvbg==
        file:
          description: file of the revision
          type: object
          required:
            - filename
            - modified_at
          properties:
            filename:
              type: string
              example: my_doc.md
            modified_at:
              type: string
              format: date-time
              example: '2023-01-11T02:30:42.227Z'
      required:
        - content
        - document_id
        - id
        - metadata
        - title
        - file
    DocumentRaw:
      type: object
      title: Document
      description: Represents a limited subset of the Document
      required:
        - id
        - slug
        - revision
      properties:
        id:
          type: string
          format: uuid
          description: the id of the document
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        parent_document_id:
          type: string
          format: uuid
          description: the id of the parent document
          nullable: true
          example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
        slug:
          type: string
          description: the slug of the document
          example: getting-started
        revision:
          $ref: '#/components/schemas/RevisionRaw'
    RevisionRaw:
      type: object
      title: Revision
      description: represents a subset of the revision of a document
      required:
        - id
        - document_id
        - content
        - metadata
        - title
      properties:
        id:
          type: string
          format: uuid
          description: the id of the revision
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        document_id:
          type: string
          format: uuid
          description: the id of the document
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        content:
          type: string
          description: Markdown document
        metadata:
          type: object
          description: the metadata of the document
          example:
            title: Hello World
            description: This is a description
            keywords: hello, world
        title:
          type: string
          description: the title of the document
          example: Hello World
    MoveDocument:
      type: object
      title: MoveDocumentPayload
      properties:
        parent_document_id:
          type: string
          format: uuid
          description: >
            Represents the document's parent document Id. If this field is not
            provided,

            the document will be placed at the top level of the document tree.
          example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
        index:
          type: integer
          description: >
            Represents a zero-indexed document order relative to its siblings
            under the same parent.

            For example, if we want to put the document at top level in first
            position we would send empty parent_document_id and index: 0.

            This api also supports using a negative index to count backwards
            from the end of the document list,

            which means you can put the document in last position by using
            index: -1.
          example: 1
    UpdateDocument:
      type: object
      title: UpdateDocumentPayload
      properties:
        parent_document_id:
          type: string
          format: uuid
          nullable: true
          description: >-
            Parent document Id. If this value is explicitly set to null, the
            document will be put as a top level document at the bottom of the
            tree.
          example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
        slug:
          $ref: '#/components/schemas/Slug'
        status:
          $ref: '#/components/schemas/PublishStatus'
        title:
          type: string
          description: document title
          example: How to update a document in Konnect DocumentHub
        raw_content:
          type: string
          format: byte
          description: base64 encoded string of the document content
          example: YmFzZTY0LWVuY29kZWQgdGV4dCBzdHJpbmc=
        filename:
          type: string
          description: name of the uploaded file
          example: my_doc.md
        metadata:
          type: object
          nullable: true
          description: metadata of the document
          example:
            author: John Doe
    ServiceIntegration:
      title: ServiceIntegration
      description: >-
        Contains information about how the integration is associated to the
        given service.
      allOf:
        - type: object
          properties:
            id:
              type: string
              format: uuid
              example: 6c1118d3-0fe3-4695-ae55-84d6ea020916
              description: The service integration ID.
              readOnly: true
            name:
              type: string
              description: The integration name.
              maxLength: 120
              example: pagerduty
              readOnly: true
            service_id:
              type: string
              format: uuid
              example: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
              description: The service ID.
              readOnly: true
            binding:
              type: string
              example: pagerduty_service
              description: The integration binding object name
              readOnly: true
            data:
              type: object
              description: >-
                JSON object containing the data which binds the integration to
                the service.
              additionalProperties: true
              example:
                id: c27a371e-6d49-4395-b822-78a37053e7b
            labels:
              $ref: '#/components/schemas/Labels'
          required:
            - id
            - name
            - service_id
            - binding
            - data
            - labels
        - $ref: '#/components/schemas/EntityTimeFields'
    UpsertServiceIntegration:
      type: object
      additionalProperties: false
      properties:
        binding:
          type: string
          description: The integration binding object name.
          writeOnly: true
          example: pagerduty_service
        data:
          type: object
          description: >-
            JSON object containing the data which binds the integration to the
            service.
          additionalProperties: true
          writeOnly: true
          example:
            id: c27a371e-6d49-4395-b822-78a37053e7b
        labels:
          $ref: '#/components/schemas/Labels'
      required:
        - binding
        - data
        - labels
    InstalledIntegration:
      title: InstalledIntegration
      description: >-
        The integration object contains information about an installed
        ServiceHub integration.
      allOf:
        - type: object
          properties:
            id:
              type: string
              format: uuid
              example: 747368bc-d836-45e6-b855-ab9a3defb3c1
              description: The installed integration ID.
              readOnly: true
            name:
              type: string
              description: The integration name.
              maxLength: 120
              example: gateway-manager
              readOnly: true
            enabled:
              type: boolean
              description: Whether the integration is enabled.
              example: true
            config:
              $ref: '#/components/schemas/InstalledIntegrationConfig'
          required:
            - id
            - name
            - enabled
            - config
        - $ref: '#/components/schemas/EntityTimeFields'
    InstalledIntegrationAuthCredential:
      title: InstalledIntegrationAuthCredential
      description: >-
        Object containing contextual information an installed integration auth
        credential.
      allOf:
        - type: object
          required:
            - id
            - type
            - expires_at
          properties:
            id:
              type: string
              format: uuid
              description: The ID of the credential.
              example: 95e4f10a-bf10-4724-9378-c3591ad8c6ed
            type:
              type: string
              description: The authorization type corresponding to the credential
              enum:
                - oauth
                - github_app_installation
            expires_at:
              type: string
              format: date-time
              nullable: true
              example: '2024-03-30T07:20:50Z'
              description: >
                Timestamp denoting when the when the rolling refresh window will
                expire.

                A null value indicates no known expiration time.

                RFC-3339 format is used with a "T" character separating date
                from time within the field value.
        - $ref: '#/components/schemas/ServiceHubCreatedAt'
    CreateInstalledIntegrationAuthCredential:
      title: CreateInstalledIntegrationAuthCredential
      description: >-
        Object containing the data required to create an installed integration
        auth credential.
      oneOf:
        - type: object
          title: CreateOAuthCredential
          required:
            - type
            - parameters
          additionalProperties: false
          properties:
            type:
              type: string
              enum:
                - oauth
              description: The authorization type corresponding to the credential
            parameters:
              type: object
              required:
                - grant_type
                - code
                - redirect_uri
              additionalProperties: false
              properties:
                grant_type:
                  type: string
                  enum:
                    - authorization_code
                code:
                  type: string
                  description: >-
                    The authorization code used to exchange for an access token
                    with the identity server.
                  example: Yzk5ZDczMzRlNDEwY
                redirect_uri:
                  type: string
                  format: uri
                  description: >
                    The redirect URI submitted to the authorization server
                    during the authentication request

                    to retrieve the authorization code.
                  example: >-
                    https://cloud.konghq.com/us/servicehub/integrations/pagerduty/oauth
        - type: object
          title: CreateGitHubAppCredential
          required:
            - type
            - parameters
          additionalProperties: false
          properties:
            type:
              type: string
              enum:
                - github_app_installation
              description: The authorization type corresponding to the credential
            parameters:
              type: object
              required:
                - installation_id
                - code
              additionalProperties: false
              properties:
                installation_id:
                  type: string
                  description: The GitHub App installation ID.
                  example: '46952218'
                code:
                  type: string
                  description: >-
                    The authorization code used to exchange for a user-scoped
                    access token.
                  example: Yzk5ZDczMzRlNDEwY
    ServiceDiscoverySettings:
      title: ServiceDiscoverySettings
      description: >-
        Contains information about the service discovery settings for an
        integration.
      allOf:
        - type: object
          properties:
            integration:
              type: string
              description: The integration name.
              maxLength: 120
              example: pagerduty
              readOnly: true
            enabled:
              type: boolean
              description: Whether discovery is enabled for the integration.
              example: true
          required:
            - integration
            - enabled
        - $ref: '#/components/schemas/EntityTimeFields'
    SuggestionRuleBase:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          description: The display name of the suggestion rule
          minLength: 1
          maxLength: 120
        description:
          type: string
          nullable: true
          default: null
          minLength: 1
          maxLength: 2048
          description: The description of the suggestion rule
          example: Suggestion rule description
        binding:
          type: string
          description: The integration binding object name
          example: pagerduty_service
        active:
          type: boolean
          description: >-
            Determines if this suggestion rule should be evaluated when
            generating suggested actions.
        auto_accept:
          type: boolean
          description: >
            Determines if the suggested action should be applied automatically.

            - `true`: Suggested action will be applied automatically

            - `false`: Suggested action will not be automatically applied, user
            input required
        discovery_selector:
          type: string
          description: >
            A boolean string or JQ expression that must evaluate to a boolean
            value.

            Supports JQ expressions syntax on discovered entity's
            `integration_record` property.
          maxLength: 2048
          example: .gateway_service.tags | contains(["_KonnectDeployment:"])
        action:
          $ref: '#/components/schemas/SuggestedRuleAction'
        rank:
          oneOf:
            - $ref: '#/components/schemas/RankAfterPayload'
            - $ref: '#/components/schemas/RankBeforePayload'
    SuggestionRulePayload:
      title: SuggestionRulePayload
      description: Payload to create a suggestion rule for an integration.
      allOf:
        - type: object
          required:
            - name
            - binding
            - active
            - auto_accept
            - action
            - discovery_selector
        - $ref: '#/components/schemas/SuggestionRuleBase'
    SystemSuggestionRule:
      title: SystemSuggestionRule
      description: Contains information about the system defined suggestion rule.
      allOf:
        - type: object
          required:
            - id
            - name
            - description
            - binding
            - active
            - auto_accept
            - action
            - discovery_selector
          properties:
            id:
              type: string
              format: uuid
              example: 22f72bd1-2897-473e-9471-302de3ccf38b
              description: The suggestion rule ID.
              readOnly: true
            name:
              type: string
              description: The display name of the suggestion rule.
              minLength: 1
              maxLength: 120
            description:
              type: string
              nullable: true
              default: null
              minLength: 1
              maxLength: 2048
              description: The description of the suggestion rule
              example: Suggestion rule description
            binding:
              type: string
              description: The integration binding object name
              example: pagerduty_service
            active:
              type: boolean
              description: >-
                Determines if this suggestion rule should be evaluated when
                generating suggested actions.
            auto_accept:
              type: boolean
              description: >
                Determines if the suggested action should be applied
                automatically.

                - `true`: Suggested action will be applied automatically

                - `false`: Suggested action will not be automatically applied,
                user input required
            discovery_selector:
              type: string
              description: >
                A boolean string or JQ expression that must evaluate to a
                boolean value.

                Supports JQ expressions syntax on discovered entity's
                `integration_record` property.
              example: .gateway_service.tags | contains(["_KonnectDeployment:"])
            action:
              $ref: '#/components/schemas/SuggestedRuleAction'
    SuggestionRule:
      title: SuggestionRule
      description: Contains information about the suggestion rule.
      allOf:
        - $ref: '#/components/schemas/SystemSuggestionRule'
        - $ref: '#/components/schemas/EntityTimeFields'
    TestSuggestionRulePayload:
      title: TestSuggestionRulePayload
      description: >-
        Payload to test suggestion rule configuration against an integration
        record.
      type: object
      additionalProperties: false
      required:
        - binding
        - discovery_selector
        - action
        - integration_record
      properties:
        binding:
          type: string
          description: The integration binding object name
          example: pagerduty_service
        discovery_selector:
          type: string
          description: >
            A boolean string or JQ expression that must evaluate to a boolean
            value.

            Supports JQ expressions syntax on discovered entity's
            `integration_record` property.
          maxLength: 2048
          example: .gateway_service.tags | contains(["_KonnectDeployment:"])
        action:
          $ref: '#/components/schemas/SuggestedRuleAction'
        integration_record:
          type: object
          description: JSON object that may contain additional context about the entity.
          additionalProperties: true
          example:
            control_plane:
              id: 0a7647d1-483a-4817-a5ac-28937b511563
              name: control_plane_name
            gateway_service:
              id: 3fd1bff6-b60d-4c22-bb74-e4cac63196fb
              name: gateway_service_name
    TestSuggestionRule:
      title: TestSuggestionRule
      description: >-
        Contains evaluation results of a suggestion rule configuration against
        an integration record.
      type: object
      additionalProperties: false
      required:
        - evaluation
        - errors
      properties:
        evaluation:
          description: >-
            Evaluation result of suggesetion rule configuration against given
            integration record.
          type: object
          additionalProperties: false
          required:
            - matched
            - action
            - service_id
          properties:
            matched:
              description: >-
                Represents if the suggestion rule configuration matches the
                given integration record.
              type: boolean
            service_id:
              description: >-
                The identifier of a service the suggesiton rule configuration
                matches with the given integration record.
              type: string
              format: uuid
              nullable: true
              example: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
            action:
              $ref: '#/components/schemas/SuggestedRuleAction'
        errors:
          description: >-
            List of errors that occured when evaluating suggestion rule
            configuration against given integration record.
          type: array
          items:
            $ref: '#/components/schemas/SuggestionRuleError'
    UpdateSuggestedDiscoveryAction:
      title: UpdateSuggestedDiscoveryAction
      description: Payload to update a suggested discovery action.
      type: object
      additionalProperties: false
      required:
        - ignored
      properties:
        ignored:
          description: |
            Determines if this suggested action has been ignored or not.
            - `true`: Suggested action has been ignored
            - `false`: Suggested action is ready to be accepted or ignored
          type: boolean
          example: false
    SuggestedDiscoveryActionObject:
      title: SuggestedDiscoveryAction
      description: Contains information about a suggested discovery action
      allOf:
        - type: object
          required:
            - id
            - integration
            - suggestion_rule_id
            - discovered_entity_id
            - entity_name
            - scope
            - service_id
            - action
            - ignored
          properties:
            id:
              description: The suggested discovery action rule ID.
              type: string
              format: uuid
              example: 76ca0689-f08e-4c04-b2a6-4c992d89d554
            integration:
              description: >-
                The machine name of the integration that this suggested
                discovery action may apply to.
              type: string
              example: gateway-manager
            suggestion_rule_id:
              description: >-
                The identifier of the suggestion rule that generated this
                suggested discovery action.
              type: string
              format: uuid
              nullable: true
              example: 22f72bd1-2897-473e-9471-302de3ccf38b
            discovered_entity_id:
              description: >-
                The identifier of the discovered entity this suggested discovery
                action may act on.
              type: string
              format: uuid
              example: 287ead32-a7da-4f2e-89cb-802ae6208f18
            entity_name:
              type: string
              description: >-
                The entity name of the discovered entity associated to this
                suggested action.
              example: My Service
            scope:
              type: string
              enum:
                - service
              description: >
                The scope of the discovered entity associated to this suggested
                action.
                  - "service" scope indicates the discovered entity is for a service integration.
              example: service
            service_id:
              description: >-
                The identifier of the service this suggested discovery action
                may act on.
              type: string
              format: uuid
              nullable: true
              example: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
            ignored:
              description: |
                Determines if this suggested action has been ignored or not.
                - `true`: Suggested action has been ignored
                - `false`: Suggested action is ready to be accepted or ignored
              type: boolean
              example: false
            action:
              $ref: '#/components/schemas/SuggestedDiscoveryAction'
        - $ref: '#/components/schemas/EntityTimeFields'
    CreateDiscoveryActionPayload:
      type: object
      additionalProperties: false
      required:
        - discovered_entity_id
        - action
      properties:
        discovered_entity_id:
          description: >-
            The identifier of the discovered entity associated to this discovery
            action.
          type: string
          format: uuid
          example: 287ead32-a7da-4f2e-89cb-802ae6208f18
        action:
          oneOf:
            - $ref: '#/components/schemas/CreateAndMapServiceActionPayload'
            - $ref: '#/components/schemas/IgnoreActionPayload'
            - $ref: '#/components/schemas/RestoreActionPayload'
            - $ref: '#/components/schemas/MapServiceAction'
    DiscoveryActionObject:
      title: DiscoveryAction
      description: Contains information about a discovery action
      type: object
      additionalProperties: false
      required:
        - id
        - discovered_entity_id
        - entity_name
        - action
        - user_id
        - cause
        - integration
        - outputs
        - created_at
      properties:
        id:
          description: The discovery action ID.
          type: string
          format: uuid
          example: 76ca0689-f08e-4c04-b2a6-4c992d89d554
        discovered_entity_id:
          description: The identifier of the discovered entity associated to this action.
          type: string
          format: uuid
          example: 287ead32-a7da-4f2e-89cb-802ae6208f18
        entity_name:
          type: string
          description: The entity name of the discovered entity associated to this action.
          example: My Service
        action:
          $ref: '#/components/schemas/DiscoveryAction'
        user_id:
          type: string
          nullable: true
          format: uuid
          example: 699f1021-4ed8-4f97-8ed3-779fba89d9c7
          description: >
            The identifer of the actor who applied this action.

            A `null` value indicates that this action was automatically
            performed based off rules set in the system.
        cause:
          type: string
          description: >
            Indicates the cause of the action.


            - `user-action`: A user took action directly.

            - `suggestion-rule`: Action was taken automatically based on a
            suggestion rule.

            - `currently-linked`: Action to ignore discovered entity was taken
            automatically because it is already linked to a service.

            - `system`: Action was taken automatically based on software
            defaults.
          enum:
            - user-action
            - suggestion-rule
            - system
        integration:
          type: string
          description: The integration name.
          example: gateway-manager
        outputs:
          $ref: '#/components/schemas/DiscoveryActionOutput'
        created_at:
          $ref: '#/components/schemas/ServiceHubCreatedAtProperties'
    UpsertDiscoveredEntity:
      title: UpsertDiscoveredEntity
      type: object
      additionalProperties: false
      required:
        - deduplication_id
        - entity_name
        - binding
        - data
        - integration_record
      properties:
        deduplication_id:
          type: string
          description: >-
            An identifier from the integration's external system to prevent
            duplicate suggestions.
          minLength: 1
          maxLength: 255
          example: PIJ90N7
        entity_name:
          type: string
          description: Name of the entity in the integration's external system.
          minLength: 1
          maxLength: 255
          example: My Service
        binding:
          type: string
          description: The integration binding object name
          minLength: 1
          maxLength: 120
          example: pagerduty_service
        data:
          type: object
          description: >-
            JSON object containing the data which binds the integration to a
            service.
          additionalProperties: true
          example:
            id: c27a371e-6d49-4395-b822-78a37053e7b
        integration_record:
          type: object
          description: Optional JSON object containing additional context about the entity.
          additionalProperties: true
          example:
            control_plane:
              id: 0a7647d1-483a-4817-a5ac-28937b511563
              name: control_plane_name
            gateway_service:
              id: 3fd1bff6-b60d-4c22-bb74-e4cac63196fb
              name: gateway_service_name
    DiscoveredEntity:
      title: DiscoveredEntity
      description: Contains information about a discovered entity.
      allOf:
        - type: object
          required:
            - id
            - integration
            - deduplication_id
            - entity_name
            - scope
            - binding
            - data
            - integration_record
            - suggestion_rule_evaluation_error
          properties:
            id:
              type: string
              format: uuid
              example: fa3db80f-b661-434e-bd7a-e6c561c3a15c
              description: The discovered entity ID.
            integration:
              type: string
              description: The integration name.
              minLength: 1
              maxLength: 120
              example: gateway-manager
            deduplication_id:
              type: string
              description: >-
                An identifier from the integration's external system to prevent
                duplicate suggestions.
              minLength: 1
              maxLength: 255
              example: 2f3adee0-3740-4962-a26b-2a75e550535c
            entity_name:
              type: string
              description: Name of the entity in the integration's external system.
              minLength: 1
              maxLength: 255
              example: My Service
            scope:
              type: string
              enum:
                - service
              description: |
                The scope of the discovered entity.
                  - "service" scope indicates the discovered entity is for a service integration.
              example: service
            binding:
              type: string
              example: pagerduty_service
              description: The integration binding object name
              minLength: 1
              maxLength: 120
            integration_record:
              type: object
              description: >-
                JSON object that may contain additional context about the
                entity.
              additionalProperties: true
              example:
                control_plane:
                  id: 0a7647d1-483a-4817-a5ac-28937b511563
                  name: control_plane_name
                gateway_service:
                  id: 3fd1bff6-b60d-4c22-bb74-e4cac63196fb
                  name: gateway_service_name
            data:
              type: object
              description: >-
                JSON object containing the data which binds the integration to a
                service.
              additionalProperties: true
              example:
                id: c27a371e-6d49-4395-b822-78a37053e7b
            suggestion_rule_evaluation_error:
              description: >-
                Respresents any errors which occured when evaluating suggestion
                rule configuration against this discovered entity.
              type: object
              nullable: true
              required:
                - suggestion_rule_id
                - details
              properties:
                suggestion_rule_id:
                  description: >
                    The id of the suggestion rule which generated an error when
                    evaluated on this discovered entity.
                  type: string
                  example: 3d8d1c3e-3884-4571-af2e-ad4ad89bc628
                details:
                  description: >
                    Details of the error generated from the related suggested
                    rule when evaluated on this discovered entity.
                  type: array
                  items:
                    $ref: '#/components/schemas/SuggestionRuleError'
        - $ref: '#/components/schemas/EntityTimeFields'
    DiscoveryIngestionStatus:
      title: DiscoveredEntity
      description: Contains the status of discovery ingestion for a given integration.
      type: object
      additionalProperties: false
      required:
        - last_scheduled
      properties:
        last_scheduled:
          type: string
          nullable: true
          format: date-time
          example: '2023-02-15T07:20:50Z'
          description: >
            The timestamp denoting when the last ingestion job was run.

            RFC-3339 format is used with a "T" character separating date from
            time within the field value.

            A `null` value denotes that ingestion for the given integration was
            never run.
    ScheduleDiscoveryIngestionPayload:
      type: object
      additionalProperties: false
      properties:
        ingest_from:
          type: string
          format: date-time
          example: '2023-02-15T07:20:50Z'
          description: >
            A timestamp indicating when to start ingestion from.

            RFC-3339 format is used with a "T" character separating date from
            time within the field value.

            Omitting this property indicates ingestion will be triggered from
            the beginning of time until the present.
    AddonManifest:
      type: object
      additionalProperties: false
      properties:
        built_in:
          type: boolean
          description: Respresenting the integration is a built-in addon.
          example: false
          readOnly: true
        name:
          type: string
          description: The addon name. Uniquely identifies the addon.
          maxLength: 120
          example: gateway-manager
          readOnly: true
        display_name:
          type: string
          description: The human-readable display name of the addon.
          minLength: 1
          maxLength: 120
          example: Gateway Manager
          readOnly: true
        description:
          type: string
          description: The text field describing the addon.
          minLength: 1
          maxLength: 2048
          readOnly: true
        version:
          type: string
          description: The addon version.
          example: v1
          readOnly: true
        authorization:
          $ref: '#/components/schemas/AddonAuthorization'
        config_schema:
          $ref: '#/components/schemas/AddonConfigSchema'
        bindings:
          $ref: '#/components/schemas/AddonBindings'
        discovery:
          $ref: '#/components/schemas/AddonDiscovery'
      required:
        - built_in
        - name
        - display_name
        - version
        - authorization
        - config_schema
        - bindings
        - discovery
    AddonAuthorization:
      title: AddonAuthorization
      description: Defines authorization for the addon.
      oneOf:
        - nullable: true
        - $ref: '#/components/schemas/OAuthAuth'
        - $ref: '#/components/schemas/GitHubAppInstallationAuth'
    OAuthAuth:
      type: object
      nullable: true
      additionalProperties: false
      required:
        - type
        - config
      properties:
        type:
          type: string
          enum:
            - oauth
        config:
          type: object
          additionalProperties: false
          required:
            - grant_type
            - client_id
            - authorization_endpoint
            - token_endpoint
            - scope
            - rolling_refresh_exp_seconds
          properties:
            grant_type:
              type: string
              enum:
                - authorization_code
            client_id:
              type: string
              example: d745213a-b7e8-4998-abe3-41f164001970
            authorization_endpoint:
              type: object
              additionalProperties: false
              required:
                - url
              properties:
                url:
                  type: string
                  format: uri
                  example: https://identity.some-service.com/oauth/authorize
            token_endpoint:
              type: object
              additionalProperties: false
              required:
                - url
              properties:
                url:
                  type: string
                  format: uri
                  example: https://identity.some-service.com/oauth/token
            scope:
              type: array
              items:
                type: string
              example:
                - read
                - write
            rolling_refresh_exp_seconds:
              type: number
              nullable: true
              description: >
                Number of seconds before the refresh token grant can no longer
                be used to mint

                a new access token. Once expired clients must re-authenticate to
                restart the

                window interval.
              example: 15780000
    GitHubAppInstallationAuth:
      type: object
      nullable: true
      additionalProperties: false
      required:
        - type
        - config
      properties:
        type:
          type: string
          enum:
            - github_app_installation
        config:
          type: object
          additionalProperties: false
          required:
            - app_install_url
            - authorize_app_installation_endpoint
          properties:
            app_install_url:
              type: object
              additionalProperties: false
              required:
                - url
              properties:
                url:
                  type: string
                  format: uri
                  example: >-
                    https://us.api.konghq.com/servicehub-addons/github/app/install
            authorize_app_installation_endpoint:
              type: object
              additionalProperties: false
              required:
                - url
              properties:
                url:
                  type: string
                  format: uri
                  example: >-
                    https://us.api.konghq.com/servicehub-addons/github/app/authorize-installation
    AddonConfigSchema:
      title: AddonConfigSchema
      description: The configuration schema for the addon.
      additionalProperties:
        oneOf:
          - $ref: '#/components/schemas/StringConfigFieldSchema'
          - $ref: '#/components/schemas/EnumConfigFieldSchema'
      example:
        base_url:
          type: string
          display_name: Base URL
          description: 'The customer''s base URL (ex: https://foo.some-service.com)'
          required: true
    StringConfigFieldSchema:
      title: StringConfigFieldSchema
      description: Schema for an addon config field representing a user-input string value.
      type: object
      additionalProperties: false
      required:
        - type
      properties:
        type:
          type: string
          description: The field type of config value.
          enum:
            - string
        default:
          type: string
          description: The default value for the config field.
        display_name:
          type: string
          description: >-
            Human-friendly name of the configuration field that is renderable by
            the UI.
        description:
          type: string
          description: Description of the configuration field that is renderable by the UI.
        required:
          type: boolean
          description: Whether the config field is a required value.
          default: false
      example:
        type: string
        display_name: Base URL
        description: 'The customer''s base URL (ex: https://foo.some-service.com)'
        required: true
    EnumConfigFieldSchema:
      title: EnumConfigFieldSchema
      description: Schema for an addon config field representing a selected enum value.
      type: object
      additionalProperties: false
      required:
        - type
        - choices
      properties:
        type:
          type: string
          description: The field type of config value.
          enum:
            - enum
        choices:
          type: array
          description: >-
            List of enumerated choices that can be selected as the config field
            value.
          items:
            type: object
            title: Option
            additionalProperties: false
            required:
              - value
            properties:
              value:
                type: string
                description: The value represented by this option.
              display_name:
                type: string
                description: >-
                  Human-friendly name of the option that is renderable by the
                  UI.
        default:
          type: string
          description: >-
            The default value for the config field. Must reference the value of
            an option listed in `choices`.
        display_name:
          type: string
          description: >-
            Human-friendly name of the configuration field that is renderable by
            the UI.
        description:
          type: string
          description: Description of the configuration field that is renderable by the UI.
        required:
          type: boolean
          description: Whether the config field is a required value.
          default: false
      example:
        type: enum
        display_name: Account Region
        description: The region of the customer's account
        required: true
        default: us
        choices:
          - value: us
            display_name: US
          - value: eu
            display_name: EU
    AddonBindings:
      title: AddonBindings
      description: >-
        Map of binding objects to represent how an addon resource links to a
        service.
      type: object
      default: {}
      additionalProperties:
        type: object
        properties:
          scope:
            type: string
            enum:
              - service
          schema_type:
            type: string
            enum:
              - simple
            default: simple
          schema:
            type: object
            additionalProperties:
              type: string
              enum:
                - string
                - number
                - boolean
        required:
          - scope
          - schema
      example:
        default:
          scope: service
          schema_type: simple
          schema:
            control_plane_id: string
            count: number
            enabled: boolean
        service_binding:
          scope: service
          schema_type: simple
          schema:
            service_id: string
    AddonDiscovery:
      title: AddonDiscovery
      description: Describes the discovery behavior of the addon.
      nullable: true
      type: object
      additionalProperties: false
      required:
        - enabled
        - integration_record_examples
      properties:
        enabled:
          type: boolean
          description: >-
            Controls whether discovery is enabled by default or not when the
            addon is installed.
        integration_record_examples:
          description: >
            Examples of possible values that the `integration_record` property
            can have for resources for a given binding.


            Please note:

            The structure of an `integration_record` is not fixed and can vary.

            Any examples listed here are not exhaustive, there might be other
            keys associated with an `integration_record` that are not shown.

            Just because a key is mentioned here does not guarantee its presence
            on an actual `integration_record`
          type: object
          additionalProperties: {}
          example:
            gateway_service:
              control_plane:
                id: 00000000-0000-0000-0000-000000000000
                name: control-plane-name
                labels:
                  env: development
              gateway_service_id:
                id: 11111111-1111-1111-1111-111111111111
                name: gateway-service
                host: konghq.com
                path: /example
                type: service
                port: 443
                protocol: https
                enabled: true
                cluster_id: 22222222-2222-2222-2222-222222222222
                tags:
                  - env: development
    InstalledIntegrationConfig:
      type: object
      description: JSON object containing the configuration values for the integration.
      additionalProperties: true
      default: {}
      example:
        base_url: https://foo.some-service.com
    Metadata:
      type: object
      description: Contains key value pairs information about entity's metadata.
      additionalProperties:
        anyOf:
          - type: string
            nullable: true
          - type: number
            nullable: true
          - type: boolean
            nullable: true
          - $ref: '#/components/schemas/UrlMetadataValue'
      example:
        owner: John Appleseed
        slack_channel:
          name: '#public-channel'
          link: https://customdomain.slack.com/archives/C02GE1JUG2W
    MetadataSchema:
      type: object
      description: Contains information about a metadata schema.
      allOf:
        - type: object
          properties:
            id:
              type: string
              format: uuid
              example: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
              description: The Metadata ID.
              readOnly: true
            name:
              type: string
              example: slack-url
              description: The name of the metadata.
              maxLength: 120
            schema:
              type: object
              description: JSON object containing the metadata schema definition.
              additionalProperties: true
              default: {}
              example:
                display_name: slack url
                description: Slack URL metadata.
                required: false
                type: string
          required:
            - id
            - name
            - schema
        - $ref: '#/components/schemas/EntityTimeFields'
    UrlMetadataValue:
      type: object
      description: Contains the name and link value associated with a URL Metadata Field.
      nullable: true
      additionalProperties: false
      required:
        - name
        - link
      properties:
        name:
          description: The human-readable name for the url metadata value
          type: string
          minLength: 1
          example: '#public-slack-channel'
        link:
          description: The url link associated with the metadata value.
          type: string
          format: uri-reference
          minLength: 1
          example: '#public-slack-channel'
    LabelsPatch:
      title: LabelsPatch
      type: object
      example:
        env: test
        owner: null
      description: >-
        JSON Merge Patch object for updating labels fields. To delete an
        existing label, provide the label key with a null value.
      additionalProperties:
        type: string
        nullable: true
        pattern: ^[a-z0-9A-Z]{1}([a-z0-9A-Z\-\.\_]*[a-z0-9A-Z]+)?$
        minLength: 1
        maxLength: 63
    EntityTimeFields:
      allOf:
        - $ref: '#/components/schemas/ServiceHubCreatedAt'
        - $ref: '#/components/schemas/ServiceHubUpdatedAt'
    PublishStatus:
      description: document publish status
      type: string
      enum:
        - published
        - unpublished
    Slug:
      type: string
      description: document slug
      pattern: ^[\w-]+$
      maxLength: 80
    SuggestedDiscoveryAction:
      oneOf:
        - $ref: '#/components/schemas/IgnoreActionPayload'
        - $ref: '#/components/schemas/MapServiceAction'
        - $ref: '#/components/schemas/CreateAndMapServiceActionPayload'
    SuggestedRuleAction:
      oneOf:
        - $ref: '#/components/schemas/IgnoreActionPayload'
        - $ref: '#/components/schemas/MapActionPayload'
    SuggestionRuleError:
      type: object
      required:
        - type
        - field
        - expression
        - message
      properties:
        type:
          type: string
          enum:
            - error
            - timeout
            - invalid-expression
            - result-not-boolean
            - result-not-string
            - unexpected-result
            - InvalidLabelKeyInputType
            - InvalidEmptyLabelKey
            - InvalidLabelKeyFormat
            - LabelKeyHasReservedPrefix
            - MaxLabelKeyCharsExceeded
            - InvalidLabelValueInputType
            - InvalidEmptyLabelValue
            - InvalidLabelValueFormat
            - MaxLabelValueCharsExceeded
            - InvalidLabelsInputType
            - MaxLabelsPerEntityExceeded
            - ConflictingKeys
          description: >
            The type of error that occured when evaluating suggestion rule
            configuration against given integration record.
              - `error`: represents a generic error.
              - `timeout`: timeout occured when evaluating jq expression
              - `invalid-expression`: jq expression could not be evaluated due to syntax error(s).
              - `result-not-boolean`: jq expression was not evaluated to a boolean
              - `result-not-string`: jq expression was not evaluated to a string
              - `unexpected-result`: jq expression was not evaluated to a result that could not be determined
              - `InvalidLabelKeyInputType`: Indicates the label key is of an invalid type (i.e. number or symbol)
              - `InvalidEmptyLabelKey`: Indicates the label key is empty
              - `InvalidLabelKeyFormat`: Indicates that the format of the label key is invalid, ex: "-bad-format-"
              - `LabelKeyHasReservedPrefix`: Indicates that the label key starts with a Kong-reserved key prefix, ex: "kong-test-key"
              - `MaxLabelKeyCharsExceeded`: Indicates that a label key exceeds the maximum number of allowed characters
              - `InvalidLabelValueInputType`: Indicates the label value is of an invalid type (i.e. number or symbol)
              - `InvalidEmptyLabelValue`: Indicates that the label value is empty
              - `InvalidLabelValueFormat`: Indicates that the format of the label value is invalid, ex: "-bad-format-"
              - `MaxLabelValueCharsExceeded`: Indicates that a label value exceeds the maximum number of allowed characters
              - `InvalidLabelsInputType`: Indicates that a collection of labels is of an invalid type (i.e. array instead of key-value object)
              - `MaxLabelsPerEntityExceeded`: Indicates that a collection of labels exceeds the maximum number of labels allowed for a given entity
              - `ConflictingKeys`: Indicates that labels keys are not unique
        field:
          type: string
          enum:
            - discovery_selector
            - action.data.service.id
            - action.data.service.name
            - action.data.resource.labels
          description: >-
            The field from the payload given which is responsible for this
            error.
        expression:
          type: string
          description: >-
            Represents the resolved or unresolved JQ expression which failed
            validation
        message:
          type: string
          description: >-
            Details of the error which occured when evaluating suggestion rule
            configuration against given integration record.
    DiscoveryAction:
      oneOf:
        - $ref: '#/components/schemas/CreateAndMapServiceAction'
        - $ref: '#/components/schemas/IgnoreActionPayload'
