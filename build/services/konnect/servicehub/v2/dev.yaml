  /discovery/integration/{integration}/discovered-entities:
    parameters:
      - schema:
          type: string
          example: gateway-manager
        name: integration
        in: path
        required: true
        description: Machine name of the integration.
    put:
      summary: Upsert Discovered Entities
      operationId: upsert-discovered-entities
      description: >
        Upserts Discovered Entities. The request is transactional, that is, a
        single failed operation

        will result in a failed state for all operations.


        The maximum amount of entities that can be ingested in a single request
        is __100__.
      requestBody:
        $ref: '#/components/requestBodies/UpsertDiscoveredEntitiesBody'
      responses:
        '200':
          description: All entities delivered in the payload were ingested successfully.
        '202':
          description: >
            The payload was accepted but a no-op was performed.

            This response will be returned when an organization has discovery
            disabled for the given integration.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
