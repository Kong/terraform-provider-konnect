                      route_admin:
                        type: object
                        additionalProperties: false
                        required:
                          - name
                          - description
                        properties:
                          name:
                            type: string
                            enum:
                              - Route Admin
                          description:
                            type: string
                            example: >-
                              This role grants full write access to administer
                              routes.
                            enum:
                              - >-
                                This role grants full write access to administer
                                routes.
                      sni_admin:
                        type: object
                        additionalProperties: false
                        required:
                          - name
                          - description
                        properties:
                          name:
                            type: string
                            enum:
                              - SNI Admin
                          description:
                            type: string
                            example: >-
                              This role grants full write access to administer
                              SNIs.
                            enum:
                              - >-
                                This role grants full write access to administer
                                SNIs.
                      upstream_admin:
                        type: object
                        additionalProperties: false
                        required:
                          - name
                          - description
                        properties:
                          name:
                            type: string
                            enum:
                              - Upstream Admin
                          description:
                            type: string
                            example: >-
                              This role grants full write access to administer
                              upstreams.
                            enum:
                              - >-
                                This role grants full write access to administer
                                upstreams.
                      viewer:
                        type: object
                        additionalProperties: false
                        required:
                          - name
                          - description
                        properties:
                          name:
                            type: string
                            enum:
                              - Viewer
                          description:
                            type: string
                            example: >-
                              This role grants read only access to all entities
                              within a control plane.
                            enum:
                              - >-
                                This role grants read only access to all
                                entities within a control plane.
              api_products:
                type: object
                additionalProperties: false
                required:
                  - name
                  - roles
                properties:
                  name:
                    type: string
                    enum:
                      - API Products
                  roles:
                    type: object
                    properties:
                      admin:
                        type: object
                        additionalProperties: false
                        required:
                          - name
                          - description
                        properties:
                          name:
                            type: string
                            enum:
                              - Admin
                          description:
                            type: string
                            example: >-
                              This role grants full write access to an API
                              product and its versions.
                            enum:
                              - >-
                                This role grants full write access to an API
                                product and its versions.
                      application_registration:
                        type: object
                        additionalProperties: false
                        required:
                          - name
                          - description
                        properties:
                          name:
                            type: string
                            enum:
                              - Application Registration
                          description:
                            type: string
                            example: >-
                              This role grants permission to enable and disable
                              application registration on an API product.
                            enum:
                              - >-
                                This role grants permission to enable and
                                disable application registration on an API
                                product.
                      creator:
                        type: object
                        additionalProperties: false
                        required:
                          - name
                          - description
                        properties:
                          name:
                            type: string
                            enum:
                              - Creator
                          description:
                            type: string
                            example: >-
                              This access is required to create API products.
                              This access is not for creating sub-entities such
                              as versions, API specs, etc.
                            enum:
                              - >-
                                This access is required to create API products.
                                This access is not for creating sub-entities
                                such as versions, API specs, etc.
                      deployer:
                        type: object
                        additionalProperties: false
                        required:
                          - name
                          - description
                        properties:
                          name:
                            type: string
                            enum:
                              - Deployer
                          description:
                            type: string
                            example: >-
                              This role grants permission to deploy and remove
                              an API product from a control plane.
                            enum:
                              - >-
                                This role grants permission to deploy and remove
                                an API product from a control plane.
                      maintainer:
                        type: object
                        additionalProperties: false
                        required:
                          - name
                          - description
                        properties:
                          name:
                            type: string
                            enum:
                              - Maintainer
                          description:
                            type: string
                            example: >-
                              This role grants all write permission to manage an
                              API product and to administer plugins.
                            enum:
                              - >-
                                This role grants all write permission to manage
                                an API product and to administer plugins.
                      plugins_admin:
                        type: object
                        additionalProperties: false
                        required:
                          - name
                          - description
                        properties:
                          name:
                            type: string
                            enum:
                              - Plugins Admin
                          description:
                            type: string
                            example: >-
                              This role grants full write permission to
                              administer plugins.
                            enum:
                              - >-
                                This role grants full write permission to
                                administer plugins.
                      publisher:
                        type: object
                        additionalProperties: false
                        required:
                          - name
                          - description
                        properties:
                          name:
                            type: string
                            enum:
                              - Publisher
                          description:
                            type: string
                            example: >-
                              This role grants permission to publish an API
                              product to one or more portals.
                            enum:
                              - >-
                                This role grants permission to publish an API
                                product to one or more portals.
                      viewer:
                        type: object
                        additionalProperties: false
                        required:
                          - name
                          - description
                        properties:
                          name:
                            type: string
                            enum:
                              - Viewer
                          description:
                            type: string
                            example: >-
                              Viewer has read-only access to an API product and
                              its sub-entities.
                            enum:
                              - >-
                                Viewer has read-only access to an API product
                                and its sub-entities.
              portals:
                $ref: '#/components/schemas/PortalsRoles'
              application_auth_strategies:
                $ref: '#/components/schemas/ApplicationAuthStrategiesRoles'
              dcr_providers:
                $ref: '#/components/schemas/DCRProvidersRoles'
              audit_logs:
                type: object
                additionalProperties: false
                required:
                  - name
                  - roles
                properties:
                  name:
                    type: string
                    enum:
                      - Audit Logs
                  roles:
                    type: object
                    properties:
                      admin:
                        type: object
                        additionalProperties: false
                        required:
                          - name
                          - description
                        properties:
                          name:
                            type: string
                            enum:
                              - Admin
                          description:
                            type: string
                            example: >-
                              This role grants full write access to the Audit
                              log configuration.
                            enum:
                              - >-
                                This role grants full write access to the Audit
                                log configuration.
              identity:
                type: object
                additionalProperties: false
                required:
                  - name
                  - roles
                properties:
                  name:
                    type: string
                    enum:
                      - Identity
                  roles:
                    type: object
                    properties:
                      admin:
                        type: object
                        additionalProperties: false
                        required:
                          - name
                          - description
                        properties:
                          name:
                            type: string
                            enum:
                              - Admin
                          description:
                            type: string
                            example: >-
                              This role grants full write access to the Identity
                              configuration.
                            enum:
                              - >-
                                This role grants full write access to the
                                Identity configuration.
              mesh_control_planes:
                type: object
                additionalProperties: false
                required:
                  - name
                  - roles
                properties:
                  name:
                    type: string
                    enum:
                      - Mesh Control Plane
                  roles:
                    type: object
                    properties:
                      admin:
                        type: object
                        additionalProperties: false
                        required:
                          - name
                          - description
                        properties:
                          name:
                            type: string
                            enum:
                              - Admin
                          description:
                            type: string
                            example: >-
                              This role grants full write access to the related
                              to Mesh control planes.
                            enum:
                              - >-
                                This role grants full write access to the
                                related to Mesh control planes.
                      creator:
                        type: object
                        additionalProperties: false
                        required:
                          - name
                          - description
                        properties:
                          name:
                            type: string
                            enum:
                              - Creator
                          description:
                            type: string
                            example: >-
                              This role grants access to create new Mesh control
                              planes.
                            enum:
                              - >-
                                This role grants access to create new Mesh
                                control planes.
                      viewer:
                        type: object
                        additionalProperties: false
                        required:
                          - name
                          - description
                        properties:
                          name:
                            type: string
                            enum:
                              - Viewer
                          description:
                            type: string
                            example: >-
                              This role grants access to read-only permissions
                              to Mesh control planes.
                            enum:
                              - >-
                                This role grants access to read-only permissions
                                to Mesh control planes.
          examples:
            Predefined Roles:
              value:
                control_planes:
                  name: Control Planes
                  roles:
                    admin:
                      name: Admin
                      description: >-
                        This role grants full write access to all entities
                        within a control plane.
                    certificate_admin:
                      name: Certificate Admin
                      description: >-
                        This role grants full write access to administer
                        certificates.
                    consumer_admin:
                      name: Consumer Admin
                      description: >-
                        This role grants full write access to administer
                        consumers.
                    creator:
                      name: Creator
                      description: >-
                        Creates a new Control Plane in an organization. The
                        creator becomes the owner of the Control Plane they
                        create.
                    deployer:
                      name: Deployer
                      description: >-
                        This role grants full write access to administer
                        services, routes and plugins necessary to deploy
                        services in Service Hub.
                    gateway_service_admin:
                      name: Gateway Service Admin
                      description: >-
                        This role grants full write access to administer gateway
                        services.
                    plugin_admin:
                      name: Plugin Admin
                      description: >-
                        This role grants full write access to administer
                        plugins.
                    route_admin:
                      name: Route Admin
                      description: This role grants full write access to administer routes.
                    sni_admin:
                      name: SNI Admin
                      description: This role grants full write access to administer SNIs.
                    upstream_admin:
                      name: Upstream Admin
                      description: >-
                        This role grants full write access to administer
                        upstreams.
                    viewer:
                      name: Viewer
                      description: >-
                        This role grants read only access to all entities within
                        a control plane.
                api_products:
                  name: API Products
                  roles:
                    admin:
                      name: Admin
                      description: >-
                        This role grants full write access to an API product and
                        its versions.
                    application_registration:
                      name: Application Registration
                      description: >-
                        This role grants permission to enable and disable
                        application registration on an API product.
                    creator:
                      name: Creator
                      description: >-
                        This access is required to create API products. This
                        access is not for creating sub-entities such as
                        versions, API specs, etc.
                    deployer:
                      name: Deployer
                      description: >-
                        This role grants permission to deploy and remove an API
                        product from a control plane.
                    maintainer:
                      name: Maintainer
                      description: >-
                        This role grants all write permission to manage an API
                        product and to administer plugins.
                    plugins_admin:
                      name: Plugins Admin
                      description: >-
                        This role grants full write permission to administer
                        plugins.
                    publisher:
                      name: Publisher
                      description: >-
                        This role grants permission to publish an API product to
                        one or more portals.
                    viewer:
                      name: Viewer
                      description: >-
                        Viewer has read-only access to an API product and its
                        sub-entities.
                audit_logs:
                  name: Audit Logs
                  roles:
                    admin:
                      name: Admin
                      description: >-
                        This role grants full write access to the Audit log
                        configuration.
                identity:
                  name: Identity
                  roles:
                    admin:
                      name: Admin
                      description: >-
                        This role grants full write access to the Identity
                        configuration.
                mesh_control_planes:
                  name: Mesh Control Plane
                  roles:
                    admin:
                      name: Admin
                      description: >-
                        This role grants full write access to the related to
                        Mesh control planes.
                    creator:
                      name: Creator
                      description: >-
                        This role grants access to create new Mesh control
                        planes.
                    viewer:
                      name: Viewer
                      description: >-
                        This role grants access to read-only permissions to Mesh
                        control planes.
    IdentityProvider:
      description: >
        An identity provider configuration. This response represents the
        configuration of a specific identity provider, which can be either OIDC
        or SAML.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/IdentityProvider'
          examples:
            OIDC Identity Provider:
              $ref: '#/components/examples/OIDCIdentityProvider'
            SAML Identity Provider With Meta Data URL:
              $ref: '#/components/examples/SAMLIdentityProvider'
            SAML Identity Provider With Meta Data:
              $ref: '#/components/examples/SAMLIdentityProviderWithMetadata'
    IdentityProviders:
      description: >
        A collection of identity providers. This response contains a collection
        of identity providers, which may  include both OIDC and SAML identity
        providers.
      content:
        application/json:
          schema:
            type: object
            title: Identity Provider Collection Response
            properties:
              data:
                type: array
                items:
                  $ref: '#/components/schemas/IdentityProvider'
          examples:
            Identity Provider Collection:
              $ref: '#/components/examples/IdentityProviders'
  requestBodies:
    CreateIdentityProviderRequest:
      description: >
        An object representing the configuration for creating a new identity
        provider. This configuration may pertain  to either an OIDC or a SAML
        identity provider.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreateIdentityProvider'
          examples:
            OIDC Identity Provider Request:
              $ref: '#/components/examples/CreateOIDCIdentityProvider'
            SAML Identity Provider Request With MetadataURL:
              $ref: '#/components/examples/CreateSAMLIdentityProviderWithMetadataURL'
            SAML Identity Provider Request With Metadata:
              $ref: '#/components/examples/CreateSAMLIdentityProviderWithMetadata'
    UpdateIdentityProviderRequest:
      description: >
        An object representing the configuration for updating an identity
        provider. This configuration may pertain  to either an OIDC or a SAML
        identity provider.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UpdateIdentityProvider'
          examples:
            Update OIDC Identity Provider:
              $ref: '#/components/examples/UpdateOIDCIdentityProvider'
            Update SAML Identity Provider:
              $ref: '#/components/examples/UpdateSAMLIdentityProvider'
            Update Identity Provider Login Path:
              $ref: '#/components/examples/UpdateIdentityProviderLoginPath'
  schemas:
    IdentityProviderEnabled:
      title: Identity Provider Enabled Property
      type: boolean
      description: >
        Indicates whether the identity provider is enabled. 

        Only one identity provider can be active at a time, such as SAML or
        OIDC.
      default: false
      example: true
    IdentityProviderType:
      type: string
      enum:
        - oidc
        - saml
      description: Specifies the type of identity provider.
      example: oidc
    IdentityProviderLoginPath:
      title: Identity Provider Login Path Property
      type: string
      example: myapp
      description: The path used for initiating login requests with the identity provider.
    OIDCIdentityProviderIssuer:
      title: OIDC Identity Provider Issuer Property
      type: string
      format: uri
      description: >-
        The issuer URI of the identity provider. This is the URL where the
        provider's metadata can be obtained.
      example: https://konghq.okta.com/oauth2/default
    OIDCIdentityProviderClientId:
      title: OIDC Identity Provider Login Client Id Property
      type: string
      example: YOUR_CLIENT_ID
      description: The client ID assigned to your application by the identity provider.
    OIDCIdentityProviderScopes:
      title: OIDC Identity Provider Scopes Property
      type: array
      description: >-
        The scopes requested by your application when authenticating with the
        identity provider.
      default:
        - email
        - openid
        - profile
      items:
        type: string
    OIDCIdentityProviderClaimMappings:
      title: OIDC Claim Mappings
      type: object
      description: >
        Defines the mappings between OpenID Connect (OIDC) claims and local
        claims used by your application for 

        authentication.
      properties:
        name:
          type: string
          example: name
          default: name
          description: The claim mapping for the user's name.
        email:
          type: string
          example: email
          default: email
          description: The claim mapping for the user's email address.
        groups:
          type: string
          default: groups
          example: groups
          description: The claim mapping for the user's group membership information.
    SAMLIdentityProviderMetadataURL:
      title: SAML Identity Provider Metadata URL
      type: string
      format: uri
      description: >-
        The identity provider's metadata URL where the identity provider's
        metadata can be obtained.
      example: https://mocksaml.com/api/saml/metadata
    SAMLIdentityProviderMetadata:
      title: SAML Identity Provider Metadata
      type: string
      description: >
        The identity provider's SAML metadata. If the identity provider supports
        a metadata URL, you can use the `idp_metadata_url` field instead.
      example: |
        <?xml version="1.0" encoding="UTF-8"?>
        <EntityDescriptor xmlns="urn:oasis:names:tc:SAML:2.0:metadata">
          <!-- SAML metadata content here -->
        </EntityDescriptor>
    CreateIdentityProvider:
      title: Identity Provider
      type: object
      description: >-
        The identity provider that contains configuration data for creating an
        authentication integration.
      properties:
        type:
          $ref: '#/components/schemas/IdentityProviderType'
        login_path:
          $ref: '#/components/schemas/IdentityProviderLoginPath'
        config:
          type: object
          oneOf:
            - $ref: '#/components/schemas/OIDCIdentityProviderConfig'
            - $ref: '#/components/schemas/SAMLIdentityProviderConfig'
    UpdateIdentityProvider:
      title: Identity Provider
      type: object
      description: >-
        The identity provider that contains configuration data for updating an
        authentication integration.
      properties:
        enabled:
          $ref: '#/components/schemas/IdentityProviderEnabled'
        login_path:
          $ref: '#/components/schemas/IdentityProviderLoginPath'
        config:
          type: object
          oneOf:
            - $ref: '#/components/schemas/OIDCIdentityProviderConfig'
            - $ref: '#/components/schemas/SAMLIdentityProviderConfig'
    IdentityProvider:
      title: Identity Provider
      type: object
      description: >-
        The identity provider that contains configuration data for
        authentication integration.
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        type:
          $ref: '#/components/schemas/IdentityProviderType'
        enabled:
          $ref: '#/components/schemas/IdentityProviderEnabled'
        login_path:
          $ref: '#/components/schemas/IdentityProviderLoginPath'
        config:
          type: object
          oneOf:
            - $ref: '#/components/schemas/OIDCIdentityProviderConfig'
            - $ref: '#/components/schemas/SAMLIdentityProviderConfig'
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
        deleted_at:
          $ref: '#/components/schemas/DeletedAt'
    OIDCIdentityProviderConfig:
      title: OIDC Identity Provider Config
      type: object
      description: >-
        The identity provider that contains configuration data for the OIDC
        authentication integration.
      properties:
        issuer_url:
          $ref: '#/components/schemas/OIDCIdentityProviderIssuer'
        client_id:
          $ref: '#/components/schemas/OIDCIdentityProviderClientId'
        scopes:
          $ref: '#/components/schemas/OIDCIdentityProviderScopes'
        claim_mappings:
          $ref: '#/components/schemas/OIDCIdentityProviderClaimMappings'
      additionalProperties: false
      required:
        - issuer_url
        - client_id
    SAMLIdentityProviderConfig:
      title: SAML Identity Provider Config
      type: object
      description: >-
        The identity provider that contains configuration data for the SAML
        authentication integration.
      properties:
        idp_metadata_url:
          $ref: '#/components/schemas/SAMLIdentityProviderMetadataURL'
        idp_metadata_xml:
          $ref: '#/components/schemas/SAMLIdentityProviderMetadata'
        sp_metadata_url:
          type: string
          format: uri
          example: >-
            https://cloud.konghq.com/v2/authenticate/the-saml-konnect-org/saml/metadata
          readOnly: true
        sp_entity_id:
          type: string
          description: The entity ID of the service provider (SP).
          example: https://cloud.konghq.com/sp/00000000-0000-0000-0000-000000000000
          readOnly: true
        login_url:
          type: string
          description: >-
            The URL to redirect users to for initiating login with the identity
            provider.
          example: https://cloud.konghq.com/login/the-saml-konnect-org
          readOnly: true
        callback_url:
          type: string
          description: >-
            The URL where the SAML identity provider sends authentication
            responses after successful login attempts.
          format: uri
          example: >-
            https://cloud.konghq.com/v2/authenticate/the-saml-konnect-org/saml/acs
          readOnly: true
      additionalProperties: false
