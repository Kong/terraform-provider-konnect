  schemas:
    PortalsRoles:
      title: Portals Roles
      type: object
      additionalProperties: false
      required:
        - name
        - roles
      properties:
        name:
          type: string
          enum:
            - Portals
        roles:
          type: object
          properties:
            admin:
              type: object
              additionalProperties: false
              required:
                - name
                - description
              properties:
                name:
                  type: string
                  enum:
                    - Admin
                description:
                  type: string
                  example: >-
                    This role grants full write access to portal configurations
                    and entities.
                  enum:
                    - >-
                      This role grants full write access to portal
                      configurations and entities.
            maintainer:
              type: object
              additionalProperties: false
              required:
                - name
                - description
              properties:
                name:
                  type: string
                  enum:
                    - Maintainer
                description:
                  type: string
                  example: >-
                    This role grants the ability to manage developers,
                    applications, and product versions in portals.
                  enum:
                    - >-
                      This role grants the ability to manage developers,
                      applications, and product versions in portals.
            creator:
              type: object
              additionalProperties: false
              required:
                - name
                - description
              properties:
                name:
                  type: string
                  enum:
                    - Creator
                description:
                  type: string
                  example: This role grants access to create new portals.
                  enum:
                    - This role grants access to create new portals.
            viewer:
              type: object
              additionalProperties: false
              required:
                - name
                - description
              properties:
                name:
                  type: string
                  enum:
                    - Viewer
                description:
                  type: string
                  example: >-
                    This role grants access to read-only permissions to portals
                    and their entities.
                  enum:
                    - >-
                      This role grants access to read-only permissions to
                      portals and their entities.
    ApplicationAuthStrategiesRoles:
      title: Application Auth Strategies Roles
      type: object
      additionalProperties: false
      required:
        - name
        - roles
      properties:
        name:
          type: string
          enum:
            - Application Auth Strategies
        roles:
          type: object
          properties:
            maintainer:
              type: object
              additionalProperties: false
              required:
                - name
                - description
              properties:
                name:
                  type: string
                  enum:
                    - Maintainer
                description:
                  type: string
                  example: >-
                    This role grants access to manage and delete application
                    auth strategies.
                  enum:
                    - >-
                      This role grants access to manage and delete application
                      auth strategies.
            creator:
              type: object
              additionalProperties: false
              required:
                - name
                - description
              properties:
                name:
                  type: string
                  enum:
                    - Creator
                description:
                  type: string
                  example: >-
                    This role grants access to create new application auth
                    strategies.
                  enum:
                    - >-
                      This role grants access to create new application auth
                      strategies.
            viewer:
              type: object
              additionalProperties: false
              required:
                - name
                - description
              properties:
                name:
                  type: string
                  enum:
                    - Viewer
                description:
                  type: string
                  example: >-
                    This role grants access to read-only permissions to
                    application auth strategies.
                  enum:
                    - >-
                      This role grants access to read-only permissions to
                      application auth strategies.
    DCRProvidersRoles:
      title: DCR Providers Roles
      type: object
      additionalProperties: false
      required:
        - name
        - roles
      properties:
        name:
          type: string
          enum:
            - DCR Providers
        roles:
          type: object
          properties:
            maintainer:
              type: object
              additionalProperties: false
              required:
                - name
                - description
              properties:
                name:
                  type: string
                  enum:
                    - Maintainer
                description:
                  type: string
                  example: This role grants access to manage and delete DCR providers.
                  enum:
                    - >-
                      This role grants access to manage and delete DCR
                      providers.
            creator:
              type: object
              additionalProperties: false
              required:
                - name
                - description
              properties:
                name:
                  type: string
                  enum:
                    - Creator
                description:
                  type: string
                  example: This role grants access to create new DCR providers.
                  enum:
                    - This role grants access to create new DCR providers.
            viewer:
              type: object
              additionalProperties: false
              required:
                - name
                - description
              properties:
                name:
                  type: string
                  enum:
                    - Viewer
                description:
                  type: string
                  example: >-
                    This role grants access to read-only permissions to DCR
                    providers.
                  enum:
                    - >-
                      This role grants access to read-only permissions to DCR
                      providers.
    BaseError:
      type: object
      title: Error
      description: standard error
      required:
        - status
        - title
        - instance
        - detail
      properties:
        status:
          type: integer
          description: >
            The HTTP status code of the error. Useful when passing the response

            body to child properties in a frontend UI. Must be returned as an
            integer.
          readOnly: true
        title:
          type: string
          description: |
            A short, human-readable summary of the problem. It should not
            change between occurences of a problem, except for localization.
            Should be provided as "Sentence case" for direct use in the UI.
          readOnly: true
        type:
          type: string
          description: The error type.
          readOnly: true
        instance:
          type: string
          description: |
            Used to return the correlation ID back to the user, in the format
            kong:trace:<correlation_id>. This helps us find the relevant logs
            when a customer reports an issue.
          readOnly: true
        detail:
          type: string
          description: >
            A human readable explanation specific to this occurence of the
            problem.

            This field may contain request/entity data to help the user
            understand

            what went wrong. Enclose variable values in square brackets. Should
            be

            provided as "Sentence case" for direct use in the UI.
          readOnly: true
    InvalidRules:
      description: invalid parameters rules
      type: string
      readOnly: true
      nullable: true
      enum:
        - required
        - enum
        - min_length
        - max_length
        - min_digits
        - min_lowercase
        - min_uppercase
        - min_symbols
        - is_array
        - is_base64
        - is_boolean
        - is_date_time
        - is_integer
        - is_null
        - is_number
        - is_object
        - is_string
        - is_uuid
        - unknown_property
        - is_label
        - matches_regex
    InvalidParameterChoiceItem:
      type: object
      properties:
        field:
          type: string
          example: name
          readOnly: true
        rule:
          $ref: '#/components/schemas/InvalidRules'
        reason:
          type: string
          example: is a required field
          readOnly: true
        choices:
          type: array
          uniqueItems: true
          nullable: true
          items: {}
          readOnly: true
      required:
        - field
        - reason
    InvalidParameterDependentItem:
      type: object
      properties:
        field:
          type: string
          example: name
          readOnly: true
        rule:
          description: invalid parameters rules
          type: string
          readOnly: true
          nullable: true
          enum:
            - dependent_fields
        reason:
          type: string
          example: is a required field
          readOnly: true
        dependents:
          type: array
          uniqueItems: true
          nullable: true
          items: {}
          readOnly: true
      required:
        - field
        - rule
        - reason
        - dependents
    InvalidParameters:
      type: array
      nullable: false
      uniqueItems: true
      minItems: 1
      description: invalid parameters
      items:
        oneOf:
          - $ref: '#/components/schemas/InvalidParameterChoiceItem'
          - $ref: '#/components/schemas/InvalidParameterDependentItem'
    BadRequestError:
      type: object
      required:
        - invalid_parameters
      properties:
