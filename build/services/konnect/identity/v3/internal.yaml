openapi: 3.0.2
info:
  title: Konnect Identity
  version: 3.0.0
  description: The management API for Kong Konnect Identity resources.
  contact:
    name: Kong
    url: https://konghq.com
servers:
  - url: https://global.api.konghq.com/v3
    description: Global Base URL
security:
  - personalAccessToken: []
  - systemAccountAccessToken: []
  - konnectAccessToken: []
tags:
  - name: Me
  - name: Managed System Accounts - Roles
  - name: Authentication
  - name: AWS
paths:
  /internal/auth0/register:
    post:
      operationId: post-auth0-register-internal
      summary: Register a new organization with an Auth0 authenticated user.
      description: >-
        Create a new organization with Auth0 authentication. The Auth0 user will
        be the organization owner.
      responses:
        '201':
          $ref: '#/components/responses/Auth0Registration'
        '400':
          $ref: '#/components/responses/IdentityBadRequest'
        '404':
          $ref: '#/components/responses/IdentityNotFound'
      requestBody:
        $ref: '#/components/requestBodies/Auth0Registration'
      tags:
        - SSO Auth0
      x-internal: true
  /internal/auth0/organizations:
    get:
      operationId: get-auth0-organizations-internal
      x-internal: true
      summary: Retrieves the list of organizations available to the given user.
      description: Retrieves the list of organizations available to the given user.
      responses:
        '200':
          $ref: '#/components/responses/Auth0OrganizationsCollection'
        '400':
          $ref: '#/components/responses/IdentityBadRequest'
        '404':
          $ref: '#/components/responses/IdentityNotFound'
      tags:
        - SSO Auth0
  /internal/system-accounts/{accountId}/assigned-roles:
    parameters:
      - schema:
          type: string
        name: accountId
        in: path
        required: true
        description: ID of the system account.
    get:
      operationId: get-system-accounts-assigned-roles-internal
      summary: Fetch assigned roles for a managed system account.
      description: >-
        Lists the roles belonging to a managed system account.  Returns 400 if
        any filter parameters are invalid.
      responses:
        '200':
          $ref: '#/components/responses/ParameterizedAssignedRolesCollection'
        '400':
          $ref: '#/components/responses/IdentityBadRequest'
        '401':
          $ref: '#/components/responses/IdentityUnauthenticated'
        '403':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/IdentityNotFound'
      parameters:
        - schema:
            type: object
            properties:
              role_name:
                $ref: '#/components/schemas/StringFieldEqualsFilter'
              entity_type_name:
                $ref: '#/components/schemas/StringFieldEqualsFilter'
          in: query
          name: filter
          description: Filter roles returned in the response.
          required: false
          style: deepObject
      tags:
        - Managed System Accounts - Roles
      x-internal: true
      security:
        - clientToken: []
    post:
      summary: Assign a role to a managed System Account.
      operationId: create-system-accounts-assigned-roles-internal
      responses:
        '201':
          $ref: '#/components/responses/ParameterizedAssignedRoleSingle'
        '401':
          $ref: '#/components/responses/IdentityUnauthenticated'
        '403':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/IdentityNotFound'
        '409':
          $ref: '#/components/responses/IdentityConflict'
      description: >-
        Assigns a role to a managed system account. Returns 409 if role is
        already assigned.
      requestBody:
        $ref: '#/components/requestBodies/AssignParameterizedRole'
      tags:
        - Managed System Accounts - Roles
      x-internal: true
      security:
        - clientToken: []
  /users/me:
    get:
      summary: Retrieve My User Account
      tags:
        - Me
      responses:
        '200':
          $ref: '#/components/responses/UserSingle'
        '401':
          $ref: '#/components/responses/IdentityUnauthenticated'
      operationId: get-users-me
      x-internal: true
      security:
        - personalAccessToken: []
        - konnectAccessToken: []
      description: >-
        Returns the user account for the user identified in the token of the
        request.
    delete:
      summary: Delete My User Account
      operationId: delete-users-me
      x-internal: true
      security:
        - konnectAccessToken: []
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/IdentityUnauthenticated'
        '403':
          description: >-
            Forbidden - If there are other users in the organization or a
            konnectAccessToken was not provided.
      description: >-
        Deletes the user account for the user identified in the token of the
        request.
      tags:
        - Me
    patch:
      summary: Update My User Account
      operationId: patch-users-me
      responses:
        '200':
          $ref: '#/components/responses/UserSingle'
        '400':
          description: Bad Request - Invalid Parameters
        '401':
          $ref: '#/components/responses/IdentityUnauthenticated'
        '403':
          description: Forbidden - If a konnectAccessToken was not provided.
      description: >-
        Updates the user account for the user identified in the token of the
        request.
      requestBody:
        $ref: '#/components/requestBodies/UpdateUser'
      tags:
        - Me
      x-internal: true
      security:
        - konnectAccessToken: []
  /users/me/permissions:
    get:
      summary: Get My Permissions
      tags:
        - Me
      description: Returns the permissions for the current user
      operationId: get-users-me-permissions
      x-internal: true
      parameters:
        - schema:
            type: object
            properties:
              actions:
                $ref: '#/components/schemas/StringFieldEqualsFilter'
              region:
                $ref: '#/components/schemas/StringFieldEqualsFilter'
              resource:
                $ref: '#/components/schemas/StringFieldEqualsFilter'
              service:
                $ref: '#/components/schemas/StringFieldEqualsFilter'
              top_level:
                $ref: '#/components/schemas/BooleanFieldFilter'
          in: query
          name: filter
          description: Filter permissions returned in the response.
          required: false
          style: deepObject
      security:
        - konnectAccessToken: []
      responses:
        '200':
          $ref: '#/components/responses/UserPermissions'
        '400':
          $ref: '#/components/responses/IdentityBadRequest'
        '401':
          $ref: '#/components/responses/IdentityUnauthenticated'
  /organizations/me:
    get:
      summary: Retrieve My Organization
      tags:
        - Me
      responses:
        '200':
          $ref: '#/components/responses/MeOrganization'
        '401':
          $ref: '#/components/responses/IdentityUnauthenticated'
      operationId: get-organizations-me
      x-internal: true
      description: >-
        Returns the organization of the user identified in the token of the
        request.
    patch:
      summary: Update My Organization
      operationId: update-organizations-me
      description: >
        Updates the current user's organization. When updating the owner, the
        new owner 

        must be an organization admin.
      x-internal: true
      tags:
        - Me
      responses:
        '200':
          $ref: '#/components/responses/MeOrganization'
        '400':
          $ref: '#/components/responses/IdentityBadRequest'
        '401':
          $ref: '#/components/responses/IdentityUnauthenticated'
        '403':
          $ref: '#/components/responses/IdentityPermissionDenied'
        '404':
          $ref: '#/components/responses/IdentityNotFound'
      requestBody:
        $ref: '#/components/requestBodies/UpdateOrganization'
  /refresh:
    post:
      summary: Refresh Token
      description: >-
        Issues new tokens. Returns 401 if a) the user is no longer active, b)
        the token has exceeded its lifetime limit, or c) the token has been
        revoked.
      operationId: refresh-token
      x-internal: true
      tags:
        - Authentication
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/IdentityUnauthenticated'
  /logout:
    post:
      summary: Log Out
      description: Clears the auth cookies.
      operationId: logout
      x-internal: true
      tags:
        - Authentication
      responses:
        '201':
          $ref: '#/components/responses/LogoutResponse'
  /aws/marketplace/resolve-customer:
    post:
      summary: Resolves an AWS Customer.
      description: This call the aws marketplace resolve customer api.
      operationId: resolveCustomer
      x-internal: true
      tags:
        - AWS
      requestBody:
        $ref: '#/components/requestBodies/AWSResolveCustomerRequest'
      responses:
        '201':
          $ref: '#/components/responses/ResolveCustomerResponse'
        '400':
          $ref: '#/components/responses/IdentityBadRequest'
components:
  responses:
    Auth0Registration:
      description: Auth0 organization registration
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Auth0Registration'
    Auth0OrganizationsCollection:
      description: A paginated list response for a collection of auth0 organizations.
      content:
        application/json:
          schema:
            type: object
            title: Auth0 Organizations Collection Response
            properties:
              meta:
                $ref: '#/components/schemas/PaginatedMeta'
              data:
                type: array
                items:
                  $ref: '#/components/schemas/Auth0Organization'
          examples:
            Organization Collection:
              value:
                meta:
                  page:
                    number: 1
                    size: 1
                    total: 10
                data:
                  - name: IDM - Developers
                    login_path: >-
                      /v2/authenticate/federated?org_id=7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
    UserSingle:
      description: A get action response of a single user.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/User'
          examples:
            Example:
              $ref: '#/components/examples/Get-User-Response'
    ParameterizedAssignedRoleSingle:
      description: A get response of a single parameterized assigned role.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ParameterizedAssignedRole'
          examples:
            Assigned Role Example:
              $ref: '#/components/examples/Parameterized-Assigned-Role-Example'
    ParameterizedAssignedRolesCollection:
      description: >-
        A paginated list response for a collection of parameterized assigned
        roles.
      content:
        application/json:
          schema:
            type: object
            title: Parameterized Assigned Roles Collection Response
            properties:
              meta:
                $ref: '#/components/schemas/PaginatedMeta'
              data:
                type: array
                description: An Array
                items:
                  $ref: '#/components/schemas/ParameterizedAssignedRole'
          examples:
            ParameterizedAssignedRolesCollection:
              $ref: >-
                #/components/examples/Parameterized-Assigned-Roles-Collection-Example
    IdentityBadRequest:
      description: Bad Request
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/BadRequestError'
          examples:
            Request Format is Invalid:
              $ref: '#/components/examples/400-request-format-is-invalid'
            Cannot be Blank:
              $ref: '#/components/examples/400-cannot-be-blank'
            Invalid ID format:
              $ref: '#/components/examples/400-invalid-id-format'
            Must be a valid UUID v4:
              $ref: '#/components/examples/400-valid-uuid'
            System teams cannot be modified:
              $ref: '#/components/examples/400-systems-team-modified'
            Password Complexity:
              $ref: '#/components/examples/400-password-complexity'
            Authentication Settings cannot be both Disabled:
              $ref: >-
                #/components/examples/400-authentication-settings-cannot-be-both-disabled
            OIDC needs an IdP configuration:
              $ref: '#/components/examples/400-oidc-auth-enabled-needs-idp'
            IdP configuration is required:
              $ref: '#/components/examples/400-idp-config-is-required'
            Unsupported filter operation:
              value:
                status: 400
                title: Bad Request
                instance: konnect:trace:3674017986744198214
                invalid_parameters:
                  - field: '[filter][actions][contains]'
                    reason: '[contains] is not a supported filter operation'
    IdentityConflict:
      description: Conflict
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ConflictError'
          examples:
            User is Already Active:
              $ref: '#/components/examples/409-user-is-already-active'
    IdentityPermissionDenied:
      description: Permission denied
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ForbiddenError'
          examples:
            Permission Denied:
              $ref: '#/components/examples/403-permission-denied'
            Invalid Permissions:
              $ref: '#/components/examples/403-invalid-permissions'
            Username or Password invalid:
              $ref: '#/components/examples/403-auth-invalid'
    IdentityUnauthenticated:
      description: Unauthenticated
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/UnauthorizedError'
          examples:
            Unauthorized:
              $ref: '#/components/examples/401-unauthenticated'
    Unauthorized:
      description: Unauthorized
      content:
        application/problem+json:
          schema:
            type: object
            title: Unauthorized Response
            description: The error response object.
            properties:
              status:
                type: integer
                example: 403
                description: The HTTP status code.
              title:
                type: string
                description: The Error Response.
                example: Unauthorized
              instance:
                type: string
                description: The Konnect traceback code.
                example: konnect:trace:952172606039454040
              detail:
                type: string
                description: Details about the error response.
                example: You do not have permission to perform this action
          examples:
            Unauthorized:
              $ref: '#/components/examples/403-permission-denied'
    IdentityNotFound:
      description: Not Found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/NotFoundError'
          examples:
            Not Found:
              $ref: '#/components/examples/404-not-found'
    MeOrganization:
      description: Me Organization
      content:
        application/json:
          schema:
            type: object
            title: Me Organization Response
            example:
              id: d99c041a-c7cf-46a2-bf3a-44bb5f75400e
              name: string
              owner_id: 1c9c3848-5897-4f2c-beed-df6f3e3adb37
              created_at: '2023-01-23T17:22:52.150Z'
              updated_at: '2023-01-23T17:22:52.150Z'
            properties:
              id:
                type: string
                description: UUID of the organization.
                format: uuid
                readOnly: true
              name:
                type: string
                description: Name of the organization.
              owner_id:
                type: string
                description: Owner ID of the organization.
              login_path:
                type: string
                description: >-
                  Path to organization-specific login when single sign on (SSO)
                  is enabled. Blank otherwise.
              created_at:
                type: string
                description: Date the organization was created.
                format: date-time
                readOnly: true
              updated_at:
                type: string
                description: Date the organization was last updated.
                format: date-time
                readOnly: true
          examples:
            Example:
              value:
                created_at: '2023-01-18T11:35:45.130Z'
                id: 023bfa42-3513-4cbf-b059-a9ddb4ea995d
                name: Acme Co.
                owner_id: e02c829c-0e2d-44b5-9057-07714ea613a3
                login_path: acme
                updated_at: '2023-01-23T17:22:52.150Z'
    UserPermissions:
      description: User Permissions
      content:
        application/json:
          schema:
            type: object
            title: User Permissions Response
            properties:
              data:
                type: array
                items:
                  type: object
                  properties:
                    resource:
                      type: string
                    actions:
                      type: array
                      items:
                        type: string
            example:
              data:
                - resource: krn:accounts:reg/*:org/aa878768-05cb-4811-90d2-b82ef61caf44
                  actions:
                    - '#root'
          examples:
            OrganizationAdminExample:
              value:
                data:
                  - resource: >-
                      krn:accounts:reg/*:org/aa878768-05cb-4811-90d2-b82ef61caf44
                    actions:
                      - '#root'
    LogoutResponse:
      description: Logout response
      content:
        application/json:
          schema:
            type: object
            title: Logout Response
            required:
              - login_path
            properties:
              login_path:
                type: string
                description: The login path.
    ResolveCustomerResponse:
      description: AWS Resolve customer response
      content:
        application/json:
          schema:
            type: object
            title: Resolve Customer Response
            required:
              - organization_id
            properties:
              organization_id:
                type: string
                description: UUID of the organization.
                format: uuid
  requestBodies:
    Auth0Registration:
      content:
        application/json:
          schema:
            title: Auth0 organization register
            type: object
            required:
              - organization_name
              - default_region
            description: Auth0 organization registration
            properties:
              organization_name:
                type: string
              default_region:
                type: string
    UpdateUser:
      description: The request schema for the update user request.
      content:
        application/json:
          schema:
            type: object
            properties:
              full_name:
                type: string
                pattern: ^[\w \W]+$
                example: James C. Woods
                description: The user's full name.
                writeOnly: true
              preferred_name:
                type: string
                maxLength: 250
                example: Jimmy
                description: The user's desired name.
                writeOnly: true
          examples:
            Example Request Body:
              $ref: '#/components/examples/Update-User-Request'
    AssignParameterizedRole:
      content:
        application/json:
          schema:
            type: object
            description: >-
              A parameterized assigned role is a role that has been assigned to
              a managed system account.
            properties:
              role_name:
                type: string
                example: Connector
                description: The desired role.
              entity_id:
                type: string
                format: uuid
                example: e67490ce-44dc-4cbd-b65e-b52c746fc26a
                description: The ID of the entity.
              entity_type_name:
                type: string
                example: Mesh Control Planes
                description: The type of entity.
              entity_region:
                type: string
                enum:
                  - us
                  - eu
                  - au
                  - '*'
                example: eu
                description: The region to scope the role assignment to.
              parameters:
                type: object
                example:
                  zoneName: zone3
          examples:
            Parameterized-Assigned-Role:
              $ref: '#/components/examples/Parameterized-Assigned-Role-Example'
      description: The request schema for assigning a role.
    UpdateOrganization:
      description: The request schema to update an organization.
      content:
        application/json:
          schema:
            type: object
            properties:
              owner_id:
                type: string
                description: >-
                  The user id of the new owner of the organization. Must be a
                  member of the Organization Admins team.
                format: uuid
                example: d9c56d92-0339-4dfb-be0c-2253162edba9
              name:
                type: string
                description: The new name of the organization.
                example: Kong Inc
          examples:
            Example Request Body:
              $ref: '#/components/examples/Update-Organization'
    AWSResolveCustomerRequest:
      description: AWS Marketplace Metering Resolve Customer request.
      content:
        application/json:
          schema:
            type: object
            required:
              - token
            properties:
              token:
                type: string
                description: Token is the aws customer token from the aws marketplace.
          examples:
            Example Request Body:
              $ref: '#/components/examples/AWS-Resolve-Customer-Request'
  schemas:
    Auth0Organization:
      title: Auth0 organization schema.
      type: object
      description: A single auth0 organization.
      properties:
        name:
          type: string
          example: My Organization
          description: The name of the organization.
          readOnly: true
        login_path:
          type: string
          example: >-
            /v2/authenticate/federated?org_id=7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
          description: The login path of the organization.
          readOnly: true
    Auth0Registration:
      title: Auth0 organization registration response
      type: object
      description: A successful Auth0 organization registration response.
      properties:
        organization_id:
          type: string
        login_path:
          type: string
    IdP:
      title: IdP Configuration
      type: object
      description: >-
        The IdP object contains the configuration data for the OIDC
        authentication integration.


        NOTE: The `openid` scope is required. Removing it could break the OIDC
        integration.
      properties:
        issuer:
          type: string
          format: uri
          example: https://myidp.com/oauth2
        login_path:
          type: string
          example: myapp
        client_id:
          type: string
          example: YOUR_CLIENT_ID
        scopes:
          type: array
          default:
            - email
            - openid
            - profile
          items:
            type: string
        claim_mappings:
          type: object
          minProperties: 3
          properties:
            name:
              type: string
              example: name
              default: name
            email:
              type: string
              example: email
              default: email
            groups:
              type: string
              default: groups
              example: custom-groups-claim
    User:
      title: User
      type: object
      description: >-
        The user object contains information about an individual user who can
        use the Konnect application and API.
      example:
        id: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
        email: user@email.com
        full_name: Test User
        preferred_name: test
        active: true
        created_at: '2022-02-07T17:46:57.52Z'
        updated_at: '2022-10-08T17:00:00.52Z'
      properties:
        id:
          type: string
          format: uuid
          example: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
          description: The User ID.
          readOnly: true
        email:
          type: string
          format: email
          example: user@email.com
          maxLength: 250
          description: The email registered to the user.
        full_name:
          type: string
          pattern: ^[\w \W]+$
          maxLength: 250
          description: The User's full name.
          example: Jane Doe
        preferred_name:
          type: string
          example: Jane
          maxLength: 250
          description: The User's preferred name.
        active:
          type: boolean
          default: true
          description: Returns True if a user has verified their email address.
          readOnly: true
        created_at:
          type: string
          format: date-time
          example: '2022-02-07T17:46:57.52Z'
          description: The time stamp for the date the account was registered.
          readOnly: true
        updated_at:
          type: string
          format: date-time
          example: '2022-10-08T17:00:00.52Z'
          description: >-
            A Unix timestamp representation of the most recent change to the
            User account.
          readOnly: true
    Team:
      title: Team
      type: object
      description: The team object contains information about a group of users.
      example:
        id: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
        name: IDM - Developers
        description: The developers for the IDM API.
        system_team: false
        labels:
          env: test
        created_at: '1992-02-07T17:46:57.52Z'
        updated_at: '2022-08-31T17:00:00.52Z'
      properties:
        id:
          type: string
          format: uuid
          example: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
          description: The team ID.
          readOnly: true
        name:
          type: string
          pattern: ^[\w \W]+$
          example: IDM - Developers
          maxLength: 250
          description: The name of the team.
        description:
          type: string
          example: The developers for the IDM API.
          maxLength: 250
          description: The team description in Konnect.
        system_team:
          type: boolean
          default: false
          description: >-
            Returns True if a user belongs to a `system_team`. System teams are
            teams that can manage Konnect objects, like "Organization Admin", or
            "Service"
          readOnly: true
        labels:
          $ref: '#/components/schemas/Labels'
        created_at:
          type: string
          format: date-time
          example: '1992-02-07T17:46:57.52Z'
          description: A Unix timestamp representation of team creation.
          readOnly: true
        updated_at:
          type: string
          format: date-time
          example: '2022-02-07T17:00:00.52Z'
          description: >
            A Unix timestamp representation of the most recent change to the
            team object in Konnect.
          readOnly: true
    TeamMapping:
      title: TeamMapping
      type: object
      description: A team assignment is a mapping of an IdP group to a Konnect Team.
      example:
        group: Service Developers
        team_ids:
          - 6801e673-cc10-498a-94cd-4271de07a0d3
      properties:
        group:
          type: string
          example: Service Developers
          description: The IdP group.
        team_ids:
          type: array
          uniqueItems: true
          description: An array of ID's that are mapped to the specified group.
          items:
