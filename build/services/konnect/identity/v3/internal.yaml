openapi: 3.0.2
info:
  title: Konnect Identity
  version: 3.0.0
  description: The management API for Kong Konnect Identity resources.
  contact:
    name: Kong
    url: 'https://konghq.com'
servers:
  - url: 'https://global.api.konghq.com/v3'
    description: Global Base URL
paths:
  /internal/auth0/register:
    post:
      operationId: post-auth0-register-internal
      summary: Register a new organization with an Auth0 authenticated user.
      description: Create a new organization with Auth0 authentication. The Auth0 user will be the organization owner.
      requestBody:
        $ref: '#/components/requestBodies/Auth0Registration'
      responses:
        '201':
          $ref: '#/components/responses/Auth0Registration'
        '400':
          $ref: '#/components/responses/IdentityBadRequest'
        '404':
          $ref: '#/components/responses/IdentityNotFound'
      tags:
        - SSO Auth0
  /internal/auth0/organizations:
    get:
      operationId: get-auth0-organizations-internal
      summary: Retrieves the list of organizations available to the given user.
      description: Retrieves the list of organizations available to the given user.
      responses:
        '200':
          $ref: '#/components/responses/Auth0OrganizationsCollection'
        '400':
          $ref: '#/components/responses/IdentityBadRequest'
        '404':
          $ref: '#/components/responses/IdentityNotFound'
      tags:
        - SSO Auth0
  /internal/users:
    get:
      operationId: get-users-internal
      summary: Retrieves users matching a provided auth0 subject and email.
      description: 'The response contains user ids and (non-deleted, non-deleting) organization ids for users associated with provided auth0 user subject.'
      parameters:
        - name: aid
          in: query
          description: Auth0 User ID
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/InternalUsers'
        '400':
          $ref: '#/components/responses/IdentityBadRequest'
  /internal/oauth/device/authorize:
    post:
      operationId: post-oauth-device-authorize
      summary: Device authorization request
      description: |-
        Initiates a device authorization workflow, generating and returning a unique device verification code.
        See https://www.rfc-editor.org/rfc/rfc8628#section-3.1 for details.
      requestBody:
        description: The request schema for the device authorization request.
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                client_id:
                  description: The client identifier.
                  type: string
                scope:
                  description: The scope of the access request.
                  type: string
              required:
                - client_id
      responses:
        '200':
          $ref: '#/components/responses/DeviceAuthorizationResponse'
        '400':
          $ref: '#/components/responses/DeviceAuthorizationGrantAuthorizeBadRequest'
      security:
        - {}
      tags:
        - Device Authorization Grant
  /internal/oauth/device/token:
    post:
      operationId: post-oauth-device-token
      summary: Device access token request
      description: |-
        This endpoint provides the machine client a means of being notified when a request for authorization is granted or rejected. 
        It is expected for the client to try the access token request repeatedly in a polling fashion based on the error code in the response.
        See https://www.rfc-editor.org/rfc/rfc8628#section-3.4 for details.
      requestBody:
        description: The request schema for the device access token request.
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                grant_type:
                  description: 'Value MUST be set to "urn:ietf:params:oauth:grant-type:device_code".'
                  type: string
                device_code:
                  description: 'The device verification code, "device_code" from the device authorization response.'
                  type: string
                client_id:
                  description: The client identifier.
                  type: string
              required:
                - grant_type
                - device_code
                - client_id
      responses:
        '200':
          $ref: '#/components/responses/DeviceAccessTokenResponse'
        '400':
          $ref: '#/components/responses/DeviceAuthorizationGrantTokenBadRequest'
      security:
        - {}
      tags:
        - Device Authorization Grant
  /internal/oauth/device/authorize/user:
    post:
      operationId: post-oauth-device-authorize-user
      summary: User device authorization request
      description: Marks the device code as authorized and is a means to provide the interactive UI flow with the necessary request metadata for the user to confirm the request.
      requestBody:
        $ref: '#/components/requestBodies/DeviceAuthorizationUserRequest'
      responses:
        '201':
          $ref: '#/components/responses/DeviceAuthorizationUserResponse'
        '400':
          $ref: '#/components/responses/IdentityBadRequest'
        '401':
          $ref: '#/components/responses/IdentityUnauthenticated'
        '403':
          $ref: '#/components/responses/Unauthorized'
      security:
        - konnectAccessToken: []
      tags:
        - Device Authorization Grant
  /internal/oauth/device/confirm:
    patch:
      operationId: patch-oauth-device-confirm
      summary: Device confirmation request
      description: Confirms the authorization request by marking the device code as confirmed.
      requestBody:
        $ref: '#/components/requestBodies/DeviceConfirmationRequest'
      responses:
        '204':
          description: No Content
        '400':
          $ref: '#/components/responses/IdentityBadRequest'
        '401':
          $ref: '#/components/responses/IdentityUnauthenticated'
        '403':
          $ref: '#/components/responses/Unauthorized'
      security:
        - konnectAccessToken: []
      tags:
        - Device Authorization Grant
  '/internal/system-accounts/{accountId}/assigned-roles':
    parameters:
      - name: accountId
        in: path
        description: ID of the system account.
        required: true
        schema:
          type: string
    get:
      operationId: get-system-accounts-assigned-roles-internal
      summary: Fetch assigned roles for a managed system account.
      description: Lists the roles belonging to a managed system account.  Returns 400 if any filter parameters are invalid.
      parameters:
        - name: filter
          in: query
          description: Filter roles returned in the response.
          required: false
          schema:
            type: object
            properties:
              role_name:
                $ref: '#/components/schemas/StringFieldEqualsFilter'
              entity_type_name:
                $ref: '#/components/schemas/StringFieldEqualsFilter'
          style: deepObject
      responses:
        '200':
          $ref: '#/components/responses/ParameterizedAssignedRolesCollection'
        '400':
          $ref: '#/components/responses/IdentityBadRequest'
        '401':
          $ref: '#/components/responses/IdentityUnauthenticated'
        '403':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/IdentityNotFound'
      security:
        - clientToken: []
      tags:
        - Managed System Accounts - Roles
    post:
      operationId: create-system-accounts-assigned-roles-internal
      summary: Assign a role to a managed System Account.
      description: Assigns a role to a managed system account. Returns 409 if role is already assigned.
      requestBody:
        $ref: '#/components/requestBodies/AssignParameterizedRole'
      responses:
        '201':
          $ref: '#/components/responses/ParameterizedAssignedRoleSingle'
        '401':
          $ref: '#/components/responses/IdentityUnauthenticated'
        '403':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/IdentityNotFound'
        '409':
          $ref: '#/components/responses/IdentityConflict'
      security:
        - clientToken: []
      tags:
        - Managed System Accounts - Roles
  /users/me:
    delete:
      operationId: delete-users-me
      summary: Delete My User Account
      description: Deletes the user account for the user identified in the token of the request.
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/IdentityUnauthenticated'
        '403':
          description: Forbidden - If there are other users in the organization or a konnectAccessToken was not provided.
      security:
        - konnectAccessToken: []
      tags:
        - Me
    patch:
      operationId: patch-users-me
      summary: Update My User Account
      description: Updates the user account for the user identified in the token of the request.
      requestBody:
        $ref: '#/components/requestBodies/UpdateUser'
      responses:
        '200':
          $ref: '#/components/responses/UserSingle'
        '400':
          description: Bad Request - Invalid Parameters
        '401':
          $ref: '#/components/responses/IdentityUnauthenticated'
        '403':
          description: Forbidden - If a konnectAccessToken was not provided.
      security:
        - konnectAccessToken: []
      tags:
        - Me
  /users/me/permissions:
    get:
      operationId: get-users-me-permissions
      summary: Get My Permissions
      description: Returns the permissions for the current user
      parameters:
        - name: filter
          in: query
          description: Filter permissions returned in the response.
          required: false
          schema:
            type: object
            properties:
              actions:
                $ref: '#/components/schemas/StringFieldEqualsFilter'
              region:
                $ref: '#/components/schemas/StringFieldEqualsFilter'
              resource:
                $ref: '#/components/schemas/StringFieldEqualsFilter'
              service:
                $ref: '#/components/schemas/StringFieldEqualsFilter'
              top_level:
                $ref: '#/components/schemas/BooleanFieldFilter'
          style: deepObject
      responses:
        '200':
          $ref: '#/components/responses/UserPermissions'
        '400':
          $ref: '#/components/responses/IdentityBadRequest'
        '401':
          $ref: '#/components/responses/IdentityUnauthenticated'
      security:
        - konnectAccessToken: []
      tags:
        - Me
  /organizations/me:
    patch:
      operationId: update-organizations-me
      summary: Update My Organization
      description: |
        Updates the current user's organization. When updating the owner, the new owner 
        must be an organization admin.
      requestBody:
        $ref: '#/components/requestBodies/UpdateOrganization'
      responses:
        '200':
          $ref: '#/components/responses/MeOrganization'
        '400':
          $ref: '#/components/responses/IdentityBadRequest'
        '401':
          $ref: '#/components/responses/IdentityUnauthenticated'
        '403':
          $ref: '#/components/responses/IdentityPermissionDenied'
        '404':
          $ref: '#/components/responses/IdentityNotFound'
      tags:
        - Me
  /refresh:
    post:
      operationId: refresh-token
      summary: Refresh Token
      description: 'Issues new tokens. Returns 401 if a) the user is no longer active, b) the token has exceeded its lifetime limit, or c) the token has been revoked.'
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/IdentityUnauthenticated'
      tags:
        - Authentication
  /logout:
    post:
      operationId: logout
      summary: Log Out
      description: Clears the auth cookies.
      responses:
        '201':
          $ref: '#/components/responses/LogoutResponse'
      tags:
        - Authentication
  /aws/marketplace/resolve-customer:
    post:
      operationId: resolveCustomer
      summary: Resolves an AWS Customer.
      description: This call the aws marketplace resolve customer api.
      requestBody:
        $ref: '#/components/requestBodies/AWSResolveCustomerRequest'
      responses:
        '201':
          $ref: '#/components/responses/ResolveCustomerResponse'
        '400':
          $ref: '#/components/responses/IdentityBadRequest'
      tags:
        - AWS
components:
  schemas:
    BaseDeviceAuthorizationGrantBadRequest:
      type: object
      properties:
        error_description:
          description: 'Human-readable text providing additional information, used to assist the client developer in understanding the error that occurred.'
          type: string
        error_uri:
          description: 'A URI identifying a human-readable web page with information about the error, used to provide the client developer with additional information about the error.'
          type: string
      title: Base Device Authorization Grant Bad Request
    DeviceAuthorizationGrantAuthorizeError:
      description: The error response for the device authorization grant request.
      type: object
      properties:
        error:
          description: |-
            A single error code from the following enum.

              invalid_request
                 The request is missing a required parameter, includes an unsupported parameter value (other than grant type),
                 repeats a parameter, includes multiple credentials, utilizes more than one mechanism for authenticating the
                 client, or is otherwise malformed.

              invalid_client
                 Client authentication failed (e.g., unknown client, no client authentication included, or unsupported
                 authentication method).

              invalid_grant
                 The provided authorization grant (e.g., authorization code, resource owner credentials) or refresh token is
                 invalid, expired, revoked, does not match the redirection URI used in the authorization request, or was issued to
                 another client.

              unauthorized_client
                 The authenticated client is not authorized to use this authorization grant type.

              unsupported_grant_type
                 The authorization grant type is not supported by the authorization server.

              invalid_scope
                 The requested scope is invalid, unknown, malformed, or exceeds the scope granted by the resource owner.
          type: string
          enum:
            - invalid_request
            - invalid_client
            - invalid_grant
            - unauthorized_client
            - unsupported_grant_type
            - invalid_scope
      required:
        - error
      title: Device Authorization Grant Authorize Error
    DeviceAuthorizationGrantTokenError:
      description: The error response for the device token request.
      type: object
      properties:
        error:
          description: |-
            A single error code from the following enum.

              authorization_pending
                 The authorization request is still pending as the end user hasn't yet completed the user-interaction steps.

              slow_down
                 A variant of "authorization_pending", the authorization request is still pending and polling should continue, but the interval MUST
                 be increased by 5 seconds for this and all subsequent requests.

              access_denied
                 The authorization request was denied.

              expired_token
                 The "device_code" has expired, and the device authorization session has concluded.
          type: string
          enum:
            - authorization_pending
            - slow_down
            - access_denied
            - expired_token
      required:
        - error
      title: Device Authorization Grant Token Error
    Auth0Organization:
      description: A single auth0 organization.
      type: object
      properties:
        name:
          description: The name of the organization.
          type: string
          example: My Organization
          readOnly: true
        login_path:
          description: The login path of the organization.
          type: string
          example: /v2/authenticate/federated?org_id=7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
          readOnly: true
      title: Auth0 organization schema.
    Auth0Registration:
      description: A successful Auth0 organization registration response.
      type: object
      properties:
        organization_id:
          type: string
        login_path:
          type: string
      title: Auth0 organization registration response
    User:
      description: The user object contains information about an individual user who can use the Konnect application and API.
      type: object
      properties:
        id:
          description: The User ID.
          type: string
          format: uuid
          example: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
          readOnly: true
        email:
          description: The email registered to the user.
          type: string
          format: email
          example: user@email.com
          maxLength: 250
        full_name:
          description: The User's full name.
          type: string
          example: Jane Doe
          maxLength: 250
          pattern: '^[\w \W]+$'
        preferred_name:
          description: The User's preferred name.
          type: string
          example: Jane
          maxLength: 250
        active:
          description: Returns True if a user has verified their email address.
          type: boolean
          default: true
          readOnly: true
        created_at:
          description: The time stamp for the date the account was registered.
          type: string
          format: date-time
          example: '2022-02-07T17:46:57.52Z'
          readOnly: true
        updated_at:
          description: A Unix timestamp representation of the most recent change to the User account.
          type: string
          format: date-time
          example: '2022-10-08T17:00:00.52Z'
          readOnly: true
      example:
        id: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
        email: user@email.com
        full_name: Test User
        preferred_name: test
        active: true
        created_at: '2022-02-07T17:46:57.52Z'
        updated_at: '2022-10-08T17:00:00.52Z'
      title: User
    ParameterizedAssignedRole:
      description: A parameterized assigned role is a role that has been assigned to a managed system account with additional parameters.
      type: object
      properties:
        id:
          description: The ID of the role assignment.
          type: string
          format: uuid
          example: eaf7adf1-32c8-4bbf-b960-d1f8456afe67
        role_name:
          description: Name of the role being assigned.
          type: string
          example: Viewer
        entity_id:
          description: A RBAC entity ID.
          type: string
          format: uuid
          example: 817d0422-45c9-4d88-8d64-45aef05c1ae7
        entity_type_name:
          description: Name of the entity type the role is being assigned to.
          type: string
          example: Control Planes
        entity_region:
          description: Region of the entity.
          type: string
          example: eu
          enum:
            - us
            - eu
            - au
            - me
            - '*'
        parameters:
          description: Additional parameters for the role assignment.
          properties:
            '':
              type: object
          type: object
      example:
        id: 54cc6168-ebb1-4300-8168-d62a0dd08fc8
        role_name: Viewer
        entity_id: 18ee2573-dec0-4b83-be99-fa7700bcdc61
        entity_type_name: Control Planes
        entity_region: us
        parameters:
          zoneName: zone3
      title: ParameterizedAssignedRole
    BooleanFieldFilter:
      description: Filter by a boolean value (true/false).
      type: boolean
      example: true
      title: BooleanFieldFilter
    UserOrgIDs:
      description: User with Organization IDs only.
      type: object
      properties:
        id:
          description: ID of a user.
          type: string
          format: uuid
          readOnly: true
        organization_id:
          description: organization ID of a user.
          type: string
          format: uuid
          readOnly: true
      title: User with Organization IDs only.
    BaseError:
      description: standard error
      type: object
      properties:
        status:
          description: |
            The HTTP status code of the error. Useful when passing the response
            body to child properties in a frontend UI. Must be returned as an integer.
          type: integer
          readOnly: true
        title:
          description: |
            A short, human-readable summary of the problem. It should not
            change between occurences of a problem, except for localization.
            Should be provided as "Sentence case" for direct use in the UI.
          type: string
          readOnly: true
        type:
          description: The error type.
          type: string
          readOnly: true
        instance:
          description: |
            Used to return the correlation ID back to the user, in the format
            kong:trace:<correlation_id>. This helps us find the relevant logs
            when a customer reports an issue.
          type: string
          readOnly: true
        detail:
          description: |
            A human readable explanation specific to this occurence of the problem.
            This field may contain request/entity data to help the user understand
            what went wrong. Enclose variable values in square brackets. Should be
            provided as "Sentence case" for direct use in the UI.
          type: string
          readOnly: true
      required:
        - status
        - title
        - instance
        - detail
      title: Error
    InvalidRules:
      description: invalid parameters rules
      type: string
      enum:
        - required
        - is_array
        - is_base64
        - is_boolean
        - is_date_time
        - is_integer
        - is_null
        - is_number
        - is_object
        - is_string
        - is_uuid
        - is_fqdn
        - is_arn
        - unknown_property
        - missing_reference
        - is_label
        - matches_regex
        - invalid
        - is_supported_network_availability_zone_list
        - is_supported_network_cidr_block
        - is_supported_provider_region
      nullable: true
      readOnly: true
    InvalidParameterStandard:
      type: object
      properties:
        field:
          type: string
          example: name
          readOnly: true
        rule:
          $ref: '#/components/schemas/InvalidRules'
        source:
          type: string
          example: body
        reason:
          type: string
          example: is a required field
          readOnly: true
      additionalProperties: false
      required:
        - field
        - reason
    InvalidParameterMinimumLength:
      type: object
      properties:
        field:
          type: string
          example: name
          readOnly: true
        rule:
          description: invalid parameters rules
          type: string
          enum:
            - min_length
            - min_digits
            - min_lowercase
            - min_uppercase
            - min_symbols
            - min_items
            - min
          nullable: false
          readOnly: true
        minimum:
          type: integer
          example: 8
        source:
          type: string
          example: body
        reason:
          type: string
          example: must have at least 8 characters
          readOnly: true
      additionalProperties: false
      required:
        - field
        - reason
        - rule
        - minimum
    InvalidParameterMaximumLength:
      type: object
      properties:
        field:
          type: string
          example: name
          readOnly: true
        rule:
          description: invalid parameters rules
          type: string
          enum:
            - max_length
            - max_items
            - max
          nullable: false
          readOnly: true
        maximum:
          type: integer
          example: 8
        source:
          type: string
          example: body
        reason:
          type: string
          example: must not have more than 8 characters
          readOnly: true
      additionalProperties: false
      required:
        - field
        - reason
        - rule
        - maximum
    InvalidParameterChoiceItem:
      type: object
      properties:
        field:
          type: string
          example: name
          readOnly: true
        rule:
          description: invalid parameters rules
          type: string
          enum:
            - enum
          nullable: false
          readOnly: true
        reason:
          type: string
          example: is a required field
          readOnly: true
        choices:
          type: array
          items: {}
          minItems: 1
          nullable: false
          readOnly: true
          uniqueItems: true
        source:
          type: string
          example: body
      additionalProperties: false
      required:
        - field
        - reason
        - rule
        - choices
    InvalidParameterDependentItem:
      type: object
      properties:
        field:
          type: string
          example: name
          readOnly: true
        rule:
          description: invalid parameters rules
          type: string
          enum:
            - dependent_fields
          nullable: true
          readOnly: true
        reason:
          type: string
          example: is a required field
          readOnly: true
        dependents:
          type: array
          items: {}
          nullable: true
          readOnly: true
          uniqueItems: true
        source:
          type: string
          example: body
      additionalProperties: false
      required:
        - field
        - rule
        - reason
        - dependents
    InvalidParameters:
      description: invalid parameters
      type: array
      items:
        oneOf:
          - $ref: '#/components/schemas/InvalidParameterStandard'
          - $ref: '#/components/schemas/InvalidParameterMinimumLength'
          - $ref: '#/components/schemas/InvalidParameterMaximumLength'
          - $ref: '#/components/schemas/InvalidParameterChoiceItem'
          - $ref: '#/components/schemas/InvalidParameterDependentItem'
      minItems: 1
      nullable: false
      uniqueItems: true
    BadRequestError:
      allOf:
        - $ref: '#/components/schemas/BaseError'
        - type: object
          required:
            - invalid_parameters
          properties:
            invalid_parameters:
              $ref: '#/components/schemas/InvalidParameters'
    NotFoundError:
      allOf:
        - $ref: '#/components/schemas/BaseError'
        - type: object
          properties:
            status:
              example: 404
            title:
              example: Not Found
            type:
              example: 'https://httpstatuses.com/404'
            instance:
              example: 'kong:trace:1234567890'
            detail:
              example: Not found
    PageMeta:
      description: Contains pagination query parameters and the total number of objects returned.
      type: object
      properties:
        number:
          type: number
          example: 1
        size:
          type: number
          example: 10
        total:
          type: number
          example: 100
      required:
        - number
        - size
        - total
    PaginatedMeta:
      description: returns the pagination information
      type: object
      properties:
        page:
          $ref: '#/components/schemas/PageMeta'
      required:
        - page
      title: PaginatedMeta
    UnauthorizedError:
      allOf:
        - $ref: '#/components/schemas/BaseError'
        - type: object
          properties:
            status:
              example: 401
            title:
              example: Unauthorized
            type:
              example: 'https://httpstatuses.com/401'
            instance:
              example: 'kong:trace:1234567890'
            detail:
              example: Invalid credentials
    ConflictError:
      allOf:
        - $ref: '#/components/schemas/BaseError'
        - type: object
          properties:
            status:
              example: 409
            title:
              example: Conflict
            type:
              example: 'https://httpstatuses.com/409'
            instance:
              example: 'kong:trace:1234567890'
            detail:
              example: Conflict
    StringFieldEqualsFilter:
      description: Filter a string value by exact match.
      type: string
      title: StringFieldEqualsFilter
    ForbiddenError:
      allOf:
        - $ref: '#/components/schemas/BaseError'
        - type: object
          properties:
            status:
              example: 403
            title:
              example: Forbidden
            type:
              example: 'https://httpstatuses.com/403'
            instance:
              example: 'kong:trace:1234567890'
            detail:
