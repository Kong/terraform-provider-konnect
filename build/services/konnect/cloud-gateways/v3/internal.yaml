    QuotaExceededExample:
      value:
        status: 403
        title: Quota Exceeded
        instance: 'konnect:trace:2822394689570210664'
        detail: 'Maximum number of <quota name> exceeded. Max allowed: <quota value>.'
    ConfigurationConflictExample:
      value:
        status: 409
        title: Conflict
        instance: 'konnect:trace:2822394689570210664'
        detail: Proposed cloud gateway configuration and current cloud gateway configuration are identical.
    NetworkNameLengthCheckBadRequestExample:
      value:
        status: 400
        title: Invalid Request
        instance: 'konnect:trace:2822394689570210664'
        detail: Invalid Parameters
        invalid_parameters:
          - field: name
            rule: max_length
            reason: name must be shorter than or equal to 120 characters
            maximum: 120
    TransitGatewayNameLengthCheckBadRequestExample:
      value:
        status: 400
        title: Invalid Request
