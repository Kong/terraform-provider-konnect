openapi: 3.0.3
info:
  title: Portal Management V3
  version: 3.0.1
  description: The management API for Portals
  contact:
    name: Kong
    url: 'https://konghq.com'
servers:
  - url: 'https://us.api.konghq.com/v3'
    description: United-States Production region
  - url: 'https://eu.api.konghq.com/v3'
    description: Europe Production region
  - url: 'https://au.api.konghq.com/v3'
    description: Australia Production region
  - url: 'https://me.api.konghq.com/v3'
    description: Middle-East Production region
paths:
  /portals:
    get:
      operationId: list-portals
      summary: List V3 Portals
      description: 'Lists developer portals defined in this region for this organization. Each developer portal is available at a unique address and has isolated configuration, customization, developers, and applications.'
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/SortPortalsV3'
        - name: filter
          in: query
          description: Filter portals returned in the response.
          required: false
          schema:
            $ref: '#/components/schemas/PortalFilterParameters'
          style: deepObject
      responses:
        '200':
          $ref: '#/components/responses/ListPortalsResponseV3'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              examples:
                ListPortalsV3BadRequestExample1:
                  $ref: '#/components/examples/ListPortalsV3BadRequestExample1'
                ListPortalsV3BadRequestExample2:
                  $ref: '#/components/examples/ListPortalsV3BadRequestExample2'
                ListPortalsV3BadRequestExample3:
                  $ref: '#/components/examples/ListPortalsV3BadRequestExample3'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      tags:
        - V3 Portals
    post:
      operationId: create-portal
      summary: Create V3 Portal
      description: Creates a new developer portal scoped in this region for this organization.
      requestBody:
        $ref: '#/components/requestBodies/CreatePortalV3'
      responses:
        '201':
          $ref: '#/components/responses/PortalResponseV3'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              examples:
                UpdatePortalV3BadRequestExample1:
                  $ref: '#/components/examples/UpdatePortalV3BadRequestExample1'
                UpdatePortalV3BadRequestExample2:
                  $ref: '#/components/examples/UpdatePortalV3BadRequestExample2'
                UpdatePortalV3BadRequestExample3:
                  $ref: '#/components/examples/UpdatePortalV3BadRequestExample3'
                UpdatePortalV3BadRequestExample4:
                  $ref: '#/components/examples/UpdatePortalV3BadRequestExample4'
                UpdatePortalV3BadRequestExample5:
                  $ref: '#/components/examples/UpdatePortalV3BadRequestExample5'
                UpdatePortalV3BadRequestExample6:
                  $ref: '#/components/examples/UpdatePortalV3BadRequestExample6'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      tags:
        - V3 Portals
  '/portals/{portalId}':
    parameters:
      - name: portalId
        in: path
        description: ID of the portal.
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: get-portal
      summary: Get V3 Portal
      description: 'Returns the configuration for a single developer portal. This allows you to understand the current visibility, access, and domain settings.'
      responses:
        '200':
          $ref: '#/components/responses/PortalResponseV3'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - V3 Portals
    patch:
      operationId: update-portal
      summary: Update V3 Portal
      description: 'Updates the configuration for a single portal including the visibility, access, and custom domain settings.'
      requestBody:
        $ref: '#/components/requestBodies/UpdatePortalV3'
      responses:
        '200':
          $ref: '#/components/responses/PortalResponseV3'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              examples:
                UpdatePortalV3BadRequestExample1:
                  $ref: '#/components/examples/UpdatePortalV3BadRequestExample1'
                UpdatePortalV3BadRequestExample2:
                  $ref: '#/components/examples/UpdatePortalV3BadRequestExample2'
                UpdatePortalV3BadRequestExample3:
                  $ref: '#/components/examples/UpdatePortalV3BadRequestExample3'
                UpdatePortalV3BadRequestExample4:
                  $ref: '#/components/examples/UpdatePortalV3BadRequestExample4'
                UpdatePortalV3BadRequestExample5:
                  $ref: '#/components/examples/UpdatePortalV3BadRequestExample5'
                UpdatePortalV3BadRequestExample6:
                  $ref: '#/components/examples/UpdatePortalV3BadRequestExample6'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
      tags:
        - V3 Portals
    delete:
      operationId: delete-portal
      summary: Delete Portal
      description: 'Deletes a single portal, along with all related entities.'
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - V3 Portals
  '/portals/{portalId}/verify-domain':
    post:
      operationId: verify-portal-domain
      summary: Verify Custom Domain
      description: 'Verifies the current status of the custom hosted domain for this portal, indicating whether the appropriate CNAME properties have propagated and if a corresponding SSL certificate has been generated.'
      parameters:
        - $ref: '#/components/parameters/PortalId'
      responses:
        '200':
          $ref: '#/components/responses/VerifyPortalDomainResponseV3'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              examples:
                VerifyPortalDomainBadRequestExample1:
                  $ref: '#/components/examples/VerifyPortalDomainBadRequestExample1'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - V3 Portals
  '/portals/{portalId}/assets/logo':
    parameters:
      - $ref: '#/components/parameters/PortalId'
    get:
      operationId: get-portal-asset-logo
      summary: Get Portal Logo
      description: Returns the logo of the portal.
      responses:
        '200':
          $ref: '#/components/responses/PortalAssetResponseV3'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      tags:
        - V3 Portal Assets
    put:
      operationId: replace-portal-asset-logo
      summary: Replace Portal Logo
      description: Replaces the logo of the portal.
      requestBody:
        $ref: '#/components/requestBodies/ReplacePortalImageAssetV3'
      responses:
        '200':
          $ref: '#/components/responses/PortalAssetResponseV3'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              examples:
                ReplacePortalImageAssetV3BadRequestExample1:
                  $ref: '#/components/examples/ReplacePortalImageAssetV3BadRequestExample1'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      tags:
        - V3 Portal Assets
  '/portals/{portalId}/assets/favicon':
    parameters:
      - $ref: '#/components/parameters/PortalId'
    get:
      operationId: get-portal-asset-favicon
      summary: Get Portal Favicon
      description: Returns the favicon of the portal.
      responses:
        '200':
          $ref: '#/components/responses/PortalAssetResponseV3'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      tags:
        - V3 Portal Assets
    put:
      operationId: replace-portal-asset-favicon
      summary: Replace Portal Favicon
      description: Replaces the favicon of the portal. The favicon is used in the browser tab of the portal.
      requestBody:
        $ref: '#/components/requestBodies/ReplacePortalImageAssetV3'
      responses:
        '200':
          $ref: '#/components/responses/PortalAssetResponseV3'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              examples:
                ReplacePortalImageAssetV3BadRequestExample1:
                  $ref: '#/components/examples/ReplacePortalImageAssetV3BadRequestExample1'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      tags:
        - V3 Portal Assets
  '/portals/{portalId}/pages':
    get:
      operationId: list-portal-pages
      summary: List Portal Pages
      description: Returns the paginated list of custom pages that have been created for this portal.
      parameters:
        - $ref: '#/components/parameters/SortPortalPages'
        - $ref: '#/components/parameters/PortalId'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
        - name: filter
          in: query
          description: Filter pages returned in the response.
          required: false
          schema:
            $ref: '#/components/schemas/PortalPagesFilterParameters'
          style: deepObject
      responses:
        '200':
          $ref: '#/components/responses/ListPortalPages'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              examples:
                ListPortalPagesBadRequestExample1:
                  $ref: '#/components/examples/ListPortalPagesBadRequestExample1'
                ListPortalPagesBadRequestExample2:
                  $ref: '#/components/examples/ListPortalPagesBadRequestExample2'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - V3 Portal Pages
    post:
      operationId: create-portal-page
      summary: Create Portal Page
      description: 'Creates a new custom page for this portal. Custom pages can be used to display static content, documentation, or other information to developers.'
      parameters:
        - $ref: '#/components/parameters/PortalId'
      requestBody:
        $ref: '#/components/requestBodies/CreatePortalPage'
      responses:
        '201':
          $ref: '#/components/responses/PortalPage'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              examples:
                UpdatePortalPageBadRequestExample1:
                  $ref: '#/components/examples/UpdatePortalPageBadRequestExample1'
                'UpdatePortalPageBadRequestExample2:':
                  $ref: '#/components/examples/UpdatePortalPageBadRequestExample2'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - V3 Portal Pages
  '/portals/{portalId}/pages/{pageId}':
    get:
      operationId: get-portal-page
      summary: Get Portal Page
      description: 'Returns the configuration of a single custom page for this portal. Custom pages can be used to display static content, documentation, or other information to developers.'
      parameters:
        - $ref: '#/components/parameters/PortalId'
        - $ref: '#/components/parameters/PageId'
      responses:
        '200':
          $ref: '#/components/responses/PortalPage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - V3 Portal Pages
    patch:
      operationId: update-portal-page
      summary: Update Portal Page
      description: Updates the configuration of a single custom page for this portal.
      parameters:
        - $ref: '#/components/parameters/PortalId'
        - $ref: '#/components/parameters/PageId'
      requestBody:
        $ref: '#/components/requestBodies/UpdatePortalPage'
      responses:
        '200':
          $ref: '#/components/responses/PortalPage'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              examples:
                'UpdatePortalPageBadRequestExample1:':
                  $ref: '#/components/examples/UpdatePortalPageBadRequestExample1'
                'UpdatePortalPageBadRequestExample2:':
                  $ref: '#/components/examples/UpdatePortalPageBadRequestExample2'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - V3 Portal Pages
    delete:
      operationId: delete-portal-page
      summary: Delete Portal Page
      description: Deletes a single custom page for this portal.
      parameters:
        - $ref: '#/components/parameters/PortalId'
        - $ref: '#/components/parameters/PageId'
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - V3 Portal Pages
  '/portals/{portalId}/snippets':
    get:
      operationId: list-portal-snippets
      summary: List Portal snippets
      description: Returns the paginated list of custom snippets that have been created for this portal.
      parameters:
        - $ref: '#/components/parameters/SortPortalSnippets'
        - $ref: '#/components/parameters/PortalId'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
        - name: filter
          in: query
          description: Filter snippets returned in the response.
          required: false
          schema:
            $ref: '#/components/schemas/PortalSnippetsFilterParameters'
          style: deepObject
      responses:
        '200':
          $ref: '#/components/responses/ListPortalSnippets'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              examples:
                ListPortalSnippetsBadRequestExample1:
                  $ref: '#/components/examples/ListPortalSnippetsBadRequestExample1'
                ListPortalSnippetsBadRequestExample2:
                  $ref: '#/components/examples/ListPortalSnippetsBadRequestExample2'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - V3 Portal Snippets
    post:
      operationId: create-portal-snippet
      summary: Create Portal Snippet
      description: 'Creates a new custom snippet for this portal. Custom snippets can be used to display static content, documentation, or other information to developers.'
      parameters:
        - $ref: '#/components/parameters/PortalId'
      requestBody:
        $ref: '#/components/requestBodies/CreatePortalSnippet'
      responses:
        '201':
          $ref: '#/components/responses/PortalSnippet'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              examples:
                UpdatePortalPageBadRequestExample1:
                  $ref: '#/components/examples/UpdatePortalSnippetBadRequestExample1'
                UpdatePortalSnippetBadRequestExample2:
                  $ref: '#/components/examples/UpdatePortalSnippetBadRequestExample2'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - V3 Portal Snippets
  '/portals/{portalId}/snippets/{snippetId}':
    get:
      operationId: get-portal-snippet
      summary: Get Portal Snippet
      description: 'Returns the configuration of a single custom snippet for this portal. Custom snippets can be used to display static content, documentation, or other information to developers.'
      parameters:
        - $ref: '#/components/parameters/PortalId'
        - $ref: '#/components/parameters/SnippetId'
      responses:
        '200':
          $ref: '#/components/responses/PortalSnippet'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - V3 Portal Snippets
    patch:
      operationId: update-portal-snippet
      summary: Update Portal Snippet
      description: Updates the configuration of a single custom snippet for this portal.
      parameters:
        - $ref: '#/components/parameters/PortalId'
        - $ref: '#/components/parameters/SnippetId'
      requestBody:
        $ref: '#/components/requestBodies/UpdatePortalSnippet'
      responses:
        '200':
          $ref: '#/components/responses/PortalSnippet'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              examples:
                'UpdatePortalPageBadRequestExample1:':
                  $ref: '#/components/examples/UpdatePortalPageBadRequestExample1'
                'UpdatePortalPageBadRequestExample2:':
                  $ref: '#/components/examples/UpdatePortalPageBadRequestExample2'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - V3 Portal Snippets
    delete:
      operationId: delete-portal-snippet
      summary: Delete Portal Snippet
      description: Deletes a single custom snippet for this portal.
      parameters:
        - $ref: '#/components/parameters/PortalId'
        - $ref: '#/components/parameters/SnippetId'
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - V3 Portal Snippets
  '/portals/{portalId}/default-content':
    post:
      operationId: create-default-content
      summary: Creates the default pages for a portal
      description: Creates the default pages for a portal if they do not already exists.
      parameters:
        - $ref: '#/components/parameters/PortalId'
      responses:
        '201':
          $ref: '#/components/responses/DefaultContentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - V3 Portal Pages
components:
  parameters:
    PageId:
      schema:
        type: string
        format: uuid
        example: ebbac5b0-ac89-45c3-9d2e-c4542c657e79
      name: pageId
      in: path
      required: true
      description: ID of the page.
    PageNumber:
      name: 'page[number]'
      description: Determines which page of the entities to retrieve.
      required: false
      in: query
      allowEmptyValue: true
      schema:
        type: integer
        example: 1
    PageSize:
      name: 'page[size]'
      description: The maximum number of items to include per page. The last page of a collection may include fewer items.
      required: false
      in: query
      allowEmptyValue: true
      schema:
        type: integer
        example: 10
    PortalId:
      schema:
        type: string
        format: uuid
      name: portalId
      in: path
      required: true
      description: ID of the portal.
    SnippetId:
      schema:
        type: string
        format: uuid
        example: ebbac5b0-ac89-45c3-9d2e-c4542c657e79
      name: snippetId
      in: path
      required: true
      description: ID of the snippet.
    SortPortalPages:
      name: sort
      description: |
        Sorts a collection of portal pages. Supported sort attributes are:
          - created_at
          - updated_at
          - path
          - title
          - public
      in: query
      required: false
      schema:
        type: string
    SortPortalSnippets:
      name: sort
      description: |
        Sorts a collection of portal snippets. Supported sort attributes are:
          - created_at
          - updated_at
          - name
          - title
          - public
      in: query
      required: false
      schema:
        type: string
    SortPortalsV3:
      name: sort
      description: |
        Sorts a collection of portals. Supported sort attributes are:
          - name
          - description
          - authentication_enabled
          - rbac_enabled
          - auto_approve_applications
          - auto_approve_developers
          - default_domain
          - custom_domain
          - created_at
          - updated_at
      in: query
      required: false
      schema:
        type: string
  schemas:
    PortalImageAssetV3:
      type: string
      format: binary
      example: 'data:image/png;base64,bmljZV9sb29raW5nX3BpY3R1cmU='
      title: PortalImageAssetV3
    ReplacePortalImageAssetV3:
      description: 'The image data to upload, along with an optional filename. Images must be a data URL with binary image data in base 64 format. See https://developer.mozilla.org/en-US/docs/Web/HTTP/Basics_of_HTTP/Data_URLs.'
      type: object
      properties:
        data:
          $ref: '#/components/schemas/ImageDataUri'
        filename:
          type: string
          maxLength: 512
      example:
        data: 'data:image/jpeg;base64,bmljZV9sb29raW5nX3BpY3R1cmU='
      additionalProperties: false
      nullable: true
      required:
        - data
      title: ReplacePortalImageAssetV3
    PagePath:
      description: The path of a page in a portal with a leading slash.
      type: string
      example: /my-page
      maxLength: 512
      title: PagePath
    PageTitle:
      description: The title of a page in a portal.
      type: string
      example: My Page
      maxLength: 512
      title: PageTitle
    PageContent:
      description: The renderable markdown content of a page in a portal.
      type: string
      example: '# Welcome to My Page'
      maxLength: 1000000
      title: PageContent
    SnippetName:
      description: The unique name of a snippet in a portal.
      type: string
      example: my-snippet
      maxLength: 512
      title: SnippetName
    SnippetTitle:
      description: The display title of a snippet in a portal.
      type: string
      example: My Snippet
      maxLength: 512
      title: SnippetTitle
    SnippetContent:
      description: The renderable markdown content of a page in a portal.
      type: string
      example: '# Welcome to My Snippet'
      maxLength: 1000000
      title: SnippetContent
    PublicStatus:
      description: Whether the resource is publicly accessible to non-authenticated users. Defaults to false.
      type: boolean
      example: true
      title: PublicStatus
    PublishedStatus:
      description: Whether the resource is visible on a given portal. Defaults to false.
      type: boolean
      example: true
      title: PublishedStatus
    Description:
      type: string
      example: A custom page about developer portals
      maxLength: 160
      title: Resource Description
    PagePublicStatusWithDefault:
      description: Whether a page is publicly accessible to non-authenticated users.
      type: boolean
      example: true
      default: false
      title: PagePublicStatusWithDefault
    SnippetPublicStatusWithDefault:
      description: Whether a page is publicly accessible to non-authenticated users.
      type: boolean
      example: true
      default: false
      title: PagePublicStatusWithDefault
    UpdatePortalPageRequest:
      description: Update a page in a portal.
      type: object
      properties:
        path:
          $ref: '#/components/schemas/PagePath'
        title:
          $ref: '#/components/schemas/PageTitle'
        content:
          $ref: '#/components/schemas/PageContent'
        public:
          $ref: '#/components/schemas/PublicStatus'
        published:
          $ref: '#/components/schemas/PublishedStatus'
        description:
          $ref: '#/components/schemas/Description'
      additionalProperties: false
      title: UpdatePortalPageRequest
    CreatePortalPageRequest:
      description: Create a page in a portal.
      type: object
      properties:
        path:
          $ref: '#/components/schemas/PagePath'
        title:
          $ref: '#/components/schemas/PageTitle'
        content:
          $ref: '#/components/schemas/PageContent'
        public:
          $ref: '#/components/schemas/PagePublicStatusWithDefault'
        published:
          $ref: '#/components/schemas/PublishedStatus'
        description:
          $ref: '#/components/schemas/Description'
      additionalProperties: false
      required:
        - path
        - title
        - content
      title: CreatePortalPageRequest
    PortalPageInfo:
      description: Information about a page in a portal.
