    ListRolesResponse:
      title: ListRolesResponse
      description: >-
        The set of roles available to associate with resources and assign to
        teams.
      type: object
      properties:
        services:
          type: object
          required:
            - name
            - roles
          properties:
            name:
              type: string
              enum:
                - Services
            roles:
              type: object
              required:
                - apiviewer
                - apiconsumer
              properties:
                apiviewer:
                  type: object
                  required:
                    - name
                    - description
                  properties:
                    name:
                      type: string
                      enum:
                        - API Viewer
                    description:
                      type: string
                      enum:
                        - >-
                          API Viewers have read-only access to the documentation
                          of a service in a portal
                apiconsumer:
                  type: object
                  required:
                    - name
                    - description
                  properties:
                    name:
                      type: string
                      enum:
                        - API Consumer
                    description:
                      type: string
                      enum:
                        - API Consumers can make calls to the given service
      required:
        - services
      example:
        services:
          name: Services
          roles:
            apiviewer:
              name: API Viewer
              description: >-
                API Viewers have read-only access to the documentation of a
                service in a portal
            apiconsumer:
              name: API Consumer
              description: API Consumers can make calls to the given service
