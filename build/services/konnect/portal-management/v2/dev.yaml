    NotFoundExample:
      value:
        status: 404
        title: Not Found
        instance: kong:trace:6816496025408232265
        detail: Not Found
  requestBodies:
    CreatePortal:
      description: Create a portal.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreatePortalRequest'
          examples:
            Example 1:
              $ref: '#/components/examples/CreatePortalExample1'
            Public Portal:
              $ref: '#/components/examples/CreatePortalExamplePublic'
            Enable RBAC:
              $ref: '#/components/examples/CreatePortalExampleRbacEnabled'
            Auto Approve Settings:
              $ref: '#/components/examples/CreatePortalExampleAutoApprove'
            Custom Domains:
              $ref: '#/components/examples/CreatePortalExampleCustomDomains'
    CreatePortalPage:
      description: Create a page in a portal.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreatePortalPageRequest'
          examples:
            Example 1:
              $ref: '#/components/examples/CreatePortalPageExample1'
    UpdatePortalPage:
      description: Update a page in a portal.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UpdatePortalPageRequest'
          examples:
            Example 1:
              $ref: '#/components/examples/UpdatePortalPageExample1'
  parameters:
    SortPortals:
      name: sort
      description: |
        Sorts a collection of portals. Supported sort attributes are:
          - name
          - description
          - is_public
          - rbac_enabled
          - auto_approve_applications
          - auto_approve_developers
          - default_domain
          - custom_domain
          - custom_client_domain
          - created_at
          - updated_at
      in: query
      required: false
      schema:
        type: string
    SortPortalPages:
      name: sort
      description: |
        Sorts a collection of portal pages. Supported sort attributes are:
          - created_at
          - updated_at
          - path
          - title
          - public
      in: query
      required: false
      schema:
        type: string
    PageSize:
      name: page[size]
      description: >-
        The maximum number of items to include per page. The last page of a
        collection may include fewer items.
      required: false
      in: query
      allowEmptyValue: true
      schema:
        type: integer
        example: 10
    PageNumber:
      name: page[number]
      description: Determines which page of the entities to retrieve.
      required: false
      in: query
      allowEmptyValue: true
      schema:
        type: integer
        example: 1
    parameters-PortalId:
      schema:
        type: string
        format: uuid
      name: portalId
      in: path
      required: true
      description: ID of the portal.
    PageId:
      schema:
        type: string
        format: uuid
        example: ebbac5b0-ac89-45c3-9d2e-c4542c657e79
      name: pageId
      in: path
      required: true
      description: ID of the page.
  responses:
    ListPortals:
      description: A paginated list of portals in the current region of an organization.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ListPortalsResponse'
          examples:
            Example 1:
              $ref: '#/components/examples/ListPortalsExample1'
    CreatePortal:
      description: Details about the portal that was created.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreatePortalResponse'
          examples:
            Example 1:
              $ref: '#/components/examples/UpdatePortalResponseExample1'
    PortalPage:
      description: Details about a page in a portal.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PortalPageResponse'
          examples:
            Example 1:
              $ref: '#/components/examples/PortalPageExample1'
    ListPortalPages:
      description: A paginated list of custom pages in a portal.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ListPortalPagesResponse'
          examples:
            Example 1:
              $ref: '#/components/examples/ListPortalPagesExample1'
    Unauthorized:
      description: Unauthorized
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/UnauthorizedError'
          examples:
            UnauthorizedExample:
              $ref: '#/components/examples/UnauthorizedExample'
    Forbidden:
      description: Forbidden
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ForbiddenError'
          examples:
            UnauthorizedExample:
              $ref: '#/components/examples/ForbiddenExample'
    NotFound:
      description: Not Found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/NotFoundError'
          examples:
            NotFoundExample:
              $ref: '#/components/examples/NotFoundExample'
  schemas:
    PagePath:
      title: PagePath
      description: The path of a page in a portal with a leading slash.
      type: string
      maxLength: 512
      example: /my-page
    PageTitle:
      title: PageTitle
      description: The title of a page in a portal.
      type: string
      maxLength: 512
      example: My Page
    PageContent:
      title: PageContent
      description: The renderable markdown content of a page in a portal.
      type: string
      maxLength: 1000000
      example: '# Welcome to My Page'
    PagePublicStatus:
      title: PagePublicStatus
      description: Whether a page is publicly accessible to non-authenticated users.
      type: boolean
      example: true
    PagePublicStatusWithDefault:
      title: PagePublicStatusWithDefault
      description: Whether a page is publicly accessible to non-authenticated users.
      type: boolean
      default: false
      example: true
    UpdatePortalPageRequest:
      title: UpdatePortalPageRequest
      description: Update a page in a portal.
      type: object
      additionalProperties: false
      properties:
        path:
          $ref: '#/components/schemas/PagePath'
        title:
          $ref: '#/components/schemas/PageTitle'
        content:
          $ref: '#/components/schemas/PageContent'
        public:
          $ref: '#/components/schemas/PagePublicStatus'
    CreatePortalPageRequest:
      title: CreatePortalPageRequest
      description: Create a page in a portal.
      type: object
      additionalProperties: false
      required:
        - path
        - title
        - content
        - public
      properties:
        path:
          $ref: '#/components/schemas/PagePath'
        title:
          $ref: '#/components/schemas/PageTitle'
        content:
          $ref: '#/components/schemas/PageContent'
        public:
          $ref: '#/components/schemas/PagePublicStatusWithDefault'
    PortalPageInfo:
      title: PortalPageInfo
      description: Information about a page in a portal.
      type: object
      additionalProperties: false
      required:
        - id
        - path
        - title
        - public
        - created_at
        - updated_at
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        path:
          $ref: '#/components/schemas/PagePath'
        title:
          $ref: '#/components/schemas/PageTitle'
        public:
          $ref: '#/components/schemas/PagePublicStatus'
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
    PortalPageResponse:
      title: PortalPageResponse
      description: Details about a page in a portal.
      additionalProperties: false
      required:
        - id
        - path
        - title
        - content
        - public
        - created_at
        - updated_at
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        path:
          $ref: '#/components/schemas/PagePath'
        title:
          $ref: '#/components/schemas/PageTitle'
        content:
          $ref: '#/components/schemas/PageContent'
        public:
          $ref: '#/components/schemas/PagePublicStatus'
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
    ListPortalPagesResponse:
      title: ListPortalPagesResponse
      description: A paginated list of custom pages in a portal.
      additionalProperties: false
      required:
        - data
        - meta
      properties:
        data:
          type: array
