openapi: 3.0.3
info:
  title: Portal API
  version: 3.0.0
  description: Portal API
  contact:
    name: Kong
    url: 'https://cloud.konghq.com'
servers:
  - url: 'https://custom.example.com'
    description: Production
paths:
  /api/v3/apis:
    get:
      operationId: list-apis
      summary: List APIs
      description: Returns a paginated list of published APIs.
      parameters:
        - $ref: '#/components/parameters/ApiFilters'
        - $ref: '#/components/parameters/ApiSort'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
      responses:
        '200':
          $ref: '#/components/responses/ApiList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
        - portalAccessToken: []
        - {}
      tags:
        - apis
  '/api/v3/apis/{apiId}':
    get:
      operationId: fetch-api
      summary: Fetch an API
      description: Gets the details for an existing published API.
      parameters:
        - $ref: '#/components/parameters/ApiId'
      responses:
        '200':
          $ref: '#/components/responses/ApiGet'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - portalAccessToken: []
        - {}
      tags:
        - apis
  '/api/v3/apis/{apiId}/actions':
    parameters:
      - $ref: '#/components/parameters/ApiId'
    get:
      operationId: get-api-actions
      summary: Get API Actions
      description: Get a list of actions that the current developer is allowed to perform on an API.
      responses:
        '200':
          $ref: '#/components/responses/ApiActions'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/NotAvailable'
      tags:
        - apis
  '/api/v3/apis/{apiId}/documents':
    get:
      operationId: list-api-documents
      summary: List API documents
      description: 'Returns a list of documents that are associated with an API. The list is paginated, and is in either a list or tree format (based on the Accept header).'
      parameters:
        - $ref: '#/components/parameters/ApiId'
        - name: Accept
          in: header
          schema:
            $ref: '#/components/schemas/DocumentContentTypeEnum'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
      responses:
        '200':
          $ref: '#/components/responses/ApiDocumentList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - portalAccessToken: []
        - {}
      tags:
        - documentation
  '/api/v3/apis/{apiId}/documents/{documentId}':
    get:
      operationId: fetch-api-document
      summary: Fetch API document
      description: Returns the specified document from the API's document tree.
      parameters:
        - name: Accept
          in: header
          schema:
            $ref: '#/components/schemas/DocumentFormatContentTypeEnum'
        - $ref: '#/components/parameters/ApiId'
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          $ref: '#/components/responses/ApiDocumentGet'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - portalAccessToken: []
        - {}
      tags:
        - documentation
  '/api/v3/apis/{apiId}/specifications':
    get:
      operationId: list-api-specs
      summary: List API specs
      description: Returns the API specification documents attached to the API. Currently only OpenAPI is supported.
      parameters:
        - $ref: '#/components/parameters/ApiId'
      responses:
        '200':
          $ref: '#/components/responses/ApiSpecList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - portalAccessToken: []
        - {}
      tags:
        - documentation
  '/api/v3/apis/{apiId}/specifications/{specId}':
    get:
      operationId: fetch-api-spec
      summary: Fetch API spec
      description: Returns an API specification document for an API. Currently only OpenAPI is supported.
      parameters:
        - $ref: '#/components/parameters/ApiId'
        - $ref: '#/components/parameters/SpecId'
      responses:
        '200':
          $ref: '#/components/responses/ApiSpecGet'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - portalAccessToken: []
        - {}
      tags:
        - documentation
  /api/v3/portal:
    get:
      operationId: get-portal-context-v3
      summary: Get portal context
      description: Returns the portal context object.
      responses:
        '200':
          $ref: '#/components/responses/GetPortalContextResponseV3'
      security:
        - portalAccessToken: []
        - {}
      tags:
        - portal
  /api/v3/portal/pages:
    get:
      operationId: list-portal-pages
      summary: List Portal Pages
      description: 'Returns a paginated list of pages for the portal. Each page has a path, title, and content. Public pages will be returned for non-authenticated users, while both private and public pages will be returned for authenticated users.'
      parameters:
        - $ref: '#/components/parameters/SortPortalPages'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/FilterByTitleEquality'
        - $ref: '#/components/parameters/FilterByTitleEqualityShort'
        - $ref: '#/components/parameters/FilterByTitleContains'
        - $ref: '#/components/parameters/FilterByPathEquality'
        - $ref: '#/components/parameters/FilterByPathEqualityShort'
        - $ref: '#/components/parameters/FilterByPathContains'
        - $ref: '#/components/parameters/FilterByPublicEquality'
        - $ref: '#/components/parameters/FilterByPublicEqualityShort'
      responses:
        '200':
          $ref: '#/components/responses/ListPortalPagesResponse'
      security:
        - portalAccessToken: []
        - {}
      tags:
        - portal
  /api/v3/portal/pages/content:
    get:
      operationId: get-portal-page
      summary: Get Portal Page
      description: 'Returns a single page for the portal. Each page has a path, title, and content. Public pages will be returned for non-authenticated users, while both private and public pages will be returned for authenticated users.'
      parameters:
        - name: path
          in: query
          description: The unique identifier of the page
          required: true
          schema:
            type: string
          example: /about/company
      responses:
        '200':
          $ref: '#/components/responses/GetPortalPageResponse'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - portalAccessToken: []
        - {}
      tags:
        - portal
  /api/v3/portal/snippets:
    get:
      operationId: list-portal-snippets
      summary: List Portal Snippets
      description: 'Returns a paginated list of snippets for the portal. Each snippet has a name, title, and content. Public snippets will be returned for non-authenticated users, while both private and public snippets will be returned for authenticated users.'
      parameters:
        - $ref: '#/components/parameters/SortPortalSnippets'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/FilterByTitleEquality'
        - $ref: '#/components/parameters/FilterByTitleEqualityShort'
        - $ref: '#/components/parameters/FilterByTitleContains'
        - $ref: '#/components/parameters/FilterByNameEquality'
        - $ref: '#/components/parameters/FilterByNameEqualityShort'
        - $ref: '#/components/parameters/FilterByPathContains'
        - $ref: '#/components/parameters/FilterByPublicEquality'
        - $ref: '#/components/parameters/FilterByPublicEqualityShort'
      responses:
        '200':
          $ref: '#/components/responses/ListPortalSnippetsResponse'
      security:
        - portalAccessToken: []
        - {}
      tags:
        - portal
  /api/v3/portal/snippets/content:
    get:
      operationId: get-portal-snippet
      summary: Get Portal Snippet
      description: 'Returns a single snippet for the portal. Each snippet has a name, title, and content. Public snippets will be returned for non-authenticated users, while both private and public snippets will be returned for authenticated users.'
      parameters:
        - name: name
          in: query
          description: The name of the snippet
          required: true
          schema:
            type: string
          example: snip1
      responses:
        '200':
          $ref: '#/components/responses/GetPortalSnippetResponse'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - portalAccessToken: []
        - {}
      tags:
        - portal
components:
  parameters:
    ApiFilters:
      name: filter
      description: Filters APIs in the response.
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/ApiFilterParameters'
      style: deepObject
    ApiId:
      name: apiId
      in: path
      required: true
      description: Contains a unique identifier used by the Portal API for this resource.
      schema:
        type: string
        format: uuid
    ApiSort:
      name: sort
      description: |
        Sorts a collection of APIs. Supported sort attributes are:
          - name
          - version
          - created_at
          - updated_at
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/SortQuery'
    DocumentId:
      schema:
        type: string
        format: uuid
        example: d32d905a-ed33-46a3-a093-d8f536af9a8a
      name: documentId
      in: path
      required: true
      description: ID of the document.
    FilterByNameEquality:
      name: 'filter[name][eq]'
      description: Filter by direct equality comparison of the name property with a supplied value.
      in: query
      required: false
      schema:
        type: string
        example: good service
    FilterByNameEqualityShort:
      name: 'filter[name]'
      description: Filter by direct equality comparison (short-hand) of the name property with a supplied value.
      in: query
      required: false
      schema:
        type: string
        example: good service
    FilterByPathContains:
      name: 'filter[path][contains]'
      description: Filter by contains comparison of the path property with a supplied substring
      in: query
      required: false
      schema:
        type: string
        example: good
    FilterByPathEquality:
      name: 'filter[path][eq]'
      description: Filter by direct equality comparison of the path property with a supplied value.
      in: query
      required: false
      schema:
        type: string
        example: good-page
    FilterByPathEqualityShort:
      name: 'filter[path]'
      description: Filter by direct equality comparison (short-hand) of the path property with a supplied value.
      in: query
      required: false
      schema:
        type: string
        example: good-page
    FilterByPublicEquality:
      name: 'filter[public][eq]'
      description: 'Filter by whether the pages returned are public or private. Private pages are only accessible to authenticated users. For authenticated users, results will include both public and private pages if not specified.'
      in: query
      required: false
      schema:
        type: string
        example: 'true'
        enum:
          - 'true'
          - 'false'
    FilterByPublicEqualityShort:
      name: 'filter[public]'
      description: 'Filter (short-hand) by whether the pages returned are public or private. Private pages are only accessible to authenticated users. For authenticated users, results will include both public and private pages if not specified.'
      in: query
      required: false
      schema:
        type: string
        example: 'true'
        enum:
          - 'true'
          - 'false'
    FilterByTitleContains:
      name: 'filter[title][contains]'
      description: Filter by contains comparison of the title property with a supplied substring
      in: query
      required: false
      schema:
        type: string
        example: Good
    FilterByTitleEquality:
      name: 'filter[title][eq]'
      description: Filter by direct equality comparison of the title property with a supplied value.
      in: query
      required: false
      schema:
        type: string
        example: Good Page
    FilterByTitleEqualityShort:
      name: 'filter[title]'
      description: Filter by direct equality comparison (short-hand) of the title property with a supplied value.
      in: query
      required: false
      schema:
        type: string
        example: Good Page
    PageNumber:
      name: 'page[number]'
      description: Determines which page of the entities to retrieve.
      required: false
      in: query
      allowEmptyValue: true
      schema:
        type: integer
        example: 1
    PageSize:
      name: 'page[size]'
      description: The maximum number of items to include per page. The last page of a collection may include fewer items.
      required: false
      in: query
      allowEmptyValue: true
      schema:
        type: integer
        example: 10
    SortPortalPages:
      name: sort
      description: |
        Sorts a collection of portal pages. Supported sort attributes are:
          - created_at
          - updated_at
          - path
          - title
          - public
      in: query
      required: false
      schema:
        type: string
    SortPortalSnippets:
      name: sort
      description: |
        Sorts a collection of portal snippets. Supported sort attributes are:
          - created_at
          - updated_at
          - name
          - title
          - public
      in: query
      required: false
      schema:
        type: string
    SpecId:
      name: specId
      in: path
      required: true
      description: Contains a unique identifier for this resource.
      schema:
        type: string
        format: uuid
  schemas:
    ApiActionsResponse:
      type: object
      properties:
        actions:
          description: List of actions that can be performed on the API
          type: object
          additionalProperties: false
          properties:
            view:
              type: boolean
            register:
              type: boolean
            view_documentation:
              type: boolean
          required:
            - view
            - register
            - view_documentation
      example:
        actions:
          view: true
          register: false
          view_documentation: true
      additionalProperties: false
      required:
        - actions
      title: API Actions Response
    Api:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
        name:
          description: Name of API.
          type: string
          example: Billing
        version:
          description: Version of API.
          type: string
          example: v1
          nullable: true
        description:
          type: string
          example: V1 API for billing functions
          nullable: true
        deprecated:
          description: 'If true, the API is deprecated.'
          type: boolean
        visibility:
          description: |
            Visibility of the API listing.
            Public APIs are visible to anyone and do not require authentication to view and retrieve information about them.
            Private APIs are only visible to authenticated developers who have been granted access.
          type: string
          enum:
            - public
            - private
        public_labels:
          $ref: '#/components/schemas/Labels'
        registration_configs:
          description: Configurations for how the API is able to be registered for by applications.
          type: array
          items:
            $ref: '#/components/schemas/V3RegistrationConfiguration'
      additionalProperties: false
      required:
        - id
        - created_at
        - updated_at
        - name
        - version
        - description
        - deprecated
        - visibility
        - public_labels
      title: Api
    ApiListPage:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/PaginatedMeta'
        data:
          type: array
          items:
            $ref: '#/components/schemas/Api'
      required:
        - meta
        - data
      title: ApiListPage
    V3RegistrationConfiguration:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        auth_methods:
          type: array
          items:
            description: Auth Methods enabled for this strategy
            type: string
          example:
            - bearer
        credential_type:
          $ref: '#/components/schemas/V3CredentialType'
        name:
          type: string
        available_scopes:
          $ref: '#/components/schemas/AvailableScopes'
        registration_auto_approve:
          description: 'If true, applications are automatically approved for registration.'
          type: boolean
          example: false
      additionalProperties: false
      required:
        - id
        - name
        - credential_type
        - registration_auto_approve
    V3CredentialType:
      type: string
      enum:
        - client_credentials
        - self_managed_client_credentials
        - key_auth
    ApiSpecDocumentSummary:
      description: Info about an API specification document.
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        api_type:
          $ref: '#/components/schemas/V3ApiTypeEnum'
      required:
        - id
        - api_type
      title: ApiSpecDocumentSummary
    ApiSpecDocument:
      description: API specification document.
      type: object
      properties:
        api_type:
          $ref: '#/components/schemas/V3ApiTypeEnum'
        content:
          type: string
      required:
        - api_type
        - content
      title: ApiSpecDocument
    V3ApiTypeEnum:
      type: string
      enum:
        - oas3
    ApiDocument:
      description: A document for an API. This is a document that is not a part of the API specification.
      type: object
      properties:
        id:
          allOf:
            - $ref: '#/components/schemas/UUID'
            - description: Unique identifier of the document.
              type: string
          x-flatten-allOf: true
        parent_document_id:
          description: Unique identifier of the parent document.
          type: string
          format: uuid
          example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
          nullable: true
        slug:
          description: Slug of the document. This is used in the URL to identify the document.
          type: string
          example: getting-started
        content:
          description: Markdown document
          example: |
            # My Kong api

            This api is powered by Konnect
          type: string
        title:
          description: Title of the document.
          type: string
          example: Hello World
      additionalProperties: false
      required:
        - id
        - slug
        - title
        - content
      title: ApiDocument
    ApiDocumentSummary:
      description: A summary of details about a document for an API.
      type: object
      properties:
        id:
          allOf:
            - $ref: '#/components/schemas/UUID'
            - description: Unique identifier of the document.
              type: string
          x-flatten-allOf: true
        parent_document_id:
          description: Unique identifier of the parent document.
          type: string
          format: uuid
          example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
          nullable: true
        slug:
          description: Slug of the document. This is used in the URL to identify the document.
          type: string
          example: getting-started
        title:
          description: Title of the document.
          type: string
          example: Hello World
      additionalProperties: false
      required:
        - id
        - slug
        - title
      title: ApiDocumentSummary
    ApiDocumentTree:
      description: a document tree
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        parent_document_id:
          type: string
          format: uuid
          example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
          nullable: true
        title:
          description: the title of the document
          type: string
          example: Getting Started
        slug:
          description: the slug of the document
          type: string
          example: getting-started
        children:
          type: array
          items:
            $ref: '#/components/schemas/ApiDocumentTree'
      additionalProperties: false
      required:
        - id
        - title
        - slug
        - children
      title: ApiDocumentTree
    ApiFilterParameters:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UuidFieldFilter'
        name:
          $ref: '#/components/schemas/StringFieldFilter'
        version:
          $ref: '#/components/schemas/StringFieldFilter'
        description:
          $ref: '#/components/schemas/StringFieldFilter'
        public_labels:
          $ref: '#/components/schemas/LabelsFieldFilter'
        deprecated:
          $ref: '#/components/schemas/BooleanFieldFilter'
        created_at:
          $ref: '#/components/schemas/DateTimeFieldFilter'
        updated_at:
          $ref: '#/components/schemas/DateTimeFieldFilter'
      title: ApiFilterParameters
    UUID:
      description: Contains a unique identifier used by the API for this resource.
      type: string
      format: uuid
      example: 5f9fd312-a987-4628-b4c5-bb4f4fddd5f7
      readOnly: true
    CreatedAt:
      description: An ISO-8601 timestamp representation of entity creation date.
      type: string
      format: date-time
      example: '2022-11-04T20:10:06.927Z'
      readOnly: true
    UpdatedAt:
      description: An ISO-8601 timestamp representation of entity update date.
      type: string
      format: date-time
      example: '2022-11-04T20:10:06.927Z'
      readOnly: true
    Labels:
      description: |
        Labels store metadata of an entity that can be used for filtering an entity list or for searching across entity types. 

        Keys must be of length 1-63 characters, and cannot start with "kong", "konnect", "mesh", "kic", or "_".
      type: object
      example:
        env: test
      additionalProperties:
        type: string
        pattern: '^[a-z0-9A-Z]{1}([a-z0-9A-Z-._]*[a-z0-9A-Z]+)?$'
        minLength: 1
        maxLength: 63
      maxProperties: 50
      title: Labels
    AvailableScopes:
      description: Possible developer selectable scopes for an application. Only present when using DCR Provider that supports it.
      type: array
      items:
        type: string
      example:
        - scope1
        - scope2
    BaseError:
      description: standard error
      type: object
      properties:
        status:
          description: |
            The HTTP status code of the error. Useful when passing the response
            body to child properties in a frontend UI. Must be returned as an integer.
          type: integer
          readOnly: true
        title:
          description: |
            A short, human-readable summary of the problem. It should not
            change between occurences of a problem, except for localization.
            Should be provided as "Sentence case" for direct use in the UI.
          type: string
          readOnly: true
        type:
          description: The error type.
          type: string
          readOnly: true
        instance:
          description: |
            Used to return the correlation ID back to the user, in the format
            kong:trace:<correlation_id>. This helps us find the relevant logs
            when a customer reports an issue.
          type: string
          readOnly: true
        detail:
          description: |
            A human readable explanation specific to this occurence of the problem.
            This field may contain request/entity data to help the user understand
            what went wrong. Enclose variable values in square brackets. Should be
            provided as "Sentence case" for direct use in the UI.
          type: string
          readOnly: true
      required:
        - status
        - title
        - instance
        - detail
      title: Error
    InvalidRules:
      description: invalid parameters rules
      type: string
      enum:
        - required
        - is_array
        - is_base64
        - is_boolean
        - is_date_time
        - is_integer
        - is_null
        - is_number
        - is_object
        - is_string
        - is_uuid
        - is_fqdn
        - is_arn
        - unknown_property
        - is_label
        - matches_regex
        - invalid
        - is_supported_network_availability_zone_list
        - is_supported_network_cidr_block
        - is_supported_provider_region
      nullable: true
      readOnly: true
    InvalidParameterStandard:
      type: object
      properties:
        field:
          type: string
          example: name
          readOnly: true
        rule:
          $ref: '#/components/schemas/InvalidRules'
        source:
          type: string
          example: body
        reason:
          type: string
          example: is a required field
          readOnly: true
      additionalProperties: false
      required:
        - field
        - reason
    InvalidParameterMinimumLength:
      type: object
      properties:
        field:
          type: string
          example: name
          readOnly: true
        rule:
          description: invalid parameters rules
          type: string
          enum:
            - min_length
            - min_digits
            - min_lowercase
            - min_uppercase
            - min_symbols
            - min_items
            - min
          nullable: false
          readOnly: true
        minimum:
          type: integer
          example: 8
        source:
          type: string
          example: body
        reason:
          type: string
          example: must have at least 8 characters
          readOnly: true
      additionalProperties: false
      required:
        - field
        - reason
        - rule
        - minimum
    InvalidParameterMaximumLength:
      type: object
      properties:
        field:
          type: string
          example: name
          readOnly: true
        rule:
          description: invalid parameters rules
          type: string
          enum:
            - max_length
            - max_items
            - max
          nullable: false
          readOnly: true
        maximum:
