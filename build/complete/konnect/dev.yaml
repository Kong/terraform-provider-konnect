  parameters:
    PageSize:
      name: page[size]
      description: >-
        The maximum number of items to include per page. The last page of a
        collection may include fewer items.
      in: query
      required: false
      schema:
        type: integer
        example: 10
      allowEmptyValue: true
    PageAfter:
      name: page[after]
      description: >-
        Request the next page of data, starting with the item after this
        parameter.
      required: false
      in: query
      allowEmptyValue: true
      schema:
        type: string
        example: ewogICJpZCI6ICJoZWxsbyB3b3JsZCIKfQ
  requestBodies:
    UpdateOrganizationState:
      required: true
      description: The request schema to set an organization's state.
      content:
        application/json:
          schema:
            type: object
            properties:
              state:
                type: string
                description: The state of the organization to set.
                example: inactive
                enum:
                  - active
                  - inactive
              reason:
                type: string
                description: The reason for the state change.
                example: invoice overdue (30 days)
              changed_by:
                type: string
                description: The uuid of the konger who modified the state.
                example: 00uerwcs8eC4ifanR256
            required:
              - state
          examples:
            Inactive Example:
              value:
                state: inactive
                reason: invoice overdue (30 days)
                changed_by: 00uerwcs8eC4ifanR256
            Active Example:
              value:
                state: active
                reason: organization was created
  securitySchemes:
    personalAccessToken:
      type: http
      scheme: bearer
      bearerFormat: Token
      description: >
        The personal access token is meant to be used as an alternative to
        basic-auth when accessing Konnect via APIs.

        You can generate a Personal Access Token (PAT) from the [personal access
        token page](https://cloud.konghq.com/global/tokens/) in the Konnect
        dashboard.

        The PAT token must be passed in the header of a request, for example:

        `curl -X GET 'https://global.api.konghq.com/v2/users/' --header
        'Authorization: Bearer kpat_xgfT...'`
    systemAccountAccessToken:
      type: http
      scheme: bearer
      bearerFormat: Token
      description: >
        The system account access token is meant for automations and
        integrations that are not directly associated with a human identity.

        You can generate a system account Access Token by creating a system
        account and then obtaining a system account access token for that
        account.

        The access token must be passed in the header of a request, for example:

        `curl -X GET 'https://global.api.konghq.com/v2/users/' --header
        'Authorization: Bearer spat_i2Ej...'`
    konnectAccessToken:
      type: http
      scheme: bearer
      description: >
        The Konnect access token is meant to be used by the Konnect dashboard
        and the decK CLI authenticate with.
      bearerFormat: JWT
security:
  - personalAccessToken: []
  - systemAccountAccessToken: []
  - konnectAccessToken: []
