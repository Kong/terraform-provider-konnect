openapi: 3.0.3
info:
  title: Konnect API
  description: The Konnect platform API
  version: 2.1.0
  contact:
    name: Kong
    url: https://konghq.com
    email: support@konghq.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: https://global.api.konghq.com
  - url: https://us.api.konghq.com
  - url: https://eu.api.konghq.com
  - url: https://au.api.konghq.com
    description: Production
externalDocs:
  description: Documentation for Kong Gateway and its APIs
  url: https://docs.konghq.com
paths:
  /v0/serverless-cloud-gateways/{controlPlaneId}:
    parameters:
      - name: controlPlaneId
        in: path
        required: true
        description: Id of the Serverless Cloud Gateway control plane
        example: bf138ba2-c9b1-4229-b268-04d9d8a6410b
        schema:
          type: string
          format: uuid
    patch:
      summary: Update the serverless cloud gateway
      operationId: update-serverless-cloud-gateway
      responses:
        '200':
          $ref: '#/components/responses/UpdateServerlessCloudGatewayResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      description: Update an individual serverless cloud gateway.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateServerlessCloudGatewayRequest'
            examples:
              Example Request Body:
                $ref: >-
                  #/components/examples/UpdateServerlessCloudGatewayRequestExample
      tags:
        - Serverless Cloud Gateways
  /v2/discovery/discovered-entities:
    get:
      summary: List Discovered Entities
      operationId: list-discovered-entities
      description: |
        Returns a paginated collection of discovered entities.
      responses:
        '200':
          $ref: '#/components/responses/ListDiscoveredEntitiesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/Internal'
      parameters:
        - $ref: '#/components/parameters/PageBefore'
        - $ref: '#/components/parameters/PageAfter'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/DiscoveredEntityFilter'
        - $ref: '#/components/parameters/DiscoveredEntitySort'
      tags:
        - Discovered Entities
  /v2/discovery/discovered-entities/{discoveredEntityId}:
    parameters:
      - schema:
          type: string
          format: uuid
          example: cbf06770-fa76-4e94-9226-ec9086938e62
        name: discoveredEntityId
        in: path
        required: true
        description: ID of the discovered entity.
    get:
      summary: Fetch Discovered Entity
      operationId: get-discovered-entity
      description: |
        Returns information about a discovered entity.
      responses:
        '200':
          $ref: '#/components/responses/DiscoveredEntityResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
      tags:
        - Discovered Entities
  /v2/discovery/discovery-actions:
    post:
      summary: Create Discovery Action
      operationId: create-discovery-action
      description: Creates a discovery action.
      requestBody:
        $ref: '#/components/requestBodies/CreateDiscoveryActionBody'
      responses:
        '201':
          $ref: '#/components/responses/DiscoveryActionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/Internal'
      tags:
        - Discovery Actions
    get:
      summary: List Discovery Actions
      operationId: list-discovery-action
      description: Returns a paginated collection of discovery actions.
      responses:
        '200':
          $ref: '#/components/responses/ListDiscoveryActionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
      parameters:
        - $ref: '#/components/parameters/PageBefore'
        - $ref: '#/components/parameters/PageAfter'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/DiscoveryActionFilter'
        - $ref: '#/components/parameters/DiscoveryActonSort'
      tags:
        - Discovery Actions
  /v2/discovery/discovery-actions/{discoveryActionId}:
    parameters:
      - schema:
          type: string
          format: uuid
          example: ffa82ca6-3753-42d9-a69e-65e02dd9d9a1
        name: discoveryActionId
        in: path
        required: true
        description: ID of the discovery action.
    get:
      summary: Fetch Discovery Actions
      operationId: get-discovery-action
      description: Returns information about a discovery action.
      responses:
        '200':
          $ref: '#/components/responses/DiscoveryActionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
      tags:
        - Discovery Actions
  /v2/discovery/integration/{integration}/discovered-entities:
    parameters:
      - schema:
          type: string
          example: gateway-manager
        name: integration
        in: path
        required: true
        description: Machine name of the integration.
    put:
      summary: Upsert Discovered Entities
      operationId: upsert-discovered-entities
      description: >
        Upserts Discovered Entities. The request is transactional, that is, a
        single failed operation

        will result in a failed state for all operations.


        The maximum amount of entities that can be ingested in a single request
        is __100__.
      requestBody:
        $ref: '#/components/requestBodies/UpsertDiscoveredEntitiesBody'
      responses:
        '200':
          description: All entities delivered in the payload were ingested successfully.
        '202':
          description: >
            The payload was accepted but a no-op was performed.

            This response will be returned when an organization has discovery
            disabled for the given integration.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
      tags:
        - Discovered Entities
  /v2/discovery/integration/{integration}/ingestion:
    parameters:
      - schema:
          type: string
          example: gateway-manager
        name: integration
        in: path
        required: true
        description: Machine name of the integration.
    put:
      summary: Schedule Discovery Ingestion
      operationId: schedule-discovery-ingestion
      description: Schedules a discovery ingestion job for the given integration.
      requestBody:
        $ref: '#/components/requestBodies/ScheduleDiscoveryIngestionBody'
      responses:
        '200':
          $ref: '#/components/responses/DiscoveryIngestionStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
      tags:
        - Discovery Ingestion
    get:
      summary: Fetch Discovery Ingestion Status
      operationId: fetch-discovery-ingestion-status
      description: Fetches the status of discovery ingestion for the given integration.
      responses:
        '200':
          $ref: '#/components/responses/DiscoveryIngestionStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
      tags:
        - Discovery Ingestion
  /v2/discovery/integration/{integration}/settings:
    parameters:
      - schema:
          type: string
          example: gateway-manager
        name: integration
        in: path
        required: true
        description: Machine name of the integration.
    get:
      summary: Fetch Service Discovery Settings for Integration
      operationId: fetch-integration-service-discovery-settings
      description: >-
        Returns information about the service discovery settings for the given
        integration.
      responses:
        '200':
          $ref: '#/components/responses/ServiceDiscoverySettingsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
      tags:
        - Discovery Settings
    put:
      summary: Upsert Service Discovery Settings for Integration
      operationId: upsert-integration-service-discovery-settings
      description: Updates service discovery settings for the given integration.
      requestBody:
        $ref: '#/components/requestBodies/UpsertServiceDiscoverySettingsBody'
      responses:
        '200':
          $ref: '#/components/responses/ServiceDiscoverySettingsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/Internal'
      tags:
        - Discovery Settings
  /v2/discovery/integration/{integration}/suggestion-rules:
    parameters:
      - schema:
          type: string
          example: gateway-manager
        name: integration
        in: path
        required: true
        description: Machine name of the integration.
    post:
      summary: Create Suggestion Rule for Integration
      operationId: create-integration-suggestion-rule
      description: Creates a suggestion rule for the given integration.
      requestBody:
        $ref: '#/components/requestBodies/CreateSuggestionRuleBody'
      responses:
        '201':
          $ref: '#/components/responses/SuggestionRuleResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
      tags:
        - Suggestion Rules
    get:
      summary: List Suggestion Rules
      operationId: list-integration-suggestion-rule
      description: Returns a paginated collection of a suggestion rules.
      responses:
        '200':
          $ref: '#/components/responses/ListSuggestionRuleResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/DiscoverySuggestionRuleFilter'
      tags:
        - Suggestion Rules
  /v2/discovery/integration/{integration}/suggestion-rules/{suggestionRuleId}:
    parameters:
      - schema:
          type: string
          example: gateway-manager
        name: integration
        in: path
        required: true
        description: Machine name of the integration.
      - schema:
          type: string
          format: uuid
          example: 22f72bd1-2897-473e-9471-302de3ccf38b
        name: suggestionRuleId
        in: path
        required: true
        description: ID of the suggestion rule.
    get:
      summary: Fetch Suggestion Rule
      operationId: get-integration-suggestion-rule
      description: >-
        Returns information about a suggestion rule from a given suggestion rule
        ID.
      responses:
        '200':
          $ref: '#/components/responses/SuggestionRuleResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
      tags:
        - Suggestion Rules
    put:
      summary: Update Suggestion Rule
      operationId: update-integration-suggestion-rule
      description: Updates the given suggestion rule.
      requestBody:
        $ref: '#/components/requestBodies/CreateSuggestionRuleBody'
      responses:
        '200':
          $ref: '#/components/responses/SuggestionRuleResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
      tags:
        - Suggestion Rules
    delete:
      summary: Delete Suggestion Rule
      operationId: delete-integration-suggestion-rule
      description: Deletes the given suggestion rule.
      responses:
        '204':
          description: No Content
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
      tags:
        - Suggestion Rules
  /v2/discovery/integration/{integration}/suggestion-rules/test:
    parameters:
      - schema:
          type: string
          example: gateway-manager
        name: integration
        in: path
        required: true
        description: Machine name of the integration.
    post:
      summary: Test a Suggestion Rule Configuration
      operationId: test-suggestion-rule
      description: Test suggestion rule configuration against an integration record.
      requestBody:
        $ref: '#/components/requestBodies/CreateTestSuggestionRuleBody'
      responses:
        '200':
          $ref: '#/components/responses/TestSuggestionRuleResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/Internal'
      tags:
        - Suggestion Rules
  /v2/discovery/integration/{integration}/system-suggestion-rules:
    parameters:
      - schema:
          type: string
          example: gateway-manager
        name: integration
        in: path
        required: true
        description: Machine name of the integration.
    get:
      summary: List System Suggestion Rules
      operationId: list-system-integration-suggestion-rule
      description: Returns a paginated collection of a system defined suggestion rules.
      responses:
        '200':
          $ref: '#/components/responses/ListSystemSuggestionRuleResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
      tags:
        - Suggestion Rules
  /v2/discovery/suggested-discovery-actions:
    get:
      summary: List Suggested Discovery Actions
      operationId: list-suggested-discovery-action
      description: Returns a paginated collection of a suggested discovery actions.
      responses:
        '200':
          $ref: '#/components/responses/ListSuggestedDiscoveryActionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/SuggestedDiscoveryActionFilter'
        - $ref: '#/components/parameters/SuggestedDiscoveryActionSort'
      tags:
        - Suggested Discovery Actions
  /v2/discovery/suggested-discovery-actions/{suggestedDiscoveryActionId}:
    parameters:
      - schema:
          type: string
          format: uuid
          example: 76ca0689-f08e-4c04-b2a6-4c992d89d554
        name: suggestedDiscoveryActionId
        in: path
        required: true
        description: ID of the suggested discovery action.
    get:
      summary: Fetch Suggested Discovery Action
      operationId: get-suggested-discovery-action
      description: Returns information about a suggested discovery action.
      responses:
        '200':
          $ref: '#/components/responses/SuggestedDiscoveryActionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
      tags:
        - Suggested Discovery Actions
    patch:
      summary: Update Suggested Discovery Action
      operationId: update-suggested-discovery-action
      description: Updates the given suggested discovery.
      requestBody:
        $ref: '#/components/requestBodies/UpdateSuggestedDiscoveryActionBody'
      responses:
        '200':
          $ref: '#/components/responses/SuggestedDiscoveryActionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
      tags:
        - Suggested Discovery Actions
  /v2/installed-integrations/{integration}/auth-credentials:
    parameters:
      - schema:
          type: string
          example: pagerduty
        name: integration
        in: path
        required: true
        description: Machine name of the integration.
    get:
      summary: List Installed Integration Auth Credentials
      operationId: list-installed-integration-auth-credentials
      description: >-
        Returns a paginated collection of installed integration auth
        credentials.
      responses:
        '200':
          $ref: >-
            #/components/responses/ListInstalledIntegrationAuthCredentialsResponse
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
      tags:
        - Integration Auth Credentials
    post:
      summary: Create Installed Integration Auth Credential
      operationId: create-installed-integration-auth-credential
      description: Creates an auth credential for the integration.
      requestBody:
        $ref: >-
          #/components/requestBodies/CreateInstalledIntegrationAuthCredentialBody
      responses:
        '201':
          $ref: '#/components/responses/InstalledIntegrationAuthCredentialResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/Internal'
        '503':
          $ref: '#/components/responses/NotAvailable'
      tags:
        - Integration Auth Credentials
  /v2/installed-integrations/{integration}/auth-credentials/{authCredentialId}:
    parameters:
      - schema:
          type: string
          example: pagerduty
        name: integration
        in: path
        required: true
        description: Machine name of the integration.
      - schema:
          type: string
          format: uuid
          example: 95e4f10a-bf10-4724-9378-c3591ad8c6ed
        name: authCredentialId
        in: path
        required: true
        description: ID of the auth credential.
    get:
      summary: Fetch Installed Integration Auth Credential
      operationId: fetch-installed-integration-auth-credential
      description: >-
        Returns context associated to an auth credential for the given installed
        integration.
      responses:
        '200':
          $ref: '#/components/responses/InstalledIntegrationAuthCredentialResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
      tags:
        - Integration Auth Credentials
    delete:
      summary: Delete Installed Integration Auth Credential
      operationId: delete-installed-integration-auth-credential
      description: >-
        Deletes an auth credential for an integration. Returns 404 if the given
        credential is not found.
      responses:
        '204':
          description: No Content
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
      tags:
        - Integration Auth Credentials
  /v2/integrations/{integration}/proxy:
    parameters:
      - schema:
          type: string
          example: pagerduty
        name: integration
        in: path
        required: true
        description: Machine name of the integration.
    post:
      summary: Integration Proxy Request
      operationId: integration-proxy-request
      description: Proxies a request to an external API made by a Service Hub integration.
      requestBody:
        $ref: '#/components/requestBodies/IntegrationProxyBody'
      responses:
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
        2XX:
          description: 2XX response code returned from the proxied API
          headers:
            x-service-hub-integration-proxy:
              schema:
                type: boolean
                description: >-
                  Set to 'true' to indicate that the response was in fact
                  proxied from the upstream.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        3XX:
          description: 3XX response code returned from the proxied API
          headers:
            x-service-hub-integration-proxy:
              schema:
                type: boolean
                description: >-
                  Set to 'true' to indicate that the response was in fact
                  proxied from the upstream.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        4XX:
          description: 4XX response code returned from the proxied API
          headers:
            x-service-hub-integration-proxy:
              schema:
                type: boolean
                description: >-
                  Set to 'true' to indicate that the response was in fact
                  proxied from the upstream.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        5XX:
          description: 5XX response code returned from the proxied API
          headers:
            x-service-hub-integration-proxy:
              schema:
                type: boolean
                description: >-
                  Set to 'true' to indicate that the response was in fact
                  proxied from the upstream.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
      tags:
        - Integrations
  /v2/metadata/schemas:
    get:
      summary: List Metadata Schemas
      operationId: list-metadata-schemas
      description: Returns a paginated collection of metadata schemas.
      responses:
        '200':
          $ref: '#/components/responses/ListMetadataSchemaResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/Internal'
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
