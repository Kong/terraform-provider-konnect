              description: An identifier from the integration's external system to prevent duplicate suggestions.
              type: string
              example: 2f3adee0-3740-4962-a26b-2a75e550535c
              maxLength: 255
              minLength: 1
            entity_name:
              description: Name of the entity in the integration's external system.
              type: string
              example: My Service
              maxLength: 255
              minLength: 1
            scope:
              description: |
                The scope of the discovered entity.
                  - "service" scope indicates the discovered entity is for a service integration.
              type: string
