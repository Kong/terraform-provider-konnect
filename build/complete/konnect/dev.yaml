          type: object
          $ref: '#/components/schemas/PageMeta'
          properties:
            number:
              description: Represents the current page number.
              type: integer
              example: 2
            size:
              description: Represents the number of entities on the page.
              type: integer
              example: 10
              maximum: 100
            total:
