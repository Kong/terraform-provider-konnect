    AddonAuthorization:
      description: Defines authorization for the add-on.
      oneOf:
        - nullable: true
        - $ref: '#/components/schemas/OAuthAuth'
        - $ref: '#/components/schemas/GitHubAppInstallationAuth'
      title: AddonAuthorization
    OAuthAuth:
      type: object
      properties:
        type:
          type: string
          enum:
            - oauth
        config:
          type: object
          additionalProperties: false
          properties:
            grant_type:
              type: string
              enum:
                - authorization_code
            client_id:
              type: string
              example: d745213a-b7e8-4998-abe3-41f164001970
            authorization_endpoint:
              type: object
              additionalProperties: false
              properties:
                url:
                  type: string
                  format: uri
                  example: 'https://identity.some-service.com/oauth/authorize'
              required:
                - url
            token_endpoint:
              type: object
              additionalProperties: false
              properties:
                url:
                  type: string
                  format: uri
                  example: 'https://identity.some-service.com/oauth/token'
              required:
                - url
            scope:
              type: array
              items:
                type: string
              example:
                - read
                - write
            rolling_refresh_exp_seconds:
              description: |
                Number of seconds before the refresh token grant can no longer be used to mint
                a new access token. Once expired clients must re-authenticate to restart the
                window interval.
              type: number
              example: 15780000
              nullable: true
          required:
            - grant_type
            - client_id
            - authorization_endpoint
            - token_endpoint
            - scope
            - rolling_refresh_exp_seconds
      additionalProperties: false
      nullable: true
      required:
        - type
        - config
    GitHubAppInstallationAuth:
      type: object
      properties:
        type:
          type: string
          enum:
            - github_app_installation
        config:
          type: object
          additionalProperties: false
          properties:
            app_install_url:
              type: object
              additionalProperties: false
              properties:
                url:
                  type: string
                  format: uri
                  example: 'https://us.api.konghq.com/servicehub-add-ons/github/app/install'
              required:
                - url
            authorize_app_installation_endpoint:
              type: object
              additionalProperties: false
              properties:
                url:
                  type: string
                  format: uri
                  example: 'https://us.api.konghq.com/servicehub-add-ons/github/app/authorize-installation'
              required:
                - url
          required:
            - app_install_url
            - authorize_app_installation_endpoint
      additionalProperties: false
      nullable: true
      required:
        - type
        - config
    AddonConfigSchema:
