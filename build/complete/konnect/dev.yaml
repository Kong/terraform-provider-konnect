openapi: 3.0.3
info:
  title: Konnect API
  description: The Konnect platform API
  version: 0.0.1
  contact:
    name: Kong Inc
    url: 'https://konghq.com'
    email: support@konghq.com
  license:
    name: Apache 2.0
    url: 'https://www.apache.org/licenses/LICENSE-2.0.html'
servers:
  - url: 'https://us.api.konghq.com'
    description: United-States Production region
  - url: 'https://eu.api.konghq.com'
    description: Europe Production region
  - url: 'https://au.api.konghq.com'
    description: Australia Production region
  - url: 'https://global.api.konghq.com'
    description: Global Production
paths:
  '/{realmId}/v0':
    parameters:
      - $ref: '#/components/parameters/realmId'
    get:
      operationId: retrieve-realm
      summary: Retrieve a realm
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthConsumerRealm'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - realms
  '/{realmId}/v0/authenticate':
    parameters:
      - $ref: '#/components/parameters/realmId'
    post:
      operationId: authenticate-in-realm
      summary: Authenticate on this realm
      requestBody:
        $ref: '#/components/requestBodies/AuthenticateBody'
      responses:
        '201':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticateResponseBody'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - realms
  /v0/realms:
    get:
      operationId: list-realms
      summary: List realms
      description: list realms
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListRealms'
      tags:
        - realms
    post:
      operationId: create-realm
      summary: Create a realm
      description: create realm
      requestBody:
        $ref: '#/components/requestBodies/CreateConsumerRealm'
      responses:
        '201':
          $ref: '#/components/responses/CreateConsumerRealmResponse'
      tags:
        - realms
  '/v0/realms/{realmId}':
    parameters:
      - $ref: '#/components/parameters/realmId'
    get:
      operationId: get-realm
      summary: Get a realm
      description: get realm
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsumerRealm'
      tags:
        - realms
    patch:
      operationId: update-realm
      summary: Update a realm
      description: update realm
      requestBody:
        $ref: '#/components/requestBodies/UpdateConsumerRealm'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsumerRealm'
      tags:
        - realms
    delete:
      operationId: delete-realm
      summary: Delete a realm
      description: delete realm
      parameters:
        - name: force
          in: query
          description: 'If true, delete specified realm and all underlying entities (consumers/apiKeys). If false, do not allow deletion if there are underlying entities.'
          schema:
            type: string
            default: 'false'
            enum:
              - 'true'
              - 'false'
      responses:
        '204':
          description: success
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - realms
  '/v0/realms/{realmId}/consumers':
    parameters:
      - $ref: '#/components/parameters/realmId'
    get:
      operationId: list-consumers-per-realm
      summary: List consumers
      description: list consumers
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListConsumers'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - consumers
    post:
      operationId: create-consumer
      summary: Create a consumer
      description: create consumer
      requestBody:
        $ref: '#/components/requestBodies/CreateConsumer'
      responses:
        '201':
          $ref: '#/components/responses/CreateConsumerResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - consumers
  '/v0/realms/{realmId}/consumers/{consumerId}':
    parameters:
      - $ref: '#/components/parameters/realmId'
      - $ref: '#/components/parameters/consumerId'
    get:
      operationId: get-consumer
      summary: Get a consumer
      description: get consumer
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Consumer'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - consumers
    patch:
      operationId: update-consumer
      summary: Update a consumer
      description: update consumer
      requestBody:
        $ref: '#/components/requestBodies/UpdateConsumer'
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Consumer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - consumers
    delete:
      operationId: delete-consumer
      summary: Delete a consumer
      description: delete consumer
      responses:
        '204':
          description: success
        '404':
          description: not found
      tags:
        - consumers
  '/v0/realms/{realmId}/consumers/{consumerId}/keys':
    parameters:
      - $ref: '#/components/parameters/realmId'
      - $ref: '#/components/parameters/consumerId'
    get:
      operationId: list-consumer-keys
      summary: List keys
      description: list keys
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListKeys'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - keys
    post:
      operationId: create-consumer-key
      summary: Create a key
      description: create key
      requestBody:
        $ref: '#/components/requestBodies/CreateApiKey'
      responses:
        '201':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateApiKeyResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - keys
  '/v0/realms/{realmId}/consumers/{consumerId}/keys/{keyId}':
    parameters:
      - $ref: '#/components/parameters/realmId'
      - $ref: '#/components/parameters/consumerId'
      - $ref: '#/components/parameters/keyId'
    get:
      operationId: get-consumer-key
      summary: Get a key
      description: get key
      responses:
        '200':
          description: success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - keys
    delete:
      operationId: delete-consumer-key
      summary: Delete a key
      description: delete key
      responses:
        '204':
          description: success
        '404':
          description: not found
      tags:
        - keys
  '/v0/realms/{realmId}/consumers/{consumerId}/move':
    parameters:
      - $ref: '#/components/parameters/realmId'
      - $ref: '#/components/parameters/consumerId'
    post:
      operationId: move-consumer
      summary: Change the realm of a consumer
      description: move consumer
      requestBody:
        $ref: '#/components/requestBodies/MoveConsumer'
      responses:
        '201':
          $ref: '#/components/responses/MoveConsumerResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - consumers
  '/v0/serverless-cloud-gateways/{controlPlaneId}':
    parameters:
      - name: controlPlaneId
        in: path
        description: Id of the Serverless Cloud Gateway control plane
        required: true
        schema:
          type: string
          format: uuid
        example: bf138ba2-c9b1-4229-b268-04d9d8a6410b
    patch:
      operationId: update-serverless-cloud-gateway
      summary: Update the serverless cloud gateway
      description: Update an individual serverless cloud gateway.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateServerlessCloudGatewayRequest'
            examples:
              Example Request Body:
                $ref: '#/components/examples/UpdateServerlessCloudGatewayRequestExample'
      responses:
        '200':
          $ref: '#/components/responses/UpdateServerlessCloudGatewayResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      servers:
        - url: 'https://global.api.konghq.com/'
      tags:
        - Serverless Cloud Gateways
  '/v1/api/{apiId}/documents':
    parameters:
      - name: apiId
        in: path
        description: The API identifier
        required: true
        schema:
          type: string
          format: uuid
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
    post:
      operationId: create-api-document
      summary: Create API Document
      description: |
        Publish a new document attached to an API.

        All configuration options may be provided in the frontmatter section of `content`. If you set values in both the `POST` request _and_ in the frontmatter, the values in the `POST` request will take precedence.
      requestBody:
        $ref: '#/components/requestBodies/CreateApiDocumentRequest'
      responses:
        '201':
          $ref: '#/components/responses/ApiDocumentResponse'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              examples:
                ApiNameBadRequestExample:
                  $ref: '#/components/examples/ApiDocumentBadRequestExample'
        '401':
          $ref: '#/components/responses/ApiUnauthorized'
        '403':
          $ref: '#/components/responses/ApiForbidden'
        '404':
          $ref: '#/components/responses/ApiNotFound'
        '409':
          $ref: '#/components/responses/ApiSlugConflict'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
      tags:
        - API Documentation
    get:
      operationId: list-api-documents
      summary: List API Documents
      description: Returns a collection of all documents for an API.
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
        - name: filter
          in: query
          description: Filters API Documents in the response.
          required: false
          schema:
            $ref: '#/components/schemas/ApiDocumentFilterParameters'
          style: deepObject
      responses:
        '200':
          $ref: '#/components/responses/ListApiDocumentResponse'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              examples:
                InvalidApiSortQueryBadRequestExample:
                  $ref: '#/components/examples/InvalidApiSortQueryBadRequestExample'
        '401':
          $ref: '#/components/responses/ApiUnauthorized'
        '403':
          $ref: '#/components/responses/ApiForbidden'
        '404':
          $ref: '#/components/responses/ApiNotFound'
      tags:
        - API Documentation
  '/v1/api/{apiId}/documents/{documentId}':
    parameters:
      - name: apiId
        in: path
        description: The API identifier
        required: true
        schema:
          type: string
          format: uuid
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
      - name: documentId
        in: path
        description: The document identifier related to the API
        required: true
        schema:
          type: string
          format: uuid
          example: de5c9818-be5c-42e6-b514-e3d4bc30ddeb
    get:
      operationId: fetch-api-document
      summary: Fetch API Document
      description: Returns a document for the API.
      responses:
        '200':
          $ref: '#/components/responses/ApiDocumentResponse'
        '401':
          $ref: '#/components/responses/ApiUnauthorized'
        '403':
          $ref: '#/components/responses/ApiForbidden'
        '404':
          $ref: '#/components/responses/ApiNotFound'
      tags:
        - API Documentation
    patch:
      operationId: update-api-document
      summary: Update an API Document
      description: Updates a document for an API.
      requestBody:
        $ref: '#/components/requestBodies/UpdateApiDocumentRequest'
      responses:
        '200':
          $ref: '#/components/responses/ApiDocumentResponse'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              examples:
                ApiNameBadRequestExample:
                  $ref: '#/components/examples/ApiDocumentBadRequestExample'
        '401':
          $ref: '#/components/responses/ApiUnauthorized'
        '403':
          $ref: '#/components/responses/ApiForbidden'
        '404':
          $ref: '#/components/responses/ApiNotFound'
        '409':
          $ref: '#/components/responses/ApiSlugConflict'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
      tags:
        - API Documentation
    delete:
      operationId: delete-api-document
      summary: Delete API Documentation
      description: Removes a document from an API.
      responses:
        '204':
          description: Document for the API was deleted successfully.
        '401':
          $ref: '#/components/responses/ApiUnauthorized'
        '403':
          $ref: '#/components/responses/ApiForbidden'
        '404':
          $ref: '#/components/responses/ApiNotFound'
      tags:
        - API Documentation
  '/v1/api/{apiId}/specifications':
    parameters:
      - name: apiId
        in: path
        description: The API identifier
        required: true
        schema:
          type: string
          format: uuid
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
    post:
      operationId: create-api-spec
      summary: Create API Specification
      description: |
        Creates a specification for an API.
        **Note:** You can only have one specification for an API.
      requestBody:
        $ref: '#/components/requestBodies/CreateApiSpecRequest'
      responses:
        '201':
          $ref: '#/components/responses/ApiSpecResponse'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              examples:
                ApiSpecContentBadRequestExample:
                  $ref: '#/components/examples/ApiSpecContentBadRequestExample'
        '401':
          $ref: '#/components/responses/ApiUnauthorized'
        '403':
          $ref: '#/components/responses/ApiForbidden'
        '404':
          $ref: '#/components/responses/ApiNotFound'
        '409':
          $ref: '#/components/responses/ApiSpecConflict'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
      tags:
        - API Specification
    get:
      operationId: list-api-specs
      summary: List API Specifications
      description: |
        Returns a list of specifications for an API.
        **Note:** You can only have one specification for an API.
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
        - name: filter
          in: query
          description: Filters API Specs in the response.
          required: false
          schema:
            $ref: '#/components/schemas/ApiSpecFilterParameters'
          style: deepObject
      responses:
        '200':
          $ref: '#/components/responses/ListApiSpecResponse'
        '401':
          $ref: '#/components/responses/ApiUnauthorized'
        '403':
          $ref: '#/components/responses/ApiForbidden'
        '404':
          $ref: '#/components/responses/ApiNotFound'
      tags:
        - API Specification
  '/v1/api/{apiId}/specifications/{specId}':
    parameters:
      - name: apiId
        in: path
        description: The API identifier
        required: true
        schema:
          type: string
          format: uuid
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
      - name: specId
        in: path
        description: The API specification identifier
        required: true
        schema:
          type: string
          format: uuid
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
    get:
      operationId: fetch-api-spec
      summary: Fetch API Specification
      description: Fetches the specification of an API.
      responses:
        '200':
          $ref: '#/components/responses/ApiSpecResponse'
        '401':
          $ref: '#/components/responses/ApiUnauthorized'
        '403':
          $ref: '#/components/responses/ApiForbidden'
        '404':
          $ref: '#/components/responses/ApiNotFound'
      tags:
        - API Specification
    patch:
      operationId: update-api-spec
      summary: Update API Specification
      description: Updates the specification of an API.
      requestBody:
        $ref: '#/components/requestBodies/UpdateApiSpecRequest'
      responses:
        '200':
          $ref: '#/components/responses/ApiSpecResponse'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              examples:
                ApiSpecContentBadRequestExample:
                  $ref: '#/components/examples/ApiSpecContentBadRequestExample'
        '401':
          $ref: '#/components/responses/ApiUnauthorized'
        '403':
          $ref: '#/components/responses/ApiForbidden'
        '404':
          $ref: '#/components/responses/ApiNotFound'
        '409':
          $ref: '#/components/responses/ApiSpecHiddenConflict'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
      tags:
        - API Specification
    delete:
      operationId: delete-api-spec
      summary: Delete API Specification
      description: Deletes the specification of an API.
      responses:
        '204':
          description: API Specification was deleted successfully.
        '401':
          $ref: '#/components/responses/ApiUnauthorized'
        '403':
          $ref: '#/components/responses/ApiForbidden'
        '404':
          $ref: '#/components/responses/ApiNotFound'
      tags:
        - API Specification
  /v1/apis:
    post:
      operationId: create-api
      summary: Create API
      description: Creates an API.
      requestBody:
        $ref: '#/components/requestBodies/CreateApiRequest'
      responses:
        '201':
          $ref: '#/components/responses/ApiResponse'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              examples:
                ApiNameBadRequestExample:
                  $ref: '#/components/examples/ApiNameBadRequestExample'
        '401':
          $ref: '#/components/responses/ApiUnauthorized'
        '403':
          $ref: '#/components/responses/ApiForbidden'
        '404':
          $ref: '#/components/responses/ApiNotFound'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
      tags:
        - API
    get:
      operationId: list-apis
      summary: List APIs
      description: Returns a collection of all APIs.
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/ApiFilters'
        - $ref: '#/components/parameters/ApiSort'
      responses:
        '200':
          $ref: '#/components/responses/ListApiResponse'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              examples:
                InvalidApiSortQueryBadRequestExample:
                  $ref: '#/components/examples/InvalidApiSortQueryNameBadRequestExample'
        '401':
          $ref: '#/components/responses/ApiUnauthorized'
        '403':
          $ref: '#/components/responses/ApiForbidden'
        '404':
          $ref: '#/components/responses/ApiNotFound'
      tags:
        - API
  '/v1/apis/{apiId}':
    parameters:
      - name: apiId
        in: path
        description: The API identifier
        required: true
        schema:
          type: string
          format: uuid
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
    get:
      operationId: fetch-api
      summary: Fetch API
      description: Fetches an API.
      responses:
        '200':
          $ref: '#/components/responses/ApiResponse'
        '401':
          $ref: '#/components/responses/ApiUnauthorized'
        '403':
          $ref: '#/components/responses/ApiForbidden'
        '404':
          $ref: '#/components/responses/ApiNotFound'
      tags:
        - API
    patch:
      operationId: update-api
      summary: Update API
      description: Updates an API.
      requestBody:
        $ref: '#/components/requestBodies/UpdateApiRequest'
      responses:
        '200':
          $ref: '#/components/responses/ApiResponse'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              examples:
                ApiNameBadRequestExample:
                  $ref: '#/components/examples/ApiNameBadRequestExample'
        '401':
          $ref: '#/components/responses/ApiUnauthorized'
        '403':
          $ref: '#/components/responses/ApiForbidden'
        '404':
          $ref: '#/components/responses/ApiNotFound'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
      tags:
        - API
    delete:
      operationId: delete-api
      summary: Delete API
      description: Deletes an API.
      responses:
        '204':
          description: API was deleted successfully.
        '401':
          $ref: '#/components/responses/ApiUnauthorized'
        '403':
          $ref: '#/components/responses/ApiForbidden'
        '404':
          $ref: '#/components/responses/ApiNotFound'
      tags:
        - API
  '/v2/control-planes/{controlPlaneId}/config-stores':
    get:
      operationId: list-config-stores
      summary: List all config stores for a control plane
      parameters:
        - $ref: '#/components/parameters/controlPlaneId'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageAfter'
      responses:
        '200':
          $ref: '#/components/responses/ListConfigStoresResponse'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
        '401':
          $ref: '#/components/responses/ConfigStoreUnauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      tags:
        - Config Stores
    post:
      operationId: create-config-store
      summary: Create Config Store
      description: Create a Config Store
      parameters:
        - $ref: '#/components/parameters/controlPlaneId'
      requestBody:
        $ref: '#/components/requestBodies/CreateConfigStoreRequest'
      responses:
        '201':
          $ref: '#/components/responses/ConfigStoreResponse'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              examples:
                ConfigStoreNameBadRequestExample:
                  $ref: '#/components/examples/ConfigStoreNameBadRequestExample'
        '401':
          $ref: '#/components/responses/ConfigStoreUnauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
      tags:
        - Config Stores
  '/v2/control-planes/{controlPlaneId}/config-stores/{configStoreId}':
    parameters:
      - $ref: '#/components/parameters/controlPlaneId'
      - $ref: '#/components/parameters/configStoreId'
    get:
      operationId: get-config-store
      summary: Fetch Config Store
      description: Returns a Config Store
      responses:
        '200':
          $ref: '#/components/responses/ConfigStoreResponse'
        '401':
          $ref: '#/components/responses/ConfigStoreUnauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      tags:
        - Config Stores
    put:
      operationId: update-config-store
      summary: Update an individual Config Store
      description: Updates a Config Store
      requestBody:
        $ref: '#/components/requestBodies/UpdateConfigStoreRequest'
      responses:
        '200':
          $ref: '#/components/responses/ConfigStoreResponse'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              examples:
                ConfigStoreNameBadRequestExample:
