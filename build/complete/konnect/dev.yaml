  /v4/explore:
    post:
      tags:
        - Explore
      operationId: ExploreController_exploreV2
      summary: Explore metrics in the analyticcs platform
      description: >-
        Post a query to the endpoint to retrieve aggregated metrics down to the
        minute. Data can be requested to group by any 2 dimensions, and any
        number of filter conditions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExploreV2Dto'
      responses:
        '200':
          description: Aggregated results of the query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExploreResultV2'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              examples:
                BadRequestExample:
                  $ref: '#/components/examples/BadRequestExample'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
components:
  schemas:
    AbsoluteTimeRangeDtoV2:
      type: object
      description: A duration representing an exact start and end time.
      properties:
        tz:
          type: string
          default: Etc/UTC
        type:
          type: string
          enum:
            - absolute
        start:
          format: date-time
          type: string
        end:
          format: date-time
          type: string
      required:
        - type
    RelativeTimeRangeDtoV2:
      type: object
      description: >-
        A duration representing a relative-to-now span of time. Generally the
        start time is floored to the requested granularity. Eg 7d from now, with
        1day granularity initiated at 2024-01-08T17:11:00+05:00 will query for
        the time range from 2024-01-01T00:00:00+05:00 to
        2024-01-08T17:11:00+05:00. The exact start and end timestamps are
        returned in the result query in the meta.start_ms and meta.end_ms
        fields. If the granularity for the previous query was 1hour, it would
        query a time range from 2024-01-01T17:00:00+05:00 to
        2024-01-08T17:11:00+05:00.
      properties:
        tz:
          type: string
          default: Etc/UTC
        type:
          type: string
          enum:
            - relative
        time_range:
          type: string
          enum:
            - 15m
            - 1h
            - 6h
            - 12h
            - 24h
            - 7d
            - 30d
            - current_week
            - current_month
            - previous_week
            - previous_month
          default: 1h
      required:
        - type
        - time_range
    ExploreFilter:
      type: object
      description: A filter that specifies which data to include in the query
      properties:
        dimension:
          type: string
          enum:
            - api_product
            - api_product_version
            - application
            - consumer
            - control_plane
            - control_plane_group
            - data_plane_node
            - gateway_service
            - route
            - status_code
            - status_code_grouped
          example: status_code
        type:
          type: string
          enum:
            - in
            - not_in
            - selector
          example: in
        values:
          type: array
          items:
            type: string
      required:
        - dimension
        - type
        - values
    ExploreV2Dto:
      type: object
      description: A query to launch at the API
      properties:
        metrics:
          type: array
          description: >-
            List of aggregated metrics to collect across the requested time
            span.
          example:
            - request_count
          items:
            type: string
            enum:
              - request_count
              - request_per_minute
              - response_latency_p99
              - response_latency_p95
              - response_latency_p50
              - response_latency_average
              - upstream_latency_p99
              - upstream_latency_p95
              - upstream_latency_p50
              - upstream_latency_average
              - kong_latency_p99
              - kong_latency_p95
              - kong_latency_p50
              - kong_latency_average
              - response_size_p99
              - response_size_p95
              - response_size_p50
              - request_size_p99
              - request_size_p95
              - request_size_p50
              - request_size_average
              - response_size_average
        dimensions:
          type: array
          description: List of attributes or entity types to group by.
          minItems: 0
          maxItems: 2
          example:
            - status_code_grouped
          items:
            type: string
            enum:
              - api_product
              - api_product_version
              - application
              - consumer
              - control_plane
              - control_plane_group
              - data_plane_node
              - gateway_service
              - route
              - status_code
              - status_code_grouped
              - time
        filters:
          type: array
          description: A list of filters to apply to the query.
          items:
            $ref: '#/components/schemas/ExploreFilter'
        granularity:
          type: string
          description: >
            Force time grouping into buckets of the specified duration.  Only
            has an effect if "time" is in the "dimensions" list.


            If "trend" is chosen, the time range covered by the query will be
            twice the specified time range, and the granularity will be set such
            that two time buckets are returned, one for the given time range and
            one for the same time range prior.

            For example:


            time range: last 24 hours

            granularity: trend


            will return 2 time buckets (assuming both have data):


            - 48 hours ago to 24 hours ago

            - 24 hours ago to now


            Another example:


            time range: 2020-05-01 to 2020-05-15

            granularity: trend


            will return 2 time buckets:


            - 2020-04-15 through 2020-04-30

            - 2020-05-01 through 2020-05-15


            The granularity of the result may be coarser than requested.  The
            finest allowed granularity depends on the query's time range: data
            farther in the past may have coarser granularity.  The exact result
            granularity will be reported in the response `meta.granularity_ms`
            field.


            If granularity is not specified and "time" is in the dimensions
            list, a default will be chosen based on the time range requested.
          enum:
            - minute
            - hour
            - day
            - week
            - trend
        time_range:
          description: The time range to query.
          oneOf:
            - $ref: '#/components/schemas/RelativeTimeRangeDtoV2'
            - $ref: '#/components/schemas/AbsoluteTimeRangeDtoV2'
          discriminator:
            propertyName: type
            mapping:
              relative: '#/components/schemas/RelativeTimeRangeDtoV2'
              absolute: '#/components/schemas/AbsoluteTimeRangeDtoV2'
          default:
            type: relative
            time_range: 1h
        meta:
          type: object
      required:
        - metrics
      example:
        time_range:
          type: relative
          time_range: 24h
          tz: EST
        dimensions:
          - time
          - gateway_service
        filters:
          - type: in
            dimension: control_plane
            values:
              - d5ac5d88-efed-4e10-9dfe-0b0a6646c219
        granularity: hour
        metrics:
          - response_latency_p99
          - response_latency_p95
          - response_latency_p50
    GroupByResult:
      type: object
      properties:
        timestamp:
          type: string
          readOnly: true
        event:
          type: object
          readOnly: true
      required:
        - timestamp
        - event
      example:
        event:
          gateway_service: >-
            d5ac5d88-efed-4e10-9dfe-0b0a6646c219:bf16907c-8673-4f9d-aa83-1f2ea9215055
          request_count: 1000
          response_latency_p99: 23
        timestamp: '2024-01-16T00:00:00Z'
    DisplayBlob:
      type: object
      properties: {}
      example:
        gateway_service:
          d5ac5d88-efed-4e10-9dfe-0b0a6646c219:bf16907c-8673-4f9d-aa83-111111111111:
            id: >-
              d5ac5d88-efed-4e10-9dfe-0b0a6646c219:bf16907c-8673-4f9d-aa83-111111111111
            deleted: true
            name: Gateway Service Alpha
          d5ac5d88-efed-4e10-9dfe-0b0a6646c219:bf16907c-8673-4f9d-aa83-1f2ea9215055:
            id: >-
              d5ac5d88-efed-4e10-9dfe-0b0a6646c219:bf16907c-8673-4f9d-aa83-1f2ea9215055
            deleted: false
            name: Gateway Service Beta
    MetricUnitDto:
      type: object
      properties: {}
      example:
        request_count: cnt
        response_latency_p99: ms
    QueryResponseMeta:
      type: object
      properties:
        start_ms:
          type: number
          readOnly: true
        end_ms:
          type: number
          readOnly: true
        display:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/DisplayBlob'
        metric_units:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/MetricUnitDto'
        granularity:
          type: number
          readOnly: true
        granularity_ms:
          type: number
          readOnly: true
        truncated:
          type: boolean
          readOnly: true
        limit:
          type: number
          readOnly: true
        query_id:
          type: string
          readOnly: true
      required:
        - start_ms
        - end_ms
        - display
        - metric_units
        - granularity_ms
        - truncated
        - limit
        - query_id
      example:
        start_ms: 1705428000000
        end_ms: 1705429000000
        display:
          gateway_service:
            d5ac5d88-efed-4e10-9dfe-0b0a6646c219:bf16907c-8673-4f9d-aa83-111111111111:
              id: >-
                d5ac5d88-efed-4e10-9dfe-0b0a6646c219:bf16907c-8673-4f9d-aa83-111111111111
              deleted: true
              name: Gateway Service Alpha
            d5ac5d88-efed-4e10-9dfe-0b0a6646c219:bf16907c-8673-4f9d-aa83-1f2ea9215055:
              id: >-
                d5ac5d88-efed-4e10-9dfe-0b0a6646c219:bf16907c-8673-4f9d-aa83-1f2ea9215055
              deleted: false
              name: Gateway Service Beta
        metric_units:
          request_count: cnt
          response_latency_p99: ms
        granularity_ms: 60000
        truncated: false
        limit: 50
        query_id: requested-query-id
    ExploreResultV2:
      type: object
      properties:
        data:
          readOnly: true
          type: array
          items:
            $ref: '#/components/schemas/GroupByResult'
        meta:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/QueryResponseMeta'
      required:
        - data
        - meta
    BaseError:
      type: object
      title: Error
      description: standard error
      required:
        - status
        - title
        - instance
        - detail
      properties:
        status:
          type: integer
          description: >
            The HTTP status code of the error. Useful when passing the response

            body to child properties in a frontend UI. Must be returned as an
            integer.
          readOnly: true
        title:
          type: string
          description: |
            A short, human-readable summary of the problem. It should not
            change between occurences of a problem, except for localization.
            Should be provided as "Sentence case" for direct use in the UI.
          readOnly: true
        type:
          type: string
          description: The error type.
          readOnly: true
        instance:
          type: string
          description: |
            Used to return the correlation ID back to the user, in the format
            kong:trace:<correlation_id>. This helps us find the relevant logs
            when a customer reports an issue.
          readOnly: true
        detail:
          type: string
          description: >
            A human readable explanation specific to this occurence of the
            problem.

            This field may contain request/entity data to help the user
            understand

            what went wrong. Enclose variable values in square brackets. Should
            be

            provided as "Sentence case" for direct use in the UI.
          readOnly: true
    UnauthorizedError:
      allOf:
        - $ref: '#/components/schemas/BaseError'
        - type: object
          properties:
            status:
              example: 401
            title:
              example: Unauthorized
            type:
              example: https://httpstatuses.com/401
            instance:
              example: kong:trace:1234567890
            detail:
              example: Invalid credentials
    ForbiddenError:
      allOf:
        - $ref: '#/components/schemas/BaseError'
        - type: object
          properties:
            status:
              example: 403
            title:
              example: Forbidden
            type:
              example: https://httpstatuses.com/403
            instance:
              example: kong:trace:1234567890
            detail:
              example: Forbidden
    PaginatedMeta:
      type: object
      example:
        page:
          number: 2
          size: 10
          total: 100
      title: PaginatedMeta
      description: returns the pagination information
      properties:
        page:
          type: object
          description: >-
            Contains pagination query parameters and the total number of
            entities returned.
          properties:
            number:
              type: integer
              example: 2
              description: Represents the current page number.
            size:
              type: integer
              example: 10
              maximum: 100
              description: Represents the number of entities on the page.
            total:
              type: integer
              example: 100
              maximum: 1000
              description: >-
                Integer indicating the total number of entities in the list of
                results that’s being paginated.
          $ref: '#/components/schemas/PageMeta'
      required:
        - page
    SortQuery:
      title: SortQuery
      type: string
      example: name,created_at desc
      description: >
        The `asc` suffix is optional as the default sort order is ascending.

        The `desc` suffix is used to specify a descending order.

        Multiple sort attributes may be provided via a comma separated list.

        JSONPath notation may be used to specify a sub-attribute (eg: 'foo.bar
        desc').
    StringFieldEqualsFilter:
      title: StringFieldEqualsFilter
      description: Filters on the given string field value by exact match.
      oneOf:
        - type: string
        - type: object
          title: StringFieldEqualsComparison
          additionalProperties: false
          properties:
            eq:
              type: string
          required:
            - eq
      x-examples:
        example-1: equals-some-value
        example-2:
          eq: some-value
      type: string
    StringFieldContainsFilter:
      title: StringFieldContainsFilter
      description: Filters on the given string field value by fuzzy match.
      type: object
      additionalProperties: false
      properties:
        contains:
          type: string
      required:
        - contains
      x-examples:
        example-1:
          contains: some-value
    StringFieldOContainsFilter:
      title: StringFieldOContainsFilter
      description: >-
        Returns entities that fuzzy-match any of the comma-delimited phrases in
        the filter string.
      type: object
      additionalProperties: false
      properties:
        ocontains:
          type: string
      required:
        - ocontains
      x-examples:
        example-1:
          ocontains: this-value,or-that-value
    StringFieldOEQFilter:
      title: StringFieldOEQFilter
      description: >-
        Returns entities that exact match any of the comma-delimited phrases in
        the filter string.
      type: object
      additionalProperties: false
      properties:
        oeq:
          type: string
      required:
        - oeq
      x-examples:
        example-1:
          oeq: some-value,some-other-value
    StringFieldNEQFilter:
      title: StringFieldNEQFilter
      description: Filters on the given string field value by exact match inequality.
      type: object
      additionalProperties: false
      properties:
        neq:
          type: string
        oeq:
          type: string
      required:
        - neq
      x-examples:
        example-1:
          neq: not-this-value
          oeq: not-this-value
    StringFieldFilter:
      title: StringFieldFilter
      description: Filters on the given string field value by either exact or fuzzy match.
      oneOf:
        - $ref: '#/components/schemas/StringFieldEqualsFilter'
        - $ref: '#/components/schemas/StringFieldContainsFilter'
        - $ref: '#/components/schemas/StringFieldOContainsFilter'
