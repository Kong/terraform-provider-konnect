        The maximum amount of entities that can be ingested in a single request is __100__.
      requestBody:
        $ref: '#/components/requestBodies/UpsertDiscoveredEntitiesBody'
      responses:
        '200':
          description: All entities delivered in the payload were ingested successfully.
        '202':
          description: |
            The payload was accepted but a no-op was performed.
            This response will be returned when an organization has discovery disabled for the given integration.
