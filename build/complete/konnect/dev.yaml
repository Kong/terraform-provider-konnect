components:
  parameters:
    AddonFilter:
      name: filter
      description: Filters a collection of add-ons.
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/AddonFilterParameters'
      style: deepObject
    AddonSort:
      name: sort
      description: |
        Sorts a collection of add-ons. Supported sort attributes are:
          - name
          - display_name
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/SortQuery'
    ApiFilters:
      name: filter
      description: Filters APIs in the response.
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/ApiFilterParameters'
      style: deepObject
    ApiSort:
      name: sort
      description: |
        Sorts a collection of APIs. Supported sort attributes are:
          - name
          - version
          - created_at
          - updated_at
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/SortQuery'
    DiscoveredEntityFilter:
      name: filter
      description: Filters a collection of discovered entities.
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/DiscoveredEntityFilterParameters'
      style: deepObject
    DiscoveredEntitySort:
      name: sort
      description: |
        Sorts a collection of discovered entities. Supported sort attributes are:
          - integration
          - created_at
          - updated_at
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/SortQuery'
    DiscoveryActionFilter:
      name: filter
      description: Filters a collection of discovery actions.
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/DiscoveryActionFilterParameters'
      style: deepObject
    DiscoveryActonSort:
      name: sort
      description: |
        Sorts a collection of discovery actions. Supported sort attributes are:
          - created_at
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/SortQuery'
    DiscoverySuggestionRuleFilter:
      name: filter
      description: Filters a collection of discovery suggestion rules.
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/DiscoverySuggestionRuleFilterParameters'
      style: deepObject
    IdentityProviderId:
      schema:
        type: string
        format: uuid
        example: d32d905a-ed33-46a3-a093-d8f536af9a8a
      name: id
      in: path
      required: true
      description: ID of the identity provider.
    InstalledAddonFilter:
      name: filter
      description: Filters a collection of installed add-ons.
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/InstalledAddonFilterParameters'
      style: deepObject
    InstalledAddonSort:
      name: sort
      description: |
        Sorts a collection of installed add-ons. Supported sort attributes are:
          - name
          - enabled
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/SortQuery'
    MetadataSchemaFilter:
      name: filter
      description: Filters a collection of metadata schemas.
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/MetadataSchemaFilterParameters'
      style: deepObject
    MetadataSchemaSort:
      name: sort
      description: |
        Sorts a collection of metadata schemas. Supported sort attributes are:
          - created_at
          - updated_at
          - name
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/SortQuery'
    PageAfter:
      name: 'page[after]'
      description: 'Request the next page of data, starting with the item after this parameter.'
      required: false
      in: query
      allowEmptyValue: true
      schema:
        type: string
        example: ewogICJpZCI6ICJoZWxsbyB3b3JsZCIKfQ
    PageBefore:
      name: 'page[before]'
      description: 'Request the next page of data, starting with the item before this parameter.'
      required: false
      in: query
      allowEmptyValue: true
      schema:
        type: string
        example: ewogICJpZCI6ICJoZWxsbyB3b3JsZCIKfQ
    PageId:
      schema:
        type: string
        format: uuid
        example: ebbac5b0-ac89-45c3-9d2e-c4542c657e79
      name: pageId
      in: path
      required: true
      description: ID of the page.
    PageNumber:
      name: 'page[number]'
      description: Determines which page of the entities to retrieve.
      in: query
      required: false
      schema:
        type: integer
        example: 1
      allowEmptyValue: true
    PageSize:
      name: 'page[size]'
      description: The maximum number of items to include per page. The last page of a collection may include fewer items.
      in: query
      required: false
      schema:
        type: integer
        example: 10
      allowEmptyValue: true
    ServiceFilter:
      name: filter
      description: Filters a collection of services.
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/ServiceFilterParameters'
      style: deepObject
    ServiceIntegrationFilter:
      name: filter
      description: Filters a collection of Service Hub integrations associated to a service.
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/ServiceIntegrationFilterParameters'
