openapi: 3.0.3
info:
  title: Konnect API
  description: The Konnect platform API
  version: 2.1.0
  contact:
    name: Kong
    url: https://konghq.com
    email: support@konghq.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: https://global.api.konghq.com/v2
  - url: https://us.api.konghq.com/v2
  - url: https://eu.api.konghq.com/v2
  - url: https://au.api.konghq.com/v2
    description: Production
externalDocs:
  description: Documentation for Kong Gateway and its APIs
  url: https://docs.konghq.com
paths:
  /explore:
    post:
      tags:
        - Explore
      operationId: ExploreController_exploreV2
      summary: Explore metrics in the analyticcs platform
      description: >-
        Post a query to the endpoint to retrieve aggregated metrics down to the
        minute. Data can be requested to group by any 2 dimensions, and any
        number of filter conditions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExploreV2Dto'
      responses:
        '200':
          description: Aggregated results of the query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExploreResultV2'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              examples:
                BadRequestExample:
                  $ref: '#/components/examples/BadRequestExample'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /organizations/state:
    post:
      summary: Sets a new state for an organization.
      operationId: post-organization-state
      description: |
        Sets a new state for an organization and creates an organization state 
        history record. An organization can be set to active or inactive.
      tags:
        - Organization Lifecycle
      responses:
        '201':
          $ref: '#/components/responses/OrganizationStateResponse'
        '400':
          $ref: '#/components/responses/OrganizationStateBadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/OrganizationNotFound'
        '409':
          $ref: '#/components/responses/OrganizationStateConflict'
      requestBody:
        $ref: '#/components/requestBodies/UpdateOrganizationState'
  /organizations/state/history:
    get:
      summary: Returns the state history of an organization.
      operationId: get-organization-state-history
      description: >
        Returns the state history of an organization sorted in reverse
        chronological order.

        Possible states include active, inactive, deleting, and deleted. An
        organization state 

        will be transitioned to the deleting state if the organization remains
        inactive for 90 days. 

        After deletion is complete, the state will be transitioned to the final
        deleted state. 
      tags:
        - Organization Lifecycle
      responses:
        '200':
          $ref: '#/components/responses/OrganizationStateHistory'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/OrganizationNotFound'
  /search:
    get:
      operationId: get-search
      summary: Search Konnect
      description: Retrieves a list of Konnect entities matching the search query provided.
      tags:
        - Search
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageAfter'
        - in: query
          name: q
          description: The query that defines the search criteria.
          example: name:"John Smith"
          schema:
            type: string
          required: true
      responses:
        '200':
          $ref: '#/components/responses/SearchResponse'
        '400':
          $ref: '#/components/responses/SearchBadRequest'
  /search/types:
    get:
      operationId: get-search-types
      summary: List Search Types
      description: Retrieves a list of searchable Konnect entity types.
      tags:
        - Search
      responses:
        '200':
          $ref: '#/components/responses/SearchTypesResponse'
components:
  schemas:
    AbsoluteTimeRangeDtoV2:
      type: object
      description: A duration representing an exact start and end time.
      properties:
        tz:
          type: string
          default: Etc/UTC
        type:
          type: string
          enum:
            - absolute
        start:
          format: date-time
          type: string
        end:
          format: date-time
          type: string
      required:
        - type
    RelativeTimeRangeDtoV2:
      type: object
      description: >-
        A duration representing a relative-to-now span of time. Generally the
        start time is floored to the requested granularity. Eg 7d from now, with
        1day granularity initiated at 2024-01-08T17:11:00+05:00 will query for
        the time range from 2024-01-01T00:00:00+05:00 to
        2024-01-08T17:11:00+05:00. The exact start and end timestamps are
        returned in the result query in the meta.start_ms and meta.end_ms
        fields. If the granularity for the previous query was 1hour, it would
        query a time range from 2024-01-01T17:00:00+05:00 to
        2024-01-08T17:11:00+05:00.
      properties:
        tz:
          type: string
          default: Etc/UTC
        type:
          type: string
          enum:
            - relative
        time_range:
          type: string
          enum:
            - 15m
            - 1h
            - 6h
            - 12h
            - 24h
            - 7d
            - 30d
            - current_week
            - current_month
            - previous_week
            - previous_month
          default: 1h
      required:
        - type
        - time_range
    ExploreFilter:
      type: object
      description: A filter that specifies which data to include in the query
      properties:
        dimension:
          type: string
          enum:
            - api_product
            - api_product_version
            - application
            - consumer
            - control_plane
            - control_plane_group
            - data_plane_node
            - gateway_service
            - route
            - status_code
            - status_code_grouped
          example: status_code
        type:
          type: string
          enum:
            - in
            - not_in
            - selector
          example: in
        values:
          type: array
          items:
            type: string
      required:
        - dimension
        - type
        - values
    ExploreV2Dto:
      type: object
      description: A query to launch at the API
      properties:
        metrics:
          type: array
          description: >-
            List of aggregated metrics to collect across the requested time
            span.
          example:
            - request_count
          items:
            type: string
            enum:
              - request_count
              - request_per_minute
              - response_latency_p99
              - response_latency_p95
              - response_latency_p50
              - response_latency_average
              - upstream_latency_p99
              - upstream_latency_p95
              - upstream_latency_p50
              - upstream_latency_average
              - kong_latency_p99
              - kong_latency_p95
              - kong_latency_p50
              - kong_latency_average
              - response_size_p99
              - response_size_p95
              - response_size_p50
              - request_size_p99
              - request_size_p95
              - request_size_p50
              - request_size_average
              - response_size_average
        dimensions:
          type: array
          description: List of attributes or entity types to group by.
          minItems: 0
          maxItems: 2
          example:
            - status_code_grouped
          items:
            type: string
            enum:
              - api_product
              - api_product_version
              - application
              - consumer
              - control_plane
              - control_plane_group
              - data_plane_node
              - gateway_service
              - route
              - status_code
              - status_code_grouped
              - time
        filters:
          type: array
          description: A list of filters to apply to the query.
          items:
            $ref: '#/components/schemas/ExploreFilter'
        granularity:
          type: string
          description: >
            Force time grouping into buckets of the specified duration.  Only
            has an effect if "time" is in the "dimensions" list.


            If "trend" is chosen, the time range covered by the query will be
            twice the specified time range, and the granularity will be set such
            that two time buckets are returned, one for the given time range and
            one for the same time range prior.

            For example:


            time range: last 24 hours

            granularity: trend


            will return 2 time buckets (assuming both have data):


            - 48 hours ago to 24 hours ago

            - 24 hours ago to now


            Another example:


            time range: 2020-05-01 to 2020-05-15

            granularity: trend


            will return 2 time buckets:


            - 2020-04-15 through 2020-04-30

            - 2020-05-01 through 2020-05-15


            The granularity of the result may be coarser than requested.  The
            finest allowed granularity depends on the query's time range: data
            farther in the past may have coarser granularity.  The exact result
            granularity will be reported in the response `meta.granularity_ms`
            field.


            If granularity is not specified and "time" is in the dimensions
            list, a default will be chosen based on the time range requested.
          enum:
            - minute
            - hour
            - day
            - week
            - trend
        time_range:
          description: The time range to query.
          oneOf:
            - $ref: '#/components/schemas/RelativeTimeRangeDtoV2'
            - $ref: '#/components/schemas/AbsoluteTimeRangeDtoV2'
          discriminator:
            propertyName: type
            mapping:
              relative: '#/components/schemas/RelativeTimeRangeDtoV2'
              absolute: '#/components/schemas/AbsoluteTimeRangeDtoV2'
          default:
            type: relative
            time_range: 1h
        meta:
          type: object
      required:
        - metrics
      example:
        time_range:
          type: relative
          time_range: 24h
          tz: EST
        dimensions:
          - time
          - gateway_service
        filters:
          - type: in
            dimension: control_plane
            values:
              - d5ac5d88-efed-4e10-9dfe-0b0a6646c219
        granularity: hour
        metrics:
          - response_latency_p99
          - response_latency_p95
          - response_latency_p50
    GroupByResult:
      type: object
      properties:
        timestamp:
          type: string
          readOnly: true
        event:
          type: object
          readOnly: true
      required:
        - timestamp
        - event
      example:
        event:
          gateway_service: >-
            d5ac5d88-efed-4e10-9dfe-0b0a6646c219:bf16907c-8673-4f9d-aa83-1f2ea9215055
          request_count: 1000
          response_latency_p99: 23
        timestamp: '2024-01-16T00:00:00Z'
    DisplayBlob:
      type: object
      properties: {}
      example:
        gateway_service:
          d5ac5d88-efed-4e10-9dfe-0b0a6646c219:bf16907c-8673-4f9d-aa83-111111111111:
            id: >-
              d5ac5d88-efed-4e10-9dfe-0b0a6646c219:bf16907c-8673-4f9d-aa83-111111111111
            deleted: true
            name: Gateway Service Alpha
          d5ac5d88-efed-4e10-9dfe-0b0a6646c219:bf16907c-8673-4f9d-aa83-1f2ea9215055:
            id: >-
              d5ac5d88-efed-4e10-9dfe-0b0a6646c219:bf16907c-8673-4f9d-aa83-1f2ea9215055
            deleted: false
            name: Gateway Service Beta
    MetricUnitDto:
      type: object
      properties: {}
      example:
        request_count: cnt
        response_latency_p99: ms
    QueryResponseMeta:
      type: object
      properties:
        start_ms:
          type: number
          readOnly: true
        end_ms:
          type: number
          readOnly: true
        display:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/DisplayBlob'
        metric_units:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/MetricUnitDto'
        granularity:
          type: number
          readOnly: true
        granularity_ms:
          type: number
          readOnly: true
        truncated:
          type: boolean
          readOnly: true
        limit:
          type: number
          readOnly: true
        query_id:
          type: string
          readOnly: true
      required:
        - start_ms
        - end_ms
        - display
        - metric_units
        - granularity_ms
        - truncated
        - limit
        - query_id
      example:
        start_ms: 1705428000000
        end_ms: 1705429000000
        display:
          gateway_service:
            d5ac5d88-efed-4e10-9dfe-0b0a6646c219:bf16907c-8673-4f9d-aa83-111111111111:
              id: >-
                d5ac5d88-efed-4e10-9dfe-0b0a6646c219:bf16907c-8673-4f9d-aa83-111111111111
              deleted: true
              name: Gateway Service Alpha
            d5ac5d88-efed-4e10-9dfe-0b0a6646c219:bf16907c-8673-4f9d-aa83-1f2ea9215055:
              id: >-
                d5ac5d88-efed-4e10-9dfe-0b0a6646c219:bf16907c-8673-4f9d-aa83-1f2ea9215055
              deleted: false
              name: Gateway Service Beta
        metric_units:
          request_count: cnt
          response_latency_p99: ms
        granularity_ms: 60000
        truncated: false
        limit: 50
        query_id: requested-query-id
    ExploreResultV2:
      type: object
      properties:
        data:
          readOnly: true
          type: array
          items:
            $ref: '#/components/schemas/GroupByResult'
        meta:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/QueryResponseMeta'
      required:
        - data
        - meta
    BaseError:
      type: object
      title: Error
      description: standard error
      required:
        - status
        - title
        - instance
        - detail
      properties:
        status:
          type: integer
          description: >
            The HTTP status code of the error. Useful when passing the response

            body to child properties in a frontend UI. Must be returned as an
            integer.
          readOnly: true
        title:
          type: string
          description: |
            A short, human-readable summary of the problem. It should not
            change between occurences of a problem, except for localization.
            Should be provided as "Sentence case" for direct use in the UI.
          readOnly: true
        type:
          type: string
          description: The error type.
          readOnly: true
        instance:
          type: string
          description: |
            Used to return the correlation ID back to the user, in the format
            kong:trace:<correlation_id>. This helps us find the relevant logs
            when a customer reports an issue.
          readOnly: true
        detail:
          type: string
          description: >
            A human readable explanation specific to this occurence of the
            problem.

            This field may contain request/entity data to help the user
            understand

            what went wrong. Enclose variable values in square brackets. Should
            be

            provided as "Sentence case" for direct use in the UI.
          readOnly: true
    UnauthorizedError:
      type: object
      properties:
        status:
          example: 401
        title:
          example: Unauthorized
        type:
          example: https://httpstatuses.com/401
        instance:
          example: kong:trace:1234567890
        detail:
          example: Invalid credentials
      allOf:
        - $ref: '#/components/schemas/BaseError'
    ForbiddenError:
      type: object
      properties:
        status:
          example: 403
        title:
          example: Forbidden
        type:
          example: https://httpstatuses.com/403
        instance:
          example: kong:trace:1234567890
        detail:
          example: Forbidden
      allOf:
        - $ref: '#/components/schemas/BaseError'
    PaginatedMeta:
      type: object
      example:
        page:
          number: 2
          size: 10
          total: 100
      title: PaginatedMeta
      description: returns the pagination information
      properties:
        page:
          type: object
          description: >-
            Contains pagination query parameters and the total number of
            entities returned.
          properties:
            number:
              type: integer
              example: 2
              description: Represents the current page number.
            size:
              type: integer
              example: 10
              maximum: 100
              description: Represents the number of entities on the page.
            total:
              type: integer
              example: 100
              maximum: 1000
              description: >-
                Integer indicating the total number of entities in the list of
                results that’s being paginated.
          $ref: '#/components/schemas/PageMeta'
      required:
        - page
    PageMeta:
      type: object
      description: >-
        Contains pagination query parameters and the total number of objects
        returned.
      required:
        - number
        - size
        - total
      properties:
        number:
          type: number
          example: 1
        size:
          type: number
          example: 10
        total:
          type: number
          example: 100
    InvalidRules:
      description: invalid parameters rules
      type: string
      readOnly: true
      nullable: true
      enum:
        - required
        - enum
        - min_length
        - max_length
        - min_digits
        - min_lowercase
        - min_uppercase
        - min_symbols
        - is_array
        - is_base64
        - is_boolean
        - is_date_time
        - is_integer
        - is_null
        - is_number
        - is_object
        - is_string
        - is_uuid
        - unknown_property
        - is_label
        - matches_regex
    InvalidParameterChoiceItem:
      type: object
      properties:
        field:
          type: string
          example: name
          readOnly: true
        rule:
          $ref: '#/components/schemas/InvalidRules'
        reason:
          type: string
          example: is a required field
          readOnly: true
        choices:
          type: array
          uniqueItems: true
          nullable: true
          items: {}
          readOnly: true
      required:
        - field
        - reason
    InvalidParameterDependentItem:
      type: object
      properties:
        field:
          type: string
          example: name
          readOnly: true
        rule:
          description: invalid parameters rules
          type: string
          readOnly: true
          nullable: true
          enum:
            - dependent_fields
        reason:
          type: string
          example: is a required field
          readOnly: true
        dependents:
          type: array
          uniqueItems: true
          nullable: true
          items: {}
          readOnly: true
      required:
        - field
        - rule
        - reason
        - dependents
    InvalidParameters:
      type: array
      nullable: false
      uniqueItems: true
      minItems: 1
      description: invalid parameters
      items:
        oneOf:
          - $ref: '#/components/schemas/InvalidParameterChoiceItem'
          - $ref: '#/components/schemas/InvalidParameterDependentItem'
    BadRequestError:
      type: object
      required:
        - invalid_parameters
      properties:
        status:
          example: 400
        title:
          example: Bad Request
        type:
          example: https://httpstatuses.com/400
        instance:
          example: kong:trace:1234567890
        detail:
          example: Invalid request body
        invalid_parameters:
          $ref: '#/components/schemas/InvalidParameters'
      allOf:
        - $ref: '#/components/schemas/BaseError'
    NotFoundError:
      type: object
      properties:
        status:
          example: 404
        title:
          example: Not Found
        type:
          example: https://httpstatuses.com/404
        instance:
          example: kong:trace:1234567890
        detail:
          example: Not found
      allOf:
        - $ref: '#/components/schemas/BaseError'
    ConflictError:
      type: object
      properties:
        status:
          example: 409
        title:
          example: Conflict
        type:
          example: https://httpstatuses.com/409
        instance:
          example: kong:trace:1234567890
        detail:
          example: Conflict
      allOf:
        - $ref: '#/components/schemas/BaseError'
    SearchResponse:
      title: SearchResponse
      description: Search response schema.
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/SearchResultItem'
        meta:
          $ref: '#/components/schemas/CursorPaginatedMeta'
    SearchTypesResponse:
      title: SearchableEntityTypesResponse
      description: The collection of searchable entity types.
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                description: The entity type.
              regions:
                type: array
                items:
                  type: string
                description: The regions the entity is available.
    SearchResultItem:
      title: SearchResultItem
      description: Item included in the list of search results.
      type: object
      required:
        - id
        - type
        - name
      properties:
        id:
          type: string
          description: Unique identifier for the record.
        type:
          type: string
          description: Konnect entity type.
        name:
          type: string
          description: Name of the entity.
        description:
          type: string
          description: Description of the entity.
        labels:
          type: object
          description: Labels for the entity.
        relations:
          type: object
          description: Relations for the entity.
    CursorPageMetaWithTotal:
      type: object
      description: >-
        Pagination metadata with exact total. Useful when the collection size is
        inexpensive to provide.
      required:
        - size
        - next
        - previous
      properties:
        first:
          description: URI to the first page
          type: string
          format: uri
        last:
          description: URI to the last page
          type: string
          format: uri
        next:
          description: URI to the next page
          type: string
          format: uri
        previous:
          description: URI to the previous page
          type: string
          format: uri
        size:
          description: Requested page size
          type: number
          example: 10
        total:
          description: Total number of objects in the collection
          type: number
          example: 974
    CursorPageMetaWithEstimatedTotal:
      type: object
      description: >-
        Pagination metadata with estimated total. Useful when exact total cannot
        be computed in reasonable time.
      required:
        - size
        - next
        - previous
      properties:
        first:
          description: URI to the first page
          type: string
          format: uri
        last:
          description: URI to the last page
          type: string
          format: uri
        next:
          description: URI to the next page
          type: string
          format: uri
        previous:
          description: URI to the previous page
          type: string
          format: uri
        size:
          description: Requested page size
          type: number
          example: 10
        estimated_total:
          description: Approximate number of objects in the collection
          type: number
          example: 1000000000
    CursorPaginatedMeta:
      type: object
      title: CursorPaginatedMeta
      description: Returns the pagination information
      properties:
        page:
          oneOf:
            - $ref: '#/components/schemas/CursorPageMetaWithTotal'
            - $ref: '#/components/schemas/CursorPageMetaWithEstimatedTotal'
      required:
        - page
    OrganizationState:
      type: object
      title: Organization State
      properties:
        id:
          type: string
          description: UUID of the organization.
          format: uuid
          readOnly: true
          example: d99c041a-c7cf-46a2-bf3a-44bb5f75400e
        state:
          type: string
          description: State of the organization.
          example: active
          enum:
            - active
            - inactive
            - deleting
            - deleted
        reason:
          type: string
          description: The reason for the organization's state.
          example: invoice overdue (30 days)
        service:
          type: string
          description: The service that modified the state.
          example: kbilling
        changed_by:
          type: string
          description: |
            The ID of the Konger who modified the state.
          example: 00uerwcs8eC4ifanR256
        created_at:
          type: string
          description: Date the organization state was created.
          format: date-time
          readOnly: true
          example: '2023-01-23T17:22:52.150Z'
  examples:
    BadRequestExample:
      value:
        status: 400
        title: Invalid Request
        instance: kong:trace:6591723055278037644
        detail: Invalid Parameters
        invalid_parameters:
          - field: time_range.time_range
            rule: unknown_property
            choices: []
            reason: property time_range should not exist
          - field: time_range.start_date
            rule: is_date
            choices: []
            reason: start must be a valid date in ISO format
          - field: time_range.end_date
            rule: is_date
            choices: []
            reason: end must be a valid date in ISO format
          - field: time_range.time_range
            rule: unknown_property
            choices: []
            reason: property time_range should not exist
          - field: time_range.start_date
            rule: is_date
            choices: []
            reason: start must be a valid date in ISO format
          - field: time_range.end_date
            rule: is_date
            choices: []
            reason: end must be a valid date in ISO format
    UnauthorizedExample:
      value:
        status: 401
        title: Unauthorized
