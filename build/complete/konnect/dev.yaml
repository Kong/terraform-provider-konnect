                    The id of the suggestion rule which generated an error when evaluated on this discovered entity.
                  type: string
                  example: 3d8d1c3e-3884-4571-af2e-ad4ad89bc628
                details:
                  description: |
                    Details of the error generated from the related suggested rule when evaluated on this discovered entity.
                  type: array
