            - suggestion_rule_id
            - discovered_entity_id
            - entity_name
            - scope
            - service_id
            - action
            - ignored
          properties:
            id:
              description: The suggested discovery action rule ID.
              type: string
              format: uuid
              example: 76ca0689-f08e-4c04-b2a6-4c992d89d554
            integration:
              description: The machine name of the integration that this suggested discovery action may apply to.
              type: string
              example: gateway-manager
            suggestion_rule_id:
              description: The identifier of the suggestion rule that generated this suggested discovery action.
              type: string
              format: uuid
              example: 22f72bd1-2897-473e-9471-302de3ccf38b
              nullable: true
            discovered_entity_id:
              description: The identifier of the discovered entity this suggested discovery action may act on.
              type: string
              format: uuid
              example: 287ead32-a7da-4f2e-89cb-802ae6208f18
            entity_name:
              description: The entity name of the discovered entity associated to this suggested action.
              type: string
              example: My Service
            scope:
              description: |
                The scope of the discovered entity associated to this suggested action.
                  - "service" scope indicates the discovered entity is for a service integration.
              type: string
              example: service
              enum:
                - service
            service_id:
              description: The identifier of the service this suggested discovery action may act on.
              type: string
              format: uuid
              example: 7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
              nullable: true
            ignored:
              description: |
                Determines if this suggested action has been ignored or not.
                - `true`: Suggested action has been ignored
                - `false`: Suggested action is ready to be accepted or ignored
              type: boolean
              example: false
            action:
              $ref: '#/components/schemas/SuggestedDiscoveryAction'
        - $ref: '#/components/schemas/EntityTimeFields'
      title: SuggestedDiscoveryAction
    CreateDiscoveryActionPayload:
      type: object
      properties:
        discovered_entity_id:
          description: The identifier of the discovered entity associated to this discovery action.
          type: string
          format: uuid
          example: 287ead32-a7da-4f2e-89cb-802ae6208f18
        action:
          oneOf:
            - $ref: '#/components/schemas/CreateAndMapServiceActionPayload'
            - $ref: '#/components/schemas/IgnoreActionPayload'
            - $ref: '#/components/schemas/RestoreActionPayload'
            - $ref: '#/components/schemas/MapServiceAction'
      additionalProperties: false
      required:
        - discovered_entity_id
        - action
    DiscoveryActionObject:
      description: Contains information about a discovery action
      type: object
      properties:
        id:
          description: The discovery action ID.
          type: string
          format: uuid
          example: 76ca0689-f08e-4c04-b2a6-4c992d89d554
        discovered_entity_id:
          description: The identifier of the discovered entity associated to this action.
          type: string
          format: uuid
          example: 287ead32-a7da-4f2e-89cb-802ae6208f18
        entity_name:
          description: The entity name of the discovered entity associated to this action.
          type: string
          example: My Service
        action:
          $ref: '#/components/schemas/DiscoveryAction'
        user_id:
          description: |
            The identifer of the actor who applied this action.
            A `null` value indicates that this action was automatically performed based off rules set in the system.
          type: string
          format: uuid
          example: 699f1021-4ed8-4f97-8ed3-779fba89d9c7
          nullable: true
        cause:
          description: |
            Indicates the cause of the action.

            - `user-action`: A user took action directly.
            - `suggestion-rule`: Action was taken automatically based on a suggestion rule.
            - `currently-linked`: Action to ignore discovered entity was taken automatically because it is already linked to a service.
            - `system`: Action was taken automatically based on software defaults.
          type: string
          enum:
            - user-action
            - suggestion-rule
            - system
        integration:
          description: The integration name.
          type: string
          example: gateway-manager
        outputs:
          $ref: '#/components/schemas/DiscoveryActionOutput'
        created_at:
          $ref: '#/components/schemas/ServiceHubCreatedAtProperties'
      additionalProperties: false
      required:
        - id
        - discovered_entity_id
        - entity_name
        - action
        - user_id
        - cause
        - integration
        - outputs
        - created_at
      title: DiscoveryAction
