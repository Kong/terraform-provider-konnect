              organization_name:
                type: string
              default_region:
                type: string
            required:
              - organization_name
              - default_region
            title: Auth0 organization register
    UpdateUser:
      description: The request schema for the update user request.
      content:
        application/json:
          schema:
            type: object
            properties:
              full_name:
                description: The user's full name.
                type: string
                example: James C. Woods
                pattern: '^[\w \W]+$'
                writeOnly: true
              preferred_name:
                description: The user's desired name.
                type: string
                example: Jimmy
                maxLength: 250
                writeOnly: true
          examples:
            Example Request Body:
              $ref: '#/components/examples/Update-User-Request'
    AssignParameterizedRole:
      content:
        application/json:
          schema:
            description: A parameterized assigned role is a role that has been assigned to a managed system account.
            type: object
            properties:
              role_name:
                description: The desired role.
                type: string
                example: Connector
              entity_id:
                description: The ID of the entity.
                type: string
                format: uuid
                example: e67490ce-44dc-4cbd-b65e-b52c746fc26a
              entity_type_name:
                description: The type of entity.
                type: string
                example: Mesh Control Planes
              entity_region:
                description: The region to scope the role assignment to.
                type: string
                example: eu
                enum:
                  - us
                  - eu
                  - au
                  - '*'
              parameters:
                example:
                  zoneName: zone3
                type: object
          examples:
            Parameterized-Assigned-Role:
              $ref: '#/components/examples/Parameterized-Assigned-Role-Example'
      description: The request schema for assigning a role.
    UpdateOrganization:
      description: The request schema to update an organization.
      content:
        application/json:
          schema:
            type: object
            properties:
              owner_id:
                description: The user id of the new owner of the organization. Must be a member of the Organization Admins team.
                type: string
                format: uuid
                example: d9c56d92-0339-4dfb-be0c-2253162edba9
              name:
                description: The new name of the organization.
                type: string
                example: Kong Inc
          examples:
            Example Request Body:
              $ref: '#/components/examples/Update-Organization'
    AWSResolveCustomerRequest:
      description: AWS Marketplace Metering Resolve Customer request.
      content:
        application/json:
          schema:
            type: object
            properties:
              token:
                description: Token is the aws customer token from the aws marketplace.
                type: string
            required:
              - token
          examples:
            Example Request Body:
              $ref: '#/components/examples/AWS-Resolve-Customer-Request'
    DeviceAuthorizationUserRequest:
      description: The request schema for the user device authorization request.
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              user_code:
                description: The end-user device verification code.
                type: string
            required:
              - user_code
    DeviceConfirmationRequest:
      description: The request schema for the device confirmation request.
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              user_code:
                description: The end-user device verification code.
                type: string
            required:
              - user_code
    UpdateOrganizationState:
      required: true
      description: The request schema to set an organization's state.
      content:
        application/json:
          schema:
            type: object
            properties:
              state:
                description: The state of the organization to set.
                type: string
                example: inactive
                enum:
                  - active
                  - inactive
              reason:
                description: The reason for the state change.
                type: string
                example: invoice overdue (30 days)
              changed_by:
                description: The uuid of the konger who modified the state.
                type: string
                example: 00uerwcs8eC4ifanR256
            required:
              - state
          examples:
            Inactive Example:
              value:
                state: inactive
                reason: invoice overdue (30 days)
                changed_by: 00uerwcs8eC4ifanR256
            Active Example:
              value:
                state: active
                reason: organization was created
