openapi: 3.0.3
info:
  title: Konnect API
  description: The Konnect platform API
  version: 2.1.0
  contact:
    name: Kong
    url: https://konghq.com
    email: support@konghq.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: https://global.api.konghq.com
  - url: https://us.api.konghq.com
  - url: https://eu.api.konghq.com
  - url: https://au.api.konghq.com
    description: Production
externalDocs:
  description: Documentation for Kong Gateway and its APIs
  url: https://docs.konghq.com
paths:
  /v2/cloud-gateways/provider-accounts:
    post:
      summary: Create Provider Account
      description: Creates a new provider account for an organization.
      operationId: create-provider-account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProviderAccountRequest'
      responses:
        '201':
          $ref: '#/components/responses/CreateProviderAccountResponse'
        '400':
          $ref: '#/components/responses/CloudGatewaysBadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/CloudGatewaysForbidden'
        '409':
          $ref: '#/components/responses/Conflict'
      tags:
        - Provider Accounts
      servers:
        - url: https://global.api.konghq.com/
  /v2/cloud-gateways/provider-accounts/{providerAccountId}:
    delete:
      summary: Delete Provider Account
      description: Deletes a provider account by ID.
      operationId: delete-provider-account
      parameters:
        - $ref: '#/components/parameters/ProviderAccountId'
      responses:
        '204':
          description: No Content
        '400':
          $ref: '#/components/responses/CloudGatewaysBadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - Provider Accounts
      servers:
        - url: https://global.api.konghq.com/
  /v2/cloud-gateways/resource-quotas:
    post:
      summary: Create Resource Quota
      description: >
        Creates a new resource quota, scoped to a given resource, for an
        organization.
      operationId: create-resource-quota
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateResourceQuotaRequest'
      responses:
        '201':
          $ref: '#/components/responses/CreateResourceQuotaResponse'
        '400':
          $ref: '#/components/responses/CloudGatewaysBadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
      tags:
        - Resource Quotas
      servers:
        - url: https://global.api.konghq.com/
  /v2/cloud-gateways/resource-quotas/{resourceQuotaId}:
    patch:
      summary: Update Resource Quota
      description: Updates a resource quota by ID.
      operationId: update-resource-quota
      parameters:
        - $ref: '#/components/parameters/ResourceQuotaId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchResourceQuotaRequest'
      responses:
        '200':
          $ref: '#/components/responses/PatchResourceQuotasResponse'
        '400':
          $ref: '#/components/responses/CloudGatewaysBadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - Resource Quotas
      servers:
        - url: https://global.api.konghq.com/
  /v3/aws/marketplace/resolve-customer:
    post:
      summary: Resolves an AWS Customer.
      description: This call the aws marketplace resolve customer api.
      operationId: resolveCustomer
      tags:
        - AWS
      requestBody:
        $ref: '#/components/requestBodies/AWSResolveCustomerRequest'
      responses:
        '201':
          $ref: '#/components/responses/ResolveCustomerResponse'
        '400':
          $ref: '#/components/responses/IdentityBadRequest'
      servers:
        - url: https://global.api.konghq.com/
  /v3/internal/auth0/organizations:
    get:
      operationId: get-auth0-organizations-internal
      summary: Retrieves the list of organizations available to the given user.
      description: Retrieves the list of organizations available to the given user.
      responses:
        '200':
          $ref: '#/components/responses/Auth0OrganizationsCollection'
        '400':
          $ref: '#/components/responses/IdentityBadRequest'
        '404':
          $ref: '#/components/responses/IdentityNotFound'
      tags:
        - SSO Auth0
      servers:
        - url: https://global.api.konghq.com/
  /v3/internal/auth0/register:
    post:
      operationId: post-auth0-register-internal
      summary: Register a new organization with an Auth0 authenticated user.
      description: >-
        Create a new organization with Auth0 authentication. The Auth0 user will
        be the organization owner.
      responses:
        '201':
          $ref: '#/components/responses/Auth0Registration'
        '400':
          $ref: '#/components/responses/IdentityBadRequest'
        '404':
          $ref: '#/components/responses/IdentityNotFound'
      requestBody:
        $ref: '#/components/requestBodies/Auth0Registration'
      tags:
        - SSO Auth0
      servers:
        - url: https://global.api.konghq.com/
  /v3/internal/oauth/device/authorize:
    post:
      operationId: post-oauth-device-authorize
      summary: Device authorization request
      description: >-
        Initiates a device authorization workflow, generating and returning a
        unique device verification code.

        See https://www.rfc-editor.org/rfc/rfc8628#section-3.1 for details.
      requestBody:
        description: The request schema for the device authorization request.
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                client_id:
                  type: string
                  description: The client identifier.
                scope:
                  type: string
                  description: The scope of the access request.
              required:
                - client_id
      responses:
        '200':
          $ref: '#/components/responses/DeviceAuthorizationResponse'
        '400':
          $ref: '#/components/responses/DeviceAuthorizationGrantAuthorizeBadRequest'
      security:
        - {}
      tags:
        - Device Authorization Grant
      servers:
        - url: https://global.api.konghq.com/
  /v3/internal/oauth/device/authorize/user:
    post:
      operationId: post-oauth-device-authorize-user
      summary: User device authorization request
      description: >-
        Marks the device code as authorized and is a means to provide the
        interactive UI flow with the necessary request metadata for the user to
        confirm the request.
      requestBody:
        $ref: '#/components/requestBodies/DeviceAuthorizationUserRequest'
      responses:
        '201':
          $ref: '#/components/responses/DeviceAuthorizationUserResponse'
        '400':
          $ref: '#/components/responses/IdentityBadRequest'
        '401':
          $ref: '#/components/responses/IdentityUnauthenticated'
        '403':
          $ref: '#/components/responses/Unauthorized'
      security:
        - konnectAccessToken: []
      tags:
        - Device Authorization Grant
      servers:
        - url: https://global.api.konghq.com/
  /v3/internal/oauth/device/confirm:
    patch:
      operationId: patch-oauth-device-confirm
      summary: Device confirmation request
      description: >-
        Confirms the authorization request by marking the device code as
        confirmed.
      requestBody:
        $ref: '#/components/requestBodies/DeviceConfirmationRequest'
      responses:
        '204':
          description: No Content
        '400':
          $ref: '#/components/responses/IdentityBadRequest'
        '401':
          $ref: '#/components/responses/IdentityUnauthenticated'
        '403':
          $ref: '#/components/responses/Unauthorized'
      security:
        - konnectAccessToken: []
      tags:
        - Device Authorization Grant
      servers:
        - url: https://global.api.konghq.com/
  /v3/internal/oauth/device/token:
    post:
      operationId: post-oauth-device-token
      summary: Device access token request
      description: >-
        This endpoint provides the machine client a means of being notified when
        a request for authorization is granted or rejected. 

        It is expected for the client to try the access token request repeatedly
        in a polling fashion based on the error code in the response.

        See https://www.rfc-editor.org/rfc/rfc8628#section-3.4 for details.
      requestBody:
        description: The request schema for the device access token request.
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                grant_type:
                  type: string
                  description: >-
                    Value MUST be set to
                    "urn:ietf:params:oauth:grant-type:device_code".
                device_code:
                  type: string
                  description: >-
                    The device verification code, "device_code" from the device
                    authorization response.
                client_id:
                  type: string
                  description: The client identifier.
              required:
                - grant_type
                - device_code
                - client_id
      responses:
        '200':
          $ref: '#/components/responses/DeviceAccessTokenResponse'
        '400':
          $ref: '#/components/responses/DeviceAuthorizationGrantTokenBadRequest'
      security:
        - {}
      tags:
        - Device Authorization Grant
      servers:
        - url: https://global.api.konghq.com/
  /v3/internal/system-accounts/{accountId}/assigned-roles:
    parameters:
      - schema:
          type: string
        name: accountId
        in: path
        required: true
        description: ID of the system account.
    get:
      operationId: get-system-accounts-assigned-roles-internal
      summary: Fetch assigned roles for a managed system account.
      description: >-
        Lists the roles belonging to a managed system account.  Returns 400 if
        any filter parameters are invalid.
      responses:
        '200':
          $ref: '#/components/responses/ParameterizedAssignedRolesCollection'
        '400':
          $ref: '#/components/responses/IdentityBadRequest'
        '401':
          $ref: '#/components/responses/IdentityUnauthenticated'
        '403':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/IdentityNotFound'
      parameters:
        - schema:
            type: object
            properties:
              role_name:
                $ref: '#/components/schemas/StringFieldEqualsFilter'
              entity_type_name:
                $ref: '#/components/schemas/StringFieldEqualsFilter'
          in: query
          name: filter
          description: Filter roles returned in the response.
          required: false
          style: deepObject
      tags:
        - Managed System Accounts - Roles
      security:
        - clientToken: []
      servers:
        - url: https://global.api.konghq.com/
    post:
      summary: Assign a role to a managed System Account.
      operationId: create-system-accounts-assigned-roles-internal
      responses:
        '201':
          $ref: '#/components/responses/ParameterizedAssignedRoleSingle'
        '401':
          $ref: '#/components/responses/IdentityUnauthenticated'
        '403':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/IdentityNotFound'
        '409':
          $ref: '#/components/responses/IdentityConflict'
      description: >-
        Assigns a role to a managed system account. Returns 409 if role is
        already assigned.
      requestBody:
        $ref: '#/components/requestBodies/AssignParameterizedRole'
      tags:
        - Managed System Accounts - Roles
      security:
        - clientToken: []
      servers:
        - url: https://global.api.konghq.com/
  /v3/logout:
    post:
      summary: Log Out
      description: Clears the auth cookies.
      operationId: logout
      tags:
        - Authentication
      responses:
        '201':
          $ref: '#/components/responses/LogoutResponse'
      servers:
        - url: https://global.api.konghq.com/
  /v3/organizations/me:
    get:
      summary: Retrieve My Organization
      tags:
        - Me
      responses:
        '200':
          $ref: '#/components/responses/MeOrganization'
        '401':
          $ref: '#/components/responses/IdentityUnauthenticated'
      operationId: get-organizations-me
      description: >-
        Returns the organization of the user identified in the token of the
        request.
      servers:
        - url: https://global.api.konghq.com/
    patch:
      summary: Update My Organization
      operationId: update-organizations-me
      description: >
        Updates the current user's organization. When updating the owner, the
        new owner 

        must be an organization admin.
      tags:
        - Me
      responses:
        '200':
          $ref: '#/components/responses/MeOrganization'
        '400':
          $ref: '#/components/responses/IdentityBadRequest'
        '401':
          $ref: '#/components/responses/IdentityUnauthenticated'
        '403':
          $ref: '#/components/responses/IdentityPermissionDenied'
        '404':
          $ref: '#/components/responses/IdentityNotFound'
      requestBody:
        $ref: '#/components/requestBodies/UpdateOrganization'
      servers:
        - url: https://global.api.konghq.com/
  /v3/refresh:
    post:
      summary: Refresh Token
      description: >-
        Issues new tokens. Returns 401 if a) the user is no longer active, b)
        the token has exceeded its lifetime limit, or c) the token has been
        revoked.
      operationId: refresh-token
      tags:
        - Authentication
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/IdentityUnauthenticated'
      servers:
        - url: https://global.api.konghq.com/
  /v3/users/me:
    get:
      summary: Retrieve My User Account
      tags:
        - Me
      responses:
        '200':
          $ref: '#/components/responses/UserSingle'
        '401':
          $ref: '#/components/responses/IdentityUnauthenticated'
      operationId: get-users-me
      security:
        - personalAccessToken: []
        - konnectAccessToken: []
      description: >-
        Returns the user account for the user identified in the token of the
        request.
      servers:
        - url: https://global.api.konghq.com/
    delete:
      summary: Delete My User Account
      operationId: delete-users-me
      security:
        - konnectAccessToken: []
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/IdentityUnauthenticated'
        '403':
          description: >-
            Forbidden - If there are other users in the organization or a
            konnectAccessToken was not provided.
      description: >-
        Deletes the user account for the user identified in the token of the
        request.
      tags:
        - Me
      servers:
        - url: https://global.api.konghq.com/
    patch:
      summary: Update My User Account
      operationId: patch-users-me
      responses:
        '200':
          $ref: '#/components/responses/UserSingle'
        '400':
          description: Bad Request - Invalid Parameters
        '401':
          $ref: '#/components/responses/IdentityUnauthenticated'
        '403':
          description: Forbidden - If a konnectAccessToken was not provided.
      description: >-
        Updates the user account for the user identified in the token of the
        request.
      requestBody:
        $ref: '#/components/requestBodies/UpdateUser'
      tags:
        - Me
      security:
        - konnectAccessToken: []
      servers:
        - url: https://global.api.konghq.com/
  /v3/users/me/permissions:
    get:
      summary: Get My Permissions
      tags:
        - Me
      description: Returns the permissions for the current user
      operationId: get-users-me-permissions
      parameters:
        - schema:
            type: object
            properties:
              actions:
                $ref: '#/components/schemas/StringFieldEqualsFilter'
              region:
                $ref: '#/components/schemas/StringFieldEqualsFilter'
              resource:
                $ref: '#/components/schemas/StringFieldEqualsFilter'
              service:
                $ref: '#/components/schemas/StringFieldEqualsFilter'
              top_level:
                $ref: '#/components/schemas/BooleanFieldFilter'
          in: query
          name: filter
          description: Filter permissions returned in the response.
          required: false
          style: deepObject
      security:
        - konnectAccessToken: []
      responses:
        '200':
          $ref: '#/components/responses/UserPermissions'
        '400':
          $ref: '#/components/responses/IdentityBadRequest'
        '401':
          $ref: '#/components/responses/IdentityUnauthenticated'
      servers:
        - url: https://global.api.konghq.com/
components:
  schemas:
    BaseError:
      type: object
      title: Error
      description: standard error
      required:
        - status
        - title
        - instance
        - detail
      properties:
        status:
          type: integer
          description: >
            The HTTP status code of the error. Useful when passing the response

            body to child properties in a frontend UI. Must be returned as an
            integer.
          readOnly: true
        title:
          type: string
          description: |
            A short, human-readable summary of the problem. It should not
            change between occurences of a problem, except for localization.
            Should be provided as "Sentence case" for direct use in the UI.
          readOnly: true
        type:
          type: string
          description: The error type.
          readOnly: true
        instance:
          type: string
          description: |
            Used to return the correlation ID back to the user, in the format
            kong:trace:<correlation_id>. This helps us find the relevant logs
            when a customer reports an issue.
          readOnly: true
        detail:
          type: string
          description: >
            A human readable explanation specific to this occurence of the
            problem.

            This field may contain request/entity data to help the user
            understand

            what went wrong. Enclose variable values in square brackets. Should
            be

            provided as "Sentence case" for direct use in the UI.
          readOnly: true
    UnauthorizedError:
      allOf:
        - $ref: '#/components/schemas/BaseError'
        - type: object
          properties:
            status:
              example: 401
            title:
              example: Unauthorized
            type:
              example: https://httpstatuses.com/401
            instance:
              example: kong:trace:1234567890
            detail:
              example: Invalid credentials
    ForbiddenError:
      allOf:
        - $ref: '#/components/schemas/BaseError'
        - type: object
          properties:
            status:
              example: 403
            title:
              example: Forbidden
            type:
              example: https://httpstatuses.com/403
            instance:
              example: kong:trace:1234567890
            detail:
              example: Forbidden
    PaginatedMeta:
      type: object
      example:
        page:
          number: 2
          size: 10
          total: 100
      title: PaginatedMeta
      description: returns the pagination information
      properties:
        page:
          type: object
          description: >-
            Contains pagination query parameters and the total number of
            entities returned.
          properties:
            number:
              type: integer
              example: 2
              description: Represents the current page number.
            size:
              type: integer
              example: 10
              maximum: 100
              description: Represents the number of entities on the page.
            total:
              type: integer
              example: 100
              maximum: 1000
              description: >-
                Integer indicating the total number of entities in the list of
                results that’s being paginated.
          $ref: '#/components/schemas/PageMeta'
      required:
        - page
    StringFieldEqualsFilter:
      title: StringFieldEqualsFilter
      description: Filters on the given string field value by exact match.
      oneOf:
        - type: string
        - type: object
          title: StringFieldEqualsComparison
          additionalProperties: false
          properties:
            eq:
              type: string
          required:
            - eq
      x-examples:
        example-1: equals-some-value
        example-2:
          eq: some-value
      type: string
    PageMeta:
      type: object
      description: >-
        Contains pagination query parameters and the total number of objects
        returned.
      required:
        - number
        - size
        - total
      properties:
        number:
          type: number
          example: 1
        size:
          type: number
          example: 10
        total:
          type: number
          example: 100
    InvalidRules:
      description: invalid parameters rules
      type: string
      readOnly: true
      nullable: true
      enum:
        - required
        - max_length
        - is_array
        - is_base64
        - is_boolean
        - is_date_time
        - is_integer
        - is_null
        - is_number
        - is_object
        - is_string
        - is_uuid
        - is_fqdn
        - is_arn
        - unknown_property
        - is_label
        - matches_regex
        - invalid
        - is_supported_network_availability_zone_list
        - is_supported_network_cidr_block
        - is_supported_provider_region
    InvalidParameterStandard:
      type: object
      additionalProperties: false
      properties:
        field:
          type: string
          example: name
          readOnly: true
        rule:
          $ref: '#/components/schemas/InvalidRules'
        source:
          type: string
          example: body
        reason:
          type: string
          example: is a required field
          readOnly: true
      required:
        - field
        - reason
    InvalidParameterMinimumLength:
      type: object
      additionalProperties: false
      properties:
        field:
          type: string
          example: name
          readOnly: true
        rule:
          description: invalid parameters rules
          type: string
          readOnly: true
          nullable: false
          enum:
            - min_length
            - min_digits
            - min_lowercase
            - min_uppercase
            - min_symbols
        minimum:
          type: integer
          example: 8
        source:
          type: string
          example: body
        reason:
          type: string
          example: is a required field
          readOnly: true
      required:
        - field
        - reason
        - rule
        - minimum
    InvalidParameterChoiceItem:
      type: object
      additionalProperties: false
      properties:
        field:
          type: string
          example: name
          readOnly: true
        rule:
          description: invalid parameters rules
          type: string
          readOnly: true
          nullable: false
          enum:
            - enum
        reason:
          type: string
          example: is a required field
          readOnly: true
        choices:
          type: array
          uniqueItems: true
          readOnly: true
          nullable: false
          minimum: 1
          items: {}
        source:
          type: string
          example: body
      required:
        - field
        - reason
        - rule
        - choices
    InvalidParameterDependentItem:
      type: object
      additionalProperties: false
      properties:
        field:
          type: string
          example: name
          readOnly: true
        rule:
          description: invalid parameters rules
          type: string
          readOnly: true
          nullable: true
          enum:
            - dependent_fields
        reason:
          type: string
          example: is a required field
          readOnly: true
        dependents:
          type: array
          uniqueItems: true
          nullable: true
          items: {}
          readOnly: true
        source:
          type: string
          example: body
      required:
        - field
        - rule
        - reason
        - dependents
    InvalidParameters:
      type: array
      nullable: false
      uniqueItems: true
      minItems: 1
      description: invalid parameters
      items:
        oneOf:
          - $ref: '#/components/schemas/InvalidParameterStandard'
          - $ref: '#/components/schemas/InvalidParameterMinimumLength'
          - $ref: '#/components/schemas/InvalidParameterChoiceItem'
          - $ref: '#/components/schemas/InvalidParameterDependentItem'
    BadRequestError:
      allOf:
        - $ref: '#/components/schemas/BaseError'
        - type: object
          required:
            - invalid_parameters
          properties:
            invalid_parameters:
              $ref: '#/components/schemas/InvalidParameters'
    NotFoundError:
      allOf:
        - $ref: '#/components/schemas/BaseError'
        - type: object
          properties:
            status:
              example: 404
            title:
              example: Not Found
            type:
              example: https://httpstatuses.com/404
            instance:
              example: kong:trace:1234567890
            detail:
              example: Not found
    ConflictError:
      allOf:
        - $ref: '#/components/schemas/BaseError'
        - type: object
          properties:
            status:
              example: 409
            title:
              example: Conflict
            type:
              example: https://httpstatuses.com/409
            instance:
              example: kong:trace:1234567890
            detail:
              example: Conflict
    ProviderAccountId:
      type: string
      format: uuid
      example: 929b2449-c69f-44c4-b6ad-9ecec6f811ae
    ResourceQuotaId:
      type: string
      format: uuid
      example: 9678f205-49a1-47bb-82d9-d01cafa42a0d
      readOnly: true
    ProviderName:
      title: Provider Name
      description: Name of cloud provider.
      type: string
      enum:
        - aws
      example: aws
    ProviderAccount:
      title: Cloud Gateway Provider Account
      description: >-
        Object containing mapping for organization and cloud provider to account
        ID.
      type: object
