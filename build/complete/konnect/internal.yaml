      title: Base Device Authorization Grant Bad Request
      type: object
      properties:
        error_description:
          type: string
          description: >-
            Human-readable text providing additional information, used to assist
            the client developer in understanding the error that occurred.
        error_uri:
          type: string
          description: >-
            A URI identifying a human-readable web page with information about
            the error, used to provide the client developer with additional
            information about the error.
    DeviceAuthorizationGrantAuthorizeError:
      title: Device Authorization Grant Authorize Error
      type: object
      description: The error response for the device authorization grant request.
      properties:
        error:
          type: string
          description: |-
            A single error code from the following enum.

              invalid_request
                 The request is missing a required parameter, includes an unsupported parameter value (other than grant type),
                 repeats a parameter, includes multiple credentials, utilizes more than one mechanism for authenticating the
                 client, or is otherwise malformed.

              invalid_client
                 Client authentication failed (e.g., unknown client, no client authentication included, or unsupported
                 authentication method).

              invalid_grant
                 The provided authorization grant (e.g., authorization code, resource owner credentials) or refresh token is
                 invalid, expired, revoked, does not match the redirection URI used in the authorization request, or was issued to
                 another client.

              unauthorized_client
                 The authenticated client is not authorized to use this authorization grant type.

              unsupported_grant_type
                 The authorization grant type is not supported by the authorization server.

              invalid_scope
                 The requested scope is invalid, unknown, malformed, or exceeds the scope granted by the resource owner.
          enum:
            - invalid_request
            - invalid_client
            - invalid_grant
            - unauthorized_client
            - unsupported_grant_type
            - invalid_scope
      required:
        - error
    DeviceAuthorizationGrantTokenError:
      title: Device Authorization Grant Token Error
      type: object
      description: The error response for the device token request.
      properties:
        error:
          type: string
          description: |-
            A single error code from the following enum.

              authorization_pending
                 The authorization request is still pending as the end user hasn't yet completed the user-interaction steps.

              slow_down
                 A variant of "authorization_pending", the authorization request is still pending and polling should continue, but the interval MUST
                 be increased by 5 seconds for this and all subsequent requests.

              access_denied
                 The authorization request was denied.

              expired_token
                 The "device_code" has expired, and the device authorization session has concluded.
          enum:
            - authorization_pending
            - slow_down
            - access_denied
            - expired_token
      required:
        - error
    Auth0Organization:
      title: Auth0 organization schema.
      type: object
      description: A single auth0 organization.
      properties:
        name:
          type: string
          example: My Organization
          description: The name of the organization.
          readOnly: true
        login_path:
          type: string
          example: >-
            /v2/authenticate/federated?org_id=7f9fd312-a987-4628-b4c5-bb4f4fddd5f7
          description: The login path of the organization.
