  - name: Audit Logs
  - name: Provider Accounts
  - name: Resource Quotas
  - name: Me
  - name: Managed System Accounts - Roles
  - name: Authentication
  - name: AWS
  - name: Device Authorization Grant
  - name: SSO Auth0
  - name: Organization Lifecycle
externalDocs:
  description: Documentation for Kong Gateway and its APIs
  url: 'https://docs.konghq.com'
security:
  - personalAccessToken: []
  - konnectAccessToken: []
  - systemAccountAccessToken: []
  - bearerAuth: []
  - serviceAccessToken: []
