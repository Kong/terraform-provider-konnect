              metadata:
                description: The device metadata to be displayed to the user for confirmation.
                type: object
                example:
                  client_name: Konnect CLI
                  user_agent: kconnectctl/0.12
                  source_ip: 192.158.1.38
                  requested_at: '2022-02-07T17:46:57.52Z'
                properties:
                  client_name:
                    description: The requesting application human name.
                    type: string
                  user_agent:
                    description: The device's user agent used to perform the device authorization grant request.
                    type: string
                  source_ip:
                    description: The IP address of the device used to perform the device authorization grant request.
                    type: string
                  requested_at:
                    description: The time stamp for the date the device authorization request was made.
                    type: string
                    format: date-time
                    example: '2022-02-07T17:46:57.52Z'
                required:
                  - client_name
                  - user_agent
                  - source_ip
                  - requested_at
            required:
              - organization_name
              - user
              - metadata
            title: User Device Authorization Response
