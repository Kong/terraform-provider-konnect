              - $ref: '#/components/schemas/DeviceAuthorizationGrantAuthorizeError'
    DeviceAuthorizationGrantTokenBadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/BaseDeviceAuthorizationGrantBadRequest'
              - oneOf:
                  - $ref: >-
                      #/components/schemas/DeviceAuthorizationGrantAuthorizeError
                  - $ref: '#/components/schemas/DeviceAuthorizationGrantTokenError'
    IdentityBadRequest:
      description: Bad Request
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/BadRequestError'
          examples:
            Request Format is Invalid:
              $ref: '#/components/examples/400-request-format-is-invalid'
            Cannot be Blank:
              $ref: '#/components/examples/400-cannot-be-blank'
            Invalid ID format:
              $ref: '#/components/examples/400-invalid-id-format'
            Must be a valid UUID v4:
              $ref: '#/components/examples/400-valid-uuid'
            System teams cannot be modified:
              $ref: '#/components/examples/400-systems-team-modified'
            Password Complexity:
              $ref: '#/components/examples/400-password-complexity'
            Authentication Settings cannot be both Disabled:
              $ref: >-
                #/components/examples/400-authentication-settings-cannot-be-both-disabled
            OIDC needs an IdP configuration:
              $ref: '#/components/examples/400-oidc-auth-enabled-needs-idp'
            IdP configuration is required:
              $ref: '#/components/examples/400-idp-config-is-required'
            Unsupported filter operation:
              value:
                status: 400
                title: Bad Request
                instance: konnect:trace:3674017986744198214
                invalid_parameters:
                  - field: '[filter][actions][contains]'
                    reason: '[contains] is not a supported filter operation'
    IdentityConflict:
      description: Conflict
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ConflictError'
          examples:
            User is Already Active:
              $ref: '#/components/examples/409-user-is-already-active'
    IdentityPermissionDenied:
      description: Permission denied
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ForbiddenError'
          examples:
            Permission Denied:
              $ref: '#/components/examples/403-permission-denied'
            Invalid Permissions:
              $ref: '#/components/examples/403-invalid-permissions'
            Username or Password invalid:
              $ref: '#/components/examples/403-auth-invalid'
    IdentityUnauthenticated:
      description: Unauthenticated
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/UnauthorizedError'
          examples:
            Unauthorized:
              $ref: '#/components/examples/401-unauthenticated'
    IdentityNotFound:
      description: Not Found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/NotFoundError'
          examples:
            Not Found:
              $ref: '#/components/examples/404-not-found'
    MeOrganization:
      description: Me Organization
      content:
        application/json:
          schema:
            type: object
            title: Me Organization Response
            example:
              id: d99c041a-c7cf-46a2-bf3a-44bb5f75400e
              name: string
              owner_id: 1c9c3848-5897-4f2c-beed-df6f3e3adb37
              created_at: '2023-01-23T17:22:52.150Z'
              updated_at: '2023-01-23T17:22:52.150Z'
              state: active
              retention_period_days: 90
            properties:
              id:
                type: string
                description: UUID of the organization.
                format: uuid
                readOnly: true
              name:
                type: string
                description: Name of the organization.
              owner_id:
                type: string
                description: Owner ID of the organization.
              login_path:
                type: string
                description: >-
                  Path to organization-specific login when single sign on (SSO)
                  is enabled. Blank otherwise.
              created_at:
                type: string
                description: Date the organization was created.
                format: date-time
                readOnly: true
              updated_at:
                type: string
                description: Date the organization was last updated.
                format: date-time
                readOnly: true
              state:
                type: string
                description: State of the organization
                enum:
                  - active
                  - inactive
              retention_period_days:
                type: integer
                description: >-
                  The number of days an organization spends inactive before
                  being deleted.
          examples:
            Example:
              value:
                created_at: '2023-01-18T11:35:45.130Z'
                id: 023bfa42-3513-4cbf-b059-a9ddb4ea995d
                name: Acme Co.
                owner_id: e02c829c-0e2d-44b5-9057-07714ea613a3
                login_path: acme
                updated_at: '2023-01-23T17:22:52.150Z'
                state: active
                retention_period_days: 90
    UserPermissions:
      description: User Permissions
      content:
        application/json:
          schema:
            type: object
            title: User Permissions Response
            properties:
              data:
                type: array
                items:
                  type: object
                  properties:
                    resource:
                      type: string
                    actions:
                      type: array
                      items:
                        type: string
            example:
              data:
                - resource: krn:accounts:reg/*:org/aa878768-05cb-4811-90d2-b82ef61caf44
                  actions:
                    - '#root'
          examples:
            OrganizationAdminExample:
              value:
                data:
                  - resource: >-
                      krn:accounts:reg/*:org/aa878768-05cb-4811-90d2-b82ef61caf44
                    actions:
                      - '#root'
    LogoutResponse:
      description: Logout response
      content:
        application/json:
          schema:
            type: object
            title: Logout Response
            required:
              - login_path
            properties:
              login_path:
                type: string
                description: The login path.
    ResolveCustomerResponse:
      description: AWS Resolve customer response
      content:
        application/json:
          schema:
            type: object
            title: Resolve Customer Response
            required:
              - organization_id
            properties:
              organization_id:
                type: string
                description: UUID of the organization.
                format: uuid
    DeviceAuthorizationResponse:
      description: Device authorization response
      content:
        application/json:
          schema:
            type: object
            title: Device Authorization Response
            properties:
              device_code:
                type: string
                description: The device verification code.
              user_code:
                type: string
                description: The end-user verification code.
              verification_uri:
                type: string
                description: The end-user verification URI on the authorization server.
              verification_uri_complete:
                type: string
                description: A verification URI that includes the "user_code".
              expires_in:
                type: integer
                description: The lifetime in seconds of the "device_code" and "user_code".
              interval:
                type: integer
                description: >-
                  The minimum amount of time in seconds that the client should
                  wait between polling requests to the token endpoint.
            required:
              - device_code
              - user_code
              - verification_uri
              - expires_in
            example:
              device_code: GmRhmhcxhwAzkoEqiMEg_DnyEysNkuNhszIySk9eS
              user_code: WDJB-MJHT
              verification_uri: https://example.com/device
              verification_uri_complete: https://example.com/device?user_code=WDJB-MJHT
              expires_in: 1800
              interval: 5
    DeviceAccessTokenResponse:
      description: Device access token response
      content:
        application/json:
          schema:
            type: object
            title: Device Access Token Response
            properties:
              access_token:
                type: string
                description: The access token issued by the authorization server.
              token_type:
                type: string
                description: The type of the token issued.
              expires_in:
                type: integer
                description: The lifetime in seconds of the access token.
              refresh_token:
                type: string
                description: >-
                  The refresh token, which can be used to obtain new access
                  tokens using the same authorization grant.
              scope:
                type: string
                description: The scope of the access token.
            required:
              - access_token
              - token_type
              - expires_in
            example:
              access_token: 2YotnFZFEjr1zCsicMWpAA
              token_type: Bearer
              expires_in: 3600
              refresh_token: tGzv3JOkF0XG5Qx2TlKWIA
              scope: read write
    DeviceAuthorizationUserResponse:
      description: User device authorization response
      content:
        application/json:
          schema:
            type: object
            title: User Device Authorization Response
            properties:
              organization_name:
                type: string
                description: The name of the organization.
              user:
                $ref: '#/components/schemas/User'
              metadata:
                type: object
                description: >-
                  The device metadata to be displayed to the user for
                  confirmation.
                properties:
                  client_name:
                    type: string
                    description: The requesting application human name.
                  user_agent:
                    type: string
                    description: >-
                      The device's user agent used to perform the device
                      authorization grant request.
                  source_ip:
                    type: string
                    description: >-
                      The IP address of the device used to perform the device
                      authorization grant request.
                  requested_at:
                    type: string
                    format: date-time
                    description: >-
                      The time stamp for the date the device authorization
                      request was made.
                    example: '2022-02-07T17:46:57.52Z'
                required:
                  - client_name
                  - user_agent
                  - source_ip
                  - requested_at
                example:
                  client_name: Konnect CLI
                  user_agent: kconnectctl/0.12
                  source_ip: 192.158.1.38
                  requested_at: '2022-02-07T17:46:57.52Z'
            required:
              - organization_name
              - user
              - metadata
  parameters:
    ResourceQuotaId:
      name: resourceQuotaId
      in: path
      description: The ID of the resource quota to operate on.
      required: true
      schema:
        $ref: '#/components/schemas/ResourceQuotaId'
    ProviderAccountId:
      name: providerAccountId
      in: path
      description: The ID of the provider account to operate on.
      required: true
      schema:
        $ref: '#/components/schemas/ProviderAccountId'
  requestBodies:
    Auth0Registration:
      content:
        application/json:
          schema:
            title: Auth0 organization register
            type: object
            required:
              - organization_name
              - default_region
            description: Auth0 organization registration
            properties:
              organization_name:
                type: string
              default_region:
                type: string
    UpdateUser:
      description: The request schema for the update user request.
      content:
        application/json:
          schema:
            type: object
            properties:
              full_name:
                type: string
                pattern: ^[\w \W]+$
                example: James C. Woods
                description: The user's full name.
                writeOnly: true
              preferred_name:
                type: string
                maxLength: 250
                example: Jimmy
                description: The user's desired name.
                writeOnly: true
          examples:
            Example Request Body:
              $ref: '#/components/examples/Update-User-Request'
    AssignParameterizedRole:
      content:
        application/json:
          schema:
            type: object
            description: >-
              A parameterized assigned role is a role that has been assigned to
              a managed system account.
            properties:
              role_name:
                type: string
                example: Connector
                description: The desired role.
              entity_id:
                type: string
                format: uuid
                example: e67490ce-44dc-4cbd-b65e-b52c746fc26a
                description: The ID of the entity.
              entity_type_name:
                type: string
                example: Mesh Control Planes
                description: The type of entity.
              entity_region:
                type: string
                enum:
                  - us
                  - eu
                  - au
                  - '*'
                example: eu
                description: The region to scope the role assignment to.
              parameters:
                type: object
                example:
                  zoneName: zone3
          examples:
            Parameterized-Assigned-Role:
              $ref: '#/components/examples/Parameterized-Assigned-Role-Example'
      description: The request schema for assigning a role.
    UpdateOrganization:
      description: The request schema to update an organization.
      content:
        application/json:
          schema:
            type: object
            properties:
              owner_id:
                type: string
                description: >-
                  The user id of the new owner of the organization. Must be a
                  member of the Organization Admins team.
                format: uuid
                example: d9c56d92-0339-4dfb-be0c-2253162edba9
              name:
                type: string
                description: The new name of the organization.
                example: Kong Inc
          examples:
            Example Request Body:
              $ref: '#/components/examples/Update-Organization'
    AWSResolveCustomerRequest:
      description: AWS Marketplace Metering Resolve Customer request.
      content:
        application/json:
          schema:
            type: object
            required:
              - token
            properties:
              token:
                type: string
                description: Token is the aws customer token from the aws marketplace.
          examples:
            Example Request Body:
              $ref: '#/components/examples/AWS-Resolve-Customer-Request'
    DeviceAuthorizationUserRequest:
      description: The request schema for the user device authorization request.
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              user_code:
                type: string
                description: The end-user device verification code.
            required:
              - user_code
    DeviceConfirmationRequest:
      description: The request schema for the device confirmation request.
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              user_code:
                type: string
                description: The end-user device verification code.
            required:
              - user_code
  securitySchemes:
    personalAccessToken:
      type: http
      scheme: bearer
      bearerFormat: Token
      description: >
        The personal access token is meant to be used as an alternative to
        basic-auth when accessing Konnect via APIs.

        You can generate a Personal Access Token (PAT) from the [personal access
        token page](https://cloud.konghq.com/global/tokens/) in the Konnect
        dashboard.

        The PAT token must be passed in the header of a request, for example:

        `curl -X GET 'https://global.api.konghq.com/v2/users/' --header
        'Authorization: Bearer kpat_xgfT...'`
    systemAccountAccessToken:
      type: http
      scheme: bearer
      bearerFormat: Token
      description: >
        The system account access token is meant for automations and
        integrations that are not directly associated with a human identity.

        You can generate a system account Access Token by creating a system
        account and then obtaining a system account access token for that
        account.

        The access token must be passed in the header of a request, for example:

        `curl -X GET 'https://global.api.konghq.com/v2/users/' --header
        'Authorization: Bearer spat_i2Ej...'`
    konnectAccessToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        The Konnect access token is meant to be used by the Konnect dashboard
        and the decK CLI authenticate with.
security:
  - personalAccessToken: []
  - systemAccountAccessToken: []
  - konnectAccessToken: []
tags:
  - name: Provider Accounts
  - name: Resource Quotas
  - name: Me
  - name: Managed System Accounts - Roles
  - name: Authentication
  - name: AWS
  - name: Device Authorization Grant
  - name: SSO Auth0
