openapi: 3.0.3
info:
  title: Konnect API
  description: The Konnect platform API
  version: 0.0.1
  contact:
    name: Kong Inc
    url: 'https://konghq.com'
    email: support@konghq.com
  license:
    name: Apache 2.0
    url: 'https://www.apache.org/licenses/LICENSE-2.0.html'
servers:
  - url: 'https://us.api.konghq.com'
    description: United-States Production region
  - url: 'https://eu.api.konghq.com'
    description: Europe Production region
  - url: 'https://au.api.konghq.com'
    description: Australia Production region
  - url: 'https://global.api.konghq.com'
    description: Global Production
paths:
  /v2/cloud-gateways/provider-accounts:
    post:
      operationId: create-provider-account
      summary: Create Provider Account
      description: Creates a new provider account for an organization.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProviderAccountRequest'
      responses:
        '201':
          $ref: '#/components/responses/CreateProviderAccountResponse'
        '400':
          $ref: '#/components/responses/CloudGatewaysBadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/CloudGatewaysForbidden'
        '409':
          $ref: '#/components/responses/Conflict'
      servers:
        - url: 'https://global.api.konghq.com/'
      tags:
        - Provider Accounts
  '/v2/cloud-gateways/provider-accounts/{providerAccountId}':
    delete:
      operationId: delete-provider-account
      summary: Delete Provider Account
      description: Deletes a provider account by ID.
      parameters:
        - $ref: '#/components/parameters/ProviderAccountId'
      responses:
        '204':
          description: No Content
        '400':
          $ref: '#/components/responses/CloudGatewaysBadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      servers:
        - url: 'https://global.api.konghq.com/'
      tags:
        - Provider Accounts
  /v2/cloud-gateways/resource-quotas:
    post:
      operationId: create-resource-quota
      summary: Create Resource Quota
      description: |
        Creates a new resource quota, scoped to a given resource, for an organization.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateResourceQuotaRequest'
      responses:
        '201':
          $ref: '#/components/responses/CreateResourceQuotaResponse'
        '400':
          $ref: '#/components/responses/CloudGatewaysBadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
      servers:
        - url: 'https://global.api.konghq.com/'
      tags:
        - Resource Quotas
  '/v2/cloud-gateways/resource-quotas/{resourceQuotaId}':
    patch:
      operationId: update-resource-quota
      summary: Update Resource Quota
      description: Updates a resource quota by ID.
      parameters:
        - $ref: '#/components/parameters/ResourceQuotaId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchResourceQuotaRequest'
      responses:
        '200':
          $ref: '#/components/responses/PatchResourceQuotasResponse'
        '400':
          $ref: '#/components/responses/CloudGatewaysBadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      servers:
        - url: 'https://global.api.konghq.com/'
      tags:
        - Resource Quotas
  /v2/internal/logstreams:
    post:
      operationId: create-authn-failure-audit-logs
      summary: Create Authentication failure logs
      description: This webhook endpoint Creates login failure audit logs using log stream sent by external vendor services (Currently Auth0).
      requestBody:
        $ref: '#/components/requestBodies/AuthFailureLogs'
      responses:
        '204':
          description: No Content
        '403':
          $ref: '#/components/responses/Forbidden'
      tags:
        - Audit Logs
  /v3/aws/marketplace/resolve-customer:
    post:
      operationId: resolveCustomer
      summary: Resolves an AWS Customer.
      description: This call the aws marketplace resolve customer api.
      requestBody:
        $ref: '#/components/requestBodies/AWSResolveCustomerRequest'
      responses:
        '201':
          $ref: '#/components/responses/ResolveCustomerResponse'
        '400':
          $ref: '#/components/responses/IdentityBadRequest'
      servers:
        - url: 'https://global.api.konghq.com/'
      tags:
        - AWS
  /v3/internal/auth0/organizations:
    get:
      operationId: get-auth0-organizations-internal
      summary: Retrieves the list of organizations available to the given user.
      description: Retrieves the list of organizations available to the given user.
      responses:
        '200':
          $ref: '#/components/responses/Auth0OrganizationsCollection'
        '400':
          $ref: '#/components/responses/IdentityBadRequest'
        '404':
          $ref: '#/components/responses/IdentityNotFound'
      servers:
        - url: 'https://global.api.konghq.com/'
      tags:
        - SSO Auth0
  /v3/internal/auth0/register:
    post:
      operationId: post-auth0-register-internal
      summary: Register a new organization with an Auth0 authenticated user.
      description: Create a new organization with Auth0 authentication. The Auth0 user will be the organization owner.
      requestBody:
        $ref: '#/components/requestBodies/Auth0Registration'
      responses:
        '201':
          $ref: '#/components/responses/Auth0Registration'
        '400':
          $ref: '#/components/responses/IdentityBadRequest'
        '404':
          $ref: '#/components/responses/IdentityNotFound'
      servers:
        - url: 'https://global.api.konghq.com/'
      tags:
        - SSO Auth0
  /v3/internal/oauth/device/authorize:
    post:
      operationId: post-oauth-device-authorize
      summary: Device authorization request
      description: |-
        Initiates a device authorization workflow, generating and returning a unique device verification code.
        See https://www.rfc-editor.org/rfc/rfc8628#section-3.1 for details.
      requestBody:
        description: The request schema for the device authorization request.
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                client_id:
                  description: The client identifier.
                  type: string
                scope:
                  description: The scope of the access request.
                  type: string
              required:
                - client_id
      responses:
        '200':
          $ref: '#/components/responses/DeviceAuthorizationResponse'
        '400':
          $ref: '#/components/responses/DeviceAuthorizationGrantAuthorizeBadRequest'
      security:
        - {}
      servers:
        - url: 'https://global.api.konghq.com/'
      tags:
        - Device Authorization Grant
  /v3/internal/oauth/device/authorize/user:
    post:
      operationId: post-oauth-device-authorize-user
      summary: User device authorization request
      description: Marks the device code as authorized and is a means to provide the interactive UI flow with the necessary request metadata for the user to confirm the request.
      requestBody:
        $ref: '#/components/requestBodies/DeviceAuthorizationUserRequest'
      responses:
        '201':
          $ref: '#/components/responses/DeviceAuthorizationUserResponse'
        '400':
          $ref: '#/components/responses/IdentityBadRequest'
        '401':
          $ref: '#/components/responses/IdentityUnauthenticated'
        '403':
          $ref: '#/components/responses/Unauthorized'
      security:
        - konnectAccessToken: []
      servers:
        - url: 'https://global.api.konghq.com/'
      tags:
        - Device Authorization Grant
  /v3/internal/oauth/device/confirm:
    patch:
      operationId: patch-oauth-device-confirm
      summary: Device confirmation request
      description: Confirms the authorization request by marking the device code as confirmed.
      requestBody:
        $ref: '#/components/requestBodies/DeviceConfirmationRequest'
      responses:
        '204':
          description: No Content
        '400':
          $ref: '#/components/responses/IdentityBadRequest'
        '401':
          $ref: '#/components/responses/IdentityUnauthenticated'
        '403':
          $ref: '#/components/responses/Unauthorized'
      security:
        - konnectAccessToken: []
      servers:
        - url: 'https://global.api.konghq.com/'
      tags:
        - Device Authorization Grant
  /v3/internal/oauth/device/token:
    post:
      operationId: post-oauth-device-token
      summary: Device access token request
      description: |-
        This endpoint provides the machine client a means of being notified when a request for authorization is granted or rejected. 
        It is expected for the client to try the access token request repeatedly in a polling fashion based on the error code in the response.
        See https://www.rfc-editor.org/rfc/rfc8628#section-3.4 for details.
      requestBody:
        description: The request schema for the device access token request.
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                grant_type:
                  description: 'Value MUST be set to "urn:ietf:params:oauth:grant-type:device_code".'
                  type: string
                device_code:
                  description: 'The device verification code, "device_code" from the device authorization response.'
                  type: string
                client_id:
                  description: The client identifier.
                  type: string
              required:
                - grant_type
                - device_code
                - client_id
      responses:
        '200':
          $ref: '#/components/responses/DeviceAccessTokenResponse'
        '400':
          $ref: '#/components/responses/DeviceAuthorizationGrantTokenBadRequest'
      security:
        - {}
      servers:
        - url: 'https://global.api.konghq.com/'
      tags:
        - Device Authorization Grant
  '/v3/internal/system-accounts/{accountId}/assigned-roles':
    parameters:
      - name: accountId
        in: path
        description: ID of the system account.
        required: true
        schema:
          type: string
    get:
      operationId: get-system-accounts-assigned-roles-internal
      summary: Fetch assigned roles for a managed system account.
      description: Lists the roles belonging to a managed system account.  Returns 400 if any filter parameters are invalid.
      parameters:
        - name: filter
          in: query
          description: Filter roles returned in the response.
          required: false
          schema:
            type: object
            properties:
              role_name:
                $ref: '#/components/schemas/StringFieldEqualsFilter'
              entity_type_name:
                $ref: '#/components/schemas/StringFieldEqualsFilter'
          style: deepObject
      responses:
        '200':
          $ref: '#/components/responses/ParameterizedAssignedRolesCollection'
        '400':
          $ref: '#/components/responses/IdentityBadRequest'
        '401':
          $ref: '#/components/responses/IdentityUnauthenticated'
        '403':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/IdentityNotFound'
      security:
        - clientToken: []
      servers:
        - url: 'https://global.api.konghq.com/'
      tags:
        - Managed System Accounts - Roles
    post:
      operationId: create-system-accounts-assigned-roles-internal
      summary: Assign a role to a managed System Account.
      description: Assigns a role to a managed system account. Returns 409 if role is already assigned.
      requestBody:
        $ref: '#/components/requestBodies/AssignParameterizedRole'
      responses:
        '201':
          $ref: '#/components/responses/ParameterizedAssignedRoleSingle'
        '401':
          $ref: '#/components/responses/IdentityUnauthenticated'
        '403':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/IdentityNotFound'
        '409':
          $ref: '#/components/responses/IdentityConflict'
      security:
        - clientToken: []
      servers:
        - url: 'https://global.api.konghq.com/'
      tags:
        - Managed System Accounts - Roles
  /v3/internal/users:
    get:
      operationId: get-users-internal
      summary: Retrieves users matching a provided auth0 subject and email.
      description: 'The response contains user ids and (non-deleted, non-deleting) organization ids for users associated with provided auth0 user subject.'
      parameters:
        - name: aid
          in: query
          description: Auth0 User ID
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/InternalUsers'
        '400':
          $ref: '#/components/responses/IdentityBadRequest'
      servers:
        - url: 'https://global.api.konghq.com/'
  /v3/logout:
    post:
      operationId: logout
      summary: Log Out
      description: Clears the auth cookies.
      responses:
        '201':
          $ref: '#/components/responses/LogoutResponse'
      servers:
        - url: 'https://global.api.konghq.com/'
      tags:
        - Authentication
  /v3/organizations/me:
    patch:
      operationId: update-organizations-me
      summary: Update My Organization
      description: |
        Updates the current user's organization. When updating the owner, the new owner 
        must be an organization admin.
      requestBody:
        $ref: '#/components/requestBodies/UpdateOrganization'
      responses:
        '200':
          $ref: '#/components/responses/MeOrganization'
        '400':
          $ref: '#/components/responses/IdentityBadRequest'
        '401':
          $ref: '#/components/responses/IdentityUnauthenticated'
        '403':
          $ref: '#/components/responses/IdentityPermissionDenied'
        '404':
          $ref: '#/components/responses/IdentityNotFound'
      servers:
        - url: 'https://global.api.konghq.com/'
      tags:
        - Me
  /v3/organizations/state:
    post:
      operationId: post-organization-state
      summary: Sets a new state for an organization.
      description: |
        Sets a new state for an organization and creates an organization state 
        history record. An organization can be set to active or inactive.
      requestBody:
        $ref: '#/components/requestBodies/UpdateOrganizationState'
      responses:
        '201':
          $ref: '#/components/responses/OrganizationStateResponse'
        '400':
          $ref: '#/components/responses/OrganizationStateBadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/OrganizationNotFound'
        '409':
          $ref: '#/components/responses/OrganizationStateConflict'
      servers:
        - url: 'https://global.api.konghq.com/'
      tags:
        - Organization Lifecycle
  /v3/organizations/state/history:
    get:
      operationId: get-organization-state-history
      summary: Returns the state history of an organization.
      description: |
        Returns the state history of an organization sorted in reverse chronological order.
        Possible states include active, inactive, deleting, and deleted. An organization state 
        will be transitioned to the deleting state if the organization remains inactive for 90 days. 
        After deletion is complete, the state will be transitioned to the final deleted state. 
      responses:
        '200':
          $ref: '#/components/responses/OrganizationStateHistory'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/OrganizationNotFound'
      servers:
        - url: 'https://global.api.konghq.com/'
      tags:
        - Organization Lifecycle
  /v3/refresh:
    post:
      operationId: refresh-token
      summary: Refresh Token
      description: 'Issues new tokens. Returns 401 if a) the user is no longer active, b) the token has exceeded its lifetime limit, or c) the token has been revoked.'
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/IdentityUnauthenticated'
      servers:
        - url: 'https://global.api.konghq.com/'
      tags:
        - Authentication
  /v3/users/me:
    delete:
      operationId: delete-users-me
      summary: Delete My User Account
      description: Deletes the user account for the user identified in the token of the request.
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/IdentityUnauthenticated'
        '403':
          description: Forbidden - If there are other users in the organization or a konnectAccessToken was not provided.
      security:
        - konnectAccessToken: []
      servers:
        - url: 'https://global.api.konghq.com/'
      tags:
        - Me
    patch:
      operationId: patch-users-me
      summary: Update My User Account
      description: Updates the user account for the user identified in the token of the request.
      requestBody:
        $ref: '#/components/requestBodies/UpdateUser'
      responses:
        '200':
          $ref: '#/components/responses/UserSingle'
        '400':
          description: Bad Request - Invalid Parameters
        '401':
          $ref: '#/components/responses/IdentityUnauthenticated'
        '403':
          description: Forbidden - If a konnectAccessToken was not provided.
      security:
        - konnectAccessToken: []
      servers:
        - url: 'https://global.api.konghq.com/'
      tags:
        - Me
  /v3/users/me/permissions:
    get:
      operationId: get-users-me-permissions
      summary: Get My Permissions
      description: Returns the permissions for the current user
      parameters:
        - name: filter
          in: query
          description: Filter permissions returned in the response.
          required: false
          schema:
            type: object
            properties:
              actions:
                $ref: '#/components/schemas/StringFieldEqualsFilter'
              region:
                $ref: '#/components/schemas/StringFieldEqualsFilter'
              resource:
                $ref: '#/components/schemas/StringFieldEqualsFilter'
              service:
                $ref: '#/components/schemas/StringFieldEqualsFilter'
              top_level:
                $ref: '#/components/schemas/BooleanFieldFilter'
          style: deepObject
      responses:
        '200':
          $ref: '#/components/responses/UserPermissions'
        '400':
          $ref: '#/components/responses/IdentityBadRequest'
        '401':
          $ref: '#/components/responses/IdentityUnauthenticated'
      security:
        - konnectAccessToken: []
      servers:
        - url: 'https://global.api.konghq.com/'
      tags:
        - Me
components:
  parameters:
    ProviderAccountId:
      name: providerAccountId
      in: path
      description: The ID of the provider account to operate on.
      required: true
      schema:
        $ref: '#/components/schemas/ProviderAccountId'
    ResourceQuotaId:
      name: resourceQuotaId
      in: path
      description: The ID of the resource quota to operate on.
      required: true
      schema:
        $ref: '#/components/schemas/ResourceQuotaId'
  schemas:
    BaseError:
      description: standard error
      type: object
      properties:
        status:
          description: |
            The HTTP status code of the error. Useful when passing the response
            body to child properties in a frontend UI. Must be returned as an integer.
          type: integer
          readOnly: true
        title:
          description: |
            A short, human-readable summary of the problem. It should not
            change between occurences of a problem, except for localization.
            Should be provided as "Sentence case" for direct use in the UI.
          type: string
          readOnly: true
        type:
          description: The error type.
          type: string
          readOnly: true
        instance:
          description: |
            Used to return the correlation ID back to the user, in the format
            kong:trace:<correlation_id>. This helps us find the relevant logs
            when a customer reports an issue.
          type: string
          readOnly: true
        detail:
          description: |
            A human readable explanation specific to this occurence of the problem.
            This field may contain request/entity data to help the user understand
            what went wrong. Enclose variable values in square brackets. Should be
            provided as "Sentence case" for direct use in the UI.
          type: string
          readOnly: true
      required:
        - status
        - title
        - instance
        - detail
      title: Error
    UnauthorizedError:
      allOf:
        - $ref: '#/components/schemas/BaseError'
        - type: object
          properties:
            status:
              example: 401
            title:
              example: Unauthorized
            type:
              example: 'https://httpstatuses.com/401'
            instance:
              example: 'kong:trace:1234567890'
            detail:
              example: Invalid credentials
    ForbiddenError:
      allOf:
        - $ref: '#/components/schemas/BaseError'
        - type: object
          properties:
            status:
              example: 403
            title:
              example: Forbidden
            type:
              example: 'https://httpstatuses.com/403'
            instance:
              example: 'kong:trace:1234567890'
            detail:
              example: Forbidden
    PaginatedMeta:
      description: returns the pagination information
      type: object
      properties:
        page:
          description: Contains pagination query parameters and the total number of entities returned.
          type: object
          $ref: '#/components/schemas/PageMeta'
          properties:
            number:
              description: Represents the current page number.
              type: integer
              example: 2
            size:
              description: Represents the number of entities on the page.
              type: integer
              example: 10
              maximum: 100
            total:
              description: Integer indicating the total number of entities in the list of results that’s being paginated.
              type: integer
              example: 100
              maximum: 1000
      example:
        page:
          number: 2
          size: 10
          total: 100
      required:
        - page
      title: PaginatedMeta
    StringFieldEqualsFilter:
      description: Filters on the given string field value by exact match.
      type: string
      oneOf:
        - type: string
        - type: object
          title: StringFieldEqualsComparison
          additionalProperties: false
          properties:
            eq:
              type: string
          required:
            - eq
      title: StringFieldEqualsFilter
      x-examples:
        example-1: equals-some-value
        example-2:
          eq: some-value
    PageMeta:
      description: Contains pagination query parameters and the total number of objects returned.
      type: object
      properties:
        number:
          type: number
          example: 1
        size:
          type: number
          example: 10
        total:
          type: number
          example: 100
      required:
        - number
        - size
        - total
    InvalidRules:
      description: invalid parameters rules
      type: string
      enum:
        - required
        - is_array
        - is_base64
        - is_boolean
        - is_date_time
        - is_integer
        - is_null
        - is_number
        - is_object
        - is_string
        - is_uuid
        - is_fqdn
        - is_arn
        - unknown_property
        - is_label
        - matches_regex
        - invalid
        - is_supported_network_availability_zone_list
        - is_supported_network_cidr_block
        - is_supported_provider_region
      nullable: true
      readOnly: true
    InvalidParameterStandard:
      type: object
      properties:
        field:
          type: string
          example: name
          readOnly: true
        rule:
          $ref: '#/components/schemas/InvalidRules'
        source:
          type: string
          example: body
        reason:
          type: string
          example: is a required field
          readOnly: true
      additionalProperties: false
      required:
        - field
        - reason
    InvalidParameterMinimumLength:
      type: object
      properties:
        field:
          type: string
          example: name
          readOnly: true
        rule:
          description: invalid parameters rules
          type: string
          enum:
            - min_length
            - min_digits
            - min_lowercase
            - min_uppercase
            - min_symbols
            - min_items
            - min
          nullable: false
          readOnly: true
        minimum:
          type: integer
          example: 8
        source:
          type: string
          example: body
        reason:
          type: string
          example: must have at least 8 characters
          readOnly: true
      additionalProperties: false
      required:
        - field
        - reason
        - rule
        - minimum
    InvalidParameterMaximumLength:
      type: object
      properties:
        field:
          type: string
          example: name
          readOnly: true
        rule:
          description: invalid parameters rules
          type: string
          enum:
            - max_length
            - max_items
            - max
          nullable: false
          readOnly: true
        maximum:
          type: integer
          example: 8
        source:
          type: string
          example: body
        reason:
          type: string
          example: must not have more than 8 characters
          readOnly: true
      additionalProperties: false
      required:
        - field
        - reason
        - rule
        - maximum
    InvalidParameterChoiceItem:
      type: object
      properties:
        field:
          type: string
          example: name
          readOnly: true
        rule:
          description: invalid parameters rules
          type: string
          enum:
            - enum
          nullable: false
          readOnly: true
        reason:
          type: string
          example: is a required field
          readOnly: true
        choices:
          type: array
          items: {}
          minItems: 1
          nullable: false
          readOnly: true
          uniqueItems: true
        source:
          type: string
          example: body
      additionalProperties: false
      required:
        - field
        - reason
        - rule
        - choices
