    NotFound:
      description: Not Found
      content:
        application/problem+json:
          schema:
            description: The error response object.
            type: object
            properties:
              type:
                description: Documentation for this error.
                type: string
              status:
                description: The HTTP status code.
                type: integer
                example: 404
              title:
                description: The error response code.
                type: string
                example: Not Found
              instance:
                description: The Konnect traceback code
                type: string
                example: 'konnect:trace:2287285207635123011'
              detail:
                description: Details about the error.
                type: string
                example: The requested report was not found
            example:
              Example 1:
                status: 404
                title: Not Found
                instance: 'konnect:trace:2287285207635123011'
                detail: The requested report was not found
            $ref: '#/components/schemas/NotFoundError'
          examples:
            NotFoundExample:
              $ref: '#/components/examples/NotFoundExample'
    TooManyRequests:
      description: Too many requests
      content:
        application/problem+json:
          schema:
            description: The error response object.
            type: object
            properties:
              type:
                description: Documentation for this error.
                type: string
              status:
