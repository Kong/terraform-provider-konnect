openapi: 3.0.3
info:
  title: Portal API
  version: 2.1.0
  description: Portal API
  contact:
    name: Kong
    url: https://cloud.konghq.com
servers:
  - url: https://custom.example.com
    description: Production
paths:
  /api/v2/portal/pages:
    get:
      operationId: list-portal-pages
      summary: List Portal Pages
      description: >-
        Returns a paginated list of pages for the portal. Each page has a path,
        title, and content. Public pages will be returned for non-authenticated
        users, while both private and public pages will be returned for
        authenticated users.
      parameters:
        - $ref: '#/components/parameters/SortPortalPages'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/FilterByTitleEquality'
        - $ref: '#/components/parameters/FilterByTitleEqualityShort'
        - $ref: '#/components/parameters/FilterByTitleContains'
        - $ref: '#/components/parameters/FilterByPathEquality'
        - $ref: '#/components/parameters/FilterByPathEqualityShort'
        - $ref: '#/components/parameters/FilterByPathContains'
        - $ref: '#/components/parameters/FilterByPublicEquality'
        - $ref: '#/components/parameters/FilterByPublicEqualityShort'
      responses:
        '200':
          $ref: '#/components/responses/ListPortalPagesResponse'
      tags:
        - portal
      security:
        - portalAccessToken: []
        - {}
  /api/v2/portal/pages/{pageId}:
    get:
      operationId: get-portal-page
      summary: Get Portal Page
      description: >-
        Returns a single page for the portal. Each page has a path, title, and
        content. Public pages will be returned for non-authenticated users,
        while both private and public pages will be returned for authenticated
        users.
      parameters:
        - name: pageId
          in: path
          description: The unique identifier of the page
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          $ref: '#/components/responses/GetPortalPageResponse'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - portal
      security:
        - portalAccessToken: []
        - {}
components:
  securitySchemes:
    portalAccessToken:
      type: apiKey
      in: cookie
      name: portalaccesstoken
      description: >
        The Developer portal cookie is meant to be used by the Developer API to
        authenticate with.
  schemas:
    BaseError:
      type: object
      title: Error
      description: standard error
      required:
        - status
        - title
        - instance
        - detail
      properties:
        status:
          type: integer
          description: >
            The HTTP status code of the error. Useful when passing the response

            body to child properties in a frontend UI. Must be returned as an
            integer.
          readOnly: true
        title:
          type: string
          description: |
            A short, human-readable summary of the problem. It should not
            change between occurences of a problem, except for localization.
            Should be provided as "Sentence case" for direct use in the UI.
          readOnly: true
        type:
          type: string
          description: The error type.
          readOnly: true
        instance:
          type: string
          description: |
            Used to return the correlation ID back to the user, in the format
            kong:trace:<correlation_id>. This helps us find the relevant logs
            when a customer reports an issue.
          readOnly: true
        detail:
          type: string
          description: >
            A human readable explanation specific to this occurence of the
            problem.

            This field may contain request/entity data to help the user
            understand

            what went wrong. Enclose variable values in square brackets. Should
            be

            provided as "Sentence case" for direct use in the UI.
          readOnly: true
    PageMeta:
      type: object
      description: >-
        Contains pagination query parameters and the total number of objects
        returned.
      required:
        - number
        - size
        - total
      properties:
        number:
          type: number
          example: 1
        size:
          type: number
          example: 10
        total:
          type: number
          example: 100
    PaginatedMeta:
      type: object
      title: PaginatedMeta
      description: returns the pagination information
      properties:
        page:
          $ref: '#/components/schemas/PageMeta'
      required:
        - page
    CreatedAt:
      type: string
      format: date-time
      example: '2022-11-04T20:10:06.927Z'
      description: An ISO-8601 timestamp representation of entity creation date.
      readOnly: true
    UpdatedAt:
      type: string
      format: date-time
      example: '2022-11-04T20:10:06.927Z'
      description: An ISO-8601 timestamp representation of entity update date.
      readOnly: true
    NotFoundError:
      type: object
      properties:
        status:
          example: 404
        title:
          example: Not Found
        type:
          example: https://httpstatuses.com/404
        instance:
          example: kong:trace:1234567890
        detail:
          example: Not found
      allOf:
        - $ref: '#/components/schemas/BaseError'
    PageId:
      title: Page ID
      description: The unique identifier of the page
      type: string
      format: uuid
      example: 582b9327-3eba-4bfe-9438-6066840dbbca
    PagePath:
      title: Page Path
      description: The path of the page with a leading slash
      type: string
      example: /my-page
    PageTitle:
      title: Page Title
      description: The title of the page
      type: string
      example: My Page
    PageContent:
      title: Page Content
      description: The renderable markdown content of the page
      type: string
      example: '# Welcome to the Developer Portal'
    PagePublicStatus:
      title: Page Public Status
      description: >-
        Whether the page is public or private. Private pages are only accessible
        to authenticated users.
      type: boolean
      example: true
    ListPortalPages:
      title: List Portal Pages
      description: A paginated list of pages for the portal
      type: object
      additionalProperties: false
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PortalPageInfo'
        meta:
          $ref: '#/components/schemas/PaginatedMeta'
    PortalPageInfo:
      title: Portal Page Info
      description: A single page for the portal
      type: object
      additionalProperties: false
      properties:
        id:
          $ref: '#/components/schemas/PageId'
        path:
          $ref: '#/components/schemas/PagePath'
        title:
          $ref: '#/components/schemas/PageTitle'
        public:
          $ref: '#/components/schemas/PagePublicStatus'
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
      required:
        - id
        - path
        - title
        - public
        - created_at
        - updated_at
    PortalPage:
      title: Portal Page
      description: A single page for the portal
      type: object
      additionalProperties: false
      properties:
        id:
          $ref: '#/components/schemas/PageId'
        title:
          $ref: '#/components/schemas/PageTitle'
        path:
          $ref: '#/components/schemas/PagePath'
        content:
          $ref: '#/components/schemas/PageContent'
        public:
          $ref: '#/components/schemas/PagePublicStatus'
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
      required:
        - id
        - title
        - path
        - content
        - public
        - created_at
        - updated_at
  responses:
    NotFound:
      description: Not Found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/NotFoundError'
          examples:
            NotFoundExample:
              $ref: '#/components/examples/NotFoundExample'
            404-Token-Not-Found:
              $ref: '#/components/examples/404-Token-Not-Found'
    ListPortalPagesResponse:
      description: Paginated list of portal pages
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ListPortalPages'
          examples:
            ListPortalPageResponseExample1:
              value:
                data:
                  - id: 582b9327-3eba-4bfe-9438-6066840dbbca
                    title: Home
                    path: /
                    public: true
                    created_at: '2021-09-01T00:00:00Z'
                    updated_at: '2021-09-01T00:00:00Z'
                meta:
                  page:
                    size: 10
                    total: 1
                    number: 1
    GetPortalPageResponse:
      description: A single portal page
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PortalPage'
          examples:
            PortalPageResponseExample1:
              value:
                id: 582b9327-3eba-4bfe-9438-6066840dbbca
                title: Home
                path: /
                content: '# Welcome to the Developer Portal'
                public: true
                created_at: '2021-09-01T00:00:00Z'
                updated_at: '2021-09-01T00:00:00Z'
  examples:
    NotFoundExample:
      value:
        status: 404
        title: Not Found
        instance: kong:trace:6816496025408232265
        detail: Not Found
    404-Token-Not-Found:
      value:
        status: 400
        title: Not Found
        instance: konnect:trace:8988732526256293040
        detail: The provided token was not found
  parameters:
    PageSize:
      name: page[size]
      description: >-
        The maximum number of items to include per page. The last page of a
        collection may include fewer items.
      required: false
      in: query
      allowEmptyValue: true
      schema:
        type: integer
        example: 10
    PageNumber:
      name: page[number]
      description: Determines which page of the entities to retrieve.
      required: false
      in: query
      allowEmptyValue: true
      schema:
        type: integer
        example: 1
    SortPortalPages:
      name: sort
      description: |
        Sorts a collection of portal pages. Supported sort attributes are:
          - created_at
          - updated_at
          - path
          - title
          - public
      in: query
      required: false
      schema:
        type: string
    FilterByTitleEquality:
      name: filter[title][eq]
      description: >-
        Filter by direct equality comparison of the title property with a
        supplied value.
      in: query
      required: false
      schema:
        type: string
        example: Good Page
    FilterByTitleEqualityShort:
      name: filter[title]
      description: >-
        Filter by direct equality comparison (short-hand) of the title property
        with a supplied value.
      in: query
      required: false
      schema:
        type: string
        example: Good Page
    FilterByTitleContains:
      name: filter[title][contains]
      description: >-
        Filter by contains comparison of the title property with a supplied
        substring
      in: query
      required: false
      schema:
        type: string
        example: Good
    FilterByPathEquality:
      name: filter[path][eq]
      description: >-
        Filter by direct equality comparison of the path property with a
        supplied value.
      in: query
      required: false
      schema:
        type: string
        example: good-page
    FilterByPathEqualityShort:
      name: filter[path]
      description: >-
        Filter by direct equality comparison (short-hand) of the path property
        with a supplied value.
      in: query
      required: false
      schema:
        type: string
        example: good-page
    FilterByPathContains:
      name: filter[path][contains]
      description: >-
        Filter by contains comparison of the path property with a supplied
        substring
      in: query
      required: false
      schema:
        type: string
        example: good
    FilterByPublicEquality:
      name: filter[public][eq]
      description: >-
        Filter by whether the pages returned are public or private. Private
        pages are only accessible to authenticated users. For authenticated
        users, results will include both public and private pages if not
        specified.
      in: query
      required: false
      schema:
        type: string
        enum:
          - 'true'
          - 'false'
        example: 'true'
    FilterByPublicEqualityShort:
      name: filter[public]
      description: >-
        Filter (short-hand) by whether the pages returned are public or private.
        Private pages are only accessible to authenticated users. For
        authenticated users, results will include both public and private pages
        if not specified.
      in: query
      required: false
      schema:
        type: string
        enum:
          - 'true'
          - 'false'
        example: 'true'
tags:
  - name: portal
    description: The API for retrieving details about a single Konnect Portal.
