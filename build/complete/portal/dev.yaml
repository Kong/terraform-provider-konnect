openapi: 3.0.3
info:
  title: Portal API
  version: 2.0.0
  description: Portal API
  contact:
    name: Kong
    url: https://cloud.konghq.com
servers:
  - url: https://custom.example.com
    description: Production
paths: {}
components:
  schemas:
    FilterType:
      type: string
      description: >-
        The type of filter to apply.  `IN` filters will limit results to only
        the specified values, while `NOT_IN` filters will exclude the specified
        values.
      enum:
        - IN
        - NOT_IN
    ApiProductVersionFilter:
      type: object
      additionalProperties: false
      properties:
        dimension:
          description: The dimension to filter.
          type: string
          enum:
            - API_PRODUCT_VERSION
        type:
          $ref: '#/components/schemas/FilterType'
        values:
          description: |
            The UUIDs of the API product versions to include in the results.
          type: array
          items:
            type: string
            pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
      required:
        - dimension
        - type
        - values
    ApplicationFilter:
      type: object
      additionalProperties: false
      properties:
        dimension:
          description: >-
            The dimension to filter. If no application filter is provided the
            API will implicitly filter on the applications owned by the
            developer making the query request.
          type: string
          enum:
            - APPLICATION
        type:
          $ref: '#/components/schemas/FilterType'
        values:
          description: |
            The UUIDs of the dev portal applications to include in the results.
          type: array
          items:
            type: string
            pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
      required:
        - dimension
        - type
        - values
    StatusCodeFilter:
      type: object
      additionalProperties: false
      properties:
        dimension:
          description: The dimension to filter.
          type: string
          enum:
            - STATUS_CODE
        type:
          $ref: '#/components/schemas/FilterType'
        values:
          description: |
            Only include requests with specific status codes in the results.
          type: array
          items:
            type: integer
            minimum: 100
            maximum: 999
      required:
        - dimension
        - type
        - values
    StatusCodeGroupedFilter:
      type: object
      additionalProperties: false
      properties:
        dimension:
          description: The dimension to filter.
          type: string
          enum:
            - STATUS_CODE_GROUPED
        type:
          $ref: '#/components/schemas/FilterType'
        values:
          description: |
            Only include the given groups of status codes in the results.
          type: array
          items:
            type: string
            pattern: ^\d[X][X]$
      required:
        - dimension
        - type
        - values
    QueryResponseMeta:
      type: object
      additionalProperties: false
      description: Query response metadata.
      properties:
        dimensions:
          type: object
          additionalProperties: false
          description: The dimension name and values returned in the response.
          properties:
            API_PRODUCT_VERSION:
              type: array
              items:
                type: string
            APPLICATION:
              type: array
              items:
                type: string
            STATUS_CODE:
              type: array
              items:
                type: string
            STATUS_CODE_GROUPED:
              type: array
              items:
                type: string
        metric_names:
          type: array
          description: The metric requested in query.
          minItems: 1
          maxItems: 1
          items:
            type: string
            enum:
              - REQUEST_COUNT
              - REQUEST_PER_MINUTE
              - RESPONSE_LATENCY_P99
              - RESPONSE_LATENCY_P95
              - RESPONSE_LATENCY_P50
              - RESPONSE_SIZE_P99
              - RESPONSE_SIZE_P95
              - RESPONSE_SIZE_P50
              - REQUEST_SIZE_P99
              - REQUEST_SIZE_P95
              - REQUEST_SIZE_P50
        metric_units:
          type: object
          description: The unit of metric.
          properties:
            REQUEST_COUNT:
              type: string
              default: count
            REQUEST_PER_MINUTE:
              type: string
              default: count/minute
            RESPONSE_LATENCY_P99:
              type: string
              default: ms
            RESPONSE_LATENCY_P95:
              type: string
              default: ms
            RESPONSE_LATENCY_P50:
              type: string
              default: ms
            RESPONSE_SIZE_P99:
              type: string
              default: bytes
            RESPONSE_SIZE_P95:
              type: string
              default: bytes
            RESPONSE_SIZE_P50:
              type: string
              default: bytes
            REQUEST_SIZE_P99:
              type: string
              default: bytes
            REQUEST_SIZE_P95:
              type: string
              default: bytes
            REQUEST_SIZE_P50:
              type: string
              default: bytes
        start_ms:
          type: integer
          description: >-
            Unix timestamp in milliseconds specifying the lower bound to return
            data for the query. Provided from the query parameters.
        end_ms:
          type: integer
          description: >-
            Unix timestamp in milliseconds specifying the upper bound to return
            data for the query. Provided from the query parameters.
        truncated:
          type: boolean
          description: >-
            True if the limit of dimension values was reached and results were
            truncated. Limit value is 50.
        granularity:
          type: integer
          description: >-
            The resulting time bucket for the returned data. If `TIME` was not
            specified as a dimension, granularity is the duration of the query.
        query_id:
          type: string
          description: Optional ID used to look up the query.
    QueryResponseRecord:
      type: object
      additionalProperties: false
      description: A response record.
      properties:
        event:
          type: object
          additionalProperties: false
          description: >-
            Event within the response. Mapping from the requested metrics and
            dimensions to the values.
          properties:
            REQUEST_COUNT:
              type: integer
              description: The number or requests metric.
            REQUEST_PER_MINUTE:
              type: number
              description: The number of requests per minute metric.
            RESPONSE_LATENCY_P99:
              type: number
              description: 99th percentile response latency metric in milliseconds.
            RESPONSE_LATENCY_P95:
              type: number
              description: 95th percentile response latency metric in milliseconds.
            RESPONSE_LATENCY_P50:
              type: number
              description: 50th percentile response latency metric in milliseconds.
            RESPONSE_SIZE_P99:
              type: number
              description: 99th percentile response size metric in bytes.
            RESPONSE_SIZE_P95:
              type: number
              description: 95th percentile response size metric in bytes.
            RESPONSE_SIZE_P50:
              type: number
              description: 50th percentile response size metric in bytes.
            REQUEST_SIZE_P99:
              type: number
              description: 99th percentile request size metric in bytes.
            REQUEST_SIZE_P95:
              type: number
              description: 95th percentile request size metric in bytes.
            REQUEST_SIZE_P50:
              type: number
              description: 50th percentile request size metric in bytes.
            API_PRODUCT_VERSION:
              type: string
              description: Dimension value for `API_PRODUCT_VERSION` name.
            APPLICATION:
              type: string
              description: Dimension value for `APPLICATION` name.
            STATUS_CODE:
              type: string
              description: Dimension value for `STATUS_CODE`.
            STATUS_CODE_GROUPED:
              type: string
              description: Dimension value for `STATUS_CODE_GROUPED`.
        timestamp:
          type: string
          format: date-time
          description: >-
            An ISO-8601 timestamp. If `TIME` was requested as a dimension this
            will be the start of the time bucket. If not specified this is the
            start time of the query.
          example: '2023-08-03T15:00:00.000Z'
    QueryResponseRecords:
      type: array
      description: Query response data.
      items:
        $ref: '#/components/schemas/QueryResponseRecord'
    BaseError:
      type: object
      title: Error
      description: standard error
      required:
        - status
        - title
        - instance
        - detail
      properties:
        status:
          type: integer
          description: >
            The HTTP status code of the error. Useful when passing the response

            body to child properties in a frontend UI. Must be returned as an
            integer.
          readOnly: true
        title:
          type: string
          description: |
            A short, human-readable summary of the problem. It should not
            change between occurences of a problem, except for localization.
            Should be provided as "Sentence case" for direct use in the UI.
          readOnly: true
        type:
          type: string
          description: The error type.
          readOnly: true
        instance:
          type: string
          description: |
            Used to return the correlation ID back to the user, in the format
            kong:trace:<correlation_id>. This helps us find the relevant logs
            when a customer reports an issue.
          readOnly: true
        detail:
          type: string
          description: >
            A human readable explanation specific to this occurence of the
            problem.

            This field may contain request/entity data to help the user
            understand

            what went wrong. Enclose variable values in square brackets. Should
            be

            provided as "Sentence case" for direct use in the UI.
          readOnly: true
    ForbiddenError:
      type: object
      properties:
        status:
          example: 403
        title:
          example: Forbidden
        type:
          example: https://httpstatuses.com/403
        instance:
          example: kong:trace:1234567890
        detail:
          example: Forbidden
      allOf:
        - $ref: '#/components/schemas/BaseError'
    CreateCredentialPayload:
      additionalProperties: false
      type: object
      properties:
        display_name:
          type: string
          maxLength: 255
    UpdateCredentialPayload:
      additionalProperties: false
      type: object
      required:
        - display_name
      properties:
        display_name:
          type: string
          maxLength: 255
    ListApplicationsResponse:
      additionalProperties: false
      type: object
      required:
        - data
        - meta
      properties:
        meta:
          $ref: '#/components/schemas/PaginatedMeta'
        data:
          type: array
          items:
            $ref: '#/components/schemas/GetApplicationResponse'
    GetApplicationResponse:
      additionalProperties: false
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
        reference_id:
          $ref: '#/components/schemas/ApplicationReferenceId'
        description:
          type: string
          nullable: true
        redirect_uri:
          type: string
          nullable: true
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
      required:
        - id
        - name
        - reference_id
        - description
        - updated_at
        - created_at
    ListCredentialsResponse:
      additionalProperties: false
      type: object
      required:
        - data
        - meta
      properties:
        meta:
          $ref: '#/components/schemas/PaginatedMeta'
        data:
          type: array
          items:
            type: object
            additionalProperties: false
            properties:
              id:
                $ref: '#/components/schemas/UUID'
              display_name:
                type: string
            required:
              - id
              - display_name
    CredentialCreationResponse:
      additionalProperties: false
      type: object
      properties:
        credential:
          type: string
        id:
          $ref: '#/components/schemas/UUID'
        display_name:
          type: string
      required:
        - credential
        - id
        - display_name
    RefreshTokenResponse:
      additionalProperties: false
      type: object
      title: Refresh token response
      description: Refresh token response
      required:
        - client_id
        - client_secret
      properties:
        client_id:
          type: string
        client_secret:
          type: string
    CreateApplicationPayload:
      additionalProperties: false
      type: object
      title: CreateApplicationPayload
      description: Application creation payload
      required:
        - name
      properties:
        name:
          description: The name of the application
          type: string
          maxLength: 255
        reference_id:
          $ref: '#/components/schemas/ApplicationReferenceId'
        redirect_uri:
          description: URL to redirect to after completing an OIDC auth flow
          type: string
          format: uri
        description:
          description: A brief description of the application
          type: string
          maxLength: 255
    ApplicationCreationResponse:
      additionalProperties: false
      type: object
      title: ApplicationCreationResponse
      description: Application creation response payload
      required:
        - id
        - name
        - reference_id
        - description
        - created_at
        - updated_at
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
        reference_id:
          $ref: '#/components/schemas/ApplicationReferenceId'
        description:
          type: string
          nullable: true
        redirect_uri:
          type: string
          nullable: true
        credentials:
          additionalProperties: false
          type: object
          required:
            - client_id
            - client_secret
          properties:
            client_id:
              type: string
            client_secret:
              type: string
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
    UpdateApplicationPayload:
      additionalProperties: false
      type: object
      title: UpdateApplicationPayload
      description: Payload required to update an application
      required:
        - name
      properties:
        name:
          description: The name of the application
          type: string
          maxLength: 255
        reference_id:
          $ref: '#/components/schemas/ApplicationReferenceId'
        redirect_uri:
          description: URL to redirect to after completing an OIDC auth flow
          type: string
          format: uri
        description:
          description: A brief description of the application
          type: string
          maxLength: 255
    ApplicationUpdateResponse:
      additionalProperties: false
      type: object
      title: ApplicationUpdateResponse
      description: Application update response payload
      required:
        - id
        - name
        - reference_id
        - description
        - updated_at
        - created_at
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
        reference_id:
          $ref: '#/components/schemas/ApplicationReferenceId'
        description:
          type: string
          example: A brief description of the application
          nullable: true
        redirect_uri:
          type: string
          example: https://example.com/callback
          nullable: true
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
    GetGrantedScopesProductVersionResponse:
      additionalProperties: false
      type: object
      required:
        - scopes
      properties:
        scopes:
          $ref: '#/components/schemas/RefreshedGrantedScopes'
    PageMeta:
      type: object
      description: >-
        Contains pagination query parameters and the total number of objects
        returned.
      required:
        - number
        - size
        - total
      properties:
        number:
          type: number
          example: 1
        size:
          type: number
          example: 10
        total:
          type: number
          example: 100
    PaginatedMeta:
      type: object
      title: PaginatedMeta
      description: returns the pagination information
      properties:
        page:
          $ref: '#/components/schemas/PageMeta'
      required:
        - page
    UUID:
      type: string
      format: uuid
      example: 5f9fd312-a987-4628-b4c5-bb4f4fddd5f7
      description: Contains a unique identifier used by the API for this resource.
      readOnly: true
    ApplicationReferenceId:
      description: |
        An identifier to correlate the application with an external system.
        Cannot be set when using Dynamic Client Registration.
      type: string
      maxLength: 255
    CreatedAt:
      type: string
      format: date-time
      example: '2022-11-04T20:10:06.927Z'
      description: An ISO-8601 timestamp representation of entity creation date.
      readOnly: true
    UpdatedAt:
      type: string
      format: date-time
      example: '2022-11-04T20:10:06.927Z'
      description: An ISO-8601 timestamp representation of entity update date.
      readOnly: true
    InvalidRules:
      description: invalid parameters rules
      type: string
      readOnly: true
      nullable: true
      enum:
        - required
        - enum
        - min_length
        - max_length
        - min_digits
        - min_lowercase
        - min_uppercase
        - min_symbols
        - is_array
        - is_base64
        - is_boolean
        - is_date_time
        - is_integer
        - is_null
        - is_number
        - is_object
        - is_string
        - is_uuid
        - unknown_property
        - is_label
        - matches_regex
    InvalidParameterChoiceItem:
      type: object
      properties:
        field:
          type: string
          example: name
          readOnly: true
        rule:
          $ref: '#/components/schemas/InvalidRules'
        reason:
          type: string
          example: is a required field
          readOnly: true
        choices:
          type: array
          uniqueItems: true
          nullable: true
          items: {}
          readOnly: true
      required:
        - field
        - reason
    InvalidParameterDependentItem:
      type: object
      properties:
        field:
          type: string
          example: name
          readOnly: true
        rule:
          description: invalid parameters rules
          type: string
          readOnly: true
          nullable: true
          enum:
            - dependent_fields
        reason:
          type: string
          example: is a required field
          readOnly: true
        dependents:
          type: array
          uniqueItems: true
          nullable: true
          items: {}
          readOnly: true
      required:
        - field
        - rule
        - reason
        - dependents
    InvalidParameters:
      type: array
      nullable: false
      uniqueItems: true
      minItems: 1
      description: invalid parameters
      items:
        oneOf:
          - $ref: '#/components/schemas/InvalidParameterChoiceItem'
          - $ref: '#/components/schemas/InvalidParameterDependentItem'
    BadRequestError:
      type: object
      required:
        - invalid_parameters
      properties:
        status:
          example: 400
        title:
          example: Bad Request
        type:
          example: https://httpstatuses.com/400
        instance:
          example: kong:trace:1234567890
        detail:
          example: Invalid request body
        invalid_parameters:
          $ref: '#/components/schemas/InvalidParameters'
      allOf:
        - $ref: '#/components/schemas/BaseError'
    UnauthorizedError:
      type: object
      properties:
        status:
          example: 401
        title:
          example: Unauthorized
        type:
          example: https://httpstatuses.com/401
        instance:
          example: kong:trace:1234567890
        detail:
          example: Invalid credentials
      allOf:
        - $ref: '#/components/schemas/BaseError'
    NotFoundError:
      type: object
      properties:
        status:
          example: 404
        title:
          example: Not Found
        type:
          example: https://httpstatuses.com/404
        instance:
          example: kong:trace:1234567890
        detail:
          example: Not found
      allOf:
        - $ref: '#/components/schemas/BaseError'
    ConflictError:
      type: object
      properties:
        status:
          example: 409
        title:
          example: Conflict
        type:
          example: https://httpstatuses.com/409
        instance:
          example: kong:trace:1234567890
        detail:
          example: Conflict
      allOf:
        - $ref: '#/components/schemas/BaseError'
    TooManyRequestsError:
      type: object
      properties:
        status:
          example: 429
        title:
          example: Too Many Requests
        type:
          example: https://httpstatuses.com/429
        instance:
          example: kong:trace:1234567890
        detail:
          example: Too Many Requests
      allOf:
        - $ref: '#/components/schemas/BaseError'
    RefreshedGrantedScopes:
      description: List of granted scopes, directly updated from the IDP
      type: array
      items:
        type: string
    UnprocessableContentError:
      type: object
      properties:
        status:
          example: 422
        title:
          example: Unprocessable Content
        type:
          example: https://httpstatuses.com/422
        instance:
          example: kong:trace:1234567891
        detail:
          example: Unprocessable Content
      allOf:
        - $ref: '#/components/schemas/BaseError'
    AuthenticateRequest:
      type: object
      additionalProperties: false
      example:
        username: developer@example.com
        password: <!N0taP@$$w0rd!>
      title: AuthenticateRequest
      description: The request schema for the authenticate endpoint.
      properties:
        username:
          type: string
          format: email
          example: developer@example.com
          writeOnly: true
        password:
          type: string
          format: password
          example: <!N0taP@$$w0rd!>
          writeOnly: true
      required:
        - username
        - password
    ResetPasswordRequest:
      title: ResetPasswordRequest
      type: object
      additionalProperties: false
      description: The request schema for the reset password endpoint.
      example:
        password: <!D3finitelyN0taP@$$w0rd!>
        token: c8efd006-d8e1-4743-b91b-f163b9eae06a
      properties:
        password:
          type: string
          format: password
          example: <!N0taP@$$w0rd!>
          writeOnly: true
        token:
          type: string
          format: uuid
          example: c8efd006-d8e1-4743-b91b-f163b9eae06a
          writeOnly: true
      required:
        - password
        - token
    VerifyEmailRequest:
      title: VerifyEmailRequest
      type: object
      additionalProperties: false
      description: The request schema for the verify email endpoint.
      example:
        token: c8efd006-d8e1-4743-b91b-f163b9eae06a
      properties:
        token:
          type: string
          format: uuid
          example: c8efd006-d8e1-4743-b91b-f163b9eae06a
          writeOnly: true
      required:
        - token
    VerifyEmailResponse:
      title: VerifyEmailResponse
      type: object
      additionalProperties: false
      description: The response schema for the verify email endpoint.
      example:
        email: developer@example.com
        token: c8efd006-d8e1-4743-b91b-f163b9eae06a
      properties:
        email:
          type: string
          format: email
          example: developer@example.com
          readOnly: true
        token:
          type: string
          format: uuid
          example: c8efd006-d8e1-4743-b91b-f163b9eae06a
          readOnly: true
    GoneError:
      type: object
      properties:
        status:
          example: 410
        title:
          example: Gone
        type:
          example: https://httpstatuses.com/410
        instance:
          example: kong:trace:1234567890
        detail:
          example: Gone
      allOf:
        - $ref: '#/components/schemas/BaseError'
    Developer:
      title: Developer
      type: object
      description: A user who can use a developer portal
      additionalProperties: false
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        email:
          type: string
          format: email
          example: developer@email.com
          maxLength: 250
        full_name:
          type: string
          pattern: ^[\w \W]+$
          example: API Developer
          maxLength: 250
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
      required:
        - full_name
        - email
    PortalAppearance:
      title: Portal Appearance
      description: the portal appearance
      type: object
      additionalProperties: false
      properties:
        variables:
          type: object
          properties:
            catalog:
              type: object
              properties:
                logo:
                  type: object
                  properties:
                    url:
                      type: string
                cover:
                  type: object
                  properties:
                    url:
                      type: string
                primary_header:
                  type: object
                  properties:
                    text:
                      type: string
                welcome_message:
                  type: object
                  properties:
                    text:
                      type: string
        stylesheets:
          type: object
          properties:
            global:
              type: object
              properties:
                main:
                  type: object
                  properties:
                    data:
                      type: object
    PortalContext:
      title: Portal Context
      description: describe the portal execution context
      type: object
      additionalProperties: false
      properties:
        portal_id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        featureset_id:
          type: string
        feature_set:
          type: string
          description: >-
            String that determines feature set group developer belongs to when
            logged in
        basic_auth_enabled:
          type: boolean
          description: Whether the portal can be accessed via email and password
        oidc_auth_enabled:
          type: boolean
          description: >-
            Whether the portal can be accessed via authentication with Single
            Sign On (SSO) through OpenID Connect (OIDC) from a third-party
            Identity Provider
        is_public:
          type: boolean
          description: >-
            Whether the portal catalog can be accessed by non-authenticated
            users
        rbac_enabled:
          type: boolean
          description: Whether the portal is protected with Role-Based Access Control
        dcr_provider_ids:
          type: array
          description: >-
            The unique identifiers of each available client provider when using
            Dynamic Client Registration
          items:
            type: string
            format: uuid
        allowed_time_period:
          type: string
          description: Allowed time period for Analytics queries
      required:
        - portal_id
        - org_id
        - is_public
        - featureset_id
