        - oidc_auth_enabled
        - rbac_enabled
        - dcr_provider_ids
        - allowed_time_period
    ProductActionsResponse:
      title: Product Actions Response
      type: object
      additionalProperties: false
      required:
        - actions
      properties:
        actions:
          type: object
          additionalProperties: false
          required:
            - view
            - register
            - view_documentation
          properties:
            view:
              type: boolean
            register:
              type: boolean
            view_documentation:
              type: boolean
          description: List of actions that can be performed on the API Product
      example:
        actions:
          view: true
          register: false
          view_documentation: true
    Product:
      title: Product
      type: object
      additionalProperties: false
      required:
        - id
        - created_at
        - updated_at
        - name
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
        name:
          type: string
          example: Billing
          description: Name of product.
        description:
          type: string
          nullable: true
          example: API for billing functions
        document_count:
          type: integer
          example: 3
          description: Number of linked documents in documentation.
          readOnly: true
        version_count:
          type: integer
          example: 2
          description: Number of published versions.
          readOnly: true
        latest_version:
          $ref: '#/components/schemas/LatestVersion'
    ProductListPage:
      title: ProductListPage
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/PaginatedMeta'
        data:
          type: array
          items:
            $ref: '#/components/schemas/Product'
    ProductVersion:
      type: object
      additionalProperties: false
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
        name:
          type: string
          example: v2.0.0
          description: Name of product version.
        deprecated:
          type: boolean
          description: If true, product version is deprecated.
        registration_configs:
          description: >-
            Configurations for how the product version is able to be registered
            for by applications.
          type: array
          items:
            $ref: '#/components/schemas/RegistrationConfiguration'
      required:
        - id
        - created_at
        - updated_at
        - name
        - deprecated
        - registration_configs
    RegistrationConfiguration:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          enum:
            - key-auth
            - openid-connect
        available_scopes:
          type: array
          items:
            type: string
    LatestVersion:
      type: object
      additionalProperties: false
      nullable: true
      properties:
        name:
          type: string
          example: v2.0.0
          readOnly: true
        id:
          $ref: '#/components/schemas/UUID'
    ProductVersionListPage:
      title: ProductVersionListPage
      type: object
      additionalProperties: false
      required:
        - meta
        - data
      properties:
        meta:
          $ref: '#/components/schemas/PaginatedMeta'
        data:
          type: array
          items:
            $ref: '#/components/schemas/ProductVersion'
    ProductVersionListApplicationsPage:
      title: ProductVersionListApplicationsPage
      type: object
      additionalProperties: false
      required:
        - meta
        - data
      properties:
        meta:
          $ref: '#/components/schemas/PaginatedMeta'
        data:
          type: array
          items:
            $ref: '#/components/schemas/ProductVersionApplication'
    ProductVersionApplication:
      title: ProductVersionApplication
      type: object
      additionalProperties: false
      required:
        - id
        - name
        - created_at
        - updated_at
        - registration_status
        - registration_id
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        name:
          description: The name of the application
          type: string
        registration_id:
          $ref: '#/components/schemas/NullableUUID'
        registration_status:
          type: string
          nullable: true
          enum:
            - approved
            - pending
            - rejected
            - revoked
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
    ProductVersionSpecDocument:
      type: object
      title: ProductVersionSpecDocument
      description: API specification document for a product version.
      properties:
        api_type:
          $ref: '#/components/schemas/ApiTypeEnum'
        content:
          type: string
      required:
        - api_type
        - content
    ProductVersionSpecOperations:
      type: object
      title: ProductVersionSpecOperations
      description: List of every operation detailed in a product version spec document.
      required:
        - api_type
        - operations
      properties:
        api_type:
          $ref: '#/components/schemas/ApiTypeEnum'
        operations:
          type: array
          items:
            type: object
            required:
              - path
              - method
              - operation_id
              - tags
              - summary
              - deprecated
            properties:
              path:
                type: string
                example: /pet
              method:
                type: string
                example: post
              operation_id:
                type: string
                nullable: true
                example: addPet
              tags:
                type: array
                items:
                  type: string
                  example: pet
              summary:
                type: string
                nullable: true
                example: Add a new Pet to the store
              deprecated:
                type: boolean
    ApiTypeEnum:
      type: string
      enum:
        - openapi
    ProductDocument:
      type: object
      title: ProductDocument
      description: >-
        A document for a product. This is a document that is not a part of the
        API specification.
      required:
        - id
        - slug
        - title
        - content
      properties:
        id:
          allOf:
            - $ref: '#/components/schemas/UUID'
            - description: >-
                Contains a unique identifier used by the DocumentHub service for
                this resource.
              type: string
        parent_document_id:
          type: string
          format: uuid
          description: >-
            Contains a unique identifier used by the DocumentHub service for
            this resource.
          nullable: true
          example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
        slug:
          type: string
          description: >-
            Slug of the document. This is used in the URL to identify the
            document.
          example: getting-started
        content:
          $ref: '#/components/schemas/DocumentBlock'
        title:
          type: string
          description: >-
            Title of the document. This is used in the Portal UI to identify the
            document.
          example: Hello World
    ProductDocumentRaw:
      type: object
      title: ProductDocumentRaw
      description: >-
        A document for a product. This is a document that is not a part of the
        API specification.
      required:
        - id
        - slug
        - title
        - content
      properties:
        id:
          allOf:
            - $ref: '#/components/schemas/UUID'
            - description: >-
                Contains a unique identifier used by the DocumentHub service for
                this resource.
              type: string
        parent_document_id:
          type: string
          format: uuid
          description: >-
            Contains a unique identifier used by the DocumentHub service for
            this resource.
          nullable: true
          example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
        slug:
          type: string
          description: >-
            Slug of the document. This is used in the URL to identify the
            document.
          example: getting-started
        content:
          type: string
          description: Markdown document
          example: |
            # My Kong api

            This api is powered by Konnect
        title:
          type: string
          description: >-
            Title of the document. This is used in the Portal UI to identify the
            document.
          example: Hello World
    NullableUUID:
      type: string
      format: uuid
      example: 5f9fd312-a987-4628-b4c5-bb4f4fddd5f7
      description: Contains a unique identifier for a resource.
      nullable: true
    DocumentItem:
      type: object
      title: Document item
      additionalProperties: false
      required:
        - id
        - parent_document_id
        - slug
        - title
      properties:
        id:
          type: string
          format: uuid
          description: the id of the document
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        parent_document_id:
          type: string
          format: uuid
          description: the id of the parent document
          nullable: true
          example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
        slug:
          type: string
          description: the slug of the document
          example: getting-started
        title:
          type: string
          description: the title of the document
          example: Getting Started
    DocumentTree:
      type: object
      title: DocumentTree
      description: a document tree
      required:
        - id
        - title
        - slug
        - meta
        - children
      properties:
        id:
          type: string
          format: uuid
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        parent_document_id:
          type: string
          format: uuid
          nullable: true
          example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
        title:
          type: string
          description: the title of the document
          example: Getting Started
        slug:
          type: string
          description: the slug of the document
          example: getting-started
        meta:
          type: object
          description: the metadata of the document
          example:
            author: Jane Doe
            description: This is a description
            keywords: hello, world
        children:
          type: array
          items:
            $ref: '#/components/schemas/DocumentTree'
    BaseNode:
      type: object
