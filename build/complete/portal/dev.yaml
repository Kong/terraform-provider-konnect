openapi: 3.0.3
info:
  title: Portal API
  version: 2.1.0
  description: Portal API
  contact:
    name: Kong
    url: 'https://cloud.konghq.com'
servers:
  - url: 'https://custom.example.com'
    description: Production
paths:
  /api/v2/explore:
    post:
      operationId: query-application-analytics-explore
      summary: Query Application Analytics (Explore)
      description: Query the portal Explore endpoint.
      requestBody:
        description: Object describing the query sent to analytics Explore API.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExploreV2Dto'
      responses:
        '200':
          description: Aggregated results of the query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExploreResultV2'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              examples:
                BadRequestExample:
                  $ref: '#/components/examples/BadRequestExample'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              examples:
                UnauthorizedExample:
                  $ref: '#/components/examples/UnauthorizedExample'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - portalAccessToken: []
      tags:
        - Application Analytics
  /api/v2/portal:
    get:
      operationId: get-portal-context
      summary: Get portal context
      description: Return the portal context object.
      responses:
        '200':
          $ref: '#/components/responses/GetPortalContextResponse'
      security:
        - {}
      tags:
        - portal
  /api/v2/portal/customization:
    get:
      operationId: get-portal-customization
      summary: Get Customization
      description: Returns the customized portal appearance.
      responses:
        '200':
          $ref: '#/components/responses/GetPortalCustomization'
      security:
        - {}
      tags:
        - portal
  /api/v3/portal/pages:
    get:
      operationId: list-portal-pages
      summary: List Portal Pages
      description: 'Returns a paginated list of pages for the portal. Each page has a path, title, and content. Public pages will be returned for non-authenticated users, while both private and public pages will be returned for authenticated users.'
      parameters:
        - $ref: '#/components/parameters/SortPortalPages'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/FilterByTitleEquality'
        - $ref: '#/components/parameters/FilterByTitleEqualityShort'
        - $ref: '#/components/parameters/FilterByTitleContains'
        - $ref: '#/components/parameters/FilterByPathEquality'
        - $ref: '#/components/parameters/FilterByPathEqualityShort'
        - $ref: '#/components/parameters/FilterByPathContains'
        - $ref: '#/components/parameters/FilterByPublicEquality'
        - $ref: '#/components/parameters/FilterByPublicEqualityShort'
      responses:
        '200':
          $ref: '#/components/responses/ListPortalPagesResponse'
      security:
        - portalAccessToken: []
        - {}
      tags:
        - portal
  /api/v3/portal/pages/content:
    get:
      operationId: get-portal-page
      summary: Get Portal Page
      description: 'Returns a single page for the portal. Each page has a path, title, and content. Public pages will be returned for non-authenticated users, while both private and public pages will be returned for authenticated users.'
      parameters:
        - name: path
          in: query
          description: The unique identifier of the page
          required: true
          schema:
            type: string
          example: /about/company
      responses:
        '200':
          $ref: '#/components/responses/GetPortalPageResponse'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - portalAccessToken: []
        - {}
      tags:
        - portal
components:
  parameters:
    FilterByPathContains:
      name: 'filter[path][contains]'
      description: Filter by contains comparison of the path property with a supplied substring
      in: query
      required: false
      schema:
        type: string
        example: good
    FilterByPathEquality:
      name: 'filter[path][eq]'
      description: Filter by direct equality comparison of the path property with a supplied value.
      in: query
      required: false
      schema:
        type: string
        example: good-page
    FilterByPathEqualityShort:
      name: 'filter[path]'
      description: Filter by direct equality comparison (short-hand) of the path property with a supplied value.
      in: query
      required: false
      schema:
        type: string
        example: good-page
    FilterByPublicEquality:
      name: 'filter[public][eq]'
      description: 'Filter by whether the pages returned are public or private. Private pages are only accessible to authenticated users. For authenticated users, results will include both public and private pages if not specified.'
      in: query
      required: false
      schema:
        type: string
        example: 'true'
        enum:
          - 'true'
          - 'false'
    FilterByPublicEqualityShort:
      name: 'filter[public]'
      description: 'Filter (short-hand) by whether the pages returned are public or private. Private pages are only accessible to authenticated users. For authenticated users, results will include both public and private pages if not specified.'
      in: query
      required: false
      schema:
        type: string
        example: 'true'
        enum:
          - 'true'
          - 'false'
    FilterByTitleContains:
      name: 'filter[title][contains]'
      description: Filter by contains comparison of the title property with a supplied substring
      in: query
      required: false
      schema:
        type: string
        example: Good
    FilterByTitleEquality:
      name: 'filter[title][eq]'
      description: Filter by direct equality comparison of the title property with a supplied value.
      in: query
      required: false
      schema:
        type: string
        example: Good Page
    FilterByTitleEqualityShort:
      name: 'filter[title]'
      description: Filter by direct equality comparison (short-hand) of the title property with a supplied value.
      in: query
      required: false
      schema:
        type: string
        example: Good Page
    PageNumber:
      name: 'page[number]'
      description: Determines which page of the entities to retrieve.
      required: false
      in: query
      allowEmptyValue: true
      schema:
        type: integer
        example: 1
    PageSize:
      name: 'page[size]'
      description: The maximum number of items to include per page. The last page of a collection may include fewer items.
      required: false
      in: query
      allowEmptyValue: true
      schema:
        type: integer
        example: 10
    SortPortalPages:
      name: sort
      description: |
        Sorts a collection of portal pages. Supported sort attributes are:
          - created_at
          - updated_at
          - path
          - title
          - public
      in: query
      required: false
      schema:
        type: string
  schemas:
    AbsoluteTimeRangeDtoV2:
      description: A duration representing an exact start and end time.
      type: object
      properties:
        tz:
          type: string
          default: Etc/UTC
        type:
          type: string
          enum:
            - absolute
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
      required:
        - type
    RelativeTimeRangeDtoV2:
      description: 'A duration representing a relative-to-now span of time. Generally the start time is floored to the requested granularity. Eg 7d from now, with 1day granularity initiated at 2024-01-08T17:11:00+05:00 will query for the time range from 2024-01-01T00:00:00+05:00 to 2024-01-08T17:11:00+05:00. The exact start and end timestamps are returned in the result query in the meta.start_ms and meta.end_ms fields. If the granularity for the previous query was 1hour, it would query a time range from 2024-01-01T17:00:00+05:00 to 2024-01-08T17:11:00+05:00.'
      type: object
      properties:
        tz:
          type: string
          default: Etc/UTC
        type:
          type: string
          enum:
            - relative
        time_range:
          type: string
          default: 1h
          enum:
            - 15m
            - 1h
            - 6h
            - 12h
            - 24h
            - 7d
            - 30d
            - current_week
            - current_month
            - previous_week
            - previous_month
      required:
        - type
        - time_range
    ExploreFilter:
      description: A filter that specifies which data to include in the query
      type: object
      properties:
        dimension:
          type: string
          example: status_code
          enum:
            - api_product
            - api_product_version
            - application
            - consumer
            - control_plane
            - control_plane_group
            - data_plane_node
            - gateway_service
            - route
            - status_code
            - status_code_grouped
        type:
          type: string
          example: in
          enum:
            - in
            - not_in
            - selector
        values:
          type: array
          items:
            type: string
      required:
        - dimension
        - type
        - values
    ExploreV2Dto:
      description: A query to launch at the API
      type: object
      properties:
        metrics:
          description: List of aggregated metrics to collect across the requested time span.
          type: array
          items:
            type: string
            enum:
              - request_count
              - request_per_minute
              - response_latency_p99
              - response_latency_p95
              - response_latency_p50
              - response_latency_average
              - upstream_latency_p99
              - upstream_latency_p95
              - upstream_latency_p50
              - upstream_latency_average
              - kong_latency_p99
              - kong_latency_p95
              - kong_latency_p50
              - kong_latency_average
              - response_size_p99
              - response_size_p95
              - response_size_p50
              - request_size_p99
              - request_size_p95
              - request_size_p50
              - request_size_average
              - response_size_average
          example:
            - request_count
        dimensions:
          description: List of attributes or entity types to group by.
          type: array
          items:
            type: string
            enum:
              - api_product
              - api_product_version
              - application
              - consumer
              - control_plane
              - control_plane_group
              - data_plane_node
              - gateway_service
              - route
              - status_code
              - status_code_grouped
              - time
          example:
            - status_code_grouped
          maxItems: 2
          minItems: 0
        filters:
          description: A list of filters to apply to the query.
          type: array
          items:
            $ref: '#/components/schemas/ExploreFilter'
        granularity:
          description: |
            Force time grouping into buckets of the specified duration.  Only has an effect if "time" is in the "dimensions" list.

            If "trend" is chosen, the time range covered by the query will be twice the specified time range, and the granularity will be set such that two time buckets are returned, one for the given time range and one for the same time range prior.
            For example:

            time range: last 24 hours
            granularity: trend

            will return 2 time buckets (assuming both have data):

            - 48 hours ago to 24 hours ago
            - 24 hours ago to now

            Another example:

            time range: 2020-05-01 to 2020-05-15
            granularity: trend

            will return 2 time buckets:

            - 2020-04-15 through 2020-04-30
            - 2020-05-01 through 2020-05-15

            The granularity of the result may be coarser than requested.  The finest allowed granularity depends on the query's time range: data farther in the past may have coarser granularity.  The exact result granularity will be reported in the response `meta.granularity_ms` field.

            If granularity is not specified and "time" is in the dimensions list, a default will be chosen based on the time range requested.
          type: string
          enum:
            - minute
            - hour
            - day
            - week
            - trend
        time_range:
          description: The time range to query.
          default:
            type: relative
            time_range: 1h
          discriminator:
            propertyName: type
            mapping:
              relative: '#/components/schemas/RelativeTimeRangeDtoV2'
              absolute: '#/components/schemas/AbsoluteTimeRangeDtoV2'
          oneOf:
            - $ref: '#/components/schemas/RelativeTimeRangeDtoV2'
            - $ref: '#/components/schemas/AbsoluteTimeRangeDtoV2'
        meta:
          type: object
      example:
        time_range:
          type: relative
          time_range: 24h
          tz: EST
        dimensions:
          - time
          - gateway_service
        filters:
          - type: in
            dimension: application
            values:
              - d5ac5d88-efed-4e10-9dfe-0b0a6646c219
        granularity: hour
        metrics:
          - response_latency_p99
          - response_latency_p95
          - response_latency_p50
    GroupByResult:
      type: object
      properties:
        timestamp:
          type: string
          readOnly: true
        event:
          type: object
          readOnly: true
      example:
        event:
          gateway_service: 'd5ac5d88-efed-4e10-9dfe-0b0a6646c219:bf16907c-8673-4f9d-aa83-1f2ea9215055'
          request_count: 1000
          response_latency_p99: 23
        timestamp: '2024-01-16T00:00:00Z'
      required:
        - timestamp
        - event
    DisplayBlob:
      type: object
      properties: {}
      example:
        gateway_service:
          'd5ac5d88-efed-4e10-9dfe-0b0a6646c219:bf16907c-8673-4f9d-aa83-111111111111':
            id: 'd5ac5d88-efed-4e10-9dfe-0b0a6646c219:bf16907c-8673-4f9d-aa83-111111111111'
            deleted: true
            name: Gateway Service Alpha
          'd5ac5d88-efed-4e10-9dfe-0b0a6646c219:bf16907c-8673-4f9d-aa83-1f2ea9215055':
            id: 'd5ac5d88-efed-4e10-9dfe-0b0a6646c219:bf16907c-8673-4f9d-aa83-1f2ea9215055'
            deleted: false
            name: Gateway Service Beta
    MetricUnitDto:
      type: object
      properties: {}
      example:
        request_count: cnt
        response_latency_p99: ms
    QueryResponseMetaExplore:
      type: object
      properties:
        start_ms:
          type: number
          readOnly: true
        end_ms:
          type: number
          readOnly: true
        display:
          allOf:
            - $ref: '#/components/schemas/DisplayBlob'
          readOnly: true
        metric_units:
          allOf:
            - $ref: '#/components/schemas/MetricUnitDto'
          readOnly: true
        granularity:
          type: number
          readOnly: true
        granularity_ms:
          type: number
          readOnly: true
        truncated:
          type: boolean
          readOnly: true
        limit:
          type: number
          readOnly: true
        query_id:
          type: string
          readOnly: true
      example:
        start_ms: 1705428000000
        end_ms: 1705429000000
        display:
          gateway_service:
            'd5ac5d88-efed-4e10-9dfe-0b0a6646c219:bf16907c-8673-4f9d-aa83-111111111111':
              id: 'd5ac5d88-efed-4e10-9dfe-0b0a6646c219:bf16907c-8673-4f9d-aa83-111111111111'
              deleted: true
              name: Gateway Service Alpha
            'd5ac5d88-efed-4e10-9dfe-0b0a6646c219:bf16907c-8673-4f9d-aa83-1f2ea9215055':
              id: 'd5ac5d88-efed-4e10-9dfe-0b0a6646c219:bf16907c-8673-4f9d-aa83-1f2ea9215055'
              deleted: false
              name: Gateway Service Beta
        metric_units:
          request_count: cnt
          response_latency_p99: ms
        granularity_ms: 60000
        truncated: false
        limit: 50
        query_id: requested-query-id
      required:
        - start_ms
        - end_ms
        - display
        - metric_units
        - granularity_ms
        - truncated
        - limit
        - query_id
    ExploreResultV2:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/GroupByResult'
          readOnly: true
        meta:
          allOf:
            - $ref: '#/components/schemas/QueryResponseMetaExplore'
          readOnly: true
      required:
        - data
        - meta
    BaseError:
      description: standard error
      type: object
      properties:
        status:
          description: |
            The HTTP status code of the error. Useful when passing the response
            body to child properties in a frontend UI. Must be returned as an integer.
          type: integer
          readOnly: true
        title:
          description: |
            A short, human-readable summary of the problem. It should not
            change between occurences of a problem, except for localization.
            Should be provided as "Sentence case" for direct use in the UI.
          type: string
          readOnly: true
        type:
          description: The error type.
          type: string
          readOnly: true
        instance:
          description: |
            Used to return the correlation ID back to the user, in the format
            kong:trace:<correlation_id>. This helps us find the relevant logs
            when a customer reports an issue.
          type: string
          readOnly: true
        detail:
          description: |
            A human readable explanation specific to this occurence of the problem.
            This field may contain request/entity data to help the user understand
            what went wrong. Enclose variable values in square brackets. Should be
            provided as "Sentence case" for direct use in the UI.
          type: string
          readOnly: true
      required:
        - status
        - title
        - instance
        - detail
      title: Error
    ForbiddenError:
      allOf:
        - $ref: '#/components/schemas/BaseError'
        - type: object
          properties:
            status:
              example: 403
            title:
              example: Forbidden
            type:
              example: 'https://httpstatuses.com/403'
            instance:
              example: 'kong:trace:1234567890'
            detail:
              example: Forbidden
    PageMeta:
      description: Contains pagination query parameters and the total number of objects returned.
      type: object
      properties:
        number:
          type: number
          example: 1
        size:
          type: number
          example: 10
        total:
          type: number
          example: 100
      required:
        - number
        - size
        - total
    PaginatedMeta:
      description: returns the pagination information
      type: object
      properties:
        page:
          $ref: '#/components/schemas/PageMeta'
      required:
        - page
      title: PaginatedMeta
    CreatedAt:
      description: An ISO-8601 timestamp representation of entity creation date.
      type: string
      format: date-time
      example: '2022-11-04T20:10:06.927Z'
      readOnly: true
    UpdatedAt:
      description: An ISO-8601 timestamp representation of entity update date.
      type: string
      format: date-time
      example: '2022-11-04T20:10:06.927Z'
      readOnly: true
    NotFoundError:
      allOf:
        - $ref: '#/components/schemas/BaseError'
        - type: object
          properties:
            status:
              example: 404
            title:
              example: Not Found
            type:
              example: 'https://httpstatuses.com/404'
            instance:
              example: 'kong:trace:1234567890'
            detail:
              example: Not found
    PortalContext:
      description: describe the portal execution context
      type: object
      properties:
        portal_id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        featureset_id:
          type: string
        feature_set:
          description: String that determines feature set group developer belongs to when logged in
          type: string
        basic_auth_enabled:
          description: Whether the portal can be accessed via email and password
          type: boolean
        oidc_auth_enabled:
          description: Whether the portal can be accessed via authentication with Single Sign On (SSO) through OpenID Connect (OIDC) from a third-party Identity Provider
          type: boolean
        saml_auth_enabled:
          description: Whether the portal can be accessed via SAML authentication
          type: boolean
        is_public:
          description: Whether the portal catalog can be accessed by non-authenticated users
          type: boolean
        rbac_enabled:
          description: Whether the portal is protected with Role-Based Access Control
          type: boolean
        dcr_provider_ids:
          description: The unique identifiers of each available client provider when using Dynamic Client Registration
          type: array
          items:
            type: string
            format: uuid
        allowed_time_period:
          description: Allowed time period for Analytics queries
          type: string
        name:
          description: Name of the developer portal.
          type: string
        canonical_domain:
          description: The canonical domain of the developer portal.
          type: string
      additionalProperties: false
      required:
        - canonical_domain
        - portal_id
        - org_id
        - is_public
        - featureset_id
        - basic_auth_enabled
        - oidc_auth_enabled
        - rbac_enabled
        - dcr_provider_ids
        - allowed_time_period
        - name
      title: Portal Context
    PageId:
      description: The unique identifier of the page
      type: string
      format: uuid
      example: 582b9327-3eba-4bfe-9438-6066840dbbca
      title: Page ID
    PagePath:
      description: The path of the page with a leading slash
      type: string
      example: /my-page
      title: Page Path
    PageTitle:
      description: The title of the page
      type: string
      example: My Page
      title: Page Title
    PageContent:
      description: The renderable markdown content of the page
      type: string
      example: '# Welcome to the Developer Portal'
      title: Page Content
    PagePublicStatus:
      description: Whether the page is public or private. Private pages are only accessible to authenticated users.
      type: boolean
      example: true
      title: Page Public Status
    PageDescription:
      type: string
      example: A custom page about developer portals
      title: PageDescription
    ListPortalPages:
      description: A paginated list of pages for the portal
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PortalPageInfo'
        meta:
          $ref: '#/components/schemas/PaginatedMeta'
      additionalProperties: false
      title: List Portal Pages
    PortalPageInfo:
      description: A single page for the portal
      type: object
      properties:
        id:
          $ref: '#/components/schemas/PageId'
        path:
          $ref: '#/components/schemas/PagePath'
        title:
          $ref: '#/components/schemas/PageTitle'
        public:
          $ref: '#/components/schemas/PagePublicStatus'
        description:
          $ref: '#/components/schemas/PageDescription'
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
      additionalProperties: false
      required:
        - id
        - path
        - title
        - public
        - created_at
        - updated_at
      title: Portal Page Info
    PortalPage:
      description: A single page for the portal
      type: object
      properties:
        id:
          $ref: '#/components/schemas/PageId'
        title:
          $ref: '#/components/schemas/PageTitle'
        path:
          $ref: '#/components/schemas/PagePath'
        content:
          $ref: '#/components/schemas/PageContent'
        public:
          $ref: '#/components/schemas/PagePublicStatus'
        description:
          $ref: '#/components/schemas/PageDescription'
        created_at:
          $ref: '#/components/schemas/CreatedAt'
        updated_at:
          $ref: '#/components/schemas/UpdatedAt'
      additionalProperties: false
      required:
        - id
        - title
        - path
        - content
        - public
        - created_at
        - updated_at
      title: Portal Page
    PortalCustomization:
      type: object
      additionalProperties: true
      title: PortalCustomization
  examples:
    BadRequestExample:
      value:
        status: 400
        title: Bad Request
        instance: 'kong:trace:9039922446017540182'
        detail: 'Malformed Query: dimension API_PRODUCT is not allowed'
        invalid_parameters: []
    UnauthorizedExample:
      value:
        status: 401
        title: Unauthorized
        instance: 'kong:trace:8347343766220159418'
        detail: Unauthorized
        invalid_parameters: []
    ForbiddenExample:
      value:
        status: 403
        title: Forbidden
        instance: 'kong:trace:2723154947768991354'
        detail: You do not have permission to perform this action
    NotFoundExample:
      value:
        status: 404
        title: Not Found
        instance: 'kong:trace:6816496025408232265'
        detail: Not Found
    404-Token-Not-Found:
      value:
        status: 400
        title: Not Found
        instance: 'konnect:trace:8988732526256293040'
        detail: The provided token was not found
  responses:
    Forbidden:
      description: Forbidden
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ForbiddenError'
          examples:
            UnauthorizedExample:
              $ref: '#/components/examples/ForbiddenExample'
    NotFound:
      description: Not Found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/NotFoundError'
          examples:
            NotFoundExample:
              $ref: '#/components/examples/NotFoundExample'
            404-Token-Not-Found:
              $ref: '#/components/examples/404-Token-Not-Found'
    GetPortalContextResponse:
      description: portal context
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PortalContext'
    ListPortalPagesResponse:
      description: Paginated list of portal pages
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ListPortalPages'
