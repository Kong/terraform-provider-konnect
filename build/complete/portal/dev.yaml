openapi: 3.0.3
info:
  title: Portal API
  version: 2.1.0
  description: Portal API
  contact:
    name: Kong
    url: 'https://cloud.konghq.com'
servers:
  - url: 'https://custom.example.com'
    description: Production
paths:
  /api/v2/explore:
    post:
      operationId: query-application-analytics-explore
      summary: Query Application Analytics (Explore)
      description: Query the portal Explore endpoint.
      requestBody:
        description: Object describing the query sent to analytics Explore API.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExploreV2Dto'
      responses:
        '200':
          description: Aggregated results of the query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExploreResultV2'
        '400':
          description: Bad Request
          content:
            application/problem+json:
              examples:
                BadRequestExample:
                  $ref: '#/components/examples/BadRequestExample'
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              examples:
                UnauthorizedExample:
                  $ref: '#/components/examples/UnauthorizedExample'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
        - portalAccessToken: []
      tags:
        - Application Analytics
  /api/v2/portal:
    get:
      operationId: get-portal-context
      summary: Get portal context
      description: Return the portal context object.
      responses:
        '200':
          $ref: '#/components/responses/GetPortalContextResponse'
      security:
        - {}
      tags:
        - portal
  /api/v2/portal/customization:
    get:
      operationId: get-portal-customization
      summary: Get Customization
      description: Returns the customized portal appearance.
      responses:
        '200':
          $ref: '#/components/responses/GetPortalCustomization'
      deprecated: true
      security:
        - {}
      tags:
        - portal
  /api/v3/apis:
    get:
      operationId: list-apis
      summary: List APIs
      description: Returns a paginated list of published APIs.
      parameters:
        - $ref: '#/components/parameters/ApiFilters'
        - $ref: '#/components/parameters/ApiSort'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
      responses:
        '200':
          $ref: '#/components/responses/ApiList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
        - portalAccessToken: []
        - {}
      tags:
        - apis
  '/api/v3/apis/{apiId}':
    get:
      operationId: fetch-api
      summary: Fetch an API
      description: Gets the details for an existing published API.
      parameters:
        - $ref: '#/components/parameters/ApiId'
      responses:
        '200':
          $ref: '#/components/responses/ApiGet'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - portalAccessToken: []
        - {}
      tags:
        - apis
  '/api/v3/apis/{apiId}/actions':
    parameters:
      - $ref: '#/components/parameters/ApiId'
    get:
      operationId: get-api-actions
      summary: Get API Actions
      description: Get a list of actions that the current developer is allowed to perform on an API.
      responses:
        '200':
          $ref: '#/components/responses/ApiActions'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/NotAvailable'
      tags:
        - apis
  '/api/v3/apis/{apiId}/documents':
    get:
      operationId: list-api-documents
      summary: List API documents
      description: 'Returns a list of documents that are associated with an API. The list is paginated, and is in either a list or tree format (based on the Accept header).'
      parameters:
        - $ref: '#/components/parameters/ApiId'
        - name: Accept
          in: header
          schema:
            $ref: '#/components/schemas/DocumentContentTypeEnum'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
      responses:
        '200':
          $ref: '#/components/responses/ApiDocumentList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - portalAccessToken: []
        - {}
      tags:
        - documentation
  '/api/v3/apis/{apiId}/documents/{documentId}':
    get:
      operationId: fetch-api-document
      summary: Fetch API document
      description: Returns the specified document from the API's document tree.
      parameters:
        - name: Accept
          in: header
          schema:
            $ref: '#/components/schemas/DocumentFormatContentTypeEnum'
        - $ref: '#/components/parameters/ApiId'
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          $ref: '#/components/responses/ApiDocumentGet'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - portalAccessToken: []
        - {}
      tags:
        - documentation
  '/api/v3/apis/{apiId}/specifications':
    get:
      operationId: list-api-specs
      summary: List API specs
      description: Returns the API specification documents attached to the API. Currently only OpenAPI is supported.
      parameters:
        - $ref: '#/components/parameters/ApiId'
      responses:
        '200':
          $ref: '#/components/responses/ApiSpecList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - portalAccessToken: []
        - {}
      tags:
        - documentation
  '/api/v3/apis/{apiId}/specifications/{specId}':
    get:
      operationId: fetch-api-spec
      summary: Fetch API spec
      description: Returns an API specification document for an API. Currently only OpenAPI is supported.
      parameters:
        - $ref: '#/components/parameters/ApiId'
        - $ref: '#/components/parameters/SpecId'
      responses:
        '200':
          $ref: '#/components/responses/ApiSpecGet'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - portalAccessToken: []
        - {}
      tags:
        - documentation
  /api/v3/assets/favicon:
    get:
      operationId: get-portal-favicon-v3
      summary: Portal Favicon
      description: Gets favicon of the developer portal.
      responses:
        '200':
          $ref: '#/components/responses/PortalImageAssetResponseV3'
      security:
        - {}
      tags:
        - portal
  /api/v3/assets/logo:
    get:
      operationId: get-portal-logo-v3
      summary: Portal Logo
      description: Gets logo of the developer portal.
      responses:
        '200':
          $ref: '#/components/responses/PortalImageAssetResponseV3'
      security:
        - {}
      tags:
        - portal
  /api/v3/customization:
    get:
      operationId: get-portal-customization-v3
      summary: Get Customization Settings
      description: Returns the portal's custom settings.
      responses:
        '200':
          $ref: '#/components/responses/PortalCustomizationResponseV3'
      security:
        - {}
      tags:
        - portal
  /api/v3/pages:
    get:
      operationId: list-portal-pages-v3
      summary: List Portal Pages
      description: 'Returns a paginated list of pages for the portal. Each page has a path, title, and content. Public pages will be returned for non-authenticated users, while both private and public pages will be returned for authenticated users.'
      parameters:
        - $ref: '#/components/parameters/SortPortalPages'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/FilterByTitleEquality'
        - $ref: '#/components/parameters/FilterByTitleEqualityShort'
        - $ref: '#/components/parameters/FilterByTitleContains'
        - $ref: '#/components/parameters/FilterByPathEquality'
        - $ref: '#/components/parameters/FilterByPathEqualityShort'
        - $ref: '#/components/parameters/FilterByPathContains'
        - $ref: '#/components/parameters/FilterByPublicEquality'
        - $ref: '#/components/parameters/FilterByPublicEqualityShort'
      responses:
        '200':
          $ref: '#/components/responses/ListPortalPagesResponse'
      security:
        - portalAccessToken: []
        - {}
      tags:
        - portal
  /api/v3/pages/content:
    get:
      operationId: get-portal-page-v3
      summary: Get Portal Page
      description: 'Returns a single page for the portal. Each page has a path, title, and content. Public pages will be returned for non-authenticated users, while both private and public pages will be returned for authenticated users.'
      parameters:
        - name: path
          in: query
          description: The unique identifier of the page
          required: true
          schema:
            type: string
          example: /about/company
      responses:
        '200':
          $ref: '#/components/responses/GetPortalPageResponse'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - portalAccessToken: []
        - {}
      tags:
        - portal
  /api/v3/portal:
    get:
      operationId: get-portal-context-v3
      summary: Get portal context
      description: Returns the portal context object.
      responses:
        '200':
          $ref: '#/components/responses/GetPortalContextResponseV3'
      security:
        - portalAccessToken: []
        - {}
      tags:
        - portal
  /api/v3/portal/pages:
    get:
      operationId: list-portal-pages
      summary: List Portal Pages
      description: 'Returns a paginated list of pages for the portal. Each page has a path, title, and content. Public pages will be returned for non-authenticated users, while both private and public pages will be returned for authenticated users.'
      parameters:
        - $ref: '#/components/parameters/SortPortalPages'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/FilterByTitleEquality'
        - $ref: '#/components/parameters/FilterByTitleEqualityShort'
        - $ref: '#/components/parameters/FilterByTitleContains'
        - $ref: '#/components/parameters/FilterByPathEquality'
        - $ref: '#/components/parameters/FilterByPathEqualityShort'
        - $ref: '#/components/parameters/FilterByPathContains'
        - $ref: '#/components/parameters/FilterByPublicEquality'
        - $ref: '#/components/parameters/FilterByPublicEqualityShort'
      responses:
        '200':
          $ref: '#/components/responses/ListPortalPagesResponse'
      deprecated: true
      security:
        - portalAccessToken: []
        - {}
      tags:
        - portal
  /api/v3/portal/pages/content:
    get:
      operationId: get-portal-page
      summary: Get Portal Page
      description: 'Returns a single page for the portal. Each page has a path, title, and content. Public pages will be returned for non-authenticated users, while both private and public pages will be returned for authenticated users.'
      parameters:
        - name: path
          in: query
          description: The unique identifier of the page
          required: true
          schema:
            type: string
          example: /about/company
      responses:
        '200':
          $ref: '#/components/responses/GetPortalPageResponse'
        '404':
          $ref: '#/components/responses/NotFound'
      deprecated: true
      security:
        - portalAccessToken: []
        - {}
      tags:
        - portal
  /api/v3/portal/snippets:
    get:
      operationId: list-portal-snippets
      summary: List Portal Snippets
      description: 'Returns a paginated list of snippets for the portal. Each snippet has a name, title, and content. Public snippets will be returned for non-authenticated users, while both private and public snippets will be returned for authenticated users.'
      parameters:
        - $ref: '#/components/parameters/SortPortalSnippets'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/FilterByTitleEquality'
        - $ref: '#/components/parameters/FilterByTitleEqualityShort'
        - $ref: '#/components/parameters/FilterByTitleContains'
        - $ref: '#/components/parameters/FilterByNameEquality'
        - $ref: '#/components/parameters/FilterByNameEqualityShort'
        - $ref: '#/components/parameters/FilterByPathContains'
        - $ref: '#/components/parameters/FilterByPublicEquality'
        - $ref: '#/components/parameters/FilterByPublicEqualityShort'
      responses:
        '200':
          $ref: '#/components/responses/ListPortalSnippetsResponse'
      deprecated: true
      security:
        - portalAccessToken: []
        - {}
      tags:
        - portal
  /api/v3/portal/snippets/content:
    get:
      operationId: get-portal-snippet
      summary: Get Portal Snippet
      description: 'Returns a single snippet for the portal. Each snippet has a name, title, and content. Public snippets will be returned for non-authenticated users, while both private and public snippets will be returned for authenticated users.'
      parameters:
        - name: name
          in: query
          description: The name of the snippet
          required: true
          schema:
            type: string
          example: snip1
      responses:
        '200':
          $ref: '#/components/responses/GetPortalSnippetResponse'
        '404':
          $ref: '#/components/responses/NotFound'
      deprecated: true
      security:
        - portalAccessToken: []
        - {}
      tags:
        - portal
  /api/v3/snippets:
    get:
      operationId: list-portal-snippets-v3
      summary: List Portal Snippets
      description: 'Returns a paginated list of snippets for the portal. Each snippet has a name, title, and content. Public snippets will be returned for non-authenticated users, while both private and public snippets will be returned for authenticated users.'
      parameters:
        - $ref: '#/components/parameters/SortPortalSnippets'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/FilterByTitleEquality'
        - $ref: '#/components/parameters/FilterByTitleEqualityShort'
        - $ref: '#/components/parameters/FilterByTitleContains'
        - $ref: '#/components/parameters/FilterByNameEquality'
        - $ref: '#/components/parameters/FilterByNameEqualityShort'
        - $ref: '#/components/parameters/FilterByPathContains'
        - $ref: '#/components/parameters/FilterByPublicEquality'
        - $ref: '#/components/parameters/FilterByPublicEqualityShort'
      responses:
        '200':
          $ref: '#/components/responses/ListPortalSnippetsResponse'
      security:
        - portalAccessToken: []
        - {}
      tags:
        - portal
  /api/v3/snippets/content:
    get:
      operationId: get-portal-snippet-v3
      summary: Get Portal Snippet
      description: 'Returns a single snippet for the portal. Each snippet has a name, title, and content. Public snippets will be returned for non-authenticated users, while both private and public snippets will be returned for authenticated users.'
      parameters:
        - name: name
          in: query
          description: The name of the snippet
          required: true
          schema:
            type: string
          example: snip1
      responses:
        '200':
          $ref: '#/components/responses/GetPortalSnippetResponse'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
        - portalAccessToken: []
        - {}
      tags:
        - portal
components:
  parameters:
    ApiFilters:
      name: filter
      description: Filters APIs in the response.
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/ApiFilterParameters'
      style: deepObject
    ApiId:
      name: apiId
      in: path
      required: true
      description: Contains a unique identifier used by the Portal API for this resource.
      schema:
        type: string
        format: uuid
    ApiSort:
      name: sort
      description: |
        Sorts a collection of APIs. Supported sort attributes are:
          - name
          - version
          - created_at
          - updated_at
      required: false
      in: query
      schema:
        $ref: '#/components/schemas/SortQuery'
    DocumentId:
      schema:
        type: string
        format: uuid
        example: d32d905a-ed33-46a3-a093-d8f536af9a8a
      name: documentId
      in: path
      required: true
      description: ID of the document.
    FilterByNameEquality:
      name: 'filter[name][eq]'
      description: Filter by direct equality comparison of the name property with a supplied value.
      in: query
      required: false
      schema:
        type: string
        example: good service
    FilterByNameEqualityShort:
      name: 'filter[name]'
      description: Filter by direct equality comparison (short-hand) of the name property with a supplied value.
      in: query
      required: false
      schema:
        type: string
        example: good service
    FilterByPathContains:
      name: 'filter[path][contains]'
      description: Filter by contains comparison of the path property with a supplied substring
      in: query
      required: false
      schema:
        type: string
        example: good
    FilterByPathEquality:
      name: 'filter[path][eq]'
      description: Filter by direct equality comparison of the path property with a supplied value.
      in: query
      required: false
      schema:
        type: string
        example: good-page
    FilterByPathEqualityShort:
      name: 'filter[path]'
      description: Filter by direct equality comparison (short-hand) of the path property with a supplied value.
      in: query
      required: false
      schema:
        type: string
        example: good-page
    FilterByPublicEquality:
      name: 'filter[public][eq]'
      description: 'Filter by whether the pages returned are public or private. Private pages are only accessible to authenticated users. For authenticated users, results will include both public and private pages if not specified.'
      in: query
      required: false
      schema:
        type: string
        example: 'true'
        enum:
          - 'true'
          - 'false'
    FilterByPublicEqualityShort:
      name: 'filter[public]'
      description: 'Filter (short-hand) by whether the pages returned are public or private. Private pages are only accessible to authenticated users. For authenticated users, results will include both public and private pages if not specified.'
      in: query
      required: false
      schema:
        type: string
        example: 'true'
        enum:
          - 'true'
          - 'false'
    FilterByTitleContains:
      name: 'filter[title][contains]'
      description: Filter by contains comparison of the title property with a supplied substring
      in: query
      required: false
      schema:
        type: string
        example: Good
    FilterByTitleEquality:
      name: 'filter[title][eq]'
      description: Filter by direct equality comparison of the title property with a supplied value.
      in: query
      required: false
      schema:
        type: string
        example: Good Page
    FilterByTitleEqualityShort:
      name: 'filter[title]'
      description: Filter by direct equality comparison (short-hand) of the title property with a supplied value.
      in: query
      required: false
      schema:
        type: string
        example: Good Page
    PageNumber:
      name: 'page[number]'
      description: Determines which page of the entities to retrieve.
      required: false
      in: query
      allowEmptyValue: true
      schema:
        type: integer
        example: 1
    PageSize:
      name: 'page[size]'
      description: The maximum number of items to include per page. The last page of a collection may include fewer items.
      required: false
      in: query
      allowEmptyValue: true
      schema:
        type: integer
        example: 10
    SortPortalPages:
      name: sort
      description: |
        Sorts a collection of portal pages. Supported sort attributes are:
          - created_at
          - updated_at
          - path
          - title
          - public
      in: query
      required: false
      schema:
        type: string
    SortPortalSnippets:
      name: sort
      description: |
        Sorts a collection of portal snippets. Supported sort attributes are:
          - created_at
          - updated_at
          - name
          - title
          - public
      in: query
      required: false
      schema:
        type: string
    SpecId:
      name: specId
      in: path
      required: true
      description: Contains a unique identifier for this resource.
      schema:
        type: string
        format: uuid
  schemas:
    AbsoluteTimeRangeDtoV2:
      description: A duration representing an exact start and end time.
      type: object
      properties:
        tz:
          type: string
          default: Etc/UTC
        type:
          type: string
          enum:
            - absolute
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
      required:
        - type
    RelativeTimeRangeDtoV2:
      description: 'A duration representing a relative-to-now span of time. Generally the start time is floored to the requested granularity. Eg 7d from now, with 1day granularity initiated at 2024-01-08T17:11:00+05:00 will query for the time range from 2024-01-01T00:00:00+05:00 to 2024-01-08T17:11:00+05:00. The exact start and end timestamps are returned in the result query in the meta.start_ms and meta.end_ms fields. If the granularity for the previous query was 1hour, it would query a time range from 2024-01-01T17:00:00+05:00 to 2024-01-08T17:11:00+05:00.'
      type: object
      properties:
        tz:
          type: string
          default: Etc/UTC
        type:
          type: string
          enum:
            - relative
        time_range:
          type: string
          default: 1h
          enum:
            - 15m
            - 1h
            - 6h
            - 12h
            - 24h
            - 7d
            - 30d
            - current_week
            - current_month
            - previous_week
            - previous_month
      required:
        - type
        - time_range
    ExploreFilter:
      description: A filter that specifies which data to include in the query
      type: object
      properties:
        dimension:
          type: string
          example: status_code
          enum:
            - api_product
            - api_product_version
            - application
            - consumer
            - control_plane
            - control_plane_group
            - data_plane_node
            - gateway_service
            - route
            - status_code
            - status_code_grouped
        type:
          type: string
          example: in
          enum:
            - in
            - not_in
            - selector
        values:
          type: array
          items:
            type: string
      required:
        - dimension
        - type
        - values
    ExploreV2Dto:
      description: A query to launch at the API
      type: object
      properties:
        metrics:
          description: List of aggregated metrics to collect across the requested time span.
          type: array
          items:
            type: string
            enum:
              - request_count
              - request_per_minute
              - response_latency_p99
              - response_latency_p95
              - response_latency_p50
              - response_latency_average
              - upstream_latency_p99
              - upstream_latency_p95
              - upstream_latency_p50
              - upstream_latency_average
              - kong_latency_p99
              - kong_latency_p95
              - kong_latency_p50
              - kong_latency_average
              - response_size_p99
              - response_size_p95
              - response_size_p50
              - request_size_p99
              - request_size_p95
              - request_size_p50
              - request_size_average
              - response_size_average
          example:
            - request_count
        dimensions:
          description: List of attributes or entity types to group by.
          type: array
          items:
            type: string
            enum:
              - api_product
              - api_product_version
              - application
              - consumer
              - control_plane
              - control_plane_group
              - data_plane_node
              - gateway_service
              - route
              - status_code
              - status_code_grouped
              - time
          example:
            - status_code_grouped
          maxItems: 2
          minItems: 0
        filters:
          description: A list of filters to apply to the query.
          type: array
          items:
            $ref: '#/components/schemas/ExploreFilter'
        granularity:
          description: |
            Force time grouping into buckets of the specified duration.  Only has an effect if "time" is in the "dimensions" list.

            If "trend" is chosen, the time range covered by the query will be twice the specified time range, and the granularity will be set such that two time buckets are returned, one for the given time range and one for the same time range prior.
            For example:

            time range: last 24 hours
            granularity: trend

            will return 2 time buckets (assuming both have data):

            - 48 hours ago to 24 hours ago
            - 24 hours ago to now

            Another example:

            time range: 2020-05-01 to 2020-05-15
            granularity: trend

            will return 2 time buckets:

            - 2020-04-15 through 2020-04-30
            - 2020-05-01 through 2020-05-15

            The granularity of the result may be coarser than requested.  The finest allowed granularity depends on the query's time range: data farther in the past may have coarser granularity.  The exact result granularity will be reported in the response `meta.granularity_ms` field.

            If granularity is not specified and "time" is in the dimensions list, a default will be chosen based on the time range requested.
          type: string
          enum:
            - minute
            - hour
            - day
            - week
            - trend
        time_range:
          description: The time range to query.
          default:
            type: relative
            time_range: 1h
          discriminator:
            propertyName: type
            mapping:
