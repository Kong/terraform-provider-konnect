    Portal:
      additionalProperties: false
      type: object
      required:
      - id
      - created_at
      - updated_at
      - name
      - default_domain
      - is_public
      - rbac_enabled
      - auto_approve_applications
      - auto_approve_developers
      - custom_domain
      - custom_client_domain
      - public_catalog_enabled
      properties:
        id:
          $ref: '../../../../../common/definitions/konnect_properties.yaml#/components/schemas/UUID'
        created_at:
          $ref: '../../../../../common/definitions/konnect_properties.yaml#/components/schemas/CreatedAt'
        updated_at:
          $ref: '../../../../../common/definitions/konnect_properties.yaml#/components/schemas/UpdatedAt'
        name:
          description: The name of the portal, used to distinguish it from other portals.
          type: string
          maxLength: 255
          minLength: 1
        default_domain:
          description: |-
            The domain assigned to the portal by Konnect. This is the default place to access the portal and its API if not using a `custom_domain``.
          type: string
          format: hostname
          readOnly: true
        is_public:
          description: |-
            Whether the portal catalog can be accessed publicly without any developer authentication. Developer accounts and applications
            cannot be created if the portal is public.
          type: boolean
        rbac_enabled:
          description: |-
            Whether the portal resources are protected by Role Based Access Control (RBAC). If enabled, developers view or register for products until
            unless assigned to teams with access to view and consume specific products.
          type: boolean
        auto_approve_applications:
          description: |-
            Whether the requests from applications to register for products will be automatically approved, or if they will be set to pending until
            approved by an admin.
          type: boolean
        auto_approve_developers:
          type: boolean
          description: |-
            Whether the developer account registrations will be automatically approved, or if they will be set to pending until approved by an admin.
        custom_domain:
          nullable: true
          type: string
          format: hostname
          description: |-
            The custom domain to access the developer portal. A CNAME for the portal's default domain must be able to be set for the custom domain
            for it to be valid. After setting a valid CNAME, an SSL/TLS certificate will be automatically manged for the custom domain, and traffic
            will be able to use the custom domain to route to the portal's web client and API.
        custom_client_domain:
          description: |-
            The custom domain to access a self-hosted customized developer portal client. If this is set, the Konnect-hosted portal client will no longer be available.
            `custom_domain` must be also set for this value to be set.
            See https://github.com/Kong/konnect-portal for information on how to get started deploying and customizing your own Konnect portal.
          nullable: true
          type: string
          format: hostname
        public_catalog_enabled:
          description: |-
            Whether API products that have been set to publicly visible will be visible in the portal to unauthenticated users.
          type: boolean
      example:
        $ref: '#/components/examples/GetPortalExample1/value'
