    DeveloperStatus:
      title: DeveloperStatus
      description: |-
        The status of a developer in a portal. Approved developers can log in, create applications, and view and register for products they have access to.
        Pending, revoked, and rejected developers cannot login or view any non-public portal information, or create or modify applications or registrations.
      type: string
      enum:
      - approved
      - pending
      - revoked
      - rejected
      example: approved
    ApplicationRegistrationStatus:
      title: ApplicationRegistrationStatus
      description: |-
        The status of an application registration request. Each registration is linked to a single version of a product, and application credentials will
        not grant access to the product version until the registration is approved.
        Pending, revoked, and rejected registrations will not provide access to the product version.
      type: string
      enum:
      - approved
      - pending
      - revoked
      - rejected
      example: approved
    PortalTheme:
      description: Select a pre-existing default theme or specify 'custom' to use custom_theme variables.
      type: string
      enum:
      - 'mint_rocket'
      - 'dark_mode'
      - 'custom'
      example: mint_rocket
