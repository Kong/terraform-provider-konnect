            will be able to use the custom domain to route to the portal's web client and API.
          type: string
          format: hostname
          nullable: true
          maxLength: 1024
        custom_client_domain:
          description: |-
            The custom domain to access a self-hosted customized developer portal client. If this is set, the Konnect-hosted portal will no longer be available.
            `custom_domain` must be also set for this value to be set.
            See https://github.com/Kong/konnect-portal for information on how to get started deploying and customizing your own Konnect portal.
          type: string
          format: hostname
          nullable: true
          maxLength: 1024
        public_catalog_enabled:
          description: |-
            Whether API products that have been set to publicly visible will be visible in the portal to unauthenticated users.
          type: boolean
      example:
        is_public: false
        rbac_enabled: true
        auto_approve_applications: false
        auto_approve_developers: false
        custom_domain: 'api.example.com'
        custom_client_domain: 'portal.example.com'
        public_catalog_enabled: false
