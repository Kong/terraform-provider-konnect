openapi: 3.0.3
info:
  title: Portal Management
  version: 2.0.0
  description: 'The management API for Portals'
  contact:
    name: Kong
    url: 'https://konghq.com'
servers:
  - url: 'https://us.api.konghq.com/v2'
    description: US Region Base URL
  - url: 'https://eu.api.konghq.com/v2'
    description: EU Region Base URL
paths:
  '/portals':
    get:
      summary: List Portals
      description: |-
        Lists developer portals defined in this region for this organization. Each developer portal is available at a unique address
        and has isolated appearance, configuration, developers, and applications.
      operationId: list-portals
      tags:
      - Portals
      parameters:
        - $ref: '../../../../../common/definitions/metadatas.yaml#/components/parameters/PageSize'
        - $ref: '../../../../../common/definitions/metadatas.yaml#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/SortPortals'
      responses:
        '200':
          $ref: '#/components/responses/ListPortals'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
  '/portals/categories':
    post:
      summary: Create a category
      description: |-
        Creates a Category that can be applied to multiple API Products on multiple Portals.
        A Category can contain a description, image and document to convey information to the developers.
      operationId: create-category
      x-unstable: true
      x-internal: true
      tags:
        - Portal Categories
      requestBody:
        $ref: '#/components/requestBodies/CreateCategoryRequest'
      responses:
        '201':
          $ref: '#/components/responses/GetCategory'
        '400':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
    get:
      summary: List categories
      description: |-
        Return a list of categories defined in this region for this organization.
      operationId: list-categories
      x-unstable: true
      x-internal: true
      tags:
      - Portal Categories
      parameters:
        - $ref: '../../../../../common/definitions/metadatas.yaml#/components/parameters/PageSize'
        - $ref: '../../../../../common/definitions/metadatas.yaml#/components/parameters/PageNumber'
      responses:
        '200':
          $ref: '#/components/responses/ListCategories'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
  '/portals/categories/{categoryId}':
    parameters:
      - $ref: '#/components/parameters/CategoryId'
    get:
      summary: Get a category by ID
      description: |-
        Retrieves a category by its unique ID.
      operationId: get-category-by-id
      x-unstable: true
      x-internal: true
      tags:
        - Portal Categories
      responses:
        '200':
          $ref: '#/components/responses/GetCategory'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '400':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
    patch:
      summary: Partially update a category by ID
      description: |-
        Partially updates an existing category by its unique ID.
      operationId: patch-category-by-id
      x-unstable: true
      x-internal: true
      tags:
        - Portal Categories
      requestBody:
        $ref: '#/components/requestBodies/UpdateCategoryRequest'
      responses:
        '200':
          $ref: '#/components/responses/GetCategory'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '400':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
    delete:
      summary: Delete a category by ID
      description: |-
        Delete a category by its unique ID.
      operationId: delete-category-by-id
      tags:
        - Portal Categories
      responses:
        '204':
          description: No Content
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
    # post:
    #   summary: Create a Portal
    #   description: |-
    #     Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod
    #     tempor incididunt ut labore et dolore magna aliqua.
    #   operationId: create-portal
    #   x-unstable: true
    #   x-internal: true
    #   tags:
    #   - Portals
    #   responses:
    #     '201':
    #       $ref: '#/components/responses/CreatePortal'
    #     '400':
    #       $ref: '../../../../../common/definitions/errors.yaml#/components/responses/BadRequest'
    #     '401':
    #       $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
    #     '403':
    #       $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
  '/portals/{portalId}':
    parameters:
      - $ref: '../../../../../common/definitions/portal.yaml#/components/parameters/PortalId'
    get:
      summary: Get Portal
      description: |-
        Returns the configuration for a single developer portal. This allows you to understand the current visibility, access,
        and domain settings.
      operationId: get-portal
      tags:
      - Portals
      responses:
        '200':
          $ref: '#/components/responses/GetPortal'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '400':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
    patch:
      summary: Update Portal
      description: |-
        Updates the configuration for a single portal including the visibility, access, and custom domain settings.
      operationId: update-portal
      x-unstable: true
      x-internal: true
      requestBody:
        $ref: '#/components/requestBodies/UpdatePortal'
      tags:
      - Portals
      responses:
        '200':
          $ref: '#/components/responses/UpdatePortal'
        '400':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
  '/portals/{portalId}/products':
    parameters:
        - $ref: '../../../../../common/definitions/portal.yaml#/components/parameters/PortalId'
    get:
      summary: List Portal Products
      operationId: list-portal-products
      description: |-
        Lists the API products that are published to this developer portal. An API product packages together multiple versions of each API, displaying 
        each version with its set of operations and documentation. Developers can browse API Products to learn about and register for them. API Products
        access can be limited to certain developers using RBAC and developer teams.
      parameters:
        - $ref: '../../../../../common/definitions/metadatas.yaml#/components/parameters/PageSize'
        - $ref: '../../../../../common/definitions/metadatas.yaml#/components/parameters/PageNumber'
      tags:
      - Portal Products
      responses:
          '200':
            $ref: '#/components/responses/ListPortalProducts'
          '400':
            $ref: '../../../../../common/definitions/errors.yaml#/components/responses/BadRequest'
          '401':
            $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
          '403':
            $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
          '404':
            $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
    post:
      summary: Publish an API product to the Portal
      description: |
        Publish an existing API product to the Portal
      operationId: publish-api-product
      x-unstable: true
      x-internal: true
      tags:
        - Portal Products
      requestBody:
        $ref: '#/components/requestBodies/PublishProductToPortal'
      responses:
        '201':
          $ref: '#/components/responses/GetPortalProduct'
        '400':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
  '/portals/{portalId}/products/{productId}':
    parameters:
      - $ref: '../../../../../common/definitions/portal.yaml#/components/parameters/PortalId'
      - $ref: '#/components/parameters/ProductId'
    get:
      summary: Get One Portal Product
      operationId: get-portal-product
      x-unstable: true
      x-internal: true
      description: Retrieves portal-specific info for the API product
      tags:
      - Portal Products
      responses:
        '201':
          $ref: '#/components/responses/GetPortalProduct'
        '400':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
    patch:
      summary: Update a Portal Product
      operationId: update-portal-product
      x-unstable: true
      x-internal: true
      description: Update portal-specific info for the API product, including its category and public catalog status.
      tags:
        - Portal Products
      requestBody:
        $ref: '#/components/requestBodies/UpdatePortalProduct'
      responses:
        '201':
          $ref: '#/components/responses/GetPortalProduct'
        '400':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
    delete:
      summary: Unpublish an API Product from the Portal
      operationId: delete-portal-product
      x-unstable: true
      x-internal: true
      description: |
        Unpublish an API product from the Portal, deleting the Portal Product
      tags:
        - Portal Products
      responses:
        '204':
          description: No Content
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
  '/portals/{portalId}/developers/{developerId}':
    parameters:
      - $ref: '../../../../../common/definitions/portal.yaml#/components/parameters/PortalId'
      - $ref: '#/components/parameters/DeveloperId'
    get:
      summary: Get Developer
      description: |-
        Returns information about a single developer in this portal. Each developer manages a set applications, providing
        them credentials to access registered API product versions. Developer registration access can be limited to
        specific API products using RBAC.
      operationId: get-developer
      parameters:
        - $ref: '../../../../../common/definitions/portal.yaml#/components/parameters/PortalId'
        - $ref: '#/components/parameters/DeveloperId'
      tags:
      - Portal Developers
      responses:
        '200':
          $ref: '#/components/responses/GetDeveloper'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
    patch:
      summary: Update Developer
      description: |-
        Updates the status of a particular developer. Approved developers have access to login to the portal. Revoked, rejected, or pending are not allowed to login.
        Even if a developer's status is no longer approved, they will still be able to using any existing credentials generated while they were approved, until each 
        application registration is revoked or deleted.
      operationId: update-developer
      requestBody:
        $ref: '#/components/requestBodies/UpdateDeveloper'
      tags:
      - Portal Developers
      responses:
        '200':
          $ref: '#/components/responses/UpdateDeveloper'
        '400':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
    delete:
      summary: Delete Developer
      description: |-
        Deletes a developer, which will discontinue their ability to login, view any non-public resources, and delete all applications owned by them.
        All credentials issued to the developer will no longer provide access to any API Products.
        A deleted developer's unique email must be re-registered and approved to gain access again.
      operationId: delete-developer
      tags:
      - Portal Developers
      responses:
        '204':
          description: No Content
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
  '/portals/{portalId}/applications':
    get:
      summary: List Applications
      description: |-
        Lists applications created by developers in this portal. Each application can be registered for various API Products (by version),
        issuing credentials for API request access. If using DCR, an application will be linked to an Identity Provider's application by
        its `reference_id`.
      operationId: list-applications
      parameters:
        - $ref: '../../../../../common/definitions/portal.yaml#/components/parameters/PortalId'
        - $ref: '../../../../../common/definitions/metadatas.yaml#/components/parameters/PageSize'
        - $ref: '../../../../../common/definitions/metadatas.yaml#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/SortApplications'
        - schema:
            type: object
            properties:
              developer_id:
                $ref: '../../../../../common/definitions/aip_filters.yaml#/components/schemas/UuidFieldFilter'
              developer_name: 
                $ref: '../../../../../common/definitions/aip_filters.yaml#/components/schemas/StringFieldFilter'
              developer_email:
                $ref: '../../../../../common/definitions/aip_filters.yaml#/components/schemas/StringFieldFilter'
              name:
                $ref: '../../../../../common/definitions/aip_filters.yaml#/components/schemas/StringFieldFilter'
          in: query
          name: filter
          description: Filter applications returned in the response.
          required: false
          style: deepObject
      tags:
      - Portal Applications
      responses:
        '200':
          $ref: '#/components/responses/ListApplications'
        '400':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
  '/portals/{portalId}/applications/{applicationId}':
    get:
      summary: Get Application
      description: |-
        Returns the configuration of a single application in this portal. If an application is linked to a DCR Provider,
        the `dcr_provider.id` and `reference_id` can be used to correlate it. An application manages a set of credentials
        and registrations for specific API product versions.
      operationId: get-application
      parameters:
        - $ref: '../../../../../common/definitions/portal.yaml#/components/parameters/PortalId'
        - $ref: '#/components/parameters/ApplicationId'
      tags:
      - Portal Applications
      responses:
        '200':
          $ref: '#/components/responses/GetApplication'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
  '/portals/{portalId}/application-registrations':
     get:
      summary: List Application Registrations by Portal
      description: |-
        Lists all of the application registrations and their current status (e.g., approved or pending) for this portal. 
        Each registration is associated with a single API product version. Access is provided through the credentials issued
        to the application that contains each registration.
      operationId: list-registrations
      parameters:
        - $ref: '../../../../../common/definitions/portal.yaml#/components/parameters/PortalId'
        - $ref: '../../../../../common/definitions/metadatas.yaml#/components/parameters/PageSize'
        - $ref: '../../../../../common/definitions/metadatas.yaml#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/SortListAllApplicationRegistrations'
        - schema:
            type: object
            properties:
              developer_id:
                $ref: '../../../../../common/definitions/aip_filters.yaml#/components/schemas/UuidFieldFilter'
              developer_name:
                $ref: '../../../../../common/definitions/aip_filters.yaml#/components/schemas/StringFieldFilter'
              application_name:
                $ref: '../../../../../common/definitions/aip_filters.yaml#/components/schemas/StringFieldFilter'
              status:
                $ref: '../../../../../common/definitions/aip_filters.yaml#/components/schemas/StringFieldFilter'
          in: query
          name: filter
          description: Filter application registrations returned in the response.
          required: false
          style: deepObject
      tags:
      - Portal Application Registrations
      responses:
        '200':
          $ref: '#/components/responses/ListApplicationRegistrations'
        '400':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
  '/portals/{portalId}/applications/{applicationId}/registrations':
     get:
      summary: List Registrations by Application
      description: |-
        Lists each API product version that this application is registered for and their current status (e.g., pending, approved, rejected, revoked).
      operationId: list-registrations-by-application
      parameters:
        - $ref: '../../../../../common/definitions/portal.yaml#/components/parameters/PortalId'
        - $ref: '#/components/parameters/ApplicationId'
        - $ref: '../../../../../common/definitions/metadatas.yaml#/components/parameters/PageSize'
        - $ref: '../../../../../common/definitions/metadatas.yaml#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/SortApplicationRegistrations'
        - schema:
            type: object
            properties:
              status:
                $ref: '../../../../../common/definitions/aip_filters.yaml#/components/schemas/StringFieldFilter'
          in: query
          name: filter
          description: Filter application registrations returned in the response.
          required: false
          style: deepObject
      tags:
      - Portal Application Registrations
      responses:
        '200':
          $ref: '#/components/responses/ListApplicationRegistrations'
        '400':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
  '/portals/{portalId}/applications/{applicationId}/registrations/{registrationId}':
    parameters:
      - $ref: '../../../../../common/definitions/portal.yaml#/components/parameters/PortalId'
      - $ref: '#/components/parameters/ApplicationId'
      - $ref: '#/components/parameters/RegistrationId'
    get:
      summary: Get Application Registration
      description: |-
        Returns information about an application's registration status for a particular API product version.
      operationId: get-application-registration
      tags:
      - Portal Application Registrations
      responses:
        '200':
          $ref: '#/components/responses/GetApplicationRegistration'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
    patch:
      summary: Update Application Registration
      description: |-
        Updates the status of a particular application registration to an API Product Version. Approved application registrations
        will allow API traffic to the corresponding API. Revoked, rejected, or pending will not allow API traffic.
      operationId: update-application-registration
      requestBody:
        $ref: '#/components/requestBodies/UpdateApplicationRegistration'
      tags:
      - Portal Application Registrations
      responses:
        '200':
          $ref: '#/components/responses/UpdateApplicationRegistration'
        '400':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
    delete:
      summary: Delete Application Registration
      description: |-
        Deletes an application registration, which if currently approved will immediately block API traffic to the API product version.
        Note: Developers can request a new application registration for the given API product version as long as they have RBAC access to consume.
      operationId: delete-application-registration
      tags:
      - Portal Application Registrations
      responses:
        '204':
          description: No Content
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
  '/portals/{portalId}/applications/{applicationId}/registrations/{registrationId}/granted-scopes':
    get:
      summary: List Granted Scopes
      description: |-
        Lists the granted scopes for this application registration. This is the list of scopes that will be sent to the API when making requests.
      operationId: list-granted-scopes
      tags:
        - Portal Application Registrations
      parameters:
        - $ref: '../../../../../common/definitions/portal.yaml#/components/parameters/PortalId'
        - $ref: '#/components/parameters/ApplicationId'
        - $ref: '#/components/parameters/RegistrationId'
      responses:
        '200':
          $ref: '#/components/responses/ListGrantedScopes'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
  '/portals/appearance-defaults':
    get:
      summary: Get Default Appearance Configurations
      description: |-
        Returns the built-in portal appearance configurations including pre-defined themes, colors, and font settings.
      operationId: get-portal-appearance-defaults
      tags:
        - Portal Appearance
      responses:
        '200':
          $ref: '#/components/responses/GetAppearanceDefaults'
        '400':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
  '/portals/{portalId}/appearance':
    get:
      summary: Get Appearance Configuration
      description: |-
        Returns the current portal appearance configuration including any custom theme, colors, fonts, and image settings.
        Portals using the fully-customizable portal client may override or ignore these settings by disregarding them in the code.
      operationId: get-portal-appearance
      parameters:
        - $ref: '../../../../../common/definitions/portal.yaml#/components/parameters/PortalId'
      tags:
        - Portal Appearance
      responses:
        '200':
          $ref: '#/components/responses/GetPortalAppearance'
        '400':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
    patch:
      summary: Update Appearance Configuration
      description: |-
        Updates the current appearance configuration for this portal including setting pre-defined or custom themes, fonts, colors, and images.
        Note that portals using the fully-customizable portal client may override or ignore these settings by disregarding them in the code.
      operationId: update-portal-appearance
      requestBody:
        $ref: '#/components/requestBodies/UpdatePortalAppearance'
      parameters:
        - $ref: '../../../../../common/definitions/portal.yaml#/components/parameters/PortalId'
      tags:
        - Portal Appearance
      responses:
        '200':
          $ref: '#/components/responses/UpdatePortalAppearance'
        '400':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
  '/portals/{portalId}/verify-domain':
    post:
      summary: Verify Custom Domains
      description: |-
        Verifies the current status of the custom hosted domain for this portal, indicating whether the appropriate CNAME properties
        have propagated and if a corresponding SSL certificate has been generated.
      operationId: verify-portal-domains
      parameters:
        - $ref: '../../../../../common/definitions/portal.yaml#/components/parameters/PortalId'
      tags:
        - Portals
      responses:
        '200':
          $ref: '#/components/responses/VerifyPortalDomains'
        '400':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
  /portals/{portalId}/authentication-settings:
    parameters:
    - $ref: '../../../../../common/definitions/portal.yaml#/components/parameters/PortalId'
    get:
      summary: Get Auth Settings
      description: |-
        Returns the developer authentication configuration for a portal, which determines how developers can log in and how they are assigned to teams.
      operationId: get-portal-authentication-settings
      tags:
        - Portal Auth Settings
      responses:
        '200':
          $ref: '#/components/responses/PortalAuthenticationSettings'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
    patch:
      summary: Update Auth Settings
      description: |-
        Updates the developer authentication configuration for a portal. Developers can be allowed to login using basic auth (email & password) or use
        Single-Sign-On (SSO) through an OIDC Identity Provider (IdP). Developers can be automatically assigned to teams by mapping claims from thier
        IdP account.
      operationId: update-portal-authentication-settings
      requestBody:
        $ref: '#/components/requestBodies/UpdatePortalAuthenticationSettings'
      tags:
        - Portal Auth Settings
      responses:
        '200':
          $ref: '#/components/responses/PortalAuthenticationSettings'
        '400':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
  /portals/{portalId}/identity-provider/team-group-mappings:
    parameters:
    - $ref: '../../../../../common/definitions/portal.yaml#/components/parameters/PortalId'
    get:
      summary: List Team Group Mappings
      description: |-
        Lists mappings between Konnect portal teams and Identity Provider (IdP) groups.
        Returns a 400 error if an IdP has not yet been configured.
      operationId: list-portal-team-group-mappings
      parameters:
        - $ref: '../../../../../common/definitions/metadatas.yaml#/components/parameters/PageSize'
        - $ref: '../../../../../common/definitions/metadatas.yaml#/components/parameters/PageNumber'
      responses:
        '200':
          $ref: '#/components/responses/PortalTeamGroupMappingCollection'
        '400':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
      tags:
        - Portal Auth Settings
    patch:
      summary: Update Team Group Mappings
      description: |-
        Allows partial updates to the mappings between Konnect portal teams and Identity Provider (IdP) groups.
        The request body must be keyed on team ID. For a given team ID, the given group list is a
        complete replacement. To remove all mappings for a given team, provide an empty group list.

        Returns a 400 error if an IdP has not yet been configured, or if a team ID in
        the request body is not found or is not a UUID.
      operationId: update-portal-team-group-mappings
      responses:
        '200':
          $ref: '#/components/responses/PortalTeamGroupMappingCollection'
        '400':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
      tags:
        - Portal Auth Settings
      requestBody:
        $ref: '#/components/requestBodies/UpdatePortalTeamGroupMappings'
  /portals/{portalId}/teams:
    parameters:
    - $ref: '../../../../../common/definitions/portal.yaml#/components/parameters/PortalId'
    get:
      summary: List Teams
      description: |-
        Lists the developer teams in a portal. Each team can contain any developer and developers can be part of multiple teams.
      operationId: list-portal-teams
      responses:
        '200':
          $ref: '#/components/responses/ListPortalTeams'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
      parameters:
        - $ref: '../../../../../common/definitions/metadatas.yaml#/components/parameters/PageSize'
        - $ref: '../../../../../common/definitions/metadatas.yaml#/components/parameters/PageNumber'
        - schema:
            type: object
            properties:
              name:
                $ref: '../../../../../common/definitions/aip_filters.yaml#/components/schemas/StringFieldFilter'
          in: query
          name: filter
          description: Filter teams returned in the response.
          required: false
          style: deepObject
      tags:
        - Portal Teams
    post:
      summary: Create Team
      operationId: create-portal-team
      responses:
        '201':
          $ref: '#/components/responses/PortalTeam'
        '400':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
      tags:
        - Portal Teams
      requestBody:
        $ref: '#/components/requestBodies/PortalCreateTeam'
      description: |-
        Creates a developer team in a portal. Developers can be added to teams to provide RBAC access to API products.
        Teams can be assigned roles that grant permissions to perform an action on a resource.
  /portals/{portalId}/teams/{teamId}:
    parameters:
      - $ref: '../../../../../common/definitions/portal.yaml#/components/parameters/TeamId'
      - $ref: '../../../../../common/definitions/portal.yaml#/components/parameters/PortalId'
    get:
      summary: Get Team
      responses:
        '200':
          $ref: '#/components/responses/PortalTeam'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
      operationId: get-portal-team
      description: Get an individual team.
      tags:
        - Portal Teams
    patch:
      description: |-
        Updates an individual developer team for a portal.
      summary: Update Team
      operationId: update-portal-team
      responses:
        '200':
          $ref: '#/components/responses/PortalTeam'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
      requestBody:
        $ref: '#/components/requestBodies/PortalUpdateTeam'
      tags:
        - Portal Teams
    delete:
      summary: Delete Team
      operationId: delete-portal-team
      description: |-
        Deletes a developer team from a portal. Deleting a team also deletes its assigned roles.
        Members of the team are not deleted, but they will lose any access provided through the team.
      responses:
        '204':
          description: No Content
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
      tags:
        - Portal Teams
  /portals/{portalId}/teams/{teamId}/developers:
    parameters:
      - $ref: '../../../../../common/definitions/portal.yaml#/components/parameters/PortalId'
      - $ref: '../../../../../common/definitions/portal.yaml#/components/parameters/TeamId'
    get:
      summary: List Team Developers
      responses:
        '200':
          $ref: '#/components/responses/ListBasicDevelopers'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
      operationId: list-portal-team-developers
      description: List a team's developers.
      parameters:
        - $ref: '../../../../../common/definitions/metadatas.yaml#/components/parameters/PageSize'
        - $ref: '../../../../../common/definitions/metadatas.yaml#/components/parameters/PageNumber'
      tags:
        - Portal Team Membership
    post:
      summary: Add Developer to Team
      operationId: add-developer-to-portal-team
      description: |-
        Adds a developer to a team. This associates them with all of the roles that have been assigned to the team,
        providing specific permissions to perform actions on resources.
      responses:
        '201':
          description: Created
        '400':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
      requestBody:
        $ref: '#/components/requestBodies/AddDeveloperToTeam'
      tags:
        - Portal Team Membership
  /portals/{portalId}/teams/{teamId}/developers/{developerId}:
    parameters:
      - $ref: '../../../../../common/definitions/portal.yaml#/components/parameters/PortalId'
      - $ref: '../../../../../common/definitions/portal.yaml#/components/parameters/DeveloperId'
      - $ref: '../../../../../common/definitions/portal.yaml#/components/parameters/TeamId'
    delete:
      summary: Remove Developer from Team
      operationId: remove-developer-from-portal-team
      description: |-
        Removes a developer from a team. This removes the association of the team's roles from the developer.
      responses:
        '204':
          description: No Content
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
      tags:
        - Portal Team Membership
  /portals/{portalId}/teams/{teamId}/assigned-roles:
    parameters:
      - $ref: '../../../../../common/definitions/portal.yaml#/components/parameters/PortalId'
      - $ref: '../../../../../common/definitions/portal.yaml#/components/parameters/TeamId'
      - $ref: '../../../../../common/definitions/metadatas.yaml#/components/parameters/PageSize'
      - $ref: '../../../../../common/definitions/metadatas.yaml#/components/parameters/PageNumber'
    get:
      summary: List Team Roles
      description: |-
        Lists the roles belonging to a developer team. Each role provides permissions to perform actions
        on a specified resource or collection.
      tags:
        - Portal Team Roles
      responses:
        '200':
          $ref: '#/components/responses/AssignedPortalRoleCollection'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
      operationId: list-portal-team-roles
    post:
      summary: Assign Role
      operationId: assign-role-to-portal-teams
      description: |-
        Assign a role to a developer team. This associates the set of permissions in a role with the team,
        so that they will be applied to any developer who is a member of the team.
      responses:
        '201':
          $ref: '#/components/responses/PortalAssignedRole'
        '400':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
        '409':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Conflict'
      requestBody:
        $ref: '#/components/requestBodies/PortalAssignRole'
      tags:
        - Portal Team Roles
  /portals/{portalId}/teams/{teamId}/assigned-roles/{roleId}:
    parameters:
      - $ref: '../../../../../common/definitions/portal.yaml#/components/parameters/RoleId'
      - $ref: '../../../../../common/definitions/portal.yaml#/components/parameters/PortalId'
      - $ref: '../../../../../common/definitions/portal.yaml#/components/parameters/TeamId'
    delete:
      summary: Remove Role
      operationId: remove-role-from-portal-team
      description: |-
        Removes an assigned role from a developer team. This deletes the association of the role with team and each
        of its members.
      responses:
        '204':
          description: No Content
        '400':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
      tags:
        - Portal Team Roles
  /portals/{portalId}/developers:
    parameters:
      - $ref: '../../../../../common/definitions/portal.yaml#/components/parameters/PortalId'
    get:
      summary: List Developers
      description: |-
        Lists the developers that have registered for this portal. Each developer can be registered to one portal and must be approved to login
        unless using the developer auto-approve setting.
      operationId: list-portal-developers
      tags:
        - Portal Developers
      responses:
        '200':
          $ref: '#/components/responses/ListDevelopers'
        '400':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
      parameters:
        - $ref: '../../../../../common/definitions/metadatas.yaml#/components/parameters/PageSize'
        - $ref: '../../../../../common/definitions/metadatas.yaml#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/SortDevelopers'
        - schema:
            type: object
            properties:
              name:
                $ref: '../../../../../common/definitions/aip_filters.yaml#/components/schemas/StringFieldFilter'
              status:
                $ref: '../../../../../common/definitions/aip_filters.yaml#/components/schemas/StringFieldFilter'
              email:
                $ref: '../../../../../common/definitions/aip_filters.yaml#/components/schemas/StringFieldFilter'
          in: query
          name: filter
          description: Filter developers returned in the response.
          required: false
          style: deepObject
  /portals/{portalId}/developers/{developerId}/teams:
    parameters:
      - $ref: '../../../../../common/definitions/portal.yaml#/components/parameters/DeveloperId'
      - $ref: '../../../../../common/definitions/portal.yaml#/components/parameters/PortalId'
    get:
      summary: List Developer Teams
      operationId: list-portal-developer-teams
      description: |-
        Lists the teams to which a developer belongs. Each team a developer is a member of grants them various roles
        that provide permissions to perform actions on certain resources.
      responses:
        '200':
          $ref: '#/components/responses/ListPortalTeams'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/NotFound'
      parameters:
        - $ref: '../../../../../common/definitions/metadatas.yaml#/components/parameters/PageSize'
        - $ref: '../../../../../common/definitions/metadatas.yaml#/components/parameters/PageNumber'
      tags:
        - Portal Team Membership
  /portal-roles:
    get:
      summary: List Portal Roles
      operationId: list-portal-roles
      description: |-
        List roles that can be assigned to teams in a portal. Each role provides a set of permissions to perform
        an action on a resource.
      responses:
        '200':
          $ref: '#/components/responses/ListRoles'
        '401':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../../../../common/definitions/errors.yaml#/components/responses/Forbidden'
      tags:
        - Portal Team Roles
