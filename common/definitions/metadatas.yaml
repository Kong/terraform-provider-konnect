components:
  schemas:
    PaginatedMeta:
      type: object
      title: PaginatedMeta
      description: returns the pagination information
      properties:
        page:
          $ref: '#/components/schemas/PageMeta'
      required:
      - page
    PageMeta:
      type: object
      description: Contains pagination query parameters and the total number of objects returned.
      required:
      - number
      - size
      - total
      properties:
        number:
          type: number
          example: 1
        size:
          type: number
          example: 10
        total:
          type: number
          example: 100
    CursorPaginatedMeta:
      type: object
      title: CursorPaginatedMeta
      description: Returns the pagination information
      properties:
        page:
          $ref: '#/components/schemas/CursorPageMeta'
      required:
      - page
    CursorPageMeta:
      type: object
      description: Contains the cursor pagination metadata
      required:
      - size
      - next
      - previous
      properties:
        first:
          description: URI to the first page
          type: string
          format: uri
        last:
          description: URI to the last page
          type: string
          format: uri
        next:
          description: URI to the next page
          type: string
          format: uri
        previous:
          description: URI to the previous page
          type: string
          format: uri
        size:
          description: Requested page size
          type: number
          example: 10
  parameters:
    PageBefore:      
      name: 'page[before]'
      description: Request the next page of data, starting with the item before this parameter.
      required: false
      in: query
      allowEmptyValue: true
      schema:
        type: string
        example: 'ewogICJpZCI6ICJoZWxsbyB3b3JsZCIKfQ'
    PageAfter:
      name: 'page[after]'
      description: Request the next page of data, starting with the item after this parameter.
      required: false
      in: query
      allowEmptyValue: true
      schema:
        type: string
        example: 'ewogICJpZCI6ICJoZWxsbyB3b3JsZCIKfQ'
    PageSize:
      name: 'page[size]'
      description: The maximum number of items to include per page. The last page of a collection may include fewer items.
      required: false
      in: query
      allowEmptyValue: true
      schema:
        type: integer
        example: 10
    PageNumber:
      name: 'page[number]'
      description: Determines which page of the entities to retrieve.
      required: false
      in: query
      allowEmptyValue: true
      schema:
        type: integer
        example: 1
