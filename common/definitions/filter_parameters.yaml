components:
  parameters:
    FilterByStatusEquality:
      name: 'filter[status][eq]'
      description: Filter by direct equality comparison of the status property with a supplied value.
      in: query
      required: false
      schema:
        type: string
        enum:
          - approved
          - pending
          - rejected
          - revoked
        example: 'approved'
