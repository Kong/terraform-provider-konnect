components:
  parameters:
    PortalId:
      schema:
        type: string
        format: uuid
      name: portalId
      in: path
      required: true
      description: ID of the portal.
    DeveloperId:
      schema:
        type: string
        example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        format: uuid
      name: developerId
      in: path
      required: true
      description: ID of the developer.
    RoleId:
      schema:
        type: string
        example: 8350205f-a305-4e39-abe9-bc082a80091a
        format: uuid
      name: roleId
      in: path
      required: true
    TeamId:
      schema:
          type: string
          format: uuid
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
      name: teamId
      in: path
      required: true
      description: ID of the team.