components:
  schemas:
    DocumentFormatContentTypeEnum:
      type: string
      default: application/json
      enum:
        - application/json
        - application/konnect.document-nodes+json
    DocumentContentTypeEnum:
      type: string
      default: 'application/json'
      enum:
      - 'application/json'
      - 'application/konnect.document-tree+json'
    ListDocuments:
      type: object
      required:
      - meta
      - data
      properties:
        meta:
          $ref: './metadatas.yaml#/components/schemas/PaginatedMeta'
        data:
          type: array
          items:
            $ref: '#/components/schemas/DocumentItem'
    ListDocumentsTree:
      type: object
      required:
      - meta
      - data
      properties:
        meta:
          $ref: './metadatas.yaml#/components/schemas/PaginatedMeta'
        data:
          type: array
          items:
            $ref: '#/components/schemas/DocumentTree'
    DocumentItem:
      type: object
      title: Document item
      required:
      - id
      - parent_document_id
      - slug
      - title
      properties:
        id:
          type: string
          format: uuid
          description: the id of the document
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        parent_document_id:
          type: string
          format: uuid
          description: the id of the parent document
          nullable: true
          example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
        slug:
          type: string
          description: the slug of the document
          example: getting-started
        title:
          type: string
          description: the title of the document
          example: Getting Started
    DocumentTree:
      type: object
      title: DocumentTree
      description: a document tree
      required:
      - id
      - title
      - slug
      - meta
      - children
      properties:
        id:
          type: string
          format: uuid
          example: d32d905a-ed33-46a3-a093-d8f536af9a8a
        parent_document_id:
          type: string
          format: uuid
          nullable: true
          example: dd4e1b98-3629-4dd3-acc0-759a726ffee2
        title:
          type: string
          description: the title of the document
          example: Getting Started
        slug:
          type: string
          description: the slug of the document
          example: getting-started
        meta:
          type: object
          description: the metadata of the document
          example: {
              "author": "Jane Doe",
              "description": "This is a description",
              "keywords": "hello, world"
            }
        children:
          type: array
          items:
            $ref: '#/components/schemas/DocumentTree'
