          additionalProperties: false
          nullable: true
          properties:
            id:
              type: string
          x-foreign: true
          x-speakeasy-terraform-plan-only: true
        created_at:
          description: Unix epoch when the resource was created.
          type: integer
          readOnly: true
        id:
          type: string
          nullable: true
        name:
          description: The SNI name to associate with the given certificate.
          type: string
        tags:
          description: An optional set of strings associated with the SNIs for grouping and filtering.
          type: array
          items:
            type: string
        updated_at:
          description: Unix epoch when the resource was last updated.
          type: integer
          readOnly: true
      example:
        certificate:
          id: bd380f99-659d-415e-b0e7-72ea05df3218
        id: 36c4566c-14cc-4132-9011-4139fcbbe50a
        name: some.example.org
      additionalProperties: false
      required:
        - name
        - certificate
