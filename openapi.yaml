                  type: string
                  enum:
                    - tcp
                    - http
                    - https
                    - grpc
                    - grpcs
                unhealthy:
                  type: object
                  properties:
                    http_failures:
                      type: integer
                    http_statuses:
                      type: array
                      items:
                        type: integer
                    interval:
                      type: number
                    tcp_failures:
                      type: integer
                    timeouts:
                      type: integer
            passive:
              type: object
              properties:
                healthy:
                  type: object
                  properties:
                    http_statuses:
                      type: array
                      items:
                        type: integer
                    successes:
                      type: integer
                type:
                  type: string
                  enum:
                    - tcp
                    - http
                    - https
                    - grpc
                    - grpcs
                unhealthy:
                  type: object
                  properties:
                    http_failures:
                      type: integer
                    http_statuses:
                      type: array
                      items:
                        type: integer
                    tcp_failures:
