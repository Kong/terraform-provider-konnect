openapi: 3.0.0
info:
  title: Example API
  version: 1.0.0
paths:
  /v2/{id}/users:
    get:
      summary: List all users
      responses:
        '200':
          $ref: '#/components/schemas/User'
      parameters:
        - $ref: '#/components/parameters/id'
    delete:
      summary: Delete users
      responses:
        '204':
          description: The resource was deleted successfully.
      parameters:
        - $ref: '#/components/parameters/id'
components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
  parameters:
    id:
      name: id
      in: query
      required: true
      schema:
        type: string
