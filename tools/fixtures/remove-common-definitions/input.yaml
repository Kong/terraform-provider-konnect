components:
  schemas:
    Error:
      type: object
      properties:
        invalid_parameters:
          type: array
          items:
            $ref: "#/components/schemas/InvalidParameter"
    InvalidParameter:
      type: object
      properties:
        name:
          type: string
paths:
  /mesh/control-planes/{cpId}/:
    get:
      operationId: index
      summary: The index endpoint
      resources:
        '200':
          $ref: '#/components/responses/IndexResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
